front:
  text: 樊川文集第二十
  hash: sha256:7bcb315d22cdb9ef7d0b248e9304af7898bd86af5cb93e2480eb5991b766df00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_020-1a}
body:
  text: 杜牧字牧之髙駢除祭酒兼侍御史依前充職右神䇿軍兵馬使制􅎁右神䇿軍右廂兵馬使兼押衙銀青光祿大夫檢校國子祭酒前靈州大都督府左司馬殿中侍御史上柱國髙駢禁旅典兵為吾爪士言念付祿未稱輸勞舛之王官帖以憲秩可曰榮遇無忘盡瘁可檢校國子祭酒兼濮王府司馬侍御史餘如故忠武軍都押衙檢校太子賔客王仲玄等加官制勑忠武軍節度右都押衙銀青光祿大夫撿校太子賔客兼殿中侍御史王仲玄等自艱難以來言念許師何役不行何戰不會居常則長法知禮臨敵則致命爭登摽於和門不忝忠武爾等短衣長劒事寇乘邊觸履艱危無所顧慮將軍列狀憲班酬勞勿矜常勝無忘淬礪可依前件右神䇿軍押衙檢校太子賔客尚漢美等敘勳制勑前件等拔以貔貅之勇籍於禁旅之中大刀長矛重弓束矢林會山立星羅翼舒唯以忠勤供我宸極錫之勳寵以酬勞瘁可依前件右龍武軍大將軍劉誠信等三十三人敘階制勑右龍武軍大將兵馬都知正議大夫檢校太子賔客上柱國賜紫金魚袋右龍武軍宿衛劉誠信等技以勇聞任因信普力可挾輈以走敵藝能奪弰以制人常礪鋒鍩無所回避自拱宸極益展忠勞思以報之何惜階級可依前件柳師玄除衢州長史知夏州進奏等制勑夏州節度押衙知進奏朝議郎前權知杭州長史兼監察御史上柱國柳師玄等將軍謢塞師玄主留邸之職從瑜繼怤以墨纕徇公喪葬告滿圭專書府藂委之務咸有勞能遷奬正名亦其常也各冝專謹勿罹悔尤可依前件賴師貞除懷州長史周少鄘除􅉑州司馬王桂直除遒州長史等制勑鳯翔府節度押衙知進奏銀青光祿大夫檢校祕書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事少鄘專史閣錯雜之務皆公謹歲久官次冝遷玄爽俾佐郡符亦有可取湖外飢人相聚為寇蕩覆鄉縣勢如燎火蓋不得巳遂至翦伐桂冝用命一舉滅之言念功勤冝有褒賞名郡上佐帖以憲秩耀爾軍旅可增義勇可依前件景思齊授官知宣武軍進奏官制勑宣武軍節度押衙知進奏起復銀青光祿大夫檢校太子賔客兼歙州司馬上柱國景思齊等諸侯之任各有職貢小者得循事例大者決於朝廷聞白啓導屬在留邸爾等咸以謹密能膺任使或外除喪服或超授新命不失職祿勉於忠勤可依前件馮少端等湖南軍將授官制勑湖南同團練副使馮少端等皆長沙勇士同擢凶徒言念功勤咸冝升獎帖之憲秩試以崇班名郡掾曹亦為美稱特如恩寵非用彛章耀爾轅門可增忠壯可依前件朱諌周豹二人委本道量事優獎官健升滿等一百二十八人弩手并子弟周質等四百八十五人並委本道酌事量加賞給武官授折衝果毅等制勑具官某等夫折衝果毅皆吾武位以延勇士國朝用此以進立戰功至將軍者衆矣自府兵一廢名存實亡今之來者豈其人哉近以邉障隙開寇戎患結豈無萬人之敵奮於下位之中但使披文空增拊髀並可依前件張直方貶恩州司戶制勑朕聞先王之理也設法誤罹雖大必捨不忌故犯縱小必誅况乎凶狠不悛罪戾日積更欲矜免其如法何銀青光祿大夫檢校刑部尚書兼左驍衛大將軍御史大夫張直方念以來朝嘉其慕善付之寵祿頗極尊榮為執金吾鞭小過而至死作禁軍統去異縣而恣遊尚以生自邉陲素乏教義退之散秩以懲非心俟其抆拭舊㢃湔洗前過必欲牽復用存始終豈暴虐得於天生險悍著於心本抵冒刑憲縱恣胸臆法所惡者爾皆為之白晝九衢指憎萬手作橫日甚而不自知滿於聽聞豈可悉數禮曰凡有罪惡屏於四裔不留中國唯舜能之況之堅頑有不移之姿網羅無屢開之典荒服作掾猶曰寬恩爾能自新豈惜後命可守恩州司户參軍貟外置同正貟仍即馳驛發遣王著貶端州司户制勑守愛州九真縣尉貟外置同正貟王著漢家之制雖丞貟相子亦當戌邉隋文之令盜邉榖一升坐法斬首蓋以西北鎮戍華夏保障法茍不立所虞非細爾當羌寇犯塞之日天子拊髀之時命守關防以為遮扜而乃占般兵糧自取傭直屏之荒服以謹其類乃令厥子叫閽稱冤再命坐獄備見罪狀幸以得無逋負可以矜寬為列郡之掾曹換萬里之一尉足得循省吾不負人可守端州司户參軍置問正貟仍即馳驛發遣李玕貶撫州司馬制勑朝散大夫守光祿少卿李玕昔開元致理之𥘉兾州刺史平嗣光闕溫凊之禮遂奪其官放歸田里是故四十餘年風俗忠厚教化之本豈先斯乎爾為將相之家窮極富貴坐有大第官為亞卿母子異居僅將十載有司彈劾事狀昭著於吾用法爾當何罪俾佐名郡尚曰寬恩可守撫州司馬貟外置同正貟仍即馳驛發遣薑閲貶嶽州司馬等制勑朝議郎前守景陵臺令上柱國薑閲等盜逆無狀輒犯陵寢侵攘法物聞之震驚爾等官業在於守奉懈怠所政是誰之過言於末減朕不敢議各宜佐官用正典刑可依前件仍並馳驛發遣武易簡量移梧州司馬制勑守崖州司戶參軍貟外置同正武易簡寇來乘城不能死節以此播棄爾亦何辭然漢誅李陵是為虐典魏捨于禁實得中道力不足者法冝矜焉守臣教為吾爪牙能與别白使易簡導生還之路朝廷無失入之刑咨爾三事大僚百司庶尹率能守此可期洽平各冝盡規朕不惜失可守梧州司馬貟外置同正貟王元宥除右神䇿軍護軍中尉制勑縏纓趨朝交戟入侍委以兵衛固須信臣內樞密使驃騎大將軍行右威衛上將軍知內侍省事上柱國晉國公食邑二千户王元宥儉而多才忠而能力事君盡禮處已無私自主樞要益見誠信今者十萬全師北落禁旅視吳漢差強人意非韓信無可計事是以輟自心腹寄兹爪牙以盡爾材出於余志爾戰斂豪猾整肅威容無使鄉閭致有侵害勉酬倚任以報君親可行右驍衛上將軍知內侍省事充右神䇿軍護軍中尉兼右街功德使散官勳封如故周元植除鳯翔監軍制勑控秦塞之西扼胡苑之左乃眷歧隴為國藩牆命以監撫冝崇班秩鳯翔監軍使銀青光祿大夫右領軍衛大將軍貟外置同正員上柱國汝南郡開國公食邑二千户賜紫金魚袋周元植事君以敬處仕無私節操凌霜而不凋肝膽開忠而洞見謙以自得高而益兢纍監三軍推誠一貫言念西塞未得髙枕用其聲實以護藩垣夫處於兵戎豫今誡汝無怨不過於逺利伏衆莫若於律身立事成功酬恩垂美在此二者汝其勉之寵以內省之崇仍兼將軍之貴往服休命無忝恩榮可守右監門衛大將軍知內侍省事散官勳封賜如故依前監鳯翔節度兵馬朱能𥙿除景陵判官制敕新授景陵判官上騎都尉朱能𥙿朕以喬山弓劍渭北衣冠霜露之心悽感常切以汝端謹有守操尚無尤常在傍側備見忠孝用是奬擢爰資守奉夙夜勤敬無忝委任可將仕郎內侍省掖庭局官教博士貟外置同正員餘如故劉全禮等七人並除內侍省內府局丞置同正等制勑賜緋魚袋上柱國劉全禮等置在傍側皆有才能既歷歲時合霑班秩各冝敬恭職祿不懈忠勤可依前件宋叔康妻封邑號制勑詩稱鵲巢禮榮翟茀既彰牙爪之效冝齊伉儷之榮左神䇿軍護軍中尉兼左街功德使特進左領軍衛大將軍知內侍省事上柱國廣平縣開國侯食邑一千户宋叔康妻清河縣君房氏懿兹柔淑作配忠勳能潔蘋蘩克叶姻族成此內則穆其壼風稱為令人實光婦道爰疏封爵用舉典章可服寵榮勉於輔佐可封清河郡夫人吐突士曄妻封邑號制勑詩美夫人禮稱內子元膺腹心之任冝崇家室之榮弓箭軍器等使特進行右領軍衛大將軍知內侍省事上柱國隂山縣開國公食邑一千五百戶吐突士曄妻咸陽縣君田氏生於冨貴作配忠貞柔婉自卑儀範可則職勤賔祭道睦􅊚親既諧閨風克成婦德爰加禮秩之貴以彰輔佐之勤榮我疏封無忘內助可封鴈門郡夫人新羅王子金元弘等授太常寺少卿監丞簿制功某臣等感恩知義奉贄不闕居大海之外為有禮之賔爾國是也自列國卿至于署丞皆吾文吏之選次第授爾赤所以表他國不同禮也將我恩寵耀爾殊鄰愼勿怠違永作藩屏並可依前件仍並放還蕃西州回鶻授驍衛大將軍制勑古者天子守在四夷蓋以恩信不虧羈縻有禮春秋列潞子之爵西漢有隰隂之封考於經史其來尚矣西州放首頡干伽思俱宇合逾越密施莫賀都督宰相安寧等忠勇竒志魁健雄姿懷西戎之腹心作中夏之保障相其君長頗有智謀今者交臂來朝稽顙請命丈組寸印髙位重爵舉以授爾用震殊鄰無忘敬恭冝念終始可雲麾將軍守左驍衛大將軍外置同正貟餘如故沙州專使押衙吳安正等二十九人授官制勑沙州專仗衙前左廂都知押衙吳安正等自天寶以降中原多故莫大之虜盜取西陲男為戎臣女為戎妾不暇弔伐今將百年自朕君臨豈敢偷惰乃命將帥收復七關爰披地圖實得天險遂相朝庭聲聞去聲聞於燉煌爾帥議潮果能抗忠臣之丹心折昆夷之長角竇融西河之故事見於盛時李陵教射之竒兵無非義旅爾等咸能竭盡肝膽奉事長帥將其誠命經歷艱危言念忠勞豈吝爵位官我武衛仍峻階級以慰皇華用震殊俗可依前件燉煌郡僧正慧菀除臨壇大德制勑燉煌管內釋門都監察僧正兼州學博士僧慧菀燉煌大藩久陷戎壘氣俗自異果産名僧彼上人者生於西土利根事佛餘力通儒悟執迷塵俗之身譬喻火宅舉君臣父子之義教爾青襟開張法門顯白三道遂使悍戾者好空惡殺義勇者徇國忘家禆助至多品地冝峻領生徒坐於學校貴服色舉以臨壇若非出群之才豈獲兼榮之授勉弘兩教用化新邦可充京城臨壇大德餘如故契丹賀正使大首領等授官制勑幽州道入朝賀正契丹大首領討魯等天子有道守在四夷爾今來朝豫亦增愧綏之玉帛榮以班秩冝懷恩寵永保封疆可依前件仍並放還蕃黔中道朝賀牂牁大酋長等十六人授官制勑黔中道朝賀牂牁大酋長攝充州刺史趙瓊林等夫西南諸國自古多順在法度之外居繩墨之表來朝有禮歸貢不闕玉帛以將厚意階級以峻等衰各服寵榮無忘恭敬可依前件仍並放還蕃黔中道朝賀訓州昆明等十三人授官制勑黔中道朝賀訓州昆明繼襲部落主嵯阿如弟攝訓州刺史嵯阿蒲等招攜以禮懷逺以德此國家所以殊俗貢聘不倦命舌人以通志意委屬國以厚宴享仍峻階級式爾恩榮無警邉陲以念終始可依前件仍並放還蕃樊川文集第二十
