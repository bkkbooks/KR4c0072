front:
  text: 樊川文集第十二
  hash: sha256:e24a5a618664aa52944b4e9304eb6d90b31fafcb05ecedc7bdc60ff2cd4cdda4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_012-1a}
body:
  text: 中書舍人杜牧字牧之上周相公書某再拜伏以大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人巳來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維清奏象舞之篇曰維清緝熙文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受設王專征之命也七年五伐留戰陳刺伐之法遺之武王王用以伐紂而有天下致之清平為周家之禎祥周公居攝祀文武於清廟作此詩以歌舞文武之德其次兵之尤者莫若鈎援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周之詩曰以爾鈎援以爾臨衡以伐崇墉臨衝間間崇墉言言此實文王伐崇墉傅于其城以臨車衝鈎援其城文王親自為之夫文王何人也周公詩之夫子刪而取之列于大雅以美武王之功德手絃而口歌之不知後伐之人何如此三聖人安有謀人之國有暴亂橫起戎狄乘其邉坐於廟堂之上曰我儒者也不能知兵不知儒者竟可知兵也竟不可知兵乎長慶兵起自始至終廟堂之上指蹤非其人不可一二悉數高宗朝薛仁貴攻吐蕃大敗於大非川仁貴曰今年嵗在庚午不當有事于西方此乃鍾鄧伐蜀身誅不返昨者誅討黨羌徴關東兵用於西方是不知天道也邉地無積粟師無見糧不先屯田隨日隨餉是不知地利也兩漢伐虜騎兵取於山東所謂兾之北土馬之所生馬良而多人習騎戰非山東兵不能伐虜昨者以步騎百不當一是謂不知人事也天時地利人事此三者皆不先計量短長得失故困蝎天下不能滅朴樕之虜此乃不學之過也不教人之戰是謂棄之則謀人之國不能料敵不曰棄國可乎某所注孫武十三篇雖不能上窮天時下極人事然上至周秦下至長慶寶曆之兵形勢虛實隨句解析離為三編輒敢獻上以備閲覽少希鑑悉苦心即為至幸伏增惶惕之至某頓首再拜上宣州高大夫書某頓首再拜自去歲前五年執事者上言云科第之選冝與寒士兄為子弟議不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潛鼠循無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讎取於夷狄豈計其所由來況國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公巳降有大功立大節率多科第人也若以子弟生於膏梁不知理道不可與美名而令得美仕則自堯巳降聖人賢人率多子弟凡此數者進退取捨無所依據某所以憤悶而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄栁下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武莊之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚寧武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也吳之季札王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庾王孫也其卿大夫之裔鬪氏生令尹子文後有鬪辛鬪巢鬪懷昭王之國皆有大功蒍氏生蒍賈孫叔敖蒍文薳啓強薳子慿薳掩薳罷屈氏生屈蕩屈到屈建子木六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為強其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏巳下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不知論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公玄齡進士也相太宗凡二十一年為唐宗臣比之伊吕周邵者郝公處俊亦進士也為宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李玄義皆進士也後為宰相濟助長孫太尉禇河南共槯武后者後突厥入塞免胄戰死儀革廢武后召玄義助處俊言不可以位與武后婁侍中師德亦進士也吐蕃強盛為監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積榖八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公柬之亦進士也年八十為相驅致四王手提社稷上還中宗郭代公元振亦進士也鎮涼州僅十五年北却突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也為宰相廢太平公主謀以佐玄宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛廉而有者其魏公乎姚梁公元崇登第下筆成章舉首佐玄宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制䇿科與玄宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐玄宗朝號為蘇宋張燕公説登制䇿科排張易之兄弟贊睿宗請玄宗監國竟誅太平公主招置文學士開內學館玄宗好書尚古封中太山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守圭不斬安祿山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周嵗拒賊十三萬兵出天寶雜記使賊不能東進尺寸以全江淮元和中宰相河東司空公中書令裴公皆進士也裴公仍再得宏辭制䇿科當貞元時河北叛齊蔡亦叛階此蜀亦叛吳亦叛其他未叛者皆高下其目熟視朝廷希嚮強弱而施其所為司空公始相憲宗廢權幸之機矛令不得張收斂百職歸於有司命節度使出朝廷不由兵士始自撫州徐袁相為滑州滑州凡二月無帥三軍無事憲宗始信之自此不用貞元故專以行軍副使大將軍為節度使拔取沉滯各還其官開州取唐會人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞九中皆十餘年遷逐其他似謪者亦皆當敘用也然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡忠剪蔡劇賊於洛師脅下招來常山質其二子以纍其心取十三城使不得與齊交手為寇因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅説命髙宗曰鑑于先王成憲其以永無愆故殷道復興鴻鴈美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁公佐玄宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其旨意所尚皆本仁義而歸忠信加以辭彩酋茂皎無塵土況有誠明長厚之譽於千人中儻使前五六年得進士第今可以出入諌官御史助明大子為治矣古人云三月不仕則相弔安有凡五六年來選取進士施設綱罟如防盜賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由于古今未前聞也某因覽三郎文章不覺發憤略言大槩干觸尊重無任惶懼某再拜上李中丞書某入仕十五年間凡四年在京其間卧疾乞假復居其半嗜酒好睡其癖巳痼往往閇戶便經旬日弔慶參請多亦廢闕至於俯仰進趍隨意所在希時徇勢不能逐人是以官途之間比之輩流亦多困躓自顧自念守道不病獨處思省亦不自悔然分於當路必無知巳默默成戚守日待月兾得一官以足衣食一自拜謁門館似蒙奬飾敢以惡文連進機案特遇采録更不因人許可指教實為師資接過之禮過等詢問之辭悉纎雖三千里僻守小郡上道之日氣色濟濟不知沉困之在巳不知升騰之在人都門帶酒笑别親戚斯乃大君子之遇難逢世途之不偶常事雖為遠宦適足自寬某世業儒學自高曽至于某身家風不墜少小孜孜至今不怠性顓固不能通經于治亂興亡之迹財賦兵甲之事地形之險易遠近古人之長短得失中丞即歸廊廟宰制在手或因時事召置堂下坐之與語此時回顧諸生必期不辱恩奬今者志尚未泯齒髮猶壯敢希指顧一罄肝膽無任感激血誠之至某恐懼再拜與人論諌書某踈愚於惰不識機括獨好讀書讀之多矣每見君臣治亂之間興亡諫諍之道遐想其人舐筆和墨則兾人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢已來凡千百輩不可悉數然恣諌而激亂生禍者纍纍皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫遷險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫室者宫室愈崇諌任小人者小人愈寵觀其旨意且欲與諌者一鬪是非一決怒氣耳不論其他是以每於本事之上尤增飾之今有兩人道未相信甲謂乙曰女好食某物愼勿果食之必死乙必曰食我食之久矣汝為我死必倍食之甲若謂乙曰汝好食某物第一少食苟多食必生病乙必因而謝之減食何者迃險之言則欲反之循常之説則必信之此乃常人之情世多然也是以因諫而生亂者纍纍皆是也漢成帝欲御樓船過渭水御史大夫薛廣德諫曰冝從橋陛下不聽臣自刎以血汚車輪陛下不廟矣不得入廟祠也上不説張猛曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶謂諫諍之言當如猛之詳善乃從橋近者寶曆中敬宗皇帝欲幸驪山時諫者至多上意不決拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡玄宗皇帝宫驪山而祿山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶耶我冝一往以驗彼言後數日自驪山回語親幸曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚高論令可行也今人平居無事友朋骨肉切磋規誨之間尚冝旁引曲釋亹亹繹繹使人樂去其不善而樂行其善况於君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諫而直諫為下前數月見報上披閣下諫疏錫以幣帛僻左且遠莫知其故近於遊客處一暏閣下諫草明白辨婉出入有據吾君聖明冝為動心數日在手味之不足且抃且喜且慰三者交并不能自止吾君聞諫既且行之仍復寵錫誘能諫者斯乃堯舜禹湯文武之心也聞於遠地冝為吾君抃也閣下以忠孝文章立於朝廷勇於諫而且深於其道果能動吾君而光世德某蒙閣下之厚愛兾於異時資閣下知以進尺寸能不為閣下之喜復自喜也吾君今日披一疏而行之明日聞一言而用之賢才忠良之士森列朝廷是以奮起志慮各盡所懷則文祖武宗之業窮天盡地日出月入皆可掃灑以復厥𥘉某縱不得效用但於一官一局筐篋簿書之間活妻子而老身命作為歌詩稱道仁聖天子之所為冶則為有餘能不自慰故獲閣下之一疏抃喜慰三者交并真不虛也冝如此也無因面讃其事書𥿄言誠不覺繁多某再拜與浙西盧大夫書某頓首再拜某年二十六由校書郎入沈公幕府自應舉得官凡半歲間既非生知復未涉人事齒少意鋭舉止動作一無所據至於報效施展朋友與遊吏事取捨之道未知東西南北冝所趨向此時郎中六官一顧憐之手擕指畫一一誘教丁寧纎悉兩府六年不嫌不怠使某無大過而粗知所以為守者實由郎中之力也去歲乞假路由漢上貟外七官以某嘗獲知於郎中惠然不疑推置於肺肝間某恃郎中之知亦敢自道其志公私謀議各悉所懷一俯一仰如久而深者久欲資郎中貟外之為階級逺干尊重欲望收恤舐筆伸紙以復踰於三四因曰既階級矣步欲升堂與排關而入者事不同日式微詩曰何其處也必有與也言必有仁義與我所以處而不去也進退計忖不冝得罪今敢謹寫所為文十四首編為一卷繼進於後愛之不倦為之不巳不至於工今以為獻無任慙惶然特為進説之端非敢因此求知不勝攀戀惕懼之至某再拜樊川文集第十二
