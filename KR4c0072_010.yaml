front:
  text: 樊川文集第十
  hash: sha256:ef6627b06bbde2504c7cbda3e0ea4b620d95aeee0274054069c4c54779f0563c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_010-1a}
body:
  text: 中書舍人杜牧字牧之李賀集序大和五年十月中半夜時舍外有疾呼傳緘書者某曰必有異亟取火來及發之果集賢學士沈公子明書一通曰吾亡友李賀元和中義愛甚厚日夕相與起居飲食賀且死嘗授我平生所著歌詩雜為四編凡千首數年來東西南北良為巳失去今夕醉解不復得寐即閲理篋怢忽得賀詩前所授我者思理往事凡與賀話言嬉遊一處所一物候一日夕一觴一飯顯顯焉無有忘棄者不覺出涕賀復無家室子弟得以給養恤問常恨想其人詠其言止矣子厚於我與我為賀集序盡道其所來由亦少解我意某其夕不果以書道不可明日就公謝旦曰丗為賀才絶出前讓居數日某深惟公曰公於詩為深妙竒博且復盡知賀之得失短長今寶敘賀不讓必不能當君意如何復就謝極道所不敢敘賀公曰子固若是是當慢我某因不敢辭勉為賀敘然其甚慙皇諸孫賀字長吉元和中韓吏部亦頗道其歌詩雲煙綿聮不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其格也風檣陳馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘壠不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也蓋騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為無得有是賀能探尋前事所以深嘆恨今古未嘗經道者如金銅仙人辭漢歌輔梁庾肩吾宫體謡求取情狀離絶逺去筆墨畦徑間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理奴僕命騷可也賀死後凡十某年京兆杜某為其序注孫子序兵者刑也刑者政事也為夫子之徒實仲由冉有之事也今者據案聽訟械繫罪人笞死于市者吏之所為也驅兵數萬橛其城郭係纍其妻子斬其罪人亦吏之所為也木索兵刃無異意也笞之與斬無異刑也小而易制用力少者木索笞也大而難制用力多者兵刃斬也俱期於除去惡民安活善人為國家者使教化通流無敢輒有不由我而自恣者其取吏無他術也無異道也俱止於仁義忠信智勇嚴明也苟得其道一二者可以使之為小吏盡得其道者可以使之為大吏故用力少者其吏易得也功易見也用力多者其吏難得也功難就也止此而巳無他術也無異道也自三代巳降皆由斯也子貢訟夫子之德曰文武之道未墜於地在人賢者識其大者逺者不賢者識其小者近者季孫問冉有曰子於戰學之乎性逹之也對曰學之季孫曰事孔子惡乎學冉有曰即學之於孔子者大聖兼該文武並用適聞其戰法猶未之詳也復不知自何代何人分為二道曰文曰武離而俱行因使搢紳之士不敢言兵或耻言之苟有言者世以為麁暴異人人不比數嗚呼亡失根本斯最為甚周公相成王制禮作樂尊大儒術有淮夷叛則出征之夫子相魯公會于夾谷曰有文事者必有武備叱辱齊侯服不敢動是一大聖人豈不知兵乎周有齊太公秦有王翦兩漢有韓信趙充國耿弇虞詡段熲魏有司馬懿吳有周瑜蜀有諸葛武侯晉有羊祜杜公元凱梁有韋睿元魏有崔浩周有韋孝寬隋有楊素國朝李靖李績裴行儉郭元振如此人者當其一時其所出計畫皆考古校今竒祕長遠䇿先定於內功後成於外彼壯健輕死善擊刺者供其呼召指使耳豈可知其由來哉某幼讀禮至于四郊多壘卿大夫辱也謂其書真不虛説年十六時見盜起圜二三千里係戮將相族誅刺史及其官屬尸塞城郭山東崩壞殷殷焉聲震朝廷當其時使將兵行誅者則必壯健善擊刺者卿大夫行列進退一如常時笑歌嬉遊輒不為辱非當辱不辱以為山東亂事非我輩所冝當知某自此謂幼所讀禮真妄人之言不足取信不足為教及年二十始讀尚書毛詩左傳國語十三代史書見其樹立其國滅亡其國未始不由兵也主兵者聖賢材能多聞博識之士則必樹立其國也壯健擊刺不學之徒則必敗亡其國也然後信知為國家者兵最為大非賢卿大夫不可堪任其事苟有敗滅真卿大夫之辱信不虛也因求自古以兵著書列于後世可以教于後生者凡十數家且百萬言其孫武所著十三篇自武死後凡千歲將兵者有成者有敗者勘其事迹皆與武所著書一一相抵當猶印圈模刻一不荖跌武之所論大約用仁義使機權也武所著書凡數十萬言曹魏武帝削其繁剩筆不精切凡十三篇成為一編曹自為序因注解之曰吾讀兵書戰䇿多矣孫武深矣然其所為注解十不釋一此者蓋非曹不能盡注解也豫尋魏志見曹自作兵書十餘萬言諸將征伐皆以新書從事從令者尅捷違教者負敗意曹自於新書中馳驟其説自成一家事業不欲隨孫武後盡解其書不然者曹豈不能耶今新書巳亡不可復知豫因取孫武書備其注曹之所注亦盡存之分為上中下三卷後之人有讀武書豫解者因而學之猶盤中走丸丸之走盤橫斜圓直計於臨時不可盡知其必可知者是知丸不能出於盤也議於廊廟之上兵形巳成然後付之於將漢祖言指蹤者人也獲兔者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰叨居其位可也送薛處士序處士之名何哉潛山隱市皆處士也在山也且非頑如木石也在市也亦非愚如市人也蓋有大知不得大用故羞耻不出寧反與市人木石為伍也國有大知之人不能大用是國病也故處士之名自負也謗國也非大君子其孰能當之薛君之處蓋自負也果能窺測堯舜孔子之道使指制有方弛張不窮則上之命一日來子之廬子之身一日立上之朝使我輩居則來問學仕則來問政千辨萬索滔滔而得若如此則善苟未至是而遽名曰處士雖吾子自負其不為矯歟某敢用此贈行送盧秀才赴舉序治心治身治友三者治矣有求名而名不隨者未之聞也治心莫若和平治身莫若兢謹治友莫若誠信友治矣非身治而不能得之身治矣非心治而不能致之三者治矣推而廣之可以治天下惡其求成進士名者而不得也况有千人皆以聖人為師眠而食一無其他唯議論是司三人有私十人公私半百人無有不公者况千人哉古之聖賢業大事巨道行則不肖懼道不行則不肖喜故有不公今進士者業微事細如成其名不肖未所喜懼寧不公邪故取之甚易耳盧生客居於饒年十七八即主一家骨肉之飢寒常與一僕東泛滄海北至單于府丐得百錢尺帛囊而聚之使其僕負之以歸饒之士皆憐之能辭明敏而知所去就年未三十嘗三舉進士以業丐資家近中輟之去歲九月余自池改睦凡同舟三千里復為余留睦七十日今之去余知其成名而不丐矣杭州新造南亭子記佛著經曰生人既死隂府收其精神校平生行事罪福之坐罪者刑獄皆怪險非人世所為凡人平生一失舉止皆落其間其尤怪者獄廣大千百萬億里積火燒之一日凡千萬生死窮億萬世無有間音諫斷名為無間夾殿宏廊悉圖其狀人未熟見者莫不毛立神駭佛經曰我國有阿闍世王殺父王篡其位法當入所謂獄無間者昔能求事佛後生為天人况其他罪事佛固無恙梁武帝明智勇武創為梁國者捨身為僧奴至國滅餓死不聞悟況下輩固惑之為工商者雜良以苦偽內而華外納以大稱斛以小出之欺奪村閭戅民銖積粒聚以至于冨刑法錢榖小胥出入人性命顛倒埋沒使簿書條令不可究知得財買大第豪奴如公侯家大吏有權力能開庫取公錢緣意恣為人不敢言是此數者心自知其罪皆捐巳奉佛以求救月日積久曰我罪如是貴冨如所求是佛能滅吾罪復能以福與吾也有罪罪滅無福福至生人唯罪福耳雖田婦稚子知所趨避今權歸於佛買福賣罪如持左契交手相付至有窮民啼一稚子無以與哺得百錢必召一僧飯之兾佛之助一日獲福若如此雖舉寰海內盡為寺與僧不足怪也屋壁繡紋可矣為金枝扶踈擎千萬佛僧為具味飯之可矣飯訖持錢與之不大不壯不髙不多不珍竒瓌怪為憂無有人力可及而不為者晉霸主也一銅鞮宫之衰弱諸侯不肯來盟今天下能如幾晉几幾千銅鞮人得不因哉文宗皇帝嘗語宰相曰古者三人共食一農人今加兵佛一農人乃為五人所食其間吾民尤困於佛帝念其本牢根大不能果去之武宗皇帝始即位獨奮怒曰窮吾天下佛也始去其山臺野邑四萬所冠其徒幾至十萬人後至會昌五年始命西京留佛寺四僧唯十人東京二寺天下所謂節度觀察同華汝三十四治所得留一寺僧準西京數其他刺史州不得有寺出四御史縷行天下以督之御史乘馹未出關天下寺至於屋基耕而刓之凡除寺四千六百僧尼笄冠二十六萬五百其奴婢十五萬良人技附為使令者陪笄冠之數良田數千萬頃奴婢口率與百畒編入農籍其餘賤取民直歸於有司寺材州縣得以恣新其公署傳舍今天子即位詔曰佛尚不殺而仁且來中國久亦可助以為冶天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉著為定令以徇其習且使後世不得復加也趙郡李子烈播立朝名人也自尚書比部郎中出為錢塘錢塘於江南繁大雅亞吳郡子烈少遊其地委曲知其俗蠧人者剔削根節斷其脈絡不數月人隨化之三箋干丞相云濤壞人居不一銲錮敗侵不休詔與錢二千萬築長堤少為數十年計人益安喜子烈曰吳越古今多文士來吾郡遊登樓倚軒莫不飄然而增思吾郡之江山甲於天下信然也佛熾害中國六百歲生見聖人一揮而幾夷之今不取其寺材立亭勝地以彰聖人之功使文士歌詩之後必有指吾而罵者乃作南亭在城東南隅宏大煥顯工施手目髮勻肉均牙滑而無遺巧矣江平入天越峯如髻越樹如髮孤帆白鳥點盡上凝在半夜酒餘倚老松坐怪石殷殷潮聲起於月外東閩兩越宦遊善地也天下名士多往之豫知百數十年後登南亭者念仁聖天子之神功矣美子烈之旨迹覩南亭千萬狀吟不辭巳四時千萬狀吟不能去作為歌詩次之於後不知幾千百人矣池州造刻漏記百刻短長取於口不取於數天下多是也某大三年佐沈吏部江西府暇日公與賔吏環城見銅壷銀箭律如古法曰建中時嗣曹王臯命處士王易簡為之公曰湖南府亦曹王命處士所所為也後二年公移鎮宣城王處士尚存因命工就京師授其術創置於城府其為童時王處士年七十常來某家精大演數與雜機巧識地有泉鑿必湧起韓文公多與之遊大和四年某自宣城使于京師處士年餘九十精神不衰某拜于牀下言及刻漏因圖授之會昌五年歲次乙丑夏四月始造于城南門樓京兆杜某記池州重起蕭丞相樓記蕭丞相為刺史時樹樓于大廳西北隅上藏九經書下為刺史便廳事大曆十年乙卯建會昌四年甲子摧木悉朽壞無一可取者刺史李方玄具材刺史杜牧命工南北霤相距五十六尺東西四十五尺十六柱三百七十六椽上下凡十二間上有其三焉皆仍舊制以會昌五年五月畢自𥘉至再凡七十一年丞相諱復實相德宗皇帝焉京兆杜某記同州澄城縣户工倉尉廳壁記縣之所重其舉秀貢賢也今之自外諸侯之儒者曠不能升一人況尉乎次乃户稅而巳史記河渠書曰自微引洛水至商顔下商顔山名鑿井深者四十餘丈即此地也徴者俗訛為澄耳其地西北山環之縣境籠其趾沙石相礴歲雨如注他皆淫灔不測徴之土適潤苗則大穫天或旬而不雨民則蒿然四望失矣是以年多薄復絶絲麻藍果之饒固無豪族富室大抵民戶高下相羌埒然歲入官賦未嘗期表鞭一人因徴其來由耆老咸曰西四十里即畿郊也主如禁司東西軍禽坊龍廄彩工梓匠善聲巧手之徒第畨上下互來進取挾公為首緣以一栝十民之晨炊夜春歲時不敢嘗悉以仰奉父伏子走尚不能當其意往往擊辱而去長吏固不敢援復況其養秩安祿者邪加以御女官多盤穴其間遞相占附比急熱如手足自丞相御史咸不能與之角逐縣令固無有為也非豪吏真工聮紐相姻戚者率率解去是以縣賦益逋徴民幸脫此苦者蓋以西有通澗巨壑義牙交吞小山峭徑馳鞍馬張機置者不便於此是以絶迹不到兼之土田枯鹵樹植不茂無秀潤氣象咸惡之而不家焉民所以安安活輸賦者殆由此儻使徴亦中其苦則墟矣尚安敢比之於他邑乎嗟乎國家設法禁百官持而行之有尺寸害民者率有尺寸之刑今此咸墮地不起反使民以山之澗壑自為防限可不悲哉使民恃險而不恃法則劃土者冝乎牆山塹河而自守矣燕趙之盜復何可多怪乎書其西壁俟得言者覽焉宋州寧陵縣記建中𥘉年李希烈自蔡陷汴驅兵東下將收江淮寧陵守將劉昌以兵二千拒之希烈衆且十倍攻之三月韓晉公以三千強弩涉水夜入寧陵弩矢至希烈帳前希烈曰復益吳弩寧陵不可取也解圍歸汴後數月希烈驍將翟輝以鋭兵大敗於淮陽城下希烈且蹙棄汴歸蔡後司徒劉公玄佐見昌問曰爾以孤城用一當十凡百日間何以能守昌泣曰以負心能守之耳昌令陴者曰內顧者斬昌孤甥張俊守西北隅未嘗內顧捽下斬之軍士有死志故能堅守因伏地流涕司徒劉公亦泣撫昌背曰國家必以富貴爾天寶末淮陽太守薛願即故起居郎弘之祖睢陽太守許遠真源縣令張巡等兵守二城其於窮蹙事相差埒睢陽陷賊淮陽能守故巡遠名懸而願事不傳昌之守寧陵近比之於睢陽故良臣之名不如忠臣孫武曰善用兵者無赫赫之功斯是也大中二年十一月十八日將仕郎守尚書司勳貟外郎史館修撰杜某題淮南監軍使院廳壁記淮南軍西蔽蔡壁壽春有團練使北蔽齊壁山陽有團練使節度使為軍三萬五千人居中統制二處一千里三十八城護天下餉道為諸道府軍事最重然倚海塹江淮深津橫商備守堅險自艱難巳來未嘗受兵故命節度使皆以道德儒學來罷宰相去登宰相命監軍使皆以賢良勤勞內外有功來自禁軍中尉樞密使去為禁軍中尉樞密使自貞元元和巳來大抵多如此今上即位六年命內侍宋公出監淮南諸開府將軍皆以內侍賢良有材不冝使居外上以為內侍自元和巳來誅齊誅蔡再伐趙前年誅滄旁擊趙魏且徴師且撫師且誥且諭勤勞危險終日馬上往監青州新附卧未嘗安復監滑州邊魏窮狹多事今監淮南是且休之休息亦不久之故內侍至焉監軍四年如始至日簡釣寬泰明白清潔恕悉軍吏禮愛賔客舉止作動無非典故暇日唯召儒生講書道士治藥而巳內侍舊部將校多禁兵子弟京師少俠出入閭里間俯首唯唯受吏約束故上至相國竒章公下至于百姓無不道説內侍稱為賢人此不虛也冝其侍衛六朝聲光冨貴某謬為相國竒章公幕府掌書記奉內侍命為廳壁記某再謝不才不足記序內侍曰掌書記為監軍使廳壁記冝也某慙惶而書時大和八年十月二十一日記自撰墓銘牧字牧之曾祖某河西隴右節度使祖某司徒平章事歧國公贈太師考某駕部貟外纍贈禮部尚書牧進士及第制䇿登科弘文館校書郎試左武衛兵曹參軍江西團練巡官轉監察御史裏行御史淮南節度掌書記拜真監察分司東都以弟病去官授宣州團練判官殿中侍御史內供奉遷左輔闕史館修撰轉膳部比部貟外郎皆兼史職出守黃池睦三州遷司勳貟外即史館修撰轉吏部貟外以弟病乞守湖州入拜考功郎中知制誥周歲拜中書舍人某平生好讀書為文亦不出人曹公曰吾讀兵書戰䇿多矣孫武深矣因注其書十三篇乃曰上窮天時下極人事無以加也後當有知之者去歲七月十日在吳興夢人告曰爾當作小行郎復問其次曰禮部考功為小行矣言其終典耳今歲九月十九日歸夜困亥𥘉就枕寢得𬒳勢久酣而不夢有人朗告曰爾改名畢十月二日奴順來言炊將熟甑裂豫曰皆不祥也十一月十日夢書片𥿄皎皎白駒在彼空谷傍有人曰空谷非也過隙也豫生於角星昴畢於角為第八宫曰病厄宮亦曰八殺宮土星在焉火星繼木星工楊晞曰木在張於角為第十一福德宮木為福德大君子救於其旁無虞也豫曰自湖守不周歲遷舍人木還福於角足矣土火還死於角冝哉復自視其形視流而疾鼻折山根年五十斯夀矣某月某日終干安仁里妻河東裴氏朗州刺史偃之女先某若干時卒長男曰曹師年十六次曰柅柅年十二别生二男曰蘭曰興一女曰真皆幼以某月日葬于少陵司馬村先塋銘曰後魏太尉顒封平安公及子九丗皆葬少陵嗟爾小子亦克厥終安于肅官樊川文集卷第十
