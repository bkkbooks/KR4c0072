  text: 樊川文集第一
  hash: sha256:a1c2edb2085fb0d2caa777be0950cacad7deb17ed97c80b6797a9004f2ada3f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_001-1a}
body:
  text: 中書舎人杜牧字牧之阿房宫賦六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走咸陽二川溶溶流入宫牆五歩一樓十歩一閣廊腰縵莫旦切廻簷牙髙啄各抱地勢鉤心鬪角盤盤焉囷囷焉蜂房水渦矗勑六切不知乎幾千萬落長撟卧波未雩何龍複道行空不霽何虹髙低冥迷不知東西歌臺暖響春光融融舞殿冷䄂風雨凄凄一日之内一宫之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜絃爲秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車廻也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾丗幾年摽掠其人倚疊如山一旦有不能輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直攔横檻多於九土之城郭管絃嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心曰益驕固戍卒叫凾谷舉楚人一炬可憐焦土滅六國者六國也非秦也族秦者秦也非天下也嗟平使六國各愛其人則足以拒秦使秦復愛六國之人則逓三世可至萬世而爲君誰得而族滅也秦人不睱自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也望故園賦余固秦人兮故園秦地念歸途之幾里訴余心之未歸兮雖繋曰而安至旣操心之大謬欲當時之奏技技固薄兮豈易售矧將來之歲幾人固有尚珠金印節人固有爲背憎面恱擊短扶長曲邀横結吐片言兮千口莫窮觸一機而百関俱發嗟小人之顓蒙兮尚何念於逸越余之思歸兮走杜陵之西道巖曲天深地平木老隴雲秦樹風高霜早周臺漢園斜陽暮草寂寥四望蜀峯聮嶂䓗蘢氣佳蟠聮地壮繚粉堞於綺城矗未央於天上月出東山苔扉向關長煙苒惹寒水注灣遠林雞犬兮樵夫夕還織有桑兮耕有土昆令季強兮郷黨附悵余心兮捨兹而何去憂豈無念念至謂何憤愠悽悄顧我則多萬世在上兮百世居後中有一生兮孰爲夀夭生既不足以紉佩兮顧他務之纎小賦言歸兮余之忘世徒爲兮紛擾晩晴賦并序秋日晩晴樊川子目于郊園見大者小者有状類者故書賦云雨晴秋容新沐兮忻遶園而細履面平池之清空兮紫閣青横遠來照水如高堂之上見羅幕弓垂乎鏡裏木勢黨伍兮行户郎切者如迎偃者如醉高者如逹低者如跂松數十株切切交風如冠劒大臣國有急難庭立而議竹林外裹兮十萬丈夫甲刃摐摐七恭切宻陣而環侍豈負軍令之不敢囂兮何意氣之嚴毅復引舟干深灣忽八九之紅芰姹然如婦斂然如女堕蘃黦於勿切顔似見放棄白鷺潜來兮邈風摽之公子窺此美人兮如慕恱其容媚雜花參差於岸側兮絳緑黄紫格頑色賤兮或妾或婢間草甚多叢者束兮靡者杳兮仰風獵日如立如笑兮千千萬萬之状容兮不可得而状也若予者則爲何如倒冠落珮兮與世闊踈敖敖休休兮眞徇其愚而隱居者乎感懷詩一首時滄州用兵高文㑹隋季提劒徇天意扶持萬代人歩驟三皇地聖云繼之神神仍用文治德澤酌生靈沉酣薫骨髓旄頭騎箕尾風塵薊門起胡兵殺漢兵屍滿咸陽市宣皇走豪傑譚笑開中否蟠聮兩河間燼萌終不弭號爲精兵䖏齊蔡燕趙魏合環千里疆爭爲一家事逆子嫁虜孫西隣聘東里急熱同手足唱和如宫徴法制自作爲禮文爭僣擬壓階螭鬪角畫屋龍交尾署𥿄日替名分財賞稱賜刳隍㰹呼怗切萬㝷繚垣疊千雉誓将付孱孫血絶然方巳九廟仗神靈四海爲輸委如何七十年汗赩含羞耻韓彭不再生英衛皆爲鬼凶門爪牙輩穰穰如兒戲累聖但日吁酣薫骨髓旄頭騎箕尾風塵薊門起胡兵殺漢兵屍滿咸陽市宣皇走豪傑譚笑開中否蟠聮兩河間燼萌終不弭號爲精兵䖏齊蔡燕趙魏合環千里疆爭爲一家事逆子嫁虜孫西隣聘東里急熱同手足唱和如宫徴法制自作爲禮文爭僣擬壓階螭鬪角畫屋龍交尾署𥿄日替名分財賞稱賜刳隍㰹呼怗切萬㝷繚垣疊千雉誓将付孱孫血絶然方巳九廟仗神靈四海爲輸委如何七十年汗赩含羞耻韓彭不再生英衛皆爲鬼凶門爪牙輩穰穰如兒戲累聖但日吁閫外将誰寄屯田數十萬隄防常慴惴急征赴軍湏厚賦資凶器因墮畫一法且逐隨時利流品極蒙尨網羅漸離弛夷狄日開張黎元愈憔悴邈矣遠太平蕭然盡煩費至于貞元末風流恣綺靡艱極㤗循來元和聖天子元和聖天子英明湯武上茅茨覆宮殿封章綻帷帳伍旅拔雄兒夢卜庸真相勃雲走轟霆河南一平盪繼于長慶𥘉燕趙終舁襁擕妻負子來北闕爭頓顙故老撫兒孫尓生今有望茹鯁喉尚隘負重力未壮坐幄無竒兵吞舟漏踈網骨添薊垣沙血漲嘑沲浪秪云徒有征安䏻問無状一日五諸侯奔亡如鳥徃取之難梯天失之易反掌蒼然太行路翦翦還榛莽關西賤男子誓肉虜柸羹請數係虜事誰其爲我聽蕩蕩乾坤大曈曈日月明叱起文武業可以豁洪𬈑安得封域內長有扈苗征七十里百里彼亦何常爭徃徃念所至得醉愁蘇醒韜舌辱壮心呌閽無助聲聊書感懷韻焚之遺賈生杜秋娘詩并序杜秋金陵女也年十五爲李錡妾後錡叛滅籍之入宫有寵扵景陵穆宗即位命秋爲皇子傅姆皇子壮封漳王鄭注用事誣丞相欲去巳者指王爲根王𬒳罪廢削秋因賜歸故郷予過金陵感其窮且老爲之賦詩京江水清滑生女白如脂其間杜秋者不勞朱粉施老濞即山鑄後庭千雙眉秋持玉斚醉與唱金縷衣勸君莫惜金縷衣勸君湏惜少年時花開堪折直湏折莫待無花空折枝李錡長唱此辭濞旣白首叛秋亦紅淚滋吳江落日渡灞岸緑楊垂聮𥚑見天子盼普莧切眄莫見切獨依依椒壁懸錦幕鏡奩蟠蛟螭低鬟認新寵窈裊復融怡月上白璧門桂影凉參差金階露新重閑捻紫蕭吹晋書盗閈凉州張駿塜得紫玉簫莓苔夾城路南苑鴈𥘉飛紅粉羽林仗獨賜辟邪旗歸來煑豹胎饜飫不䏻飴咸池昇日慶銅雀分香悲雷音後車遠事徃落花時燕禖得皇子壮髪緑緌緌畫堂授傳姆天人親捧持虎睛珠絡褓金盤犀鎮帷長楊射熊羆武帳弄啞咿漸抛竹馬劇稍出舞雞竒嶄嶄整冠珮侍宴坐瑶池眉宇儼圖畫神秀射朝輝一尺桐偶人江充知自欺王幽茅土削秋放故郷歸􅒀稜拂斗極廻首尚遲遲四朝三十載似夢復疑非潼關識舊吏吏髪巳如絲却喚吳江渡舟人那得知歸來四隣改茂苑草菲菲清血灑不盡仰天知問誰寒衣一疋素夜借隣人機我昨金陵過聞之爲歔欷自古皆一貫變化安䏻推夏姬滅兩國逃作巫臣姬西子下姑蘇一舸逐鴟夷織室魏豹俘作漢太平基悞置代藉中兩朝尊母儀光武紹高祖本係生唐兒珊瑚破高齊作婢舂黄糜蕭后去揚州突厥爲閼氏女子固不定士林亦難期射鉤後呼父釣翁王者師無國要孟子有人毀仲尼秦因逐客令柄歸丞相斯安知魏齊首見㫁簣中屍給䘮蹷張輩廊廟冠峩危珥貂七葉貴何妨我虜支蘇武却生返鄧通終死饑主張旣難測翻覆亦其宜地盡有何物天外復何之指何爲而捉足何爲而馳耳何爲而聽目何爲而窺巳身不自曉此外何思惟因傾一樽酒題作杜秋詩愁來獨長詠聊可以自貽郡齋獨酌黄州作前年鬢生雪今年鬚帶霜時節序鱗次古今同鴈行甘英窮西海四萬到洛陽東南我所見北可計幽荒中畫一萬國角角棊布方地頑壓不穴天廻老不僵屈指百萬世過如霹靂忙人生落其内何者爲彭殤促束自繋縛儒衣寛且長旗亭雪中過敢問當壚娘我愛李侍中摽摽七尺強白羽八扎弓䏶壓緑檀槍風前略橫陣紫髯分兩傍淮西萬虎士怒目不敢當功成賜宴麟德殿猨超鶻掠廣毬塲三千宫女側頭看相排踏碎雙明璫旌竿幖幖旗㸌㸌意氣横鞭歸故郷我愛朱䖏士三吳當中央罷亞稻名百頃稻西風吹半黄尚可活郷里豈唯滿囷倉後嶺翠撲撲前溪碧泱泱霧暁起鳬鴈日晚下牛羊叔舅欲飲我杜甕爾來嘗伯娣子欲歸彼亦有壷漿西阡下桞塢東陌繞荷塘姻親骨肉舎煙火遥相望太守政如水長官貪似狼征輸一云畢任爾自存亡我昔造其室羽儀鸞鶴翔交横碧流上竹映琴書牀出語無近俗堯舜禹武湯問今天子少誰人爲棟梁我曰天子聖晉公提紀綱聮兵數十萬附海正誅滄謂言大義小不義取易卷席如探囊犀甲吳兵鬪弓弩虵矛燕騎馳鋒鋩豈知三載几百戰鉤車不得望其牆荅云此山外有事同胡羗誰将國伐叛話與釣魚郎溪南重廽首一逕出脩篁爾來十三歲斯人未曽忘徃徃自撫已淚下神蒼茫御史詔分洛舉趾何猖狂闕下諌官業拜䟽無文章㝷僧解幽夢乞酒緩愁腸豈爲妻子計未去山林蔵平生五色線願𥙷舜衣裳絃歌敎燕趙蘭芷浴河湟腥膻一掃灑兇狠皆披攘生人但眠食壽域富農桑孤吟志在此自亦笑荒唐江郡雨𥘉霽刀好截秋光池邊成獨酌擁鼻菊枝香醺酣更唱太平曲仁聖天子夀無疆張好好詩并序牧大和三年佐故吏部沈公江西幕好好年十三始以善歌來樂籍中後一歲公移鎮宣城復置好好於宣城籍中後二歲爲沈著作述師以雙鬟納之後二歲扵洛陽東城重覩好好感舊傷懷故題詩贈之君爲豫章姝十三纔有餘翠茁鳯生尾丹葉蓮含跗高閣倚天半章江聮碧虚此地試君唱特使華筵鋪主公顧四座始訝來踟蹰吳娃起引賛伭徊映長𥚑雙鬟可高下纔過青羅𥜗盼盼乍垂䄂一聲離鳯呼繁絃迸関紐塞管裂圎盧衆音不能逐裊裊穿雲衢主公再三嘆謂言天下殊贈之天馬錦副以水犀梳龍沙看秋浪明月遊東湖自此每相見三日巳爲踈玉質隨月滿艶態逐春舒絳脣漸輕巧雲歩轉虚徐旌斾忽東下笙歌隨舳艫霜凋謝樓樹沙暖句溪蒲身外任塵土罇前極懽娱飄然集仙客著作甞任集賢挍理諷賦欺相如聘之碧瑶珮載以紫雲車洞閉水聲逺月髙蟾影孤爾來未幾歳散盡髙陽徒洛城重相見婥婥爲當壚恠我苦何事少年垂白鬚朋遊今在否落拓更能無門館慟哭後水雲秋景𥘉斜日掛衰枊涼風生座隅灑盡滿衿涙短歌聊一書冬至日寄小姪阿宜詩小姪名阿冝未得三尺長頭圎筋骨緊兩臉明且光去年學官人竹馬遶四廊指揮群兒軰意氣何堅剛今年始讀書下口三五行隨兄旦夕去歛手整衣裳去歳冬至日拜我立我旁祝爾願爾貴仍且壽命長今年我江外今日生一陽憶爾不可見祝爾傾一觴陽德比君子𥘉生甚微茫排隂出九地萬物隨開張一似小兒學日就復月將勤勤不自巳二十能文章仕宦至公相致君作堯湯我家公相家劒珮甞丁當舊第開朱門長安城中央第中無一物萬卷書滿堂家集二百編上下馳皇王多是撫州寫今來五紀強尚可與爾讀助爾爲賢良經書刮根本史書閱興亡髙􅎥屈宋艶濃薫班馬香李杜泛浩浩韓栁摩蒼蒼近者四君子與古爭強梁願爾一祝後讀書曰曰忙一日讀十紙一月讀一箱朝庭用文治大開官職埸願爾出門去取官如駈羊吾兄苦好古學問不可量晝居府中治夜歸書滿牀後貴有金玉必不爲汝藏崔昭生崔芸李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵叅軍與縣尉塵土驚劻音匡勷音穰一語不中治笞箠身滿瘡官罷得絲髪好買百樹桑稅錢未輸足得米不敢甞願爾聞我語懽喜入心腸大明帝宫闕杜曲我池塘我若自潦倒看汝爭翶翔揔語諸小道此詩不可忘李甘詩天和八九年訓注極虓虎潜身九地底轉上青天去四海鏡清澄千官雲片縷公私各閑暇追遊日相伍豈知禍亂根枝葉潜滋莽九年夏四月天誡若言語烈風駕地震獰雷駈猛雨夜於正殿階抜去千年樹吾君不省覺二凶日威武操持北斗柄開閉天門路森森明庭士縮縮循牆鼠平生負名節一旦如奴虜指名爲錮黨狀跡誰告訴喜無李杜誅敢憚髠鉗苦時當秋夜月日直日庚午喧喧皆傳言明晨相登注予時與和鼎官班各持斧和鼎頋予云我死有䖏所當庭裂詔書退立須鼎爼君門暁日開赭案横霞布儼雅千官容勃欝吾纍怒適属命麟将趙耽昨之傳者誤明日詔書下謫斥南荒去夜登青泥坂墜車傷左股病妻尚在牀稚子𥘉離乳幽蘭思楚澤恨水啼湘渚怳怳三閭魂悠悠一千古其冬三兇敗渙汗開湯罟賢者須䘮亡讒人尚堆堵予於後四年諌官事明主常欲雪幽冤於時一禆𥙷拜章豈艱難膽薄多憂懼如何干斗氣竟作炎荒土題此涕滋筆以代投湘賦洛中送兾處士東逰處士有儒術走可挾車輈壇宇寛帖帖符彩高酋酋不愛事耕稼不樂干王侯四十餘年中超超爲浪逰元和五六嵗客于幽魏州幽魏多扗士意氣相淹留劉濟願跪履田興請建籌處士拱兩手笑之但掉頭自此南走越㝷山入羅浮願學不死藥粗知其來由却於童頂上蕭蕭玄髪抽我作八品吏洛中如繋囚忽遭冀處士豁若登高樓拂榻與之坐十日語不休論今星璨璨考古寒颼颼治亂掘根本蔓延去声相牽鈎武事何駿壮文理何優柔顔回捧爼豆項羽横戈矛祥雲繞毛髪高浪開咽喉但可感鬼神安䏻爲獻酧好入天子夢刻像來爾求胡爲去吳㑹欲浮滄海舟贈以蜀馬箠副之胡罽裘餞酒載三斗東郊黄葉稠我感有淚下君唱高歌酧嵩山高萬尺洛水流千秋徃事不可問天地空悠悠四百年炎漢三十代宗周二三里遺堵八九所高丘人生一世内何必多悲愁謌闋解携去信非吾輩流送沈處士赴蘇州李中丞招以詩贈行山城樹葉紅下有碧溪水溪橋向吳路酒旗誇酒美下馬此送君高謌爲君醉念君苞材䏻百工在城壘空山三十年鹿裘挂牎睡自言隴西公飄然我知巳舉酒属吳門今朝爲君起懸弓三百斤囊書數萬𥿄戰賊即戰賊爲吏即爲吏盡我所有無惟公之指使予曰隴西公淊淊大君子常思掄群材一爲國家治譬如匠見木礙眼皆不棄大者麄十圍小者細一指㨝先結切橛與棟梁施之皆有位忽然竪明堂一揮立䏻致予亦何爲者亦受公恩紀處士常有言殘虜爲犬豕常恨兩手空不得一馬箠今依隴西公如虎傅兩翅公非刺史材當坐巖廊地處士魁竒姿必展平生志東吳饒風光翠􅬐多名寺踈煙亹亹秋獨酌平生思因書問故人能忘批𥿄尾公或憶姓名爲說都憔悴長安送友人遊湖南子性劇弘和愚衷深𥚹狷相捨囂譊中吾過何由鮮楚南饒風煙湘岸苦縈宛山宻夕陽多人稀芳草逺青梅繁枝伭班笋新梢短莫哭葬魚人酒醒且眠飯皇風仁聖天子神且武内興文敎外披欀以徳化人漢文帝側身脩道周宣王迒音剛蹊巢穴盡窒塞禮樂刑政皆㢮張何當提筆待廵狩前駈白斾弔河湟雪中書懐臘雪一尺厚雲凍寒頑癡孤城大澤畔人踈煙火微憤悱欲誰語憂愠不能持天子號仁聖任賢如事師凢稱曰治具小大無不施明庭開廣敞才儁受羈維如日月縆公曾切昇若鸞鳯葳蕤人才自朽下棄去亦其冝北虜壞亭障聞屯千里師牽連乆不解他盗恐旁窺臣實有長䇿彼可徐鞭笞如蒙一召議食肉寢其皮斯乃廟堂事爾微非爾知向來躐等語長作陷身機行當臘欲破酒齊去聲不可遟且想春候暖甕間傾一巵雨中作賤子本幽慵多爲儁賢侮得州荒僻中更值連江雨一褐擁秋寒小牎侵竹塢濁醪氣色嚴皤腹瓶甖古酣酣天地寛怳怳嵇劉伍但爲適性情豈是藏鱗羽一世一萬朝朝朝醉中去偶遊石盎僧舎宣州作敬岑草浮光句沚水觧脉益鬱乍怡融凝嚴忽頽坼梅纇暖眠酣風緒和無力鳬浴漲汪汪雛嬌村羃羃落日美樓臺輕烟飾阡陌㶑緑古津遠積潤苔基釋孰謂漢陵人來作江汀客載筆念無䏻捧籌慙所晝任轡偶追閑逢幽果遭適僧語淡如雲塵事繁堪織今古㡬輩人而我何䏻息赴京𥘉入汴口曉景即事先寄兵部李郎中清淮控隋漕北走長安道檣形􅌨􅌨斜浪態迤迤徒何反好𥘉旭紅可染明河澹如掃澤闊鳥來遲村饑人語早露蔓蟲絲多風蒲燕鶵老秋思高蕭蕭客愁長裊裊因懷京洛間宦遊何戚草什伍持津梁澒湧爭追討翾便去聲詎可㝷㡬秘安䏻考小人乏馨香上下将何禱唯有君子心顯豁知幽抱獨酌長空碧杳杳萬古一飛鳥生前酒伴閑愁醉閑多少烟深隋家寺殷葉暗相照獨佩一壷遊秋豪㤗山小惜春春半年巳除其餘強爲有即此醉殘花便同嘗臘酒悵望送春盃殷勤掃花箒誰爲駐東流年年長在手題安州浮雲寺樓寄湖州張郎中去夏踈雨餘同倚朱欄語當時樓下水今日到何處恨如春草多事與孤鴻去楚岸栁何窮別愁紛若絮過驪山作始皇東遊出周鼎劉項縱觀皆引頸削平天下實辛勤却爲道旁窮百姓黔首不愚爾益愚千里凾關囚獨夫牧童火入九泉底燒作灰時猶未枯池州送孟遲先輩昔子來陵陽時當苦炎熱我雖在金臺頭角長垂折奉披塵意驚立語平生豁寺樓㝡騫軒坐送飛鳥没一罇中夜酒半破前峯月煙院松飄蕭風廊竹交戞時歩郭西南繚徑苔圓折好鳥響丁丁小溪光汃汃普八切籬落見娉婷機絲弄唖軋煙濕樹姿嬌雨餘山態活仲秋徃歴陽同上牛磯歇大江吞天去一練橫坤抹千帆美滿風曉日殷鮮血歴陽裴太守襟䪨苦超越鞔皷畫麒麟看君撃狂節離䄂颭應勞恨粉啼還咽明年忝諌官緑樹秦川濶子提徤筆來勢若夸父渇九衢林馬撾千門織車轍秦臺破心膽黥陣驚毛髪子既屈一鳴余固冝三刖慵憂長者來病怯長街喝僧爐風雪夜相對眠一褐暖灰重擁瓶曉粥還分鉢青雲馬生角黄州使持節秦嶺望樊川秪得廻頭別商山四皓祠心與樗蒲說大澤兼葭風孤城狐兎窟且復考詩書無因見簮笏古訓屹如山古風冷刮骨周鼎列瓶罌荆璧横抛摋蘓割切力盡不可取忽忽狂歌發三年未爲苦兩郡非不逹秋浦倚吳江去檝飛青鶻溪山好畫圖洞壑深閨闥竹岡森羽林花塢團宫纈景物非不佳獨坐如韝紲丹鵲東飛來喃喃送君扎呼兒旋去聲供衫走門空踏襪手把一枝物桂花香帶雪喜極至無言笑餘翻不恱人生直作百嵗翁亦是萬古一瞬中我欲東召龍伯翁上天掲取北斗柄蓬萊頂上斡海水水盡到底看海空月於何處去日於何處來跳丸相趂走不住堯舜禹湯文武周孔皆爲灰酌此一杯酒興君狂且謌離別豈足更關意衰老相隨可奈何重送手撚金僕姑腰懸玉轆轤爬音琶頭峯北正好去係取可汗鉗作奴六宮雖念相如賦其那防邉重武夫題池州弄水亭弄水亭前溪颭灔翠綃舞綺席草芊芊紫嵐峯伍伍螭蟠得形勢翬飛如軒户一鏡奩曲堤萬丸跳猛雨檻前燕鴈栖枕上巴㠶去叢筠侍脩廊密蕙媚幽圃杉樹碧爲幢花駢紅作堵停樽遲去聲晚月咽咽上幽渚客舟耿孤燈萬里人夜語漫流罥苔槎饑鳬曬雪羽玄絲落鈎餌氷鱗看吞吐㫁霓天帔垂狂燒漢旗怒曠朗半秋曉蕭瑟好風露光㓗疑可攬欲以襟懷貯幽抱吟九歌羇情思湘浦四時皆異状終日爲良遇小山浸石稜撑舟入幽處孤謌倚桂巖晚酒眠松䲧紆餘帶竹村蠶郷足砧杵塍泉落環珮畦苗差纂組風俗知所尚豪強耻孤侮隣䘮不相舂公租無詬負農時貴伏臘簮瑱事禮賂郷校富華禮征行産強弩不䏻自勉去但媿來何暮故園漢上林信美非吾土題宣州開元寺寺置於東晉時南朝謝眺城東吳㝡深處亡國去如鴻遺寺藏煙䲧樓飛九十尺廊環四百柱高高下下中風繞松桂樹青苔照朱閣白鳥兩相語溪聲入僧夢月色暉粉堵閱景無旦夕慿欄有今古留我酒一罇前山看春雨大雨行開成三年宣州開元寺作東垠黑風駕海水海底卷上天中央三吳六月忽悽慘晚後點滴來蒼茫錚棧雷車軸轍壮矯躩蛟龍爪尾長神鞭鬼馭載隂帝來徃噴灑何顛狂四面崩騰玉京仗萬里横牙羽林搶雲纏風束亂𫾣磕黄帝未勝蚩尤強百川氣勢苦豪俊坤関宻鏁愁開張大和六年亦如此我時壮氣神洋洋東樓聳首看不足恨無羽翼高飛翔盡召邑中豪健者闊展朱盤開酒埸奔觥槌鼓助聲勢眼底不顧纎腰娘今年闒茸鬢巳白竒遊壮觀唯深藏景物不盡人自老誰知前事堪悲傷自宣州赴官入京路逢裴坦判官歸宣州因題贈敬亭山下百頃竹中有詩人小謝城城髙跨樓滿金碧下聽一溪寒水聲梅花落徑香繚繞雪白玉璫花下行縈風酒斾挂朱閣半醉遊人聞弄笙我𥘉到此未三十頭腦釤利䈥骨輕畫堂檀板秋拍碎一引有時聮十觥老閑腰下丈二組塵士高懸千載名重遊鬢白事皆改唯見東流春水平對酒不敢起逢君還眼明雲罍看人棒波臉任他横一醉六十日古來聞阮生是非離别際始見醉中情今日送君話前事髙謌引劒還一傾江湖酒伴如相問終老煙波不計程贈宣州元處士陵陽北郭隱身丗兩忘者蓬蒿三畒居寛於一天下罇酒對不酌黙與玄相話人生自不足愛嘆遭逢寡村行春半南陽西柔桑過村塢娉娉垂栁風點點迴塘雨蓑唱牧牛兒籬窺蒨裙女半濕解征衫主人饋雞黍史將軍二首長鉟周都尉閑如秋嶺雲取蝥弧登壘以駢隣翼軍百戰百勝價河南河北聞今遇太平日老去誰憐君壯氣蓋燕趙耽耽魁傑人彎弧五百歩長㦸八十斤河湟非内地安史有遺塵何日武臺坐兵符授虎臣樊川文集第一
