front:
  text: 樊川文集第十九
  hash: sha256:e57ed6514fa836ba778c136f5df535e87b74e5cdde368046fefd640bb9f2d503
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_019-1a}
body:
  text: 中書舎人杜牧字牧之王釗除皇城留守制勑銀青光禄大夫檢校刑部尚書前兼左金吾衞大将軍御史大夫充左街使太原郡開國公食邑二千户王釗常侍文陛召見武䑓願以五千獨當一隊思長䇿乆安之術避必戰敢死之虜頗嗤免胄獨䏻全師洎繁纓趨朝執金入侍夷險一貫忠勞兩兼子尾之疾雖平郄克之歩尚蹇官崇環衞職實司武入座副相不失舊榮且務優安勉於遵飬可檢校刑部尚書兼右領軍衞上将軍御史大夫充大内皇城留守散官如故王知信除左衞将軍史寰除右監門衛将軍等制勑昭武軍校尉前守右驍衛将軍上柱國賜緋魚袋王知信等古人之爲理也不以一青而掩大功克廣紹子文之宗霍陽繼愽陸之後知信烈祖貝丘之戰可庇十代豈止曾孫寰父伯仲亦效忠懇提挈全魏歸于朝廷今者寵以将軍旌其舊德豈唯獨舉賞延之典亦欲使列士諸将自爲孫謀彛鎬明誼入仕巳乆皆無悔吝故有序遷臨封逺邦蔡亳兵部分憂佐理無忘謹㢘可依前件張直方授左驍衛将軍制勑朕㩀南面之尊制一代之命先講百官之法後行四方之政若有罪不問是倒持太阿有頑不磨是廢去砥石則拱視天下何以爲理雲麾将軍起復檢校刑部尚書兼右羽林統軍将軍御史大夫張直方席其先人任爲邉将披誠向闕執玉來朝近臣勞郊大匠理第典兵於禁門之内立侍於交㦸之中校其寵榮無與等比而乃每輕法檢恣爲遨盪擅去宿衛潜遊異縣有司問状持舌不言以至再三始引愆闕古人有云語人必於其倫觀過必於其黨念其生自戎旅素不鐫琢既觸法網亦可矜容加膝墜泉予常自慎小懲大誡爾冝知恩不失将軍之榮仍有兼官之重足得湔洗以俟甄升可銀青光禄大夫檢校刑部尚書兼右驍衛将軍御史大夫朱叔明授右武衛大将軍制勑金紫光禄大夫檢校工部尚書兼左武衛上将軍御史大夫上柱國呉興郡開國公食邑二千户朱叔明司馬軍令黄帝李法兵家尚嚴始可尅敵邉将破虜詐増首級亦罪之小者漢文時魏尚囚繋漢宣時田順自殺開元中幽州長史趙含章大破奚虜旋坐贓賄放流瀼州縱有功勞不贖罪犯是以拓土萬里垂功中興自長慶巳還益輕邊事選拔将帥多非賢良豪奪種落蹄角之畜割削士卒衣食之賜見利則徃見弱則欺罔酧恩榮不顧㢘耻積帛藏鏹丘累陵聚是以戰士離落兵甲鈍弊積三十年擲之不問近者伐叛益知其由屢下詔書誥誡深切豈知頑昧不可鐫琢嗟爾叔明材惟樸樕性命淺狹其兄叔夜以贓抵刑不出私門可視覆轍忝㩀藩翰巳積歲時料甲峙粮既乏素效事虜接戰不報寸功而乃公欺降戎乾没戰馬歸充伏櫪告以弊帷人之無良一至於此昔曹劌請戰卜式輸射俱是匹夫不與公食爾乃貴擁旄鉞任倚邉陲何其用心與古相萬諌臣拜䟽前罰未塞尚爲恩貸不失将軍分務洛師可以循省可右武衞大将軍分司東都散官勲封如故梁榮幹除檢校國子祭酒兼右神䇿軍将軍制勑北落親軍夾峙宫省選忠勇者爲吾爪牙右神䇿軍奉天鎮都知兵馬使銀青光禄大夫檢校國子祭酒兼右威衛将軍御史大夫上柱國安定郡開國公食邑二千户梁榮幹射必落鵰力䏻扼武自晦雄毅益守謙恭故䏻塞護長榆兵分細栁恩加士卒名著勤勞今日擢掌五兵榮懸三綬勉礪鋒鍔上答寵光可檢校國子祭酒兼右神䇿軍将軍知軍事御史大夫充馬軍都虞侯散官勲封如故吕衛除左衛将軍李銖右威衛将軍令狐勆除滑州别駕等制勅忠武将軍前左武衛将軍兼灃州長史合川郡公賜紫金魚袋吕衛等衛爲天驕之魁來就諸臣之位誠敬忠信不失其常銖朗入仕歲乆閱官頗多聞無尤違是率理道将軍上佐半刺之任言於清時皆爲美仕帖以禄秩之綬用嘉慕義之心慎無自輕勉於敬畏可依前件張㓜彰程脩巳除諸衞将軍翰林待詔等制勑翰林待詔昭武校尉前守左驍衞将軍上柱國賜紫金魚袋張㓜彰等㓜彰脩巳鴻都奏伎攻於丹青用志不分與古爭品審以武進晩䏻知書屢以辭章上千丞相知實以謹良綰務師儒以詳練守職或藝或勞或遷或㧞将軍佐寮皆爲寵擢各守職秩無忘專愼可依前件一品孫李明逺授左千牛僃身等制勑一品孫李明逺三品孫韓鍔等立侍交㦸纔䏻勝冠出入見君父之尊師資益忠孝之道流離少好騏驥老成冝念聿脩愼無欲速明逺可致果副尉守左千牛僃身鍔可翊麾校尉守左千牛僃身李鄠除檢校刑部貟外郎充鹽鐡嶺南留後鄭蕃除義武軍推官等制勑前鳯翔節度副使朝議郎侍御史内供奉賜緋魚袋李鄠等五嶺之表地逺京邑吏以法制奉公下以文律自持盖亦寡矣而鹽鐵搉束之籍延袤萬里若當其才非唯山澤之饒歸於公上亦得以逺人利病聞於朝廷今吾丞相揣摩新規改易舊制以鄠文學廉愼當官挺然甞倅賢侯號爲名士以此委任必有可觀蕃瑾嗣閔咸有才能佐藩評刑知已所請各進官秩皆爲榮遇冝思報效無累薦延可依前件韋宗立授撿校倉部貟外郎知鹽鐵廬壽院等制勑權知鹽鐵廬壽院事朝請郎侍御史内供奉韋宗立等近者恢復河湟訓定羗虜江湖之間人安而不擾供饋之費財有餘而力不蹙實由管搉委之名臣今者尚書休以爾宗立等上言咸曰清白處巳勤謹奉公予安能知無不可者曁頡與潜皆稱名士自有丞相爲爾巳知守職佐藩無忝新命可依前件房次玄除檢校貟外郎充度支靈鹽供軍使等制勑前知度支河南院事朝散大夫試太子司議郎兼侍御史上柱國賜緋魚袋房次玄等有司臣各言爾等或以科名文學或以清白才用列於薦籍其辭甚羙分金榖榷運之務無忘謹廉佐諸侯將軍之府冝竭禆助報知苟盡能不逹乎爾其勉之可依前件李知讓加御史中丞依前邠州刺史韋瓊加侍御史充振武掌書記等制勑大中大夫使持節邠州諸軍事守邠州刺史充兵馬留後上柱國賜紫金魚袋李知讓等以知議所理雜以華夷冝假霜臺用壓戎落瓊璹觀等皆吾卿大夫之令子弟也戎臣知之請爲佐理夫幕吏之道有事必言知無不爲考於職分亦無本局各思報效勿事依違可依前件崔彦曾除山南西道副使李詵山東道推官揚元汶京兆府法曹等制勑朝議郎行鄭州管城縣令上柱國賜緋魚袋崔彦曾等戎臣請士京兆求賢披其薦籍皆曰才能彦曾左官非罪理人異等詵張王賢客梁苑辭人元汶官決平之司無舞文之過移爲典獄陟在賔階不累巳知唯有直道可依前件李承慶除鳯翔節度副使馮軒除義成軍推官等制勑朝議郎前守太常丞上柱國李承慶等以文學升名於有司以才䏻入仕於官次諸侯辟之以佐於實席天子用之升於朝廷次第等級大小髙下亦與古之郷舉里選考德試言無以異也爾等皆吾卿大夫之令子弟也清風素範克肖家聲属辭彫章能取科第旣有知巳皆爲才人賢觀與遊逹視所舉今爾賔主兩皆得之義則進否則退無爲羙疹以求苟容可依前件夏侯曈除忠武軍節度副使薛途除徑陽尉充集賢校理等制勑前昭義軍節度判官朝議郎殿中御史内供奉夏侯曈等曈以科名辭學開敏多才乆遊諸侯常藴令聞周知吏理兼能㓗身戎臣上言願爲毗賛旣諾仕以委質宜直道以酬知途以文行䇿名節趣清逺言於後進實爲秀人延閣典校丞相所請勉循階級以至堂奥可依前件蕭孜除著作佐郎裴祐之陜府廵官崔滔櫟陽縣尉集賢校理等制勑在春秋時晉爲諸侯國也尚立公族大夫敎育諸卿之子冨有賢哲不假搜聘召同列而㑹者三百餘年況今天覆盡得而禹畫無遺名卿賢相之家清風素範之敎子孫森羅髦俊並作次第叙用豈嘆乏才匭使判官將仕郎守國子監太學博士蕭孜等或以秀異得舉文學決科或以行實立身遭逢知巳皆後生可畏之士爲當時有才之人東觀著述殿閣典校參畫幕府開導獻納清秩羙職二者兼之不由階級安至堂奥勉於脩愼以俟超升可依前件揚知退除鄆州判官薛廷望除羙原尉直弘文館等制勑將仕郎前守京兆府藍田縣主簿楊知退等國家盪定濟魯餘三十年多用名儒鎭之以選古俗其議賔吏皆爲秀彦弘文館四部群書十八學士詳考理亂鋪陳王道此乃貞觀之故事也若非名士固不與焉知退與途文行温雅副幕府之求廷望才學聲華膺丞相之選當戰伐之後切於供饋庠績自以謹幹稱於有司子非能知咸徇其請各冝率勵無累所舉可依前件白従道除東渭橋廵官陶祥除福建支後劉蛻壽州廵官等制勑度支東渭橋給納使廵官將仕郎試大理評事兼監察御史白従道等朕以國計出入委以表臣尚書㓪當戰伐之餘財榖殫蹷㫁長𥙷矩以無爲有今者上言三吏皆曰周才校其智䏻足應事役曁守臣貽孫等亦曰祥蛻之學温愼而在賔階才者得失之端士者功名之本勉於自勵無負巳知可依前件盧籍除河東副使李推賢殿中丞髙湜除湖南推官薛廷傑桂管支使等制勑河東節度副使朝散大夫檢校大理少卿攝御史中丞上柱國盧籍等夫諸侯之任重矣其行道也得以阜俗其行法也得以刑人賞人若張攻化得以助業某等上言咸舉可用籍等或負才器倜儻不群或以文章䇿名俊秀或有幹局可佐囹圄皆徇所子安能知并州近胡王業兹始艱難巳來何戰不會長沙始安頗聞旱耗各冝良士以佐賢侯夫直道枉道無他故也取容盡節而巳勿慮後患冝竭報知曁殿省佐僚縣道爲郡豈曰虚授亦當爾才正霜臺之舊名班芸閣之𥘉命各服寵禄勉於自強可依前件鄭碣除江西判官李仁範除東川推官斐䖍餘除山南東道推官䖏士陳威除西川安撫廵官等制勑浙江西道都團練判官将仕郎監察御史裏行鄭碣李仁範曁䖍餘等咸以丈行䇿名清時諸侯知之命爲幕吏少微四星䖏士毗輔之宿也天之布列在軒轅前此乃天意親近賢良先於妃后威者吾能言之耕延陵之臯荷石門之蓧沉如魚潜冥若鴻翔非吾賢相爾不肯起徇酬知已以壮在野並可依前件斐詒除監察御史裏行桂管支使等制勑前鄆曹濮等州觀察支使朝散大夫試大理評事斐詒等守臣有司上言請士皆曰詒等士族之中有政事科名清廉公謹嘗經職守稱有才能古人於一飯之恩尚有殺身以報況於知已得不勉之可依前件石賀除義武軍書記崔㳙除東川推官等制勑朝議郎行祕書省著作佐郎石賀等朕寄諸侯之事重矣大者敎化風俗小者惠飬黎衆環千里之疆綰三軍之衆講求倚用不五六人守臣公度仲郢所請賀等各以文學决科愷悌于禄觀其襃舉皆是才名能報所知在爾賔主子不與焉曁鑲與鈞亦稱智敏神州作掾五庫掌財足展幹能無惰官守可依前件顧湘除涇原營田判官夏侯覺除鹽鐡廵官等制勑前振武軍節度判官文林郎監察御史裏行顧湘等近者循名貴實科指稍峻諸侯有司亦各搜選才良以佐物務湘覺本以文進兼通吏理從周曁魯皆稱幹能于以聲韻上獻律吕精功雖曰小道亦有可觀徇請酬勞咸加新命各守職分無忘用心可依前仲趙元方除戶部和糴廵官陳洙除長安縣尉王巖除右金吾使判官等制勑攝戸部廵官宣德郎試秘書省校書郎兼殿中侍御史趙元方等各爲長才自有知巳地官平糴專豐耗發歛之任京尉坐曹决事得操豪猾交㦸之内賛佐衛臣言於仕進皆曰得路勉思報效無累所舉並可依前件韋承鼎除左賛善大夫韋諝除尚食奉御柳謙除夀安縣令韋選除義昌軍推官錢琦除滄景支使等制勑前度支東渭橋給納使廵官徴仕郎試大理司直兼殿中侍御史柱國韋承鼎等持身謹潔美才周通奉公當官先勞後禄端雅守道俊秀升名乆遊賢侯衆稱君子參東朝之賛諭分五尚之職秩糺大府群吏之失提王畿生齒之籍方六七十長億萬夫金臺嘉招武幄與食法官憲秩以壮藩垣進於清時皆爲美仕近者屢譴幕吏子豈無意盖欲廓賔階敢言之路誡諸侯自是之尊惟滄新造控制兩河付之誠臣尤籍良畫若免後患愼勿苟容各脩官業無自媮薄可依前件康從固除翼王府司馬制勑新授銀青光禄大夫檢校國子祭酒兼濮州長史殿中侍御史上柱國康從固其父秀榮實爲名将李廣多爭死之士竇嬰無入家之金一收七關易如拾芥念爾跨馬事敵執戎同仇壮比文鴦勇同李敢子之能仕父教之忠古人之言信不虚設今者願留闕下以奉朝請念其垂誨可見至誠曵𥚑憲寮用爾恩寵冝思終始上報君親可檢校國子祭酒兼翼王府司馬殿中侍御史散官勲如故張正度除汾州别駕等制勑中散大夫前守青州别駕上柱國張正度等各以才能仕進謹愼脩身積日累時咸有知巳或以序進或徇所請皆佐列郡無怠官當可依前件馬逈除蜀州别駕等制勑中散大夫前守彭王府司馬上柱國馬逈等以爾入仕歳乆愈知爲理半刺上佐得與二千石參校政事短長利病者也今以名郡藉其佽助各有兼授以峻等衰愼守官常無自偷惰可依前件樊川文集第十九
