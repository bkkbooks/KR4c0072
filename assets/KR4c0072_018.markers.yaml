  - {type: indent, offset: 522, content: 　　　, id: KR4c0072_krp_018-bkkind4}
  - {type: variant, offset: 523, length: 429, content: 文舉除睦州刺史制勑夫三尺律令人情出於中耳苟情有不可亦法無本條正議大夫權知宗正卿上柱國隴西縣開國伯食邑七百戸賜紫金魚袋李文舉宗室子孫𥘉以地進累居官次皆著能名是以取自遠藩擢爲宗正大則提舉群吏灑掃守奉次則整訓屬族次第昭穆唯此二者爾之職焉今則狂盗公然侵犯陵寢毀櫝之罪巳坐首令責師之義固難矜寛勉於分憂足以𥙷過可使持節睦州諸軍事守睦州刺史散官勲封賜如故仍馳驛赴任竇弘餘加官依前台州刺史蘇莊除鄧州刺史等制勑朝散大夫使持節台州諸軍事守台州刺史上柱國竇弘餘朝議郎前使持節䖍州諸軍事守䖍州刺史上柱國賜緋魚袋蘇莊等南郡盗作而蕭育拜河内政羙而㓂恂留爲人擇官因重而撫考於兩漢行古道也弘餘廉使上言父老有請其爲政也長育多方恵訓不倦凡設敎令皆有科指荘任南康悉心爲理謹身律下節用愛人南陽古都近者小擾臨海越俗尤惜良吏就加超拜各叶所冝仕至二千石可比人矣無異文律不自貴重副疲羸之望者須念始終坐狂愚之罪者勿理深汚各膺寵禄無忝分寄弘餘可檢校太子右庻子餘如故莊可使持節鄧州諸軍事守鄧州刺史散官勲賜如故李曁, WYG: 暨}
