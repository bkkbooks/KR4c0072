  - {type: variant, offset: 4185, length: 308, content: 題荀文若傳後荀文若爲操畫䇿取兖州比之髙光不棄關中河內官渡不令還許比楚漢成臯凡爲籌計比擬無不以帝王許之海内付之事就功畢欲邀名於漢代委身之道可以爲忠乎世皆曰曹馬且東漢崩裂紛披都遷主播天下大亂操起兵東都提獻帝於徒歩困餓之中南征北伐僅三十年始定三分之業司馬懿安完之代竊發肘下奪偷權柄殘虐狡譎豈可與操比哉若使操不殺伏后不誅孔融不囚楊彪從容於揖譲之間雖慙於三代天下非操而誰可以得之者紂殺一比干武王㫁首燒屍而滅其國桓温四十年間殺千百比干毒流其社稷可以血食乎可以壇墠父天拜郊乎假使當時無操獻帝復能正其國乎假使操不挾獻帝以令天下英雄能與操爭乎若使無操復何人爲蒼生請命乎教盗穴墻發櫃多得金玉巳復不與同挈得不爲盗乎何况非盗也文若之死冝然耶, WYG: ''}
