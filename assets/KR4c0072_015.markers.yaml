  - {type: variant, offset: 601, length: 837, content: 賀平党項表臣某言伏奉三月二十七日勑党項剪除北邊寜靜華夏同慶道路懽呼臣誠慶誠抃頓首頓首伏以上天有震耀殺戮王者有攻討誅夷是以不暫討者不乆寧不一勞者不永逸伏以自古夷狄處中華未有不爲患者春秋時長狄攻魯北戎病齊破衞陵燕侵秦撓晉西漢趙充國納先零於内地東朝馬文泉置當煎於三輔自後熾大侵亂關中戰爭十年騷擾四海陵逼京邑發掘園陵叚熲不生終不䏻滅後至曹公因匈奴衰弱分爲五部處在汾晉散而居之元海傑然首亂華夏中原䘮没凡數百年國朝貞觀之𥘉突厥破滅太宗惑彦愽之利口忽文貞之成筭處其䧏衆置於河南不數十年果殘燕趙興師命将輸榖饋財天下騷然始能殄滅是知今古夷狄處在中土未有不爲亂者伏以党羗雜種本在河外生西北之勁俗禀天地之戾氣爲西戎所蹙舉種來䧏國家納之置於内地爰受冠帶兼伏征徭角觡既成觝觸是務天寳至德之際北燕偏重去聲中原一掀大暦建中之際逆胡餘波巨盗再起党羗因此亦恣猖狂兎伏鳥飛爲戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正強且須覊縻未可重撅於是邉疆日駭種類嵗繁每至勁弓折膠重馬免乳以魁健之質張忿鷙之兇劫饋糓以焚舟殺軺車而閉道衆虺盤結群犬吽牙依㨜深山出沒險徑近在宇下游於彀中艱難巳來不能剷削伏惟聖敬文思和武光孝皇帝皇天縱聖赫日資明威極風霆謀先造化潜運睿筭獨决神機箕宿禡牙狼星歛角戍日禱馬太白揚眉按瑣而邊事無遺聚米而兵形盡見披其要地擣以竒兵獸窮搏人鹿急走隘囊封赤白雜沓繼來雉走檄書逺近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍於枕席之上敗虜於險阻之中或以利戈春喉或以長矛挾脅僵屍積疊千山之草木飛腥霆電轟喧萬里之威稜大震詩曰不弔昊天亂靡有定此言中國不振蠻夷入伐下人號天以告亂也復曰宣王薄伐小雅中興是知武功不成文德不洽皐陶無遺之誡史佚非類之言若不殄除何爲家國自此兵爲農器革作軒車泥紫金於常山沉殘戎於青海天覆盡得禹畫無遺統華夏爲一家用夷狄爲四守萬物由道百度皆貞逺超三代之風使無一人之獄臣僻左小郡樸樕散材空過流年徒生聖代尚能爲詩見志作歌極情上詠神功庻垂後代限以守土不獲稱慶無任踴躍欵懇之至謹奉表陳賀以聞臣誠惶誠恐頓首頓首謹言, WYG: ''}
