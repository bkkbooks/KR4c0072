  - {type: variant, offset: 0, length: 4245, content: 樊川文集第四杜牧字牧之徃年隨故府吴興公夜泊蕪湖口今赴官西去再宿蕪湖感舊傷懷因成十六韻南指陵陽路東流似昔年重恩山未荅雙鬢雪飄然數仞慚投跡群公愧拍肩駑駘蒙錦繡塵土浴潺湲郭隗黄金峻虞卿白璧鮮貔貅環玉帳鸎鵡破蠻牋極浦沉碑㑹秋花落㡌筵旌旗明逈野冠珮照神仙籌畫言何𥙷優容道實全謳謡人撲地雞犬樹連天紫鳯超如電青襟散似煙蒼生未經濟墳草巳芊綿徃事唯沙月孤燈但客舡峴山雲影畔棠葉水聲前故國還歸去浮生亦可憐髙歌一曲淚明日夕陽邊懷鍾陵舊遊四首一謁征南最少年虞卿雙璧截肪鮮歌謡千里春長暖絲管髙臺月正圓玉帳軍籌羅俊彦絳帷環珮立神仙陸公餘徳機雲在如我酬恩合執鞭又滕閣中春綺席開柘枝蠻皷殷晴雷垂樓萬幕青雲合破浪千㠶陣馬來未掘雙龍牛斗氣髙懸一榻棟梁材連巴控越知何有珠翠沉檀處處堆又十頃平湖堤桞合岸秋蘭芷緑纎纎一聲明月採蓮女四面朱樓卷畫簾白鷺煙分光的的㣲漣風定翠徒兼切斜輝更落西山影千歩虹橋氣象兼又控壓平江十萬家秋來江靜鏡新磨城頭晩鼓雷霆後橋上遊人笑語多日落汀㾗千里色月當樓午一聲歌昔年行樂穠桃畔醉與龍沙㨂蜀羅臺城曲二首整整復斜斜隨旗簇晩沙門外韓檎虎樓頭張麗華誰憐容足地却羡井中鼃又王頒兵勢急鼓下坐蠻奴㶑灔倪塘水义牙出骨鬚乾蘆一炬火廻首是平蕪江上雨寄崔碣春半平江雨圎文破蜀羅聲眠蓬底客寒濕釣來簑暗澹遮山逺空濛着栁多此時懷一恨相望意如何罷鍾陵幕吏十三年來泊湓浦感舊爲詩青梅雨中熟檣倚酒旗邊故國殘春夢孤舟一褐眠揺揺逺堤柳暗暗十程煙南奏鍾陵道無因似昔年啇山麻澗雲光嵐彩四面合柔柔垂栁十餘家雉飛鹿過芳草逺牛巷雞塒春日斜秀眉老父對罇酒舊袖女兒簮野花征車自念塵土計惆悵溪邊書細沙啇山冨水驛驛本名與陽諌議同姓名因此改爲冨水驛益戇猶來未覺賢終湏南去弔湘川當時物議朱雲小後代聲華白日懸邪佞每思當面唾清貧長欠一盃錢驛名不合輕移改留警朝天者惕然丹水何事苦縈廻離腸不自裁恨聲随夢去春態逐雲來沉定藍光徹喧盤粉浪開翠巖三百尺誰作子陵臺題武關碧溪留我武關東一笑懷王跡自窮鄭䄂嬌饒酣似醉屈原憔悴去如蓬山墻谷塹依然在弱吐強吞盡巳空今日聖神家四海戍旗長卷夕陽中除官赴闕商山道中絶句水疊鳴珂樹如帳長楊春殿九門珂我來惆悵不自決欲去欲住終如何漢江溶溶漾漾白鷗飛緑淨春深好染衣南去北來人自老夕陽長送釣船歸襄陽雪夜感懷徃事起獨念飄然自不勝前灘急夜響宻雪映寒燈的的三年夢迢迢一綫縆明朝楚山上莫上㝡高層詠歌聖德逺懷天寳因題關亭長句四韻聖敬文思業太平海寰天下唱歌行秋來氣勢洪河壯霜後精神泰華獰廣德者強朝萬國用賢無敵是長城君王若悟治皮諭安史何人敢弄兵途中作緑樹南陽道千峯勢逺隨碧溪風澹態芳樹雨餘姿野渡雲𥘉暖征人袖半垂殘花不一醉行樂是何時重到襄陽哭亡友韋壽朋故人墳樹立秋風伯道無兒跡更空重到笙歌分散地隔江吹笛月明中赤壁折戟沉沙鐵未銷自將磨洗認前朝東風不與周郎便銅雀春深鏁二喬雲夢澤日旗龍斾想飄揚一索功髙縛楚王直是超然五湖客未如終始郭汾陽除官行至昭應聞友人出官因寄賤子來千里明公去一麾可能休涕淚豈獨感恩知草木秋風後山川落照時如何望故國驅馬却遲遲寄浙東韓乂評事一笑五雲溪上舟跳丸日月十經秋鬢衰酒减欲誰泥跡辱魂慚好自尤夢寐㡬囬迷蛺蝶文章應廣畔牢愁無窮塵土無聊事不得清言解不休泊秦淮煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花秋浦途中蕭蕭山路窮秋雨淅淅溪風一岸蒲爲問寒沙新到鴈來時還下杜陵無題桃花夫人廟即息夫人細腰宫裏露桃新脉脉無言度㡬春至竟息亡縁底事可憐金谷堕樓人𥘉春有感寄歙州邢貟外雪溺前溪水啼聲巳繞灘梅衰未減態春嫩不禁寒跡去夢一覺年來事百般聞君亦多感何處倚欄干書懷寄中朝徃還平生自許少塵埃爲吏塵中勢自廻朱紱乆慚官借與白頭還嘆老將來湏知丗路難輕進豈是君門不大開霄漢㡬多同學伴可憐頭角盡卿材寄崔鈞緘書報子玉爲我謝平津自愧掃門士誰爲乞火人詞㠯陪羽獵戰將騁駢隣兩地差池恨江汀醉送君𥘉春雨中舟次和州横江裴使君見迎李趙二秀才同來因書四韻兼寄江南許渾先軰芳草渡頭㣲雨時萬株楊栁拂波垂蒲根水暖鴈𥘉浴梅徑香寒蜂未知辭客倚風吟暗淡使君廻馬濕旌旗江南仲蔚多情調悵望春隂㡬首詩和州絶句江湖醉度十年春牛渚山邊六問津歴陽前事知何實髙位紛紛見䧟人題烏江亭勝敗兵家事不期包羞忍耻是男兒江東子弟多才俊卷土重來未可知題橫江舘孫家兄弟晉龍驤馳騁功名業帝王至竟江山誰是主荅磯空屬釣魚郎寄澧州張舎人笛髪勻肉好生春嶺截玉鑚星寄使君檀的染時㾗半月落梅飄處響穿雲樓中威鳯傾冠聽沙上驚鴻掠水分遥想紫泥封詔罷夜深應隔禁牆聞寄楊州韓綽判官青山隱隱水遥遥秋盡江南草木凋二十四橋明月夜玉人何處教吹簫送李羣玉赴舉故人别來面如雪一榻拂雲秋影中玉白花紅三百首五陵誰唱與春風送薛種遊湖南賈傅松醪酒秋來美更香憐君片雲思一棹去瀟湘題夀安縣甘棠舘御溝一渠東注芳華苑苑鏁池塘百歲空水殿半傾蟾口澁爲誰流下蓼花中汴河懷古錦䌫龍舟隋煬帝平臺複道漢梁王遊人閑起前朝念折柳孤吟斷殺腸汴河阻凍千里長河𥘉凍時玉珂瑶珮響參差浮生恰似冰底水日夜東流人不知酬張祜處士見寄長句四韻七子論詩誰似公曹劉須在指揮中薦衡昔日知文舉令狐相公曽表薦處士乞火無人作蒯通北極樓臺長掛夢西江波浪逺吞空可憐故國三千里虚唱歌辭滿六宫處士詩曰故國三千里深官二十年一聲河滿子隻淚落君前寄宣州鄭諌議大夫官重醉江東蕭灑名儒振古風文石陛前辭聖主碧雲天外作冥鴻五言寧謝顔光禄百歳須齊衛武公再拜冝同丈人行過庭交分有無同題元處士髙亭宣州水接西江天外聲小齋松影拂雲平何人敎我吹長笛與倚春風弄月明鄭瓘恊律廣文遺韻留攄散雞犬圖書共一船自說江湖不歸事阻風中酒過年年題籌筆驛江東矜割據鄴下奪孤婺霸略非匡漢宏圖欲佐誰奏書辭後主仗劒出全師重襲襃斜路懸開反正旗欲将苞有截必使舉無遺沉慮經謀際揮毫決勝時圜􅒀當分畫前著比操持山秀扶英氣川流入妙思筭成功在彀運去事終虧命屈天方猒人亡國自随艱難推舊姓開創極𥘉基揔歎曽過地寕探作敎資若歸新暦數誰復顧衰危報德兼明道長留識者知和野人殷潜之題籌筆驛十四韻三吳裂婺女九錫獄孤兒覇主業未半本朝心是誰永安宫受詔籌筆驛沉思畫地乾坤在濡毫勝負知艱難同草創得失計毫釐寂黙經千慮分明渾一期川流縈智思山聳助扶持慷慨匡時略從容問罪師襃中秋鼓角渭曲晩旌旗仗義懸無敵鳴攻固有辭若非天奪去豈復慮䏻支子夜星纔落鴻毛鼎便移郵亭世自換白日事長垂何處躬耕者猶題殄瘁詩重題絶句一首郵亭寄人丗人丗寄郵亭何如自籌度鴻路有冥冥送陸洿郎中棄官東歸少微星動照春雲魏闕衡門路自分倐去忽來應有意丗間塵土謾疑君寄珉笛與宇文舎人調髙銀字聲還側物比柯亭韻校竒寄與玉人天上去桓將軍見不教吹寄内兄和州崔貟外十二韻歴陽崔太守何日不含情恩義同鍾李李􅈾鍾瑶中外兄弟少相友善塤箎實弟兄光塵能混合擘畫最分明臺閣仁賢譽閨門孝友聲西方像教毀南海繡衣行為嶺南坼寺副使金槖寧廻顧珠簞肯一棖祇冝裁宻詔何自取專城進退無非道徊翔必有名好風𥘉婉軟離思苦縈盈金馬舊逰貴桐廬春水生雨侵寒牖夢梅引凍醪傾共祝中興主髙歌唱太平遣興鏡弄白髭鬚如何作老夫浮生長勿勿兒小且嗚嗚忍過事堪喜㤗來憂勝無治平心徑熟不遣有窮途早秋踈雨洗空曠秋摽驚意新大熱去酷吏清風來故人罇酒酌未酌曉花嚬不嚬銖秤與縷雪誰覺老陳陳秋思熱去解鉗􅎂飄蕭秋半時㣲雨池塘見好風襟䄂知髪短梳未足枕凉閑且欹平生分過此何事不參差途中一絶鏡中絲髪悲來慣衣上塵㾗拂漸難惆悵江湖釣竿手却遮西日向長安春盡途中田園不事來逰宦故國誰交爾別離獨倚關亭還把酒一年春盡送春詩題村舎三樹稚桑春未到扶牀乳女午啼饑潜銷暗鑠歸何處萬指侯家自不知代人寄逺六言二首河橋酒斾風軟候舘梅花雪嬌宛陵樓上瞪目我郎何處情饒繡領任垂蓬髻丁香閑結春梢䞉肯新年歸否江南緑草迢迢閨情姢姢却月眉新鬢學鵶飛暗砌勻檀粉晴牎畫夾衣䄂紅垂寂寞眉黛歛依稀還向長陵去今宵歸不歸舊遊閑吟芍藥詩悵望乆嚬眉盼眄廻眸逺纎衫整髻遲重㝷春晝夢笑把淺花枝小市長陵住非郎誰得知寄逺隻影隨驚鴈單栖鏁畫籠向春羅䄂薄誰念舞臺風簾徒云逢剪削豈謂見偏装鳯節䡖雕日鸞花薄飾香問屏何屈曲憐帳解周防下潰金階露斜分碧瓦霜沉沉伴春夢寂寂侍華堂誰見昭陽殿真珠十二行寄題甘露寺北軒曽上蓬萊宫裏行北軒欄檻㝡留情孤高堪弄桓伊笛縹緲冝聞子晉笙天接海門秋水色煙籠隋苑暮鐘聲他年㑹着荷衣去不向山僧道姓名題青雲舘虬蟠千仞劇羊腸天府由來百二強四皓有芝輕漢祖張儀無地與懷王雲連帳影蘿隂合枕遶泉聲客夢凉深處㑹容高尚者水苗三頃百株桑郡中有懷寄上睦州貟外十三兄歙州刺史邢羣城枕溪流淺更斜麗譙連帶邑人家經冬野菜青青色未臘山梅樹樹花雖免瘴雲生嶺上永無京信到天涯如今嵗晏從羇滯心喜彈冠事不賖正𥘉奉酬翠巖千尺倚溪斜曽得嚴光作釣家越嶂逺分丁字水臘梅遲見二年花明時刀尺君湏用幽處田園我有涯一壑風烟陽羡里解龜休去路非賖江上偶見絶句楚郷寒食橘花時野渡臨風駐綵旗草色連雲人去住水紋如糓燕差池題木蘭廟彎弓征戰作男兒夢裏曽經與畫眉㡬度思歸還把酒拂雲堆上祝明妃入商山早入商山百里雲藍溪橋下水聲分流水舊聲人舊耳此廻嗚咽不堪聞偶題甘羅昔作秦丞相子政曽爲漢輦郎千載更逄王侍讀當時還道有文章送盧秀才一絶春瀬與煙逺送君孤棹開潺湲如不改愁更釣魚來醉題金鑷洗霜鬢銀觥敵露桃醉頭扶不起三丈日還高題商山四皓廟一絶吕氏強梁嗣子柔我扵天性豈恩讎南軍不袒左邉䄂四老安劉是滅劉送隱者一絶無媒徑路草蕭蕭自古雲林遠市朝公道世間唯白髪貴人頭上不曽饒題張處士山荘一絶好鳥疑𫾣磬風蟬認軋箏脩篁與嘉樹偏倚半巖生有懷重送斛斯判官蒼蒼煙月滿川亭我有勞歌一爲聴将取離魂隨白騎三台星裡拜文星贈別娉娉裊裊十三餘荳䓻梢頭二月𥘉春風十里揚州路卷上珠簾揔不如多情却似揔無情唯覺罇前笑不成蠟燭有心還惜别替人垂淚到天明寄遠前山極遠碧雲合清夜一聲白雪㣲欲寄相思千里月溪邊殘照雨霏霏九日金英繁亂拂欄香明府辭官酒滿缸還有玉樓輕薄女笑他寒燕一雙雙寄牛相公漢水横衝蜀浪分危樓點的拂孤雲六年仁政謳歌去栁遠春隄處處聞我乏青雲稱君無買笑金虚傳南國貌爭奈五爲人題贈二首陵心桂席塵瑶珮瓊鑪燼水沉凝魂空薦夢低珥悔聽琴月落珠簾卷春寒錦幕深誰家樓上笛何處月明砧蘭徑飛蝴蝶筠籠語翠襟和簮抛鳯髻将淚入鴛衾的的新添恨迢迢絶好音文園終病渇休詠白頭吟緑樹鶯鶯語平江燕燕飛枕前聞去鴈樓上送春歸半月縆雙臉凝腰素一圍西牆苔漠漠南浦夢依依有恨簮花懶無寥鬪草稀雕籠長慘澹蘭畹謾芳菲鏡歛青蛾黛燈挑皓腕肌避人匀迸淚拖䄂倚殘暉有貌雖桃李單棲足是非雲軿載馭去寒夜看裁衣少年行官爲駿馬監職帥羽林兒兩綬藏不見落花何處期獵𫾣白玉鐙怒䄂紫金鎚田竇長留醉蘇辛曲讓岐豪持出塞節笑別逺山眉捷報雲臺賀公卿拜壽巵盆池鑿破蒼苔地偷他一片天白雲生鏡裏明月落階前有寄雲闊煙深樹江澄水浴秋美人何處在明月萬山頭樊川文集第四, WYG: 撰}
