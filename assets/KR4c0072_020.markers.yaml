  - {type: variant, offset: 0, length: 3550, content: 樊川文集第二十杜牧字牧之髙駢除祭酒兼侍御史依前充職右神䇿軍兵馬使制􅎁右神䇿軍右廂兵馬使兼押衙銀青光禄大夫檢校國子祭酒前靈州大都督府左司馬殿中侍御史上柱國髙駢禁旅典兵爲吾爪士言念付禄未稱輸勞舛之王官帖以憲秩可曰榮遇無忘盡瘁可檢校國子祭酒兼濮王府司馬侍御史餘如故忠武軍都押衙檢校太子賔客王仲玄等加官制勑忠武軍節度右都押衙銀青光禄大夫撿校太子賔客兼殿中侍御史王仲玄等自艱難以來言念許師何役不行何戰不㑹居常則長法知禮臨敵則致命爭登摽於和門不忝忠武爾等短衣長劒事㓂乗邊觸履艱危無所顧慮将軍列状憲班酧勞勿矜常勝無忘淬礪可依前件右神䇿軍押衙檢校太子賔客尚漢美等叙勲制勑前件等㧞以貔貅之勇籍於禁旅之中大刀長矛重弓束矢林㑹山立星羅翼舒唯以忠勤供我宸極錫之勲寵以酬勞瘁可依前件右龍武軍大将軍劉誠信等三十三人叙階制勑右龍武軍大将兵馬都知正議大夫檢校太子賔客上柱國賜紫金魚袋右龍武軍宿衛劉誠信等技以勇聞任因信普力可挾輈以走敵藝䏻奪弰以制人常礪鋒鍩無所廻避自拱宸極益展忠勞思以報之何惜階級可依前件柳師玄除衢州長史知夏州進奏等制勑夏州節度押衙知進奏朝議郎前權知杭州長史兼監察御史上柱國柳師玄等将軍謢塞師玄主留邸之職從瑜繼怤以墨纕徇公喪葬告滿珪專書府藂委之務咸有勞䏻遷奨正名亦其常也各冝專謹勿罹悔尤可依前件頼師貞除懷州長史周少鄘除􅉑州司馬王桂直除遒州長史等制勑鳯翔府節度押衙知進奏銀青光禄大夫檢校秘書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事少鄘專史閣錯雜之務皆公謹歳乆官次冝遷玄爽俾佐郡符亦有可取湖外飢人相聚爲㓂蕩覆郷縣勢如燎火蓋不得巳遂至翦伐桂冝用命一舉滅之言念功勤冝有襃賞名郡上佐帖以憲秩耀爾軍旅可増義勇可依前件景思齊授官知宣武軍進奏官制勑宣武軍節度押衙知進奏起復銀青光禄大夫檢校太子賔客兼歙州司馬上柱國景思齊等諸侯之任各有職貢小者得循事例大者決於朝廷聞白啓導屬在留邸爾等咸以謹宻能膺任使或外除䘮服或超授新命不失職禄勉於忠勤可依前件馮少端等湖南軍將授官制勑湖南同團練副使馮少端等皆長沙勇士同擢兇徒言念功勤咸冝升獎帖之憲秩試以崇班名郡掾曹亦爲羙稱特如恩寵非用彛章耀爾轅門可増忠壯可依前件朱諌周豹二人委本道量事優獎官健陞滿等一百二十八人弩手并子弟周質等四百八十五人並委本道酌事量加賞給武官授折衝果毅等制勑具官某等夫折衝果毅皆吾武位以延勇士國朝用此以進立戰功至将軍者衆矣自府兵一廢名存實亡今之來者豈其人哉近以邉障隙開㓂戎患結豈無萬人之敵奮於下位之中但使披文空増拊髀並可依前件張直方貶恩州司戸制勑朕聞先王之理也設法誤罹雖大必捨不忌故犯縱小必誅况乎凶狠不悛罪戾日積更欲矜免其如法何銀青光禄大夫檢校刑部尚書兼左驍衛大将軍御史大夫張直方念以來朝嘉其慕善付之寵禄頗極尊榮爲執金吾鞭小過而至死作禁軍統去異縣而恣遊尚以生自邉陲素乏教義退之散秩以懲非心俟其抆拭舊㢃湔洗前過必欲牽復用存始終豈暴虐得於天生險悍著於心本抵冐刑憲縱恣胸臆法所惡者爾皆爲之白晝九衢指憎萬手作横日甚而不自知滿於聽聞豈可悉數禮曰凢有罪惡屏於四裔不留中國唯舜䏻之況之堅頑有不移之姿網羅無屢開之典荒服作掾猶曰寛恩爾䏻自新豈惜後命可守恩州司户參軍貟外置同正貟仍即馳驛發遣王著貶端州司户制勑守愛州九眞縣尉貟外置同正貟王著漢家之制雖丞貟相子亦當戌邉隋文之令盗邉榖一升坐法斬首盖以西北鎮戍華夏保障法茍不立所虞非細爾當羗㓂犯塞之日天子拊髀之時命守關防以爲遮扜而乃占般兵粮自取傭直屏之荒服以謹其類乃令厥子叫閽稱冤再命坐獄備見罪状幸以得無逋負可以矜寛爲列郡之掾曹換萬里之一尉足得循省吾不負人可守端州司户參軍置問正貟仍即馳驛發遣李玕貶撫州司馬制勑朝散大夫守光禄少卿李玕昔開元致理之𥘉兾州刺史平嗣光闕温凊之禮遂奪其官放歸田里是故四十餘年風俗忠厚教化之本豈先斯乎爾爲将相之家窮極富貴坐有大第官爲亞卿母子異居僅將十載有司彈劾事狀昭著於吾用法爾當何罪俾佐名郡尚曰寛恩可守撫州司馬貟外置同正貟仍即馳驛發遣姜閱貶岳州司馬等制勑朝議郎前守景陵臺令上柱國姜閱等盗逆無狀輙犯陵寢侵攘法物聞之震驚爾等官業在於守奉懈怠所政是誰之過言於末减朕不敢議各宜佐官用正典刑可依前件仍並馳驛發遣武易簡量移梧州司馬制勑守崖州司戸參軍貟外置同正武易簡㓂來乗城不能死節以此播棄爾亦何辭然漢誅李陵是爲虐典魏捨于禁實得中道力不足者法冝矜焉守臣敎爲吾爪牙能與别白使易簡導生還之路朝廷無失入之刑咨爾三事大僚百司庶尹率能守此可期洽平各冝盡規朕不惜失可守梧州司馬貟外置同正貟王元宥除右神䇿軍護軍中尉制勑縏纓趨朝交㦸入侍委以兵衛固湏信臣内樞宻使驃騎大將軍行右威衛上將軍知内侍省事上柱國晉國公食邑二千户王元宥儉而多才忠而䏻力事君盡禮䖏已無私自主樞要益見誠信今者十萬全師北落禁旅視吳漢差強人意非韓信無可計事是以輟自心腹寄兹爪牙以盡爾材出於余志爾戰歛豪猾整肅威容無使郷閭致有侵害勉酧倚任以報君親可行右驍衛上将軍知内侍省事充右神䇿軍護軍中尉兼右街功德使散官勲封如故周元植除鳯翔監軍制勑控秦塞之西扼胡苑之左乃睠歧隴爲國藩牆命以監撫冝崇班秩鳯翔監軍使銀青光禄大夫右領軍衛大将軍貟外置同正員上柱國汝南郡開國公食邑二千户賜紫金魚袋周元植事君以敬䖏仕無私節操凌霜而不凋肝膽開忠而洞見謙以自得高而益兢累監三軍推誠一貫言念西塞未得髙枕用其聲實以護藩垣夫䖏於兵戎予今誡汝無怨不過於逺利伏衆莫若於律身立事成功酧恩垂美在此二者汝其勉之寵以内省之崇仍兼将軍之貴徃服休命無忝恩榮可守右監門衛大将軍知内侍省事散官勲封賜如故依前監鳯翔節度兵馬朱䏻𥙿除景陵判官制敕新授景陵判官上騎都尉朱䏻𥙿朕以喬山弓劍渭北衣冠霜露之心悽感常切以汝端謹有守操尚無尤常在傍側備見忠孝用是奨擢爰資守奉夙夜勤敬無忝委任可将仕郎内侍省掖庭局官教愽士貟外置同正員餘如故劉全禮等七人並除内侍省内府局丞置同正等制勑賜緋魚袋上柱國劉全禮等置在傍側皆有才䏻既歴歲時合霑班秩各冝敬恭職禄不懈忠勤可依前件宋叔康妻封邑號制勑詩稱鵲巢禮榮翟茀既彰牙爪之效冝齊伉儷之榮左神䇿軍護軍中尉兼左街功德使特進左領軍衞大将軍知内侍省事上柱國廣平縣開國侯食邑一千户宋叔康妻清河縣君房氏懿兹柔淑作配忠勲䏻潔蘋蘩克叶姻族成此内則穆其壼風稱爲令人實光婦道爰䟽封爵用舉典章可服寵榮勉於輔佐可封清河郡夫人吐突士曄妻封邑號制勑詩羙夫人禮稱内子元膺腹心之任冝崇家室之榮弓箭軍器等使特進行右領軍衛大將軍知内侍省事上柱國隂山縣開國公食邑一千五百戸吐突士曄妻咸陽縣君田氏生於冨貴作配忠貞柔婉自卑儀範可則職勤賔祭道睦􅊚親旣諧閨風克成婦德爰加禮秩之貴以彰輔佐之勤榮我䟽封無忘内助可封鴈門郡夫人新羅王子金元弘等授太常寺少卿監丞簿制功某臣等感恩知義奉䞇不闕居大海之外爲有禮之賔爾國是也自列國卿至于署丞皆吾文吏之選次第授爾赤所以表他國不同禮也將我恩寵耀爾殊隣愼勿怠違永作藩屏並可依前件仍並放還蕃西州廻鶻授驍衞大將軍制勑古者天子守在四夷蓋以恩信不虧羈縻有禮春秋列潞子之爵西漢有隰隂之封考於經史其來尚矣西州放首頡干伽思俱宇合逾越宻施莫賀都督宰相安寜等忠勇竒志魁健雄姿懐西戎之腹心作中夏之保障相其君長頗有智謀今者交臂來朝稽顙請命丈組寸印髙位重爵舉以授爾用震殊隣無忘敬恭冝念終始可雲麾将軍守左驍衛大将軍外置同正貟餘如故沙州專使押衙吳安正等二十九人授官制勑沙州專仗衙前左廂都知押衙吳安正等自天寳以降中原多故莫大之虜盗取西陲男爲戎臣女爲戎妾不暇弔伐今将百年自朕君臨豈敢偷惰乃命将帥收復七關爰披地圖實得天險遂相朝庭聲聞去声聞於燉煌爾帥議潮果䏻抗忠臣之丹心折昆夷之長角竇融西河之故事見於盛時李陵教射之竒兵無非義旅爾等咸䏻竭盡肝膽奉事長帥将其誠命經歴艱危言念忠勞豈吝爵位官我武衛仍峻階級以慰皇華用震殊俗可依前件燉煌郡僧正慧菀除臨壇大德制勑燉煌管内釋門都監察僧正兼州學愽士僧慧菀燉煌大藩乆䧟戎壘氣俗自異果産名僧彼上人者生於西土利根事佛餘力通儒悟執迷塵俗之身譬喻火宅舉君臣父子之義教爾青襟開張法門顯白三道遂使悍戾者好空惡殺義勇者徇國忘家禆助至多品地冝峻領生徒坐於學校貴服色舉以臨壇若非出群之才豈獲兼榮之授勉弘两教用化新邦可充京城臨壇大德餘如故契丹賀正使大首領等授官制勑幽州道入朝賀正契丹大首領討魯等天子有道守在四夷爾今來朝予亦増愧綏之玉帛榮以班秩冝懷恩寵永保封疆可依前件仍並放還蕃黔中道朝賀牂牁大酋長等十六人授官制勑黔中道朝賀牂牁大酋長攝充州刺史趙瓊林等夫西南諸國自古多順在法度之外居繩墨之表来朝有禮歸貢不闕玉帛以将厚意階級以峻等衰各服寵榮無忘恭敬可依前件仍並放還蕃黔中道朝賀訓州昆明等十三人授官制勑黔中道朝賀訓州昆明繼襲部落主嵯阿如弟攝訓州刺史嵯阿蒲等招攜以禮懷逺以德此國家所以殊俗貢聘不倦命舌人以通志意委屬國以厚宴享仍峻階級式爾恩榮無警邉陲以念終始可依前件仍並放還蕃樊川文集第二十, WYG: ''}
