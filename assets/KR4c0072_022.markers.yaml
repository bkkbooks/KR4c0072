  - {type: variant, offset: 3093, length: 883, content: 下恐驚珠淚落金盤将出關宿層峯驛却寄李諌議孤驛在重阻雲根掩柴扉數聲暮禽切萬壑秋意歸心馳碧泉澗目㫁青瑣闈明日武關外夢魂勞逺飛使廻枉唐州崔司馬書兼寄四韻因和清晨候吏把酒來十載離憂得暫開癡叔去時還讀易仲容多興索衘盃人心計日殷勤望馬首隨雲早晚廻莫爲霜臺愁歲暮潜龍湏待一聲雷郡齋秋夜即事寄斛斯處士許秀才有客誰人肯夜過獨憐風景柰愁何邉鴻怨處迷霜乆庭樹空來見月多故國杳無千里信綵弦時伴一聲歌馳心秪待城烏暁㡬對虚簷望白河同趙二十二訪張明府郊居聮句陶潜官罷酒缾空門掩楊花一夜風牧古調詩吟山色裏無絃琴在月明中嘏逺簷髙樹冝幽鳥出岫孤雲逐晚虹牧别後東籬數枝菊不知閑醉與誰同嘏早春題眞上人院生天寳𥘉清羸已近百年身古寺風煙又一春寰海自成戎馬地唯師曽是太平人對花微疾不飲呈坐中諸公花前雖病亦提壷數調持觴興有無盡日臨風羡人醉雪香空伴白髭鬚酬王秀才桃花園見寄桃滿西園淑景催㡬多紅豔淺深開此花不逐溪流出晉客無因入洞來走筆送杜十三歸京煙鴻上漢聲聲逺逸驥㝷雲歩歩髙應笑内兄年六十郡城閑坐飬霜毛送王十至褒中因寄尚書闕下經年别人間兩地情壇埸新漢将煙月古隋城鴈去梁山逺雲髙楚岫明君家荷藕好緘恨寄遥程後池泛舟送王十相送西郊暮景和青蒼竹外遶寒波爲君蘸甲十分飲應見離心一倍多重送王十分𬒮還應立馬看向來離思始知難鴈飛不見行塵滅景下山遥極目寒洛陽秋夕泠泠寒水帶霜風更在天橋夜景中清禁漏閑煙樹寂月輪移在上陽宫贈獵騎巳落雙鵰血尚新鳴鞭走馬又翻身慿君莫射南來鴈恐有家書寄逺人懷吳中馮秀才長洲苑外草蕭蕭却筭遊程歲月遥唯有别時今不忘暮煙秋雨過楓橋寄東塔僧𥘉月微明漏白煙碧松梢外挂青天西風靜起傳深業應送愁吟入夜蟬秋夕紅燭秋光冷畫屏輕羅小扇撲流螢淫階夜色凉如水坐看牽牛織女星瑶瑟玉仙瑶瑟夜珊珊月過樓西桂燭殘風景人間不如此動揺湘水徹明寒送故人歸山三清洞裏無端别又拂塵衣欲卧雲看著挂冠迷處所北山蘿月在移文聞角暁樓煙檻出雲霄景下林塘巳寂寥城角爲秋悲更逺護霜雲破海天遥押兵甲發谷口寄諸公曉澗青青桂色孤楚人隨玉上天衢水辭谷口山寒少今日風頭校暖無和令狐侍御賞蕙草㝷常詩思巧如春又喜幽亭蕙草新本是馨香比君子遶欄今更爲何人偶題道在人間或可傳小還輕變巳多年, WYG: 夷爾}
