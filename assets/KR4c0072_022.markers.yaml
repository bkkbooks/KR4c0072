  - {type: variant, offset: 851, length: 798, content: 巳慿鴻去歸唯與燕期只應明月見千里兩相思冬至日遇京使發寄舎弟逺信初逢雙鯉去他郷正遇一陽生鐏前豈解愁家國輦下唯能憶弟兄旅館夜憂姜𬒳冷暮江寒覺晏裘輕竹門風過還惆悵疑是松䆫雪打聲洛下送張曼容赴上黨召歌闋鐏殘恨起偏慿君不用設離筵未趍雉尾隨元老且驀羊腸過少年七葉漢貂眞宻近一枝詵桂亦徒然羽書正急徴兵地湏遣頭風處處痊宣州留贈紅鈆濕盡半羅裙洞府人間手欲分滿面風流雖似玉四年夫壻恰如雲當春離恨盃長滿倚柱關情日漸曛爲報眼波湏穏當五陵遊宕莫知聞寄題宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人爲倚東樓柱正是千山雪漲溪贈張祐詩韻一逄君平生稱所聞粉毫唯畫月瓊尺只裁雲黥陣人人懾秋星歴歴分數篇留别我羞殺李将軍殘春獨來南亭因寄張祐煖雲如粉草如茵獨歩長堤不見人一嶺桃花紅錦黦半溪山水碧羅新髙枝百舌猶欺鳥帶葉梨花獨送春仲蔚欲知何䖏在苦吟林下拂詩塵宣州開元寺南樓小樓纔受一床横終日看山酒滿傾可惜和風夜來雨醉中虚度打牎聲寄逺人終日求人卜廻廻道好音那時離别後入夢到如今别沈䖏士舊事參差夢新程邐迤秋故人如見憶時到寺東樓留贈舞鞾應任閑人看笑臉還湏待我開不用鏡前空有淚薔薇花謝即歸來奉和僕射相公春澤稍愆聖君軫慮嘉雪忽降品彚昭蘇即事書成四韻白相國飄來鷄樹鳯池邊漸壓瓊枝凍碧漣銀闕雙髙銀漢裏玉山横列玉墀前昭陽殿下風廻急承露盤中月彩圎上相抽毫歌帝徳一篇風雅羙豐年寄李播評事子列光殊價明時忍自髙寕無好舟擑不汎惡風濤大翼終難戢竒鋒且自韜春來煙渚上幾淨雪霜毫送牛相出鎮襄州盛時常注意南雍暫分茅紫殿辭明主巖廊别舊交危憧侵碧霧寒斾獵紅旓德業懸秦鏡威聲隱楚郊拜塵先灑淚成厦昔容巢遥仰沉碑㑹鴛鴦玉佩敲送薛邽二首可憐走馬騎驢漢豈有風光肯占伊只有三張最惆悵下山廻馬尚遲遲小捷風流巳俊才便将紅粉作金臺明年未去池陽郡更乞春時却重來見穆三十宅中庭梅榴花謝矜紅掩素似多才不待櫻桃不逐梅春到未曽逢宴賞雨餘爭解免低徊巧窮南國千般豔趂得東風二月開堪恨王孫浪遊去落英狼籍始歸來留誨曹師, WYG: ''}
