  - {type: variant, offset: 9, length: 187, content: 班竹筒簟血染班班成錦紋昔年遺恨至今存分明知是湘妃泣何忍将身卧淚㾗和嚴惲秀才落花共惜流年留不得且環流水醉流柸無情紅豔年年盛不恨凋零却恨開倡樓戲贈細栁橋邉深半春纈衣簾裏動香塵無端有寄閑消息背挿金釵笑向人𥘉上舩留寄煙水本好尚親交何慘悽况爲珠履客即泊錦帆堤沙鴈同舩去田鵶遶岸啼此時還有味必臥日從西秋岸河岸微退落栁影微彫踈舩上聽呼穉堤南趂漉魚數帆旗去疾一艇箭廻𥘉曽入相思夢因慿附逺書過, WYG: 勇籍於禁旅之中}
