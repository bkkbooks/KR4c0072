  - {type: variant, offset: 4004, length: 361, content: 然巳十秋雪山當面照銀鈎懷恩淚盡霜天曉一片餘霞映驛樓陜州醉贈裴四同年凄風洛下同覊思遟日棠隂得醉歌自笑與君三歳别頭銜依舊鬢絲多破鏡佳人失手鏡𥘉分何日團圎再㑹君今朝萬里秋風起山北山南一片雲長安雪後秦陵漢苑參差雪北闕南山次第春車馬滿城原上去豈知惆悵有閑人華清宫零葉飜紅萬樹霜玉蓮開蘂暖泉香行雲不下朝元閣一曲淋鈴淚數行冬日題智門寺北樓滿懷多少是恩酬未見功名巳白頭不爲㝷山試筋力豈能寒上背雲樓别王十後遣京使累路附書重關曉度宿雲寒羸馬縁知歩歩難此信的應中路見亂山何處拆書看許秀才至辱李蘄州絶句問斷酒之情因寄有客南來話所思故人遥枉醉中詩暫因微疾湏防酒不是歡情减舊時送張判官歸兼謁鄂州大夫處士聞名早遊秦獻䟽廻腹中書萬卷身外酒千盃江雨春波闊園林客夢催今君拜旌㦸凛凛近霜臺宿長慶寺南行歩歩逺浮塵更近青山昨夜鄰髙鐸數聲秋撼玉霽河千里暁横銀紅渠影落, WYG: ''}
