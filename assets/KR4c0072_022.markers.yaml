  - {type: variant, offset: 2616, length: 5, content: 郷兩枝仙桂, WYG: 四十餘年風俗忠厚教化之本豈先斯乎爾為將相之家窮極富貴坐有大第官為亞卿母子異居僅將十載有司彈劾事狀昭著於吾用法爾當何罪俾佐名郡尚曰寛恩可守撫州司馬員外置同正員仍即馳驛發遣姜閱貶岳州司馬等制勅朝議郎前守景陵臺令上柱國姜閱等盗逆無狀輒犯陵寢侵攘法物聞之震驚爾等官業在於守奉懈怠所政是誰之過言於末減朕不敢議各宜佐官用正典刑可依前件仍並馳驛發遣武易簡量移梧州司馬制勅守崖州司户參軍員外置同正員武易簡冦來乗城不能死節以此播棄爾亦何辭然漢誅李陵是為虐典魏捨于禁實得中道力不足者法宜矜焉守臣教為吾爪牙能與别白使易簡導生還之路朝廷無失入之刑咨爾三事大僚百司庶尹率能守此可期治平各宜盡規朕不惜失可守梧州司馬員外置同正員王元宥除右神策軍䕶軍中尉制勅繁纓趨朝交㦸入侍委以兵衛固須信臣内樞宻使驃騎大將軍行右威衛大將軍知内侍省事上柱國晉國公食邑二千户王元宥儉而多才忠而能力事君盡禮處巳無私自主樞要益見誠信今者十萬全師北落禁旅視吳漢差强人意非韓信無可計事是以輟自心腹寄兹爪牙以盡爾材出於余志爾戢斂豪猾整肅威容無使鄉閭致有侵害勉酬倚任以報君親可行右驍衛上將軍知内侍省事充右神策軍䕶軍中尉兼右街功徳使散官勲封如故周元植除鳯翔監軍制勅控秦塞之西扼胡苑之左乃睠岐隴為國藩牆命以監撫宜崇班秩鳯翔監軍使銀青光禄大夫右領軍衛大將軍員外置同正員上柱國汝南郡開國公食邑二千户賜紫金魚袋周元植事君以敬處仕無私節操凌霜而不凋肝膽開忠而洞見謙以自得高而益兢累監三軍推誠}
