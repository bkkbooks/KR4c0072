  - {type: variant, offset: 0, length: 2, content: 樊川, WYG: 高駢除祭酒兼侍御史依前充職右神策軍兵馬使制勅右神策軍右廂兵馬使兼押衙銀青光禄大夫檢校國子祭酒前靈州大都督府左司馬殿中侍御史上柱國高駢禁旅典兵為吾爪士言念付禄未稱輸勞}
  - {type: variant, offset: 3, length: 1, content: 集, WYG: 之王官帖以憲秩可曰榮遇無忘盡悴可檢校國子祭酒兼濮王府司馬侍御史餘如故忠武軍都押衙檢校太子賔客王仲𤣥等加官制勅忠武軍節度右都押衙銀青光禄大夫檢校太子賔客兼殿}
