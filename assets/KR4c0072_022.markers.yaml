  - {type: variant, offset: 2622, length: 0, content: '', WYG: 貫言念西塞未得高枕用其聲實以䕶藩垣夫處於兵戎予今誡汝無怨不過於逺利伏衆莫若於律身立事成功酬恩垂美在此二者汝其勉之寵以内省之崇仍兼將軍之貴往服休命無忝恩榮可守右監門衛大將軍知内侍宋叔康妻封邑號制勅詩稱鵲巢禮榮翟茀既彰爪牙之効宜齊伉儷之榮左神䇿軍中尉兼左衛功徳使特進左領軍衛大將軍内侍省事上柱國廣平縣開國侯食邑一千户宋叔康妻清河縣君居氏懿兹柔淑作配忠勲能潔蘋蘩克叶姻族成此内則穆其壼風稱為令人實光婦道爰疏封爵用舉典章可服寵榮勉於輔佐可封清河郡夫人吐突士煜妻封邑號制勅詩美夫人禮稱内子允膺腹心之任宜崇家室之榮弓箭軍器等使特進行右領軍衛大將軍知内侍省事上柱國隂山縣開國公食邑一千五百户吐突士煜妻咸陽縣君田氏生於富貴作配忠貞柔婉自卑儀範可則職勤賔祭道睦姻親既諧閨風克成婦徳爰加禮秩之貴以彰輔佐之勤榮我疏封無忘内助可封雁門郡夫人新羅王子金元𢎞等授太常寺少卿監丞簿制勅某臣等感恩知義奉贄不闕居大海之外為有禮之賔爾國是也自列國卿至於署丞皆吾文吏之選次第授爾亦所以表他國不同禮也將我恩寵耀爾殊隣慎勿怠違永作藩屏並可依前件仍並放還蕃西州回鶻授驍衛大將軍制勅古者天子守在四夷葢以恩信不虧羈縻有禮春秋列潞子之爵西漢有隰隂之封考於經文其來尚矣西州放首頡干伽思俱宇合逾越宻施莫賀都督宰相安寧等忠勇奇志魁健雄姿懐西戎之腹心作中夏之保障相其君長頗有智謀今者交臂來朝稽顙請命乂爼寸即高仁重爵舉以授爾用震殊隣無忘敬恭宜念終始可雲麾將軍守左驍衛大將軍外置同正員餘如故沙州專使押衙吳安正等二十九人授官制勅沙州專使衙前左廂都知押衙吳安正等自天寶以降中原多故莫大之虜盗取西陲男為戎臣女為戎妾不暇弔伐今將百年自朕君豈敢偷惰乃命將帥収復七闗爰披地圖實得天險遂使朝廷聲聞聞於燉煌爾帥議潮果能抗忠臣之丹心折昆夷之長角竇融西河之故事見於盛}
