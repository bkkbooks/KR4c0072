  - {type: variant, offset: 2557, length: 0, content: '', WYG: 叙階制勅右龍武軍大將兵馬都知正議大夫檢校太子賔客上柱國賜紫金魚袋右龍武軍宿衛劉誠信等技以勇聞任因信普力可挾輈以}
  - {type: page-break, offset: 2557, content: '', id: KR4c0072_WYG_017-2b, image: WYG1081/WYG1081-0688d.png}
  - {type: variant, offset: 2558, length: 0, content: '', WYG: 敵藝能奪矟以制人常礪鋒銛無所迴避自拱宸極益展忠勞思以報之何惜階級可依前件柳師𤣥除衢州長史知夏州進奏等制勅夏州節度押衙知進奏朝議郎前權知杭州長史兼監察御史上柱國柳師𤣥等將軍䕶塞師𤣥主留邸之職從瑜繼怤以墨縗狥公喪葬告滿珪專書府藂委之務咸有勞能遷奬正名亦其常也各宜專謹勿罹悔尤可依前件賴師貞除懷州長史周少􅅠除虢州司}
  - {type: page-break, offset: 2558, content: '', id: KR4c0072_WYG_017-3a, image: WYG1081/WYG1081-0689a.png}
  - {type: variant, offset: 2559, length: 3, content: 廻秦地, WYG: 王桂直除道州長史等制勅鳯翔府節度押衙知進奏銀青光禄大夫檢校秘書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事}
  - {type: substitution, offset: 2559, original: 廻, replacement: 回, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16348}}
  - {type: variant, offset: 2563, length: 9, content: 年多辦酒巳将春色入, WYG: 􅅠專史閣錯雜之務皆公謹歲久官次宜遷𤣥爽俾佐郡符亦有可取湖外饑人相聚為㓂蕩覆鄉縣勢如燎火葢不得已遂至剪伐桂直用命一舉滅之言念功勤宜有褒賞名郡上佐帖以憲秩耀爾軍旅可增義勇可依前件景思齊授官知宣武軍進奏制勅宣武軍節度押衙知進奏起復銀青光禄大夫檢校太子賔客兼歙州司馬上柱國景思齊等諸侯之任各有職貢小者得循事例大者决於朝廷聞白啟導屬在留邸爾等咸以謹宻能膺任使或外除喪服或超授新命不失職禄勉於忠勤可依前件馮少端等湖南軍將授官制勅湖南同團練副使馮少端等皆長沙勇士同戮兇徒言念功勤咸宜升奬帖之憲秩試以崇班名郡椽曹亦為美稱特加恩寵非用彛章耀爾轅門可増忠壯可依前件朱諌周豹二人委本道量事優奬官健陞滿等一百二十八人弩手并子弟周質等四百八十五人並委本道酌事量加賞給武官授折衝果毅等制勅具官某等夫折衝果毅皆吾武位以延勇士國朝用此以進立戰功至將軍者衆矣自府兵一廢名存實亡今之來者豈其人哉近以邊障隙開㓂戎患結豈無萬人之敵奮於下位之中但使披文空増拊髀並可依前件張直方貶恩州司户制勅朕聞先王之理也設法誤罹雖大必捨不忌故犯縱小必誅况乎凶狠不悛罪戾日積更欲矜免其如法何銀青光禄大夫檢校刑部尚書兼左驍衛大將軍御史大夫張直方念以來朝嘉其慕善付之寵禄頗極尊榮為執金吾鞭小過而至死作禁軍統去異縣以恣遊尚以生自邊陲素乏教義退之散秩以懲非心俟其収抵舊痕湔洗前過必欲牽復用存始終豈暴虐得於天生險悍著於心本抵冐刑憲縱恣胷臆法所惡者爾皆為之白晝九衢指憎萬手作横日甚而不自知滿於聽聞豈可悉數禮曰凡有罪惡屏於四裔不留中國惟舜能之况之堅頑有不移之姿􅃠羅無屢開之典荒服作掾猶曰寛恩爾能自新豈惜後命可守恩州司户參軍員外置同正員仍即馳驛發遣王著貶端州司户制勅守愛州九員縣尉員外置同正員王著漢家之制雖丞員相子亦當戍邊隋文之令盗邊穀一升坐法斬首葢以西北鎮戍華夏保障法苟不立所虞非細爾當羌㓂犯塞之日天子拊髀之時命守}
