  - {type: variant, offset: 1650, length: 903, content: 詩萬物有醜好各一姿状分唯人即不爾學與不學論學非探其花要自撥其根孝友與誠實而不忘爾言根本既深實柯葉自滋繁念爾無忽此期以慶吾門洛陽文爭武戰就神功時似開元天寳中巳建玄戈收相土應廽翠㡌過離宫侯門草滿冝寒兎洛浦沙深下塞鴻疑有女蛾西望䖏上陽煙樹正秋風寄唐州李玭尚書累代功勲照世光奚胡聞道死心降書功筆秃三千管領節門排十六雙先揖耿弇聲寂寂今看黄霸事摐摐時人欲識胷襟否彭蠡秋連萬里江南陵道中南陵水靣漫悠悠風緊雲輕欲變秋正是客心孤逈䖏誰家紅䄂凭江樓登九峯樓晴江灔灔含淺沙髙低逺郭滯秋花牛酒漁笛山月上鷺渚鶖梁溪日斜爲郡異郷徒泥酒杜陵芳草豈無家白頭搔殺倚柱遍歸棹何時聞軋鴉别家𥘉歲嬌兒未識爺别爺不拜手吒义拊頭一别三千里何日迎門却到家歸家穉子牽衣問歸來何太遟共誰爭歲月贏得鬂邉絲雨連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠孤客耳主人䆫外有芭蕉送人鴛鴦帳裏暖芙蓉低泣關山幾萬重明鑑半邊釵一股此生何處不相逢遣懐道泰時還泰時來命不來何當離城市髙卧愽山隈醉贈薛道封飲酒論丈四百刻水分雲隔二三年男兒事業知公有賣與明君直幾錢歙州盧中丞見惠名醖誰憐賤子啓窮途太守封來酒壹壷攻破是非渾似夢削平身丗有如無醺醺若借嵆康懶兀兀仍添寗武愚猶念悲秋更分賜夾溪紅蓼映風蒲詠襪鈿尺裁量减四分纎纎玉笋裏輕雲五陵年少欺他醉笑把花前出畫裙官詞二首蝉翼輕綃傅體紅玉膚如醉向春風深宫鎻閉猶疑惑更取丹沙試辟宫監宫引出暫開門随例湏朝不是恩銀錀却收金鎻合月明花落乂黄昏月三十六宫秋夜深昭陽歌㫁信沉沉唯應獨伴陳皇后照見長門望幸心忍死留别獻鹽鐵裴相公二十叔賢相輔明主蒼生夀域開青春辭白日幽壤作黄埃豈是無多士偏蒙不棄才孤墳一尺土誰可爲培栽悲吳王城二月春色江上來水精波動碎樓䑓吳王宮殿栁含翠蘇小宅房花正開解舞細腰何處徃䏻歌姹女逐誰廻千秋萬古無消息國作荒原人作灰閨情代作梧桐葉落鴈𥘉歸迢遞無因寄逺衣月照石泉金點冷鳯酣簫管玉聲微佳人力杵秋風外蕩子從征夢寐希遥望戍樓天欲曉滿城鼕鼓白雲飛寄沈褒秀才晴河萬里色如刀處處浮雲卧碧桃仙桂茂時金鏡暁洛波飛處玉容髙雄如寳劒衝牛斗麗似鴛鴦飬羽毛他日憶君何處望九天香滿碧蕭騷入關東西南北數衢通曽取江西徑過東今日更㝷南去路未秋應有北歸鴻及第後寄長安故人東都放牓未花開, WYG: ''}
