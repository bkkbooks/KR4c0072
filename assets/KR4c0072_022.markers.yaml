  - {type: variant, offset: 4427, length: 1286, content: 物情𥘉與是非閑時名竟是無端事羞對靈山道愛山眼看雲鶴不相隨何看塵中事作爲好伴羽人深洞去月前秋聽玉參差登澧州驛樓寄京兆韋尹尹曽典此郡一話涔陽舊使君郡人廻首望青雲政聲長與江聲在自到津樓日夜聞長安晴望翠屏山對鳯城開碧落揺光霽後來迴識六龍廵幸處飛煙閑繞望春臺歳日朝迴口號星河猶在整朝衣逺望天門再拜歸笑向春風初五十敢言知命且知非驌驦駿瑶池罷游宴良樂委塵沙遭遇不遭遇鹽車與鼓車龍丘途中二首漢苑殘花别吴江盛夏來唯看萬樹合不見一枝開水色饒湘浦灘聲怯建溪淚流迴月上可得更猿啼宫人塚盡是離宫院中女苑墻城外塚纍纍少年入内教歌舞不識君王到老時寄浙西李判官燕臺上客意何如四五年來漸漸踈直道莫抛男子業遭時還與故人書青雲滿眼應驕我白髮渾頭少恨渠唯念賢哉崔大讓可憐無事不歌魚寄杜子不識長楊事北胡且教紅䄂醉來扶狂風烈熖雖千尺豁得平生俊氣無武牢關吏應相笑箇底年年徃復來若問使君何處去爲言相憶首長廻盧秀才将出王屋髙歩名埸江南相逢贈别王屋山人有古文欲攀青桂弄氛氲将擕徤筆干明主莫向山壇問白雲馳逐寜教爭䖏讓是非偏忌衆中分交遊話我慿君道除却鱸魚更不聞送劉三復郎中赴闕横溪辭寂寞金馬去追逰好是鴛鴦佀正逢霄漢秋玉珂聲瑣瑣錦帳夢悠悠㣲笑知今是因風謝釣舟羊欄浦夜陪宴會弋檻營中夜未央雨沾雲惹侍襄王毬來香䄂依稀暖酒凸觥心汎灔光紅絃髙緊聲聲急珠唱鋪圓裊裊長自比諸生最無取不知何䖏亦升堂送杜顗赴潤州幕少年才俊赴知音丞相門欄不覺深直道事人男子業異郷加飯弟兄心還須整理韋弦佩莫獨矜誇玳瑁簮若去上元懷古去謝安墳下與沉吟有感宛溪垂栁最長枝曽𬒳春風盡日吹不堪攀折猶堪看陌上少年来自遟書懷寄盧州謝山南畔州風物最宜秋太守懸金印佳人敞畫樓凝缸暗醉夕殘月上汀州可惜當年鬢朱門不得遊賀崔大夫崔正字内舉無慙古所難燕䑓遥想拂塵冠登龍有路水不峻一鴈背飛天正寒别夜酒餘紅燭短映山帆去碧霞殘謝公樓下潺湲響離恨詩情添㡬般江南送左師江南爲客正悲秋更送吾師古渡頭惆悵不同塵土别水雲蹤跡去悠悠寢夜蛩唱如波咽更深似水寒露華驚弊褐燈影挂塵冠故國𥘉離夢前溪更下灘紛紛毫髪事多少宦遊難十九兄郡樓有宴病不赴十二層慺敞畫簷連雲歌盡草纎纎空堂病怯階前月燕子嗔垂一行簾愁聚散竟無形廻腸自結成古今留不得離别又潜生䧏虜将軍思窮秋逺客情何人更憔悴落第泣秦京隋苑一云定子牛相小青紅霞一抺廣陵春定子當筵睡臉新却笑丘墟隋煬帝破家亡國爲誰人芭蕉芭蕉爲雨移故向䆫前種憐渠點滴聲留得歸郷夢夢逺莫歸郷覺來一翻動汴人舟行荅張祐千萬長河共使船聽君詩句倍滄然春風野岸名花發一道㠶檣畫栁煙牧陪昭應盧郎中在江西宣州佐今吏部沈公幕罷府周歳公宰昭應牧在淮南縻職叙舊成二十韻用以投寄燕鴈下楊州凉風栁陌愁可憐千里夢還是一年秋宛水環朱檻章江敞碧流謬陪吾益友祗事我賢侯印組縈光馬鋒鋩看解牛井閭安樂易冠蓋愜依投政簡稀開閤功成每運籌送春經野塢遲日上高樓玉裂歌聲㫁霞飄舞帶收泥情斜拂印别臉小低頭日晩花枝爛釭疑粉彩稠未曾孤酩酊剰肯隻淹留重德俄徴寵諸生苦宦遊分途之絶國灑淚拜行輈聚散眞漂梗光隂極轉郵銘心徒歴歴屈指盡悠悠君作烹鮮用誰膺仄席求卷懷能憤悱卒歳且優游去矣時難遇沽哉價莫酬滿枝爲皷吹衷甲避戈矛隋帝宮荒草秦王土一丘相逢好大笑除此揔雲浮, WYG: 蕃}
