  - {type: variant, offset: 3941, length: 0, content: '', WYG: 流故不得記嗚呼胡為而來二鬼驚馬折脛而死哉大中五年辛未歲五月二日記自撰墓銘牧字牧之曾祖某河西隴右節度使祖某司徒平章事岐國公贈太師考某駕部員外累贈禮部尚書牧進士及第制䇿登科𢎞文館校書郎試左武衛兵曹參軍江西團練巡官轉監察御史裏行御史淮南節度掌書記拜真監察分司東都以弟病去官授宣州團練判官殿中侍御史内供奉遷左補闕史館修撰轉膳部比部員外郎皆兼史職出守黃池睦三州遷司勲員外郎史館修撰轉吏部員外以弟病乞守湖州入拜考功郎中知制誥周歲拜中書舍人某平生好讀書為文亦不出人曹公曰吾讀兵書戰䇿多矣孫武深矣因注其書十三篇乃曰上窮天時下極人事無以加也後當有知之者去歲七月十日在吳興夢人告曰爾當作小行郎復問其次曰禮部考功為小行矣言其終典耳今歳九月十九日歸夜困亥初就枕寢得被勢乆酣而不夢有人朗告曰爾改名畢十月二日奴順來言炊將熟甑裂予曰皆不祥也十一月十日夢書片紙皎皎白駒在彼空谷傍有人曰空谷非也過隙也予生於角星昴畢於角為第八宫曰病厄宫亦曰八殺宫土星在焉火星繼木星王楊晞曰木在張於角為第十一福德宫木為福德大君子救於其旁無虞也予曰自湖守不周歲遷舍人木還福於角足矣土火還死於角宜哉復自視其形視流而疾鼻折山根年五十斯壽矣某月某日終于安仁里妻河東裴氏朗州刺史偃之女先某若干時卒長男曰曹師年十六次曰秜秜年十二别生二男曰蘭曰興一女曰真皆幼以某月日葬於少陵司馬村先塋銘曰後魏太尉顒封平安公及子九世皆葬少陵嗟爾小子亦克厥終安于肅宫樊川集卷六欽定四庫全書樊川集巻七唐杜牧撰}
