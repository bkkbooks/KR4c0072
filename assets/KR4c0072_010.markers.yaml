  - {type: variant, offset: 5020, length: 557, content: 自撰墓銘牧字牧之曾祖某河西隴右節度使祖某司徒平章事歧國公贈太師考某駕部貟外累贈禮部尚書牧進士及第制䇿登科弘文館校書郎試左武衛兵曹參軍江西團練廵官轉監察御史裏行御史淮南節度掌書記拜眞監察分司東都以弟病去官授宣州團練判官殿中侍御史内供奉遷左𥙷闕史館修撰轉膳部比部貟外郎皆兼史職岀守黄池睦三州遷司勲貟外卽史館修撰轉吏部貟外以弟病乞守湖州入拜考功郎中知制誥周歳拜中書舎人某平生好讀書爲文亦不出人曹公曰吾讀兵書戰䇿多矣孫武深矣因注其書十三篇乃曰上窮天時下極人事無以加也後當有知之者去歳七月十日在吴興夢人告曰爾當作小行郎復問其次曰禮部考功爲小行矣言其終典耳今歲九月十九日歸夜困亥𥘉就枕寢得𬒳勢乆酣而不夢有人朗告曰爾改名畢十月二日奴順來言炊將熟甑裂予曰皆不祥也十一月十日夢書片𥿄皎皎白駒在彼空谷傍有人曰空谷非也過隙也予生於角星昴畢於角爲第八宫曰病厄宮亦曰八殺宮土星在焉火星繼木星工楊晞曰木在張於角爲第十一福德宮木爲福德大君子救於其旁無虞也予曰自湖守不周歳遷舎人木還福於角足矣土火還死於角冝哉復自視其形視流而疾鼻折山根年五十斯夀矣某月某日終干安仁里妻河東裴氏朗州刺史偃之女先某若干時卒長男曰曹師年十六次曰柅柅年十二别生二男曰蘭曰興一女曰眞皆幼以某月日葬于少陵司馬村先塋銘曰後魏太尉顒封平安公及子九丗皆葬少陵嗟爾小子亦克厥終安于肅官, WYG: ''}
