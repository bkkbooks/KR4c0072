  - {type: variant, offset: 6979, length: 342, content: 復相國知子必欲次第叙用子今復求刺史得不生相國疑怪乎某荅曰是何言與某唯恃吾相之知始敢干求今天下以江淮爲國命杭州戸十萬稅錢五十萬刺史之重可以殺生而有厚禄朝廷多用名曹正郎有名望而老於爲政者而爲之某今官爲外郎是官位未至也前三任刺史無異政聞於吾相是爲政無取也今若得遂所求非唯超顯兼活私家某若不恃吾相之知而求之是狂躁妄庸人也墜井者求出執熱者願濯古人以此二者譬喻所切也某今所切是墜於絶壑而衣掛于樹杪覆在鼎中下有熱火而水将沸與古所喻則復過之輙敢具䟽血誠上干尊重兾垂恩憐或賜援拯慺慺丹懇不勝惶懼懇悃之至謹啓爲堂兄慥求澧州啓某啓庫部家兄昨者特蒙奨㧞却忝班行實以聽聞稍難不敢更求榮進今在郢州汨口草市絶俸巳是累年孤外生及姪女堪嫁者三人仰食待衣者不啻百口脫粟蒿霍才及一飡伏蒙仁恩頻賜顧問必許援拯授以涔陽活於闔門, WYG: ''}
