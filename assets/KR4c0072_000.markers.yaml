  - {type: variant, offset: 0, length: 5156, content: 樊川文集序將仕郎守京兆府藍田縣尉充集賢殿校理裴延翰撰長安南下杜樊郷酈元注水經實樊川也延翰外曽祖司徒歧公之別墅在焉上五年冬仲舅自吴興守拜考功郎中知制誥盡吴興俸錢創治其墅岀中書直亟召昵宻往遊其地一旦談啁酒酣顧延翰曰司馬遷云自古冨貴其名磨滅者不可勝紀我適稚走於此得官受俸再治完具俄及老爲樊上翁旣不自期冨貴要有數百首文章異日爾爲我序號樊川集如此顧樊川一禽魚一草木無恨矣庻千百年未隨此磨滅邪明年冬遷中書舎人始少得恙盡搜文章閱千百紙擲焚之纔屬留者十二三延翰自撮髪讀書學文率承導誘伏念始𥘉出仕入朝三直太史筆比四出守其間餘二十年几有撰制大乎短章塗藁醉墨碩夥纎屑雖適僻阻不逺數千里必獲冩示以是在延翰乆藏蓄者甲乙籖目比校焚外十多七八得詩賦傳録論辯碑誌序記書啓表制離爲二十編合爲四百五十首題曰樊川文集嗚呼雖當一時戲感之言孰見魄兆而果驗白耶嘻文章與政通而風俗以文移在三代之道以文與忠敬隨之是爲理具與運高下探採古作者之論以屈原宋玉賈誼司馬遷相如楊雄劉向班固爲世魁傑然騷人之辭怨刺憤懟雖援及君臣敎化而不䏻霑洽持論相如子雲瑰麗詭變諷多要寡漫羡無歸不見治亂賈馬劉班乗時君之善否直豁巳臆奮然以拯世扶物爲任纂緒造端必不空言言之所及則君臣禮樂敎化賞罰無不包焉竊觀仲舅之文高聘夐厲旁紹曲摭絜簡渾圓勁出横貫滌濯滓窳支立攲倚呵摩鄆瘃如火煦焉爬梳痛痒如水洗焉其抉剔挫偃敢㫁果行若誓牧野前無有敵其正視嚴聽前衡後鑾如整冠裳祗謁宗廟其聒蟄爆聲發不慄若大吕勁鳴洪鐘横撞撑裂噎喑戞切韶護其砭熨嫉害堤障𥘉終若濡槁扵未焚膏㿈扵未穿栽培敎化翻正治亂變醨養瘠堯醲舜薫斯有意趨賈馬劉班之藩牆者邪具文有罪言者原十六衛者戰守二論者與時宰論用兵論江賊二書者上獵秦漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凡人未甞經度者若繩裁刀解粉畫線織布在眼見耳聞下其譎往事則阿房宫賦刺當代則感懐詩有國欲亡則得一賢人決遂不亡則張保皐傳尚古兩柄本出儒術不專任武力者則注孫子而爲其序褒勸賢傑表掲職業則贈莊淑大長公主及故丞相竒章公汝南公墓誌摽白歴代取士得才率由公族子弟爲多則與髙大夫書諌諍之體非訐醜惡與主鬪激則論諌書若一縣宰因行德敎不施刑罰能舉古風則謝守黃州表一存一亡適見交分則祭李處州文訓勵官業告東君命擬古典謩以寓誅賞則司帝之誥其餘𫐠喻讃誡興諷愁傷易格異狀機鍵雜發雖綿逺窮幽醲腴魁礨筆酣句健窕眇碎細包詩人之軌憲整楊馬之衙陣聳曹劉之骨氣掇顔謝之物色然未始不撥斸治本縆幅道義鈎索於經史觝禦於理化也故文中子曰言文而不及理是天下無文也王道何從而興乎嘻所謂文章與政通而風俗以文移果於是以卜盛時理具踔三代而䕃萬古若躋太華臨溟渤但觀乎積髙而沓深不知其磅礴澶漫所爲逺大者也近代或序其文非有名與位則文學宗老小子旣就其集寐寤思慮顛倒友覆不翅音試逾年苟墜承顧付與之言雖晦顯兩不相解在他人無知狀者然以髙有天幽有神隂有宰物者可自􅔰誣以甘罰殛邪故惣條目強自作序樊川文集緫目中書舎人杜牧字牧之第一賦三首阿房宫賦望故園賦晩晴賦詩二十八首感懷杜秋娘郡齋獨酌張好好冬至日寄小姪阿冝李甘洛中送兾處士東遊送沈處士赴蘇州李中丞招以詩贈行長安送友人遊湖南皇風雪中書懷雨中作偶遊石盡僧舎赴京𥘉入汴口曉景即事獨酌惜春題安州浮雲寺樓過驪山作池州送孟遲先􅒰重送題池州弄水亭題宣州開元寺大雨行逢裴坦判官歸宣州因題贈贈宣州元處士村行史將軍弟二律詩六十七首華清宫三十韻長安雜題長句六首河湟許七侍御棄官東歸李給事二首題永崇西平王宅太尉愬院六韻東兵長句十韻過勤政樓題魏文貞早春閣下寓直蕭九舎人因寄書懷四韻秋晚與沈十四舎人期遊樊川不至念昔遊今皇帝陛下一詔徴兵不日功集河湟諸郡次第歸降臣獲覩聖功輙献歌詠奉和白相公長句四韻過華清宫絶句三首登樂遊原聞趙縱使君與党項戰中箭身死長句送容州中丞赴鎮夏州崔常侍自少常亞列出領麾幢十韻街西長句春申君奉陵宫人讀韓杜集春日言懷寄李常侍李侍郎於陽羡里冨有泉石某亦於陽羡粗有薄産叙舊述懷因獻長句四韻贈李䖏士長句四韻送國棊王逢重送絶句少年行奉和門下相公送西川相公兼領相印出鎮全蜀朱坡早春寄岳州李使君送王侍御赴夏口座主幕自貽自遣題桐葉沈下賢李和鼎贈沈學士張歌人憶逰朱坡四韻朱坡絶句三首出宫人二首長安秋望獨酌醉眠不飲贈酒昔事文皇帝三十二韻道一大尹存之學士庭美學士簡于聖明自致霄漢皆與舎弟昔年還徃牧支離窮悴竊於一麾書美歌詩兼自言志因成長句四韻呈上三君子杏園春睌題韋家亭子過田家宅見宋拾遺題名處感而成詩雪晴訪趙嘏街西所居将赴吳興登樂逰原一絶第三律詩八十八首洛陽長句二首洛中監察病假滿送韋楚老拾遺歸朝東都送鄭處誨校書歸上都故洛陽城有感楊州三首潤州二首題楊州禪智寺西江懷古江南懷古江南春絶句將赴宣州留題楊州禪智寺題宣州開元寺水閣宣州送裴坦判官往舒州句溪夏曰送盧霈秀才自宣城赴官上京春末題池州弄水亭登池州九峯樓寄張祜齊