州刺史等制王晏實除齊州吴𥘉本巴州陳侹渝州刺史等制郭瓊除渠州郭宗元除興州等刺史王康除建陵臺令等制吴從蓬州賈師由除瓊州蕭蕃除羅州刺史制裴閱除温州刺史伊實除獻陵臺令等制陸紹除信州刺史封載除遂州刺史鄭宗道南鄭縣令等制張德翁除歸州刺史李承訓除福昌縣令盧審矩除陽翟縣令等制王樟除雅州刺史郭錥除右諭德等制傅孟恭除威州刺史宣敏加祭酒兼御史依前宣歙道兵馬使知防秋事等制姚克柔除鳯州刺史韋承鼎除櫟陽縣令王仲連賛善大夫等制朱載言除循州刺史袁循除渭南縣令張公及除獻陵令韋㓜章除京兆府倉曹等制支某除鄆王傅盧賔除融州刺史趙全素除福陵令等制鄭㥄除大理少卿致仕制第十九王釗除皇城留守制王知信除左衞将軍史寰除右監門縣將軍等制張直方授左驍衛將軍制朱叔明授右武衛大將軍制梁榮幹除檢校國子祭酒兼右神䇿軍將軍制吕衛除左衛將軍李銖右威衛將軍令狐朗除滑州別駕等制張幼彰程脩巳除諸衛將軍翰林待詔等制一品孫李明逺授左千牛備身等制李鄠除檢校刑部貟外郎充塩鐵嶺南留後鄭蕃除義武軍推官等制韋宗立授檢校倉部貟外郎知鹽鐵廬壽院等制房次玄除檢校貟外郎充度支靈鹽供軍使等制李知讓加御史中丞依前邠州刺史韋瓊加侍御史充振武軍掌書記等制崔彦曽除山南西道副使李詵山東道推官揚元汶京兆府法曹等制李承慶除鳯翔節度副使馮軒除義成軍推官等制夏侯曈除忠武軍節度副使薛途除涇陽尉充集賢校理等制蕭孜除著作佐郎裴祐之陜府廵官崔滔櫟陽縣尉集賢校理等制楊知退除鄆州判官薛廷望除羙原尉直弘文舘制白從道除東渭橋廵官陶祥福建支使劉蛻壽州廵官等制盧籍除河東副使李推賢殿中丞高湜除湖南推官薛延傑桂管支使等制鄭碣除江西判官李仁範除東川推官裴處餘除山南東道推官處士陳威除西川安撫廵官等制裴詒除監察御史裏行桂管支使等制石賀除義武軍書記崔㳙除東川推官等制顧湘除涇原營田判官夏侯覺除鹽鐡廵官等制趙元方除戸部和糴巡官陳洙除長安縣尉王巖除右金吾使判官等制韋承鼎除左賛善大夫韋諝除尚食奉御栁謙除壽安縣令韋選除義昌軍推官錢琦除滄景支使等制康從固除翼王府司馬等制張正度除汾州別駕等制馬逈除蜀州別駕等制第二十高駢除祭酒兼侍御史依前充右神策軍兵馬使制忠武軍都押衙檢校太子賔客王仲玄等加官制右神策軍押徛檢校太子賔客尚漢美叙勲制右神龍軍大將軍劉誠信等三十三人叙階制栁師玄除衢州長史知夏州進奏等制頼師貞除懷州長史周少鄘除􅉑州司馬主桂除道州長史等制景思齊等授官知宣武軍進奏制馮少端等湖南軍將授官制武官授折衝果毅等制張直方貶恩州司户制王著貶端州司户制李玕貶撫州司馬制姜閱貶岳州司馬制武易簡量移梧州司馬制王元宥除神䇿軍護軍中尉制周元植除鳯翔監軍制朱能𥙿除景陵判官制劉全禮等七人並除内侍省府局丞登同正等制宋叔康妻封邑號制吐突士曄妻封邑號制新羅王子金元弘等授太常寺少卿監丞簿等制西州廻鶻授驍衛大將軍制沙州專使押猗錢安正等二十九人授官制燉煌郡僧正慧菀除臨壇大徳制契丹賀正使大首領等授官制黔中道朝賀牂牁大酋長等十六人授官制黔中遒朝賀訓州昆明等十三人授官制樊川文集緫目, WYG: 巻}
