  - {type: variant, offset: 1, length: 4210, content: 川文集第三中書舎人杜牧字牧之洛陽長句二首草色人心相與閑是非名利有無間橋橫落照虹堪畫樹鏁千門鳥自還芝蓋不來雲杳杳仙舟何處水潺潺君王謙讓泥金事蒼翠空高萬嵗山天漢東穿白玉京日華浮動翠光生橋邉逰女珮環委波底上陽金碧明月鏁名園孤鶴唳川酣秋夢鑿龍聲連昌繡嶺行宫在玉輦何時父老迎洛中監察病假滿送韋楚老拾遺歸朝洛橋風暖細翻衣春引仙官去玉墀獨鶴𥘉冲太虛日九牛新落一毛時行開敎化期君是卧病神祇禱我知十載丈夫堪耻處朱雲猶掉直言旗東都送鄭處誨挍書歸上都悠悠渠水清雨霽洛陽城槿墮𥘉開艶蟬聞第一聲故人容易去白髪等閑生此別無多語期君晦盛名故洛陽城有感一片官牆當道危行人爲汝去遲遲篳圭苑裏秋風後平樂舘前斜日時錮黨豈䏻留漢鼎清談空解識胡兒千燒萬戰坤靈死慘慘終年鳥雀悲揚州三首煬帝雷塘土迷蔵有舊樓誰家唱水調明月滿揚州煬鑿汴河自造水調駿馬宜閑出千金好暗逰喧闐醉年少半脫紫茸裘秋風放螢苑春草鬪雞臺金絡擎鵰去鸞環拾翠來蜀船紅錦重越橐水沉堆處處皆華表淮王奈却廻街垂千歩栁霞映兩重城天碧臺閣麗風凉歌管清纎腰間長䄂玉珮雜繁纓拖軸誠爲壮豪華不可名自是荒淫罪何妨作帝京潤州二首句吳亭東千里秋放歌曽作昔年逰青苔寺裡無馬跡緑水橋邉多酒楼大抵南朝皆曠逹可憐東晉㝡風流月明更想桓伊在一笛聞吹出塞愁謝眺詩中佳麗地夫差傳裏水犀軍城高鐵瓮横強弩潤州城孫權築號為鉄瓮栁暗朱樓多夢雲畫角愛飄江北去釣歌長向月中聞揚州塵土試廻首不惜千金借與君題揚州禪智寺雨過一蟬噪飄蕭松桂秋青苔滿階砌白鳥故遲留暮藹生深樹斜陽下小樓誰知竹西路歌吹是揚州西江懷古上吞巴漢控瀟湘怒似連山浄鏡光魏帝縫囊真戲劇符堅投箠更荒唐千秋釣舸歌明月萬里沙鷗弄夕陽范蠡清塵何寂寞好風唯屬徃來商車書混一業無窮井邑山川今古同戊辰年向江南懷古金陵過惆悵閑吟憶庾公江南春絶句千里鸎啼緑映紅水村山郭酒旗風南朝四百八十寺多少樓臺烟雨中将赴宣州留題揚州禪智寺故里溪頭松柏雙來時盡日倚松牎杜陵隋苑巳絶國秋晚南逰更渡江題宣州開元寺水閣閣下宛溪夾溪居人六朝文物草連空天澹雲閑今古同鳥去鳥來山色裏人歌人哭水聲中深秋簾幕千家雨落日樓臺一笛風惆悵無因見范蠡參差煙樹五湖東宣州送斐坦判官徃舒州時牧欲赴官歸京日暖泥融雪半銷行人芳草馬聲驕九華山路雲遮寺清弋江村桞拂橋君意如鴻高的的我心懸斾正揺揺同來不得同歸去故國逢春一寂寥句溪夏日送廬霈秀才歸王屋山将欲赴舉野店正紛泊繭𧖟𥘉引絲行人碧溪渡繋馬緑楊枝苒苒跡始去悠悠心所期秋山念君别惆悵桂花時自宣城赴官上京蕭灑江湖十過秋酒盃無日不遲留謝公城畔溪驚夢蘇小門前栁拂頭千里雲山何處好㡬人襟韻一生休塵冠挂却知閑事終把蹉跎訪舊逰春末題池州弄水亭使君四十四兩佩左銅魚爲吏非循吏論書讀底書晚花紅艶静高樹緑隂𥘉亭宇清無比溪山畫不如嘉賔能嘯詠宫妓巧粧梳逐日愁皆碎隨時醉有餘偃湏求五鼎陶秪愛吾廬趣向人皆異賢豪莫笑渠登池州九峯樓寄張祜百感衷來不自由角聲孤起夕陽樓碧山終日思無盡芳草何年恨即休睫在眼前長不見道非身外更何求誰人得似張公子千首詩輕萬户侯齊安郡晚秋栁岸風來影漸踈使君家似野人居雲容水態還堪賞嘯志歌懷亦自如雨暗殘燈棊欲散酒醒孤枕鴈來𥘉可怜赤壁爭雄渡唯有簔翁坐釣魚九日齊山登高江涵秋影鴈𥘉飛與客攜壷上翠㣲塵世難逢開口笑菊花湏挿滿頭歸但将酩酊酬佳節不用登臨恨落暉古徃今來只如此牛山何必獨霑衣池州春送前進士蒯希逸芳草復芳草㫁腸還㫁腸自然堪下淚何必更殘陽楚岸干萬里燕鴻三兩行有家歸不得況舉別君觴齊安郡中偶題二首兩竿落日溪橋上半縷輕煙栁影中多少緑荷相倚恨一時廻首背西風秋聲無不攪離心夢澤兼葭楚雨深自滴堦前大梧葉千君何事動哀吟齊安郡後池絶句菱透浮萍緑錦池夏鸎千轉弄薔薇盡日無人看㣲雨鴛鴦相對浴紅衣題齊安城樓鳴軋江樓角一聲㣲陽㶑㶑落寒汀不用慿欄苦廻首故郷七十五長亭池州李使君没後十一日處州新命始到後見歸妓感而成詩縉雲新命詔𥘉行纔是孤魂夀噐成黄壤不知新雨露粉書空換舊銘旌巨卿哭處雲空㫁阿騖歸來月正明多少四年遺愛事郷閭生子李為名見劉秀才與池州妓別逺風南浦萬重波未似生離恨別多楚管䏻吹栁花怨吳姬争唱竹枝歌金釵橫䖏緑雲墮玉筯凝時紅粉和待得枚皐相見日自應粧鏡笑蹉跎池州廢林泉寺廢寺碧溪上頽垣倚亂峯看栖歸樹鳥猶想過山鐘石路㝷僧去此生應不逄憶齊安郡平生睡足處雲夢澤南州一夜風欺竹連江雨送秋格卑常汩汩力學強悠悠終掉塵中手瀟湘釣漫流池州清溪弄溪終日到黄昏照數秋來白髪根何物頼君千遍洗筆頭塵土漸無㾗遊池州林泉寺金碧洞䄂拂霜林下石稜潺湲聲㫁滿溪氷携茶臘月遊金碧合有文章病茂陵即事黄州作因思上黨三年戰閑詠周公七月詩竹帛未聞書死節丹青空見畫靈旗蕭條井邑如魚尾早晚干戈識虎皮莫笑一麾東下計滿江秋浪碧參差贈李秀才是上公孫子骨清年少眼如冰鳯羽參差五色層天上麒麟時一下人間不獨有徐陵寄李起居四韻椘女梅簮白雪姿前溪碧水凍醪時雲罍心凸知難捧鳯管簧寒不受吹南國劍眸䏻昐盻侍臣香䄂愛僛垂自憐窮律窮途客正刼孤燈一局棊題池州貴池亭勢比凌歊宋武臺分明百里逺㠶開蜀江雪浪西江滿強半春寒去却來蘭溪在蘄州西蘭溪春盡碧泱泱映水蘭花雨發香楚國大夫憔悴日應㝷此路去瀟湘睦州四韻州在釣臺邊溪山實可怜有家皆掩映無處不潺湲好樹鳴幽鳥晴樓入野煙殘春杜陵客中酒落花前秋晚早發新定解印書千軸重陽酒百缸凉風滿紅樹曉月下秋江巖壑會歸去塵埃終不降懸纓未敢濯嚴瀬碧漴漴除官歸京睦州雨霽秋半吴天霽清凝萬里光水聲侵笑語嵐翠挨衣裳逺樹疑羅帳孤雲認粉囊溪山侵两越時節到重陽顧我能甘賤無由得自強悮曽公觸尾不敢夜循牆豈意籠飛鳥還爲錦帳郎網今開傳爕書舊識黄香曽在史館四年姹女眞虚語飢兒欲一行淺深湏掲厲休更學張綱夜泊桐廬先寄蘇臺盧郎中水檻桐廬舘歸舟繫石根笛吹孤戍月犬吹隔溪村十載違清栽幽懷未一論蘇臺菊花節何處與開鐏新轉南曹未叙朝散𥘉秋暑退出守吴興書此篇以自見志捧詔汀洲去全家羽翼飛喜抛新錦帳榮借舊朱衣且免材爲累何妨拙有機宋株聊自守魯酒怕旁圍清尚寜無素光隂亦未晞一盃寛幕席五字弄珠璣越浦黄甘嫰吴溪紫蟹肥平生江海志佩得左魚歸題白蘋洲山鳥飛紅帶亭薇拆紫花溪光𥘉透徹秋色正清華靜處知生樂喧中見死誇無多珪組累終不負煙霞題茶山在冝㒷山實東吴秀茶稱瑞草魁剖符雖俗吏脩貢亦仙才溪盡停蠻棹旗張卓翠苔栁村穿窈窕松澗渡喧豗等級雲峯峻寛平洞府開拂天聞笑語特地見樓臺泉嫰黄金湧山有金沙泉脩貢岀罷貢即絶牙香紫璧裁拜章期沃日輕騎疾奔雷舞䄂嵐侵澗歌聲谷荅廻磬音藏葉鳥雪豔照潭梅好是全家到廉爲奉詔來樹隂香作帳花徑落成堆景物殘三月登臨愴一盃重遊難自尅俛首入塵埃茶山下作春風最窈窕日暁栁村西嬌雲光占岫健水鳴分溪燎巖野花逺戞瑟幽鳥啼把酒坐芳草亦有佳人攜入茶山下題水口草市絶句倚溪侵嶺多髙樹誇酒書旗有小樓驚起鴛鴦豈無恨一雙飛去却廻頭春日茶山病不飲酒因呈賔客笙歌登畫舡十曰清明前山秀白雲膩溪光紅粉鮮欲開未開花半隂半晴天誰知病太守猶得作茶仙不飲贈官妓芳草正得意汀洲日欲西無端千樹㧕更拂一條谿幾朶梅堪折何人手好攜誰憐佳麗地春恨却悽悽早春贈軍事薛判官雪後新正半春來四刻長晴梅朱粉豔嫰水碧羅光絃管開雙調花鈿坐兩行唯君莫惜醉認取少年埸代吳興妓春𥘉寄薛軍事霧冷侵紅粉春隂撲翠鈿自悲臨暁鏡誰與惜流年栁暗霏㣲雨花愁黯淡天金釵有㡬隻抽當酒家錢八月十二日得替後移居霅溪館因題長句四韻萬家相慶喜秋成處處樓臺歌板聲千歲鶴歸猶有恨一年人住豈無情夜凉溪館留僧話風定蘇潭看月生景物登臨閑始見願爲閑客此閑行𥘉冬夜飲淮陽多病偶求懽客䄂侵霜與燭盤砌下梨花一堆雪明年誰此凭欄干栽竹本因遮日種却似爲溪移歴歴羽林影踈踈煙露姿蕭騷寒雨夜𫾣劼客八反晚風時故國何年到塵冠挂一枝梅輕盈照溪水掩歛下瑶臺妬雪聊相比欺春不逐來偶同佳客見似爲凍醪開若在秦樓畔堪爲弄玉媒山石榴似火山榴映小山繁中䏻薄艶中閑一朶佳人玉釵上秪疑燒却翠雲鬟桞長句日落水流西復東春光不盡栁何窮巫娥廟裏低含雨宋玉宅前斜帶風莫将榆莢共爭翠深感杏花相映紅灞上漢南千萬樹㡬人遊宦別離中隋堤桞夾岸垂楊三百里秪應圖畫㝡相宜自嫌流落西歸疾不見東風二月時桞絶句數樹新開翠影齊倚風情態𬒳春迷依依故國樊川恨半掩村橋半拂溪獨栁含煙一株桞拂地揺風乆佳人不忍折悵望廻纎手早鴈金河秋半虜絃開雲外驚飛四散哀仙掌月明孤影過長門燈暗數聲來湏知胡騎紛紛在豈逐春風一一廻莫厭瀟湘少人處水多菰米岸莓苔鵁鶄芝莖抽紺趾清唳擲金梭日翅閑張錦風池去罥羅静眠依翠荇暖戯折高荷山隂豈無爾繭字換群鵝鸚鵡華堂日漸高雕檻繋紅縚故國隴山樹美人金剪刀避籠交翠尾罅嘴静新毛不念三緘事世途皆尓曹鶴清音迎晚月愁思立寒蒲丹頂西施頰霜毛四皓鬚碧雲行止躁白鷺性靈麤終日無群伴溪邉弔影孤鵶擾擾復翻翻黄昬颺冷煙毛欺皇后髪聲感楚姬絃蔓壘盤風下霜林接翅眠祗如西旅様頭白豈無縁鷺鷥雪衣雪髮青玉觜群捕魚兒溪影中驚飛逺映碧山去一樹梨花落晚風村舎燕漢官一百四十五多下珠簾閉瑣牎何處營巢夏将半茅簷煙裏語雙雙歸燕畫堂歌舞喧喧地社去社來人不看長是江樓使君伴黄昏猶待倚欄干傷猿獨折南園一朶梅重㝷幽坎巳生苔無端晚吹驚髙樹似裊長枝欲下來還俗老僧雪髮不長寸秋寒力更㣲獨㝷一徑葉猶挈納殘衣日暮千峯裏不知何處歸斫竹寺廢竹色死宦家寕爾留霜根漸随斧風玉尚𫾣秋江南苦吟客何處送悠悠将赴湖州留題亭菊陶菊手自種楚蘭心有期遥知渡江日正是擷芳時折菊籬東菊徑深折得自孤吟雨中衣半濕擁鼻自知心雲盡日看雲首不廻無心都大似無才可怜光彩一片玉萬里晴天何處來醉後題僧院離心忽忽復悽慺雨晦傾瓶取醉泥可羡髙僧共心語一如攜穉往東西題禪院觥舡一棹百分空十歳青春不負公今日鬢絲禪榻畔茶煙輕颺落花風哭李給事中敏陽陵郭門外坡陁丈五墳九泉如結友兹地好埋君朱雲葬陽陵郭外黄州竹逕鬪竹濁蟠小徑屈折鬪虵來三年得歸去知遶幾千廽題敬愛寺樓暮景千山雪春寒百尺樓獨登還獨下誰㑹我悠悠送劉秀才歸江陵綵服鮮華覲渚宫鱸魚新熟別江東劉郎浦夜侵船月宋玉亭春弄䄂風落落精神終有立飄飄才思杳無窮誰人世上爲金口借取明時一薦雄見吳秀才與池妓别因成絶句紅燭短時羗笛怨清歌咽處蜀絃高萬里分飛兩行淚滿江寒雨正蕭騷湖南正𥘉招李郢秀才行樂及時時巳晚對酒當歌歌不成千里暮山重疊翠一溪寒水淺深清高人以飲爲忙事浮世除詩盡強名看着白蘋牙欲吐雪舟相訪勝閑行贈朱道靈劉根丹篆三千字郭璞青囊兩卷書牛渚磯南謝山北白雲深處有巖居屏風絶句屏風周倣畫纎腰嵗乆丹青色半銷斜倚玉牎鸞髪女拂塵猶自妬嬌饒哭韓綽平明送葬上都門紼翣交橫逐去䰟歸來冷笑悲身事喚婦呼兒索酒盆新定途中無端偶效張文紀下杜郷園别五秋重過江南更千里萬山深處一孤舟題新定八松院小石雨滴珠璣碎苔生紫翠重故關何日到且看小三峯樊川文集第三, WYG: ''}
