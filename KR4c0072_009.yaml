front:
  text: 樊川文集第九
  hash: sha256:be261fbd05447c8cad43b2ca8e0a121733173cb277382dbe3f9c1c7c0472d838
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_009-1a}
body:
  text: 中書舍人杜牧字牧之唐故平盧軍節度巡官隴西李府君墓志銘大和元年舉進士及第鄉貢上都有司試于東都在二都群進士中往往有言前十五年有進士李飛自江西來貌古文髙始就禮部試賦吏大呼其姓名熟視符驗然後入飛曰如是選賢耶即求貢如是自以為賢耶因袖手不出明日徑返江東某曰誠有是人吾輩不可得與為伍矣後二年事故吏部沈公於鍾陵宣城為幕吏兩府凡五年間同舍生蘭陵蕭置京兆韓乂博陵崔夀每品量人之等第必曰有道有學有文如李處士戡者寡矣是卑進士不舉嘗名飛者某益恨未靣其人且喜其人之在世也大和九年為監察御史分司東都今諫議大夫李中敏左拾遺韋楚老前監察御史盧簡求咸言於某曰御史法當檢謹子少年設有與遊冝得長厚有學識者因訪求得失資以為官洛下莫若李處士戡某謝曰素所恨未見者即日造其廬遂旦夕往來開成元年春二月平盧軍節度使王公彥威聞君名挈卑辭於簡副以幣馬請為節度巡官明年春乎盧府改西歸病於路卒於洛陽友人王廣思恭里第享年若干君諱戡字定臣七代祖渤海王奉慈祖杠衢州盈川令父䔲婺州浦陽尉浦陽晚無子夫人吳興沈氏夢一人狀甚偉捧一嬰兒曰豫為孔丘以是與爾及期而生君因名曰夫授君幼孤旁無羣從可以附託年十餘歲即好學寒雪拾薪自炙夜無然膏默念所記年三十盡明六經書解決微隱蘇融雪釋鄭玄至于孔頴逹輩凡所為疏注皆能短長其得失一舉進士耻不肯試歸晉陵陽羡里得山水居之始開百家書緣飾事業每有小功喪訖制不食肉飲酒語言行止皆有法度陽羡民有鬪諍不決不之官人必以詣君所著文數百篇外于仁義一不關筆嘗曰詩者可以歌可以流於竹鼓於絲婦人小兒皆欲諷誦國俗薄厚扇之於詩如風之疾速嘗痛自元和已來有元白詩者纎豔不逞非莊士雅人多為其所破壞流於民間疏于屏壁子父女母交口教授淫言媟語冬寒夏熱入人肌骨不可除去吾無位不得用法以治之欲使後代知有發憤者因集國朝巳來類於古詩得若干首編為三卷目為唐詩為序以導其志居江南秀人張知實蕭置韓又崔壽宋邢楊發王廣皆趨君交之後皆得進士第有名聲官職君尚為布衣然於君不敢稍怠君在洛中困甚河陽節度使蕭洪移鎮鄜州諌議大夫蕭俶以君言於洪洪素敬諌議即欲謁君以請君曰人間譁言洪盜籍外戚一窺其面能易吾死尚且不忍死况為其黨乎居數月洪果敗晏弘農楊氏女早卒子二人長曰審之次曰鼎郎始五歲以某年月權葬於常州義興縣某鄉里某於君為晚交得君最厚因為之銘曰命如煙雲道比宫宅煙雲飄揚莫知往來為道不至無以偃息有道有命偶然相值命不在我不肖亦貴豈可指此與彼為市嗚呼定臣曰德孔修曰學必聖飭我兢兢一不言命可傳其心以教後生嗚呼哀哉唐故淮南支使試大理評事兼監察御史杜君墓志銘君諱顗字勝之曽祖涼州節度使襄陽公贈左僕射希望大父司徒平章事太保致仕岐國公贈太師某皇考駕部貟外郎贈禮部尚書某君幼孤多疾目視昏近先夫人不令就學年十七讀尚書十三篇禮記七篇漢書止賈誼傳下復執卷年二十四明年當舉進士始握筆茸闕下獻書裴丞相度書指言時事書成各數千字不半歲遍傳天下進士崔岐有文學峭澀不許可人詣門贈君詩曰賈馬死來生杜顗中間寥落一千年年二十五舉進士二十六一舉登上第時賈相國餗為禮部之二年朝士以進士干賈公不獲有傑強毀嘲者賈公曰我秪以杜某敵𢾗百輩足矣始命試祕書正字匭使判官李丞相德𥙿出為鎮海軍節度使辟君試協律郎為巡官後貶袁州語親善曰我聞杜巡官言晚十年故有此行大和九年夏君客揚州六月授咸陽尉直史館君曰訓注必亂可徐行俟之至汴二凶敗及洛以疾辭東下居揚州龍興寺丞相竒章公僧孺請君入幕府君謝曰李公在困未願副知巳開成二年春目益昏冬遂喪明李為淮南節度使復請為試評事兼監察觀察支使兄自馮翊迎醫石至曰是狀腦脂下融名曰內障如蠟塞管蠟去管明俟脂凝可以抉去無不愈者後二年石曰可冶治不效自馮翊别迎醫醫曰嗟乎障有赤脈如木根橫去牢不可斷是法名曰日腳內障生日腳者法不可治君因居淮南築室治生不復言治眼事聞於天下無不嗟嘆君安泰自如令人旁讀十三代史書一聞不遺客來與之議論證引聽者忘去年四十五大中五年二月二十五日卒一男麟師年十歲女曰暑兒始五歲六年二月八日歸葬先塋實萬年縣洪原鄉陵西南二里某今年五十假使更生十年為六十人不夭矣與君别止三千六百日爾況早衰多病敢期六十人乎忍不抑哀以銘吾弟銘曰古之逹人以生為寄為夢以死為歸為竟不知生偶然乎其有裁受乎偶然即泯為大空與不生同其有裁受乎嗚呼勝之今既歸而竟矣其自知矣何為而然乎嗚呼哀哉唐故灞陵駱處士墓志銘灞陵駱處士名峻字肅之華州華隂人也當建中四年年二十遊京師值泚亂為其黨源休拘委以事處士逸一日夕行二百里拜親於華隂因啓度賊終不能東出百里間鄉里不足憂願得一見天子於艱危中遂入奉天至漢中屢以兵食干執事者後長安李懷光踵叛關中公私飢李馬渾兵十餘萬計日餉食有司因請授處士嶽州灞陵尉繫職於饋運間後四遷上揚州士曹參軍至元和𥘉以母喪去職哀哭濵死終喪因曰汚吾迹二十餘年者食豐衣鮮以有飬也今可以行吾志也乃於灞陵東坡下得水樹以居之相國杜公黃裳在蒲津相國張公弘靜在并州大梁渾尚書鎬在易定潘侍郎孟陽在蜀之東川司徒薛公革在鄭滑皆挈卑詞幣馬至門曰處士不能一起助我為治乎皆以疾辭長慶𥘉桂府觀察使杜公凡兩拜章乞為梧州刺史詔因授之衆皆曰今黃家洞賊熾雍容兵連敗縮首不出猶鼎鱉爾交址殺都護復旱亂相仍朝廷豈捐此三處不以公治之而久置公為梧守耶處士慘而讓祇以疾辭解訖不言其他爾後人知其堅不可復動矣田三百畒果𬞞占其一捽墾辛苦不受人一錢惠朝之名士多造其廬未嘗以栖退超脫之髙露於言色溫敬畏下如勇於仕進者論及當代利病活人緩邊之䇿必亹亹盡吐兾逹於在位者至於安危機鍵之語默不出口尤不信浮圗學有言者必約其條目引六經以窒之曰是乃其徒盜夫子之旨而為其辭是安能自為之善圗山水狀鑑者比之朱審王維之儔里百家鬪訴凶吉一來決凡三十六年無一日不自得也以會昌元年十一月某日卒年七十九以某月日歸葬於華隂縣先人之墓處士嘗曰相國劉公晏不急征不橫賦承亂亡之餘食數十萬兵者二十餘年斯過蕭何逺矣每長短校量今古冨人強國之術我烈祖司徒歧國公趙國公李公當貞元元和時儒學術業冠天下每與處士語未嘗不嗟嘆其才恨其尚壯不可屈以仕優禮接之嗚呼賢哉銘曰不見可欲使心不亂古之作者窮栖自斷去聲子伯子至王霸久卧向栩相趙馬良車煥子夏髙第心中交戰處士之居落青門畔文駟連羈繡軒交貫危冠自喜音戲首縈後絆言訖揖去一如不見我齒未衰誰知巳知岐公主師見必迎喜語必移時論兵計食屈指無遺功名冨貴不能釣之諸侯六辟南服一麾笑而不答亦無事非三百畒田百實繁滋三十六年食具衣完今其去矣誰知其端嗚呼賢哉唐故復州司馬杜君墓志銘并序公諱詮字謹夫河西隴右節度使襄陽公贈司空之曽孫司徒岐國公贈太師之孫司農少卿贈給事中之子公以岐公蔭調授揚州參軍同州馮翊縣丞衛尉寺主簿鄂州江夏縣令復州司馬年六十某年月日終于漢上别業岐公外殿內輔凡十四年貴冨繁大孫兒二十餘人晨昏起居同堂環侍公為之親不以進門內家事條治裁酌至於筐篋細碎悉歸於公稱謹而治自罷江夏令卜居於漢北泗水上烈日笠首自督耕夫而一年食足二年衣食兩餘三年而室屋完新六畜肥繁器用皆具凡十五年起於墾荒不假人之一毫之助至成冨家翁常曰忍耻入仕不緣妻子衣食者舉丗幾人彼忍耻我勞力等衣食尓顧我何如後授復州司馬半歲棄去終不復仕以某月日歸葬於長安城南少陵原司馬村先塋某為從父弟泣涕而書銘曰公侯之家所業唯官薄官業農墾荒室完入仕多耻以農力勞等衣食尓勞力者賢歸全故丘慶期孫子唐故雍府巡官裴君墓志銘君諱希顔字某裴氏於百氏中獨摽其族曰眷三分之為東西中君東春裴在國朝名位最大曰冕艱難中定册立肅宗於靈武而相之繼相代宗僅十五年國史有傳冕於君為堂伯祖父王考某終朗州刺史娶宣州寧國令滎陽鄭某女生四男為首生朗州為盩厔河西令道朗二州刺史公廉剛簡強於愛人凡關百姓一毫事與京兆尹節度使爭論大聲於延府間前如無人然未嘗以杖貴治家家人有過失則諭之諭不變者出之為良人終不忍牽鬻於市將終鄭夫人泣請遺令曰吾之廄騾為盩厔時役之今踰十年聽其老死愼不可賣言訖而絶君生寖染仁父之化溫良柔友窮居鄠縣飢寒餘二十年未嘗出一言以愠不足司農卿裴及為雍府經略使辟君為從事得南方疾歸大中二年某月日卒于其家享年若干不娶無子某娶裴氏實君之私其弟覺泣來請銘銘曰淑其性生無位死無子孰識其端唐故范陽盧秀才墓志秀才盧生名霈字子中自天寶後三代或仕燕或仕趙兩地皆多良田畜馬生年二十未知古有人曰周公孔夫子者擊毬飲酒馬射走兔語言習尚無非攻守戰鬪之事鎮州有儒者黃建鎮人敬之呼為先生建因語生以先王儒學之道因復曰自河而南有土地數萬里可如燕趙比者百數十處有西京東京西京有天子公卿士人畦居兩京間皆億萬家萬國皆持其土産出其珍異時節朝貢一取約束無禁限疑忌廣大寬易嬉遊終日但能為先王儒學之道可得其公卿之位顯榮冨貴流及子孫至老不見戰爭殺戮生立悟其言即隂約母弟雲竊家駿馬日馳三百里夜抵襄國界捨馬步行徑入王屋山請詣道士觀道士憐之置之外門廡下席地而處始開孝經論語布褐不襪椊草為茹或竟日不得食如此凡十年年三十有文有學日間習人事誠敬通逹汝洛間士人稍稍知之開成三年來京師舉進士於羣輩中酋酋然凡曰進士名者多趨之願與之為交生嘗曰丈夫一日得志天子召座於前以笏畫地取山東一百二十城唯我知其甚易爾因言燕趙間山川禹儉教令風俗人情之所短長三十年來王師攻擊利與不利其所來由明白如彩畫一一可以目覩開成四年客遊代州南歸某月日於晉州霍邑縣界晝日盜殺之京師名進士聞之多有哭者資其弟雲至霍邑取生喪來長安以某年月日葬於城南某鄉里其所資費皆出於交遊間曽祖昌嗣涿州刺史祖顗易州長史父勸鎮州石邑令某常以生之林節薦生於公卿間聞生之死哭之因志其墓唐故進士龔軺墓志會昌五年十二月某自秋浦守桐廬路由餞塘龔軺袖詩以進士名來謁時刺史趙郡李播曰龔秀才詩人兼鼓琴因令操流波弄清越可聽及飲酒頗攻章程謹雅而和飲罷某南去舟中閲其詩有山水間淡之思後四年守吳興因與進士嚴惲言及鬼神事嚴生曰有進士龔軺去歲來此晝坐客館中若有二人召軺者軺命馬甚速始跨鞍馬驚墯地折左脛旬日卒余始了然憶錢塘見軺時徐徐尋思如昨日事因知尚殯于野乃命軍吏徐良改葬于卞山南去州城西北一十五里嚴生與軺善亦不知其鄉里源
