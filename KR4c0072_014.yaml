  text: 樊川文集第十四
  hash: sha256:51074ab363ad95bfc6981c9cbc38f5fb62fabcc30349d9f8f8e1bf875a04c5ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_014-1a}
body:
  text: 杜牧字牧之黃州准赦祭百神文㑹昌二年歲次壬戍夏四月乙丑朔二十三日丁亥皇帝御宣政樓百辟卿士稽首再拜敢上仁聖文武至神大孝尊號于皇帝受冊禮畢御丹鳯樓因大赦天下刺史宜祭境内神祗有益於人者可抽常所上賦以備具牧爲刺史實守黃州夏六月甲子朔十八日辛已伏准赦書得祭諸神因爲文稱讃皇帝功德用饗神云黃帝嗣帝飾天付前壬申年坐統大業慈明寛恩聖明文武或曰誅殛曰我父母譬彼嬰兒豈不可恕或曰畋逰苑大林深喈嘐跳突千毛萬羽豹裂鵬擒其樂無伍皇帝曰不匪我不知言豈假汝未撫四夷未考百度天地宗廟未陳簋簠如寐未寤如痒未愈斥退狗馬未可以御或曰酒飲順氣完神奠樂工習自祖自父瑶簮繡𥚑千萬侍女酧以觥斚助之歌舞冨貴四海不樂何苦皇帝曰不如聞四海蝗蔽田畒或曰亢旱或曰淫雨稚老孤寡未盡得所聞一有是首不能舉乃㧞俊良乃登耆老夕思朝議依䂓約矩詳刑定法深刻不取摽掲典制酌之中古遠師太宗近法憲宗怵慄思惟不治是懼四國旣平六職攸序黍稷稻梁嘔啞俯僂父子供養嬰兒撫乳萬里齊俗實皇帝力繄眠而食罔知其故皇帝乃曰予見郊廟嚴法物旓旐旅五帝坐壇百神立坫天廉反嵬嶷肹嚮捧爵是醮海外天内戎狄蠻夷竒服異貌伏于除外懽喜呌噪廻御丹鳯大赦四海改元㑹昌减論有罪紹功嗣德搜剔幽昧寒暑合節風輕雨碎榖溢陳囷畜繁腯大東南西北限岸畺紀無有頓憚得可反不識災害三事大夫邦伯諸侯曰皇帝德古不能侔謳歌謡詠安能可稱百工庻人亦有聚謀拜章口呼願上大號神聴天聞欲揚宏休皇帝曰無功不可虚受懇請不巳出涕叩頭皇帝不能止曰予慙羞曰因大赦惟新九州不窮不詐不饑不偷有窮有饑實吏之尤予實天吏許之省修約束敎誡纎悉丁寜品類細偉各當源流皇帝曰俞股肱耳目誠示竭力寒暑風雨宜神是酬匪神之力其誰䏻謀凡爾守土各報爾望剥烹羹胾無愛羊牛天下聞命奔走承事牧實遭遇亦忝刺史齋齋惕慄臨谷臨墜視牲啓毛濯爵置羃不委下吏餚羞具潔罔有不備衣冠待暁坐以假寐歩及神宇蹐足屏氣神實在前敬恭跪起詩不云乎皇天上帝伊誰云憎天憎罪人天可指視止殃其身豈可傍熾刺史有罪可病可死其身未塞可及妻子無作水旱以及閭里皇帝仁聖神祇聰明唱和符同相爲表裏黃治雖遠黃俗雖鄙皇符視之近遠一致洋洋在上實提人紀無負皇帝自作羞愧月惟孟夏日惟辛巳實神降祉神如有言我荅皇帝寒暑風雨其期必至瘥癘水旱永永止弭爾爲官人勉其爾治某敬再拜流汗霑地祭城隍神祈雨文下土之人云實有之石榖豊實寒暑合節天實生之苗房甲而水湮之苗秀好而旱莠之饑即必死天實殺之也天實有人生之孰敢言天之仁殺之孰言天之不仁刺史吏也二歲一交如𬒳管庫敢有其寳玉如彼傳舎敢治其居室東海孝婦吏冤殺之天實冤之殺吏可也東海之人扵婦何辜而三年旱之刺史性愚治或不至厲其身可也絶其命可也吉福殃惡止當其身胡爲䧏旱毒彼百姓謹書誠懇本之扵天神能格天爲我申聞第二文牧爲刺史凡十六月未嘗爲吏不知吏道黃境隣蔡治出武夫僅五十年今行一切後有文吏未盡削除伏臘節序牲醪雜須吏僅百輩公取扵民里胥因縁侵竊十倍簡料民費半扵公租刺史知之悉皆除去郷正村長強爲之名豪者尸之得縱強取三萬戸多五百人刺史知之亦悉除去蠒絲之租兩耗其二銖稅榖之賦斗耗其一斗刺史知之亦悉除去吏頑者笞而出之吏良者勉而進之民物吏錢交手爲市小大之獄面盡其詞弃扵市者必守定令人戸非多風俗不雜刺史年少事得躬親疽抉其根矣苗去其莠矣不侵不蠧生活自如公庭晝日不聞人聲刺史雖愚亦曰無過縱使有過力短不及恕亦可也殺亦可也稺老孤窮指苗燃鼎将穂秀矣忍令萎死以絶民命古先聖哲一皆稱天舉動行止如天在旁以爲天道仁即福之惡即殺之孤窮即憐之無過即遂之今旱巳乆恐無秋成謹具刺史之所爲下人之將絶再告於神神其如何祭木瓜神文維㑹昌六年歳次景寅某月某日某官敬告于木瓜山之神惟神聦明格天能降雲雨郡有災旱必能救之前後刺史祈無不應去歳七月苗將萎死禱神之際甘雨隨至槁然㓙歳化爲豐年仰神之靈惑神之德願新祠宇以崇祭祀今易卑庳變爲華敞正位南靣廟皃嚴整風雷雲雨師伯必備侍衛旗㦸羅列森然惟神繋雲在襟貯雨在缶視人如子渇即與之不容㓙邪不降疾疫千萬年間使池之人敬仰不怠伏惟尚饗祭故處州李使君文維㑹昌五年歳次乙丑某月日池州刺史杜牧謹遣軍事押衙王鏶謹以清酌庶羞之奠敬致祭于亡友李君起居之靈憶昔相遇兩未生鬚京師衆中跡猶甚踈一言道合盡冩有無我於宣城恭跡賔吏君隨幕府東下繼至復與友人故薛子威邂逅釋願如相爲期放論劇談各持是非攻強討深張矛彀機怒或赩赫終成笑嬉於後七年君拜左史來蜀西川我官𥙷闕云愧我先拜章請代蓋私我焉我有家事乞假南來循出里第君出離杯令弟在席恣爲詼諧耳熱膽張觥聮相􆁥我歸墜馬一支㡬摧君來我坐側倚旁隈時閒酸吟戲口猶開云君我殺以酒相加忌我之才及我南去君刺池陽我守黃岡葭葦之場唯君書信前後相望辭意纎悉勉我自強筆我性情𥙷短裁長一函每發沉憂併忘幸㑹交代㳂檝若飛江山九月凉風滿衣爲别㡬時多少懽悲志業益廣不可窺知長人之術酋爲吏師縱酒十日舞䄂僛垂語公之餘且及其私許以季女配我長兒莫云稚齒可以指期各負少壮輕後會時寓居宣城書札曰馳一疾不起訃來猶疑嗚呼哀哉惟先僕射儉德冠古凡二十年四領茅土所至所治曰人父母官俸餘半委庫不取京師里第蓬茅數畒慶餘生君曰天酧𥙷何聰明才智兮不使施爲何付與之多兮折之何暴天陽地隂高厚相侔上有河漢鈲普錯反天横流百刻晝夜平分不饒皎不隂晦一月㡬朝二男三女俗率如此三男二女無有其地君子小人鼻目並列與小人校會無百一扵百一中以秀奪實凢禀隂陽生扵其間陽常不勝賢者冝艱自古皆然欲復何言撫孤一弔拍棺一哭咫尺不遂涕下相續期扵没齒盡力嗣子嗚呼哀哉伏惟尚饗祭周相公文維大中五年歲次辛未七月辛未朔八日戊寅故吏朝議郎知湖州諸軍事守湖州刺史杜牧謹遣軍事押衙司馬素謹以清酌庻羞之奠敬祭于故相國僕射贈司徒周公之靈伏惟相公之道徧於天下至如牧者受恩叢深爰自稚齒即蒙顧許及在䆠途援挈益至㑹昌之改柄者爲誰忿忍隂汗平声多逐良善牧實忝幸亦在遣中黃崗大澤葭葦之埸繼來池陽西在孤島僻左五歲遭逢聖明牧拾冤沉誅破罪惡牧扵此際更遷桐廬東下京江南走千里曲屈越嶂如入洞穴驚濤觸舟㡬至傾没萬山環合才千餘家夜有哭鳥晝有毒霧病無與醫饑不兼食抑喑偪塞行少卧多逐者紛紛歸軫相接唯牧遠弃其道益艱相公憐憫極力掀拔爰及作相首取西歸授之名曹帖以重職虢國太子綘市諜人死而復生未足爲喻旌斾西去拜扵都門賢士大夫無不攀惜皆曰相公事君盡忠保道輕位大張公室盡閉私門彼由徑者跛倚不進天下賢彦明知所趣重德壮年衆期再入牧守吳興繼奉手示但休退不言疾恙訃問忽至慟哭問天嗚呼蒼生未濟而䘮吾相爲蒼生慟豈獨私恩想像音容思惟恩紀期扵令嗣可以効死吳洛相遠踰扵二千無因拜柩見歸九泉哭送使者致誠奠筵伏惟尚享祭龔秀才文維大中五年歲次辛未五月朔二日湖州刺史杜牧謹遣軍事十将徐良敬致祭于故龔秀才之靈死者生之極折脛而天復死之極言扵前定莫得而推出扵偶然魂其冤哉郷里何在骨肉何人卞山之南可以栖䰟嗚呼哀哉伏惟尚饗唐故銀青光禄大夫檢校禮部尚書御史大夫充浙江西道都團練觀察處置等使上柱國清河郡開國公食邑二千户贈吏部尚書崔公行状曽祖某皇任醴泉縣令祖某皇任太子中允贈右散騎常侍父某皇任檢校吏部郎中兼御史中丞袁州刺史贈太師公諱某字某威儀秀偉神氣深厚即之如鑑望之如春旣冠識者知不容扵風塵矣貞元十二年中第十六年平判入等授集賢殿校書郎陜􅉑觀察使崔公琮願公爲賔而不樂之挈辭載幣使者數返公徐爲起之且曰不關上聞攝職可也受署爲觀察廵官後轉京兆府鄠縣尉遷監察御史侍御史刑部貟外丁邠國太夫人憂杖而䏻起人有聞焉外除拜吏部貟外郎判南曹事千人百族必應進而進公親自挾格肖法必留戾程必黜每懸牓舉牘冨室權家汗而仰視不敢出口宿吏逡廵縛手係舌願措一姧不䏻得之凡二年遷左司郎中吏部郎中加朝散大夫旋拜諌議大夫兼知匭使穆宗皇帝春秋冨盛稍以畋遊聲色爲事公晨朝正殿揮同列進而言曰十一聖之功德四海之大萬國之衆之治之亂懸於陛下自山巳東百城千里昨日得之今日失之西望戎壘距宗廟十舎百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至氣直天子為之動容歛䄂慰而謝之遷給事中敬宗皇帝始即位旁求師臣今相國竒章公上言曰非公不可遂以本官充翰林侍講學士命服金紫旋拜中書舎人仍兼舊職侍帝郊天加銀青光禄大夫高承簡罷鄭滑節度使滑人叩闕乞爲承簡樹政德碑内官進曰翰林故事職由掌詔學士上曰承簡功臣胤也治吾咽喉地克有善政罷而請紀入人深矣吾以師臣之辭且寵異焉居數月魏博節度使史憲誠拜章爲故帥田季安樹神道碑内官執請亦如前辭上曰魏北燕趙南控成臯天下形勝地也吾以師臣之辭且慰安焉居數月陳許節度使王沛拜章乞爲亡父樹神道碑内官執請如前辭上曰許昌天下精兵處也俗忠風厚沛䏻撫之吾視如臂吾以師臣之辭而彰其忠孝焉是三者皆御扎命公令刻其辭恩禮親重無與爲比歷嵗願出守本官辭懇而遂禮部缺侍郎上曰公可也遂以命之二年選士七十餘人大抵後浮華先材實轉兵部侍郎今上即位四年公亟請於丞相閤曰願得一方疲人而治之除陜􅉑觀察使兼御史大夫先是陜之官人人必月尅俸錢五千助輸貢于京師者歲至八十萬公曰官人不䏻瞻私安䏻䘏民吾不䏻獨治安可自封即以常給廉使雜費下至于塩酪膏薪之品十去其九可得八十萬歲爲代之官人感恱隨治短長不忍爲欺萬國西走陜實其衝復有江淮梁徐許蔡之戌兵北出朔方上郡回中汧隴間踐更徃來不虚一時民之供億吏湏必應生活之具至于缾缶匕匙常碎於四方之手公曰此猶束炬以焚民也於是節宴賞截浮費凡金􅃮陶木絲枲之用悉爲具之可饗數千人民一不知復有詔㫖支稅粟輸太倉者歳數萬斛始歛民也遠遠近近就積佛寺終輸于河復藉民而載之民之巨牛大車半頓于路前政咸知計不䏻出公曰管仲曰粟行五百里民有饑色斯言粟重物也不可推遷民受其弊况今迂直之計有不趐習試五百里乎公乃大索有無親籌而計之北臨黄河樹倉四十間穴倉爲糟下注于舟因隙賞直不敗時務自此壮者斛㓜者斗負挈囊裏委倉而去不知有輸他境之民越逸奔走軿軿爭闘願爲陜民政成化行上國下國更口讃頌凡二年改岳愕安黄蘄申等州觀察使囊山帶江三十餘城繚繞數千里洞庭百越巴蜀荆漢而㑹注焉五十餘年北有蔡盗於是安鏁三關鄂練萬卒皆傖楚善戰寖有戰風稱爲難治有自徃矣公始臨之簡服伍旅脩理械用親之以文齊之以武大創㕔事以張威容造蒙衝小艦上下千里武士用命盡得羣盗公曰劫于水者以盡殺爲習雖值童耉而無捨焉比附他盗刑不可等扵是一死之内必累加之盗相誡曰公之未去勿觸其境然後黜弃奸冐用公法也升陟㢘䏻用公舉也撫獲窮約用公惠也豪商大賈不得輕役不得隱田父子兄弟不得同販於闔境之内有餘不足自公而均復建立儒宫置愽士設生徒廪餼必具頑惰必遷敬讓之風人知家習八年秋江水漲溢公曰安得長堤而禦之言訖軍士齊民雲鍤雨杵一揮立就令行恩結有如此者千里之内如視堂廡雖僻左下里嵗臘男子必以雞黍賀饋女子䏻以簮瑱相問遺富樂歡康肩扵治古凡五年遷浙西觀察使加禮部尚書公曰三吳者國用半在焉因高爲旱因下爲水者六嵗矣輕賦兵役不减扵民上田沃土多歸豪強荀恱所謂公家之惠優扵三代豪強之酷甚扵亡秦今其是也扵是料民等第籍地沃塉均其征賦一其徭役經費宴賞約事裁節民有宿逋不可減扵上供者必代而輸之誠禱山川嵗獲大稔復曰衣冠者民之主也自艱難巳來軍士得以氣加之商賈得以財侮之不䏻自奮者多栖扵吳土遂立延賔舘以待之苟有一善必接盡禮因訪里閭益知民之疾苦隨以治之纔逾朞歲而吳民復振開成元年十月二十日薨扵治所多士相弔曰使公相天子貞觀開元之俗可期而見也豈公不幸實生民之不幸也主上痛悼輟朝一日贈吏部尚書公生得靈和自干名立朝爲公卿爲侯伯未嘗須臾間汲汲牽率欲顯名合朝而仁義忠信明智㳟儉欝積發溢自然相隨不立約結而善人自親不設溝壘而不肖自遠不志扵榮逹而官位自及公内外閥閱源派清顯㧞扵甲族而復甲焉觀昆仲六人皆至逹官公與伯兄季弟五司禮闈再入吏部自國朝巳來未之有也上至公相方伯下及再命一命幕府附陪吏之属徧滿内外皆公門生公俯首益恭如孤臣客卿惕惕而多畏也自爲重鎮苞苴金幣之貨不至權門親戚故舊周給衣食畢其婚䘮悉出俸錢不以家爲在家怡然未嘗訓勉子弟自化皆爲名人居室卑痺不設歩廊賔至值雨則張盖躡屐而就于外位𥘉鎮于陜或束挺經月不鞭一人至于驛馬令五嵗幸全則爲代之著爲定制曰致一物扵必窮之地君子不爲其爲仁愛而臻扵此及遷鎮鄂渚嚴峻刑法至扵誅戮未嘗貰一等後一刻或問扵公曰陜鄂之政不一俱臻扵治何也公曰陜之土塉民勞吾撫之不暇尚恐其驚鄂之土沃民剽雜以夷俗非用威刑莫䏻致理政貴知變蓋爲此也聞者服焉嗚呼公之德行材器真哲人君子没而不朽者也易名定謚爲國常典敢書先烈逹于執事附于史氏云爾謹状唐故尚書吏部侍郎贈吏部尚書沈公行状曾祖某皇任泉州司戸叅軍祖某皇任婺州武義縣主簿贈屯田貟外郎父某皇任尚書禮部貟外郎贈太子少保公諱某字某明春􅴜䏻文攻書未冠知名我烈祖司徒岐公與公先少保友善一見公喜曰沈氏有子吾無恨矣因以馮氏表生女妻之貞元末舉進士時許公孟容爲給事中權文公爲禮部侍郎時稱權許進士中否二公未嘗不相聞於其間者其年禮部畢事文公詣許曰亦有遺恨曰爲誰曰沈某一人耳許曰誰家子某不之知文公因具言先少保名字許曰若如此我故人子後數日徑詣公且責不相見公謝曰聞於丈人或援致中第是累丈人公舉違某孤進故不敢自逹許曰如公者可使我急賢詣公不可使公因舊造我明年中第文公門生七十人時人比公爲顔子聮中制䇿科授太子校書鄠縣尉直史館左拾遺左𥙷闕史館修撰翰林學士歴尚書司門貟外郎司勲兵部郎中中書舎人命服朱紫時穆宗皇帝親任學士時事機祕多考決在内必取其長循爲宰相公宻𥙷弘多同列每欲面陳拜章互來告公必取規議用爲進退歳乆當爲其長者凡再公皆逡廵不就上欲面授之公奏曰學士院長參議大政出爲宰相臣自知必不能爲凡宰相之任非能盡知天下物情苟爲之必致敗撓況今百姓甚困燕趙適亂臣以死不敢當願得治人一方爲陛下長養之因出稱疾特降中使劉泰倫起之公稱益篤故相國李公徳𥙿與公同列友善亦欲公之起辭說甚切公終不出因詔以本官兼史職出歸綸閣乆處宻近思效用於外懇請於丞相不已由是出爲湖南觀察使兼御史大夫凡二歳轉爲人困事繁惡易滋長官人調授少得防冤踈通蹊徑人情物理無不曲盡吏欲爲欺扵此照驗之端必明扵彼民有未伸扵彼開張之路必在扵此亹亹循環皆極根本尤重刑罰杖十五至死者每有一犯必具獄㫁刑之後徧示幕府吏雖十人有一人以爲小未可者必再詳䆒經費遊宴約事裁節歲有水旱不可减于常貢者必爲代之江西宣州聮歲水災所貸萬計公善飬情性自居方伯生殺之任喜怒好惡是四者閉覆渾然雖終嵗伺之不見毫髪故黠吏欲賊公之所向高下其事終不可得每處一事未嘗不從容盡理故所至之處冨庻懽康理行第一每去任人吏泣送出境不絶自宣城入爲吏部侍郎二年考覆搜舉品第倫比時稱精能宰物之望屬於僉議公每願用所長復理於外及薨於位知與不知莫不相弔上悼惜輟朝一日贈吏部尚書公與先少保俱掌國史撰憲宗實録未竟出鎮湖南詔以随之成於理所時論榮之公出得靈粹沛然而仁自㓜及長未嘗須臾間汲汲牽率欲及扵道温良恭儉明智忠信内積外溢自然相随自布衣至扵逹䆠凡所交友皆當時名公将美所長覆救所不及三十年間無有攜間者公常居中雖有重名每苦於飢寒兩求廉鎮時宰許之皆先要公曰欲用某爲從事可乎公必拒之至有怒者公曰誠如此願息所請故二鎮幕府皆取孤進之士未嘗有吏一人因權勢入嘗擇邸吏尹倫戇滯闕事寮佐皆患之因請易之公曰某出京師面誡倫曰止可關事不可多事是倫適能如此受不虚矣故二鎮號爲富饒凡十年間權勢貴倖之風不及扵公耳苞苴寳玉之賂亦不至權門雖有怒者亦不敢以言議公公然侵公其爲守道自得皆如此類在家無杖笞呵責家人自化兄弟生姪雖絶服者入門飲食衣服指使其奴婢無二等親戚故舊周給所得皆出俸錢不以家爲於京師開化里致第價錢三百萬訖二鎮牽率滿之及在牀之日周身之飾易以任器京師士人雜然言議以爲非今之有指爲異事嗚呼公之徳行可以稱古君子矣牧分實通家義推先執復以孱昧叨在賔席幼熟懿行長奉指教泣涕撰記以僃遺闕以附于史氏云爾謹状卷終
