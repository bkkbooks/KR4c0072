body:
  text: 將仕郎守京兆府藍田縣尉充集賢殿校理裴延翰撰長安南下杜樊郷酈元注水經實樊川也延翰外曽祖司徒歧公之別墅在焉上五年冬仲舅自吴興守拜考功郎中知制誥盡吴興俸錢創治其墅岀中書直亟召昵宻往遊其地一旦談啁酒酣顧延翰曰司馬遷云自古冨貴其名磨滅者不可勝紀我適稚走於此得官受俸再治完具俄及老爲樊上翁旣不自期冨貴要有數百首文章異日爾爲我序號樊川集如此顧樊川一禽魚一草木無恨矣庻千百年未隨此磨滅邪明年冬遷中書舎人始少得恙盡搜文章閱千百紙擲焚之纔屬留者十二三延翰自撮髪讀書學文率承導誘伏念始𥘉出仕入朝三直太史筆比四出守其間餘二十年几有撰制大乎短章塗藁醉墨碩夥纎屑雖適僻阻不逺數千里必獲冩示以是在延翰乆藏蓄者甲乙籖目比校焚外十多七八得詩賦傳録論辯碑誌序記書啓表制離爲二十編合爲四百五十首題曰樊川文集嗚呼雖當一時戲感之言孰見魄兆而果驗白耶嘻文章與政通而風俗以文移在三代之道以文與忠敬隨之是爲理具與運高下探採古作者之論以屈原宋玉賈誼司馬遷相如楊雄劉向班固爲世魁傑然騷人之辭怨刺憤懟雖援及君臣敎化而不䏻霑洽持論相如子雲瑰麗詭變諷多要寡漫羡無歸不見治亂賈馬劉班乗時君之善否直豁巳臆奮然以拯世扶物爲任纂緒造端必不空言言之所及則君臣禮樂敎化賞罰無不包焉竊觀仲舅之文高聘夐厲旁紹曲摭絜簡渾圓勁出横貫滌濯滓窳支立攲倚呵摩鄆瘃如火煦焉爬梳痛痒如水洗焉其抉剔挫偃敢㫁果行若誓牧野前無有敵其正視嚴聽前衡後鑾如整冠裳祗謁宗廟其聒蟄爆聲發不慄若大吕勁鳴洪鐘横撞撑裂噎喑戞切韶護其砭熨嫉害堤障𥘉終若濡槁扵未焚膏㿈扵未穿栽培敎化翻正治亂變醨養瘠堯醲舜薫斯有意趨賈馬劉班之藩牆者邪具文有罪言者原十六衛者戰守二論者與時宰論用兵論江賊二書者上獵秦漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凡人未甞經度者若繩裁刀解粉畫線織布在眼見耳聞下其譎往事則阿房宫賦刺當代則感懐詩有國欲亡則得一賢人決遂不亡則張保皐傳尚古兩柄本出儒術不專任武力者則注孫子而爲其序褒勸賢傑表掲職業則贈莊淑大長公主及故丞相竒章公汝南公墓誌摽白歴代取士得才率由公族子弟爲多則與髙大夫書諌諍之體非訐醜惡與主鬪激則論諌書若一縣宰因行德敎不施刑罰能舉古風則謝守黃州表一存一亡適見交分則祭李處州文訓勵官業告東君命擬古典謩以寓誅賞則司帝之誥其餘𫐠喻讃誡興諷愁傷易格異狀機鍵雜發雖綿逺窮幽醲腴魁礨筆酣句健窕眇碎細包詩人之軌憲整楊馬之衙陣聳曹劉之骨氣掇顔謝之物色然未始不撥斸治本縆幅道義鈎索於經史觝禦於理化也故文中子曰言文而不及理是天下無文也王道何從而興乎嘻所謂文章與政通而風俗以文移果於是以卜盛時理具踔三代而䕃萬古若躋太華臨溟渤但觀乎積髙而沓深不知其磅礴澶漫所爲逺大者也近代或序其文非有名與位則文學宗老小子旣就其集寐寤思慮顛倒友覆不翅音試逾年苟墜承顧付與之言雖晦顯兩不相解在他人無知狀者然以髙有天幽有神隂有宰物者可自􅔰誣以甘罰殛邪故惣條目強自作序樊川文集緫目中書舎人杜牧字牧之第一賦三首阿房宫賦望故園賦晩晴賦詩二十八首感懷杜秋娘郡齋獨酌張好好冬至日寄小姪阿冝李甘洛中送兾處士東遊送沈處士赴蘇州李中丞招以詩贈行長安送友人遊湖南皇風雪中書懷雨中作偶遊石盡僧舎赴京𥘉入汴口曉景即事獨酌惜春題安州浮雲寺樓過驪山作池州送孟遲先􅒰重送題池州弄水亭題宣州開元寺大雨行逢裴坦判官歸宣州因題贈贈宣州元處士村行史將軍弟二律詩六十七首華清宫三十韻長安雜題長句六首河湟許七侍御棄官東歸李給事二首題永崇西平王宅太尉愬院六韻東兵長句十韻過勤政樓題魏文貞早春閣下寓直蕭九舎人因寄書懷四韻秋晚與沈十四舎人期遊樊川不至念昔遊今皇帝陛下一詔徴兵不日功集河湟諸郡次第歸降臣獲覩聖功輙献歌詠奉和白相公長句四韻過華清宫絶句三首登樂遊原聞趙縱使君與党項戰中箭身死長句送容州中丞赴鎮夏州崔常侍自少常亞列出領麾幢十韻街西長句春申君奉陵宫人讀韓杜集春日言懷寄李常侍李侍郎於陽羡里冨有泉石某亦於陽羡粗有薄産叙舊述懷因獻長句四韻贈李䖏士長句四韻送國棊王逢重送絶句少年行奉和門下相公送西川相公兼領相印出鎮全蜀朱坡早春寄岳州李使君送王侍御赴夏口座主幕自貽自遣題桐葉沈下賢李和鼎贈沈學士張歌人憶逰朱坡四韻朱坡絶句三首出宫人二首長安秋望獨酌醉眠不飲贈酒昔事文皇帝三十二韻道一大尹存之學士庭美學士簡于聖明自致霄漢皆與舎弟昔年還徃牧支離窮悴竊於一麾書美歌詩兼自言志因成長句四韻呈上三君子杏園春睌題韋家亭子過田家宅見宋拾遺題名處感而成詩雪晴訪趙嘏街西所居将赴吳興登樂逰原一絶第三律詩八十八首洛陽長句二首洛中監察病假滿送韋楚老拾遺歸朝東都送鄭處誨校書歸上都故洛陽城有感楊州三首潤州二首題楊州禪智寺西江懷古江南懷古江南春絶句將赴宣州留題楊州禪智寺題宣州開元寺水閣宣州送裴坦判官往舒州句溪夏曰送盧霈秀才自宣城赴官上京春末題池州弄水亭登池州九峯樓寄張祜齊安郡晚秋九日齊山登髙池州春送前進士蒯希逸齊安郡中偶題二首齊安郡後池絶句題齊安城樓池州李使君沒後十一日處州新命始到後見歸妓感而成詩見劉秀才與池州妓别池州廢林泉寺憶齊安郡池州清溪遊池州林泉寺金君洞即事黄州作贈李秀才是上公孫子寄李起居四韻題池州貴池亭蘭溪睦州四韻秋晚早發新定除官歸京睦州雨霽夜泊桐廬先寄蘇臺廬郎中新轉南曹未叙朝散𥘉秋暑退出守吴興書此篇以自見志題白蘋洲題茶山茶山下作入茶山下題水口草市絶句春日茶山病不飲酒因呈賔客不飲贈官妓贈薛判官代吴興妓春𥘉寄薛軍事八月十三日得替後移居霅溪館因題長句𥘉冬夜飲栽竹梅山石榴栁長句隨隄桞栁絶句獨柳早鴈鵁鶄鸚鵡鶴鵶鷺鷥村舎鷰歸鷰傷猿還俗老僧斫竹將赴湖州留題亭菊折菊雲醉後題僧院題禪院哭李給事中敏黄州竹逕題敬愛寺樓送劉秀才歸江陵見吴秀才與池妓别因成絶句湖南正𥘉招李郢秀才贈朱道靈屏風絶句哭韓綽新定途中題新定八松院小石第四長韻四首律詩七十一首感舊傷懐因成十六韻懷鍾陵舊遊四首臺城曲二首江上雨寄崔碣泊湓浦感舊啇山麻澗啇山冨水驛丹水題武關除官赴闕啇山道中絶句漢江襄陽雪夜感懷詠歌聖德追懷天寳因題關亭長句四韻途中作哭韋壽朋赤壁雲夢澤除官行至昭應聞友人出官因寄寄浙東韓乂評事泊秦淮秋浦途中題桃花夫人廟𥘉春有感書懷寄中朝往還寄崔鈞𥘉春雨中舟次和州橫江裴使君見迎李趙二秀才同來因書四韻兼寄江南許渾先軰和州絶句題烏江亭題横江館寄澧州張舍人笛寄楊州韓綽判官送李群玉赴舉送薛種遊湖南題夀安縣甘棠館御溝汴河懷古汴河阻凍酬張祜處士見寄長句四韻寄宣州鄭諌議題元處士高亭鄭瓘恊律題壽筆驛和野人殷潜之題籌筆驛十四韻重題絶句一首送陸洿郎中棄官東歸寄珉笛與宇文舍人寄内兄和州崔貟外十二韻遣與早秋秋思途中一絶春盡途中題村舎代人寄逺閨情舊遊寄逺簾寄題甘露寺北軒題青雲舘郡中有懷正𥘉奉酬江上偶見絶句題木蘭廟入啇山偶題送盧秀才一絶醉題題啇山四皓廟送隱者遊張處士山莊有懷重送斛斯判官贈別寄逺九曰寄牛相公爲人題贈少年行盆池有寄第五罪言原十六衛戰論守論論相第六燕将録張保臯鄭年傳竇列女傳書處州韓吏部孔子廟碑隂三子言性辯塞廢井文題荀文若傳後第七唐故江西觀察使武陽公韋公遺愛碑唐故太子少師竒章郡開國公贈太尉牛公墓誌銘唐故東川節度使檢校右僕射兼御史大夫贈司徒周公墓誌銘第八唐岐陽公主墓銘唐故御史大夫韋公墓誌銘唐故處州刺史李公墓誌銘唐故歙州刺史邢君墓誌銘第九李府君墓誌銘杜君墓誌銘駱䖏士墓誌銘復州司馬杜君墓誌銘盧秀才墓誌銘進士龔軺墓誌銘第十李賀集序注孫子序送薛䖏士序送盧秀才赴舉序杭州新造南亭記池州造刻漏記池州重起蕭丞相樓記同州澄城縣功倉戸尉㕔壁記宋州寕陵縣記淮南監軍使院㕔壁記自撰墓誌銘第十一上司徒李公論用兵書上李太尉論江賊書上門下崔相公書上昭義劉司徒書第十二上周相公書上宣州髙大夫書上李中丞書與人論諌書上浙西盧大夫書第十三上宣州崔大夫書上池州李使君書投知巳書荅莊充書上河陽李尚書書上鹽鐵裴侍郎書與汴州從事書第十四黃州准􅫰祭百神文又祭城隍神祈雨文二首池州祭木瓜神文祭故處州李使君文祭東川周相公文祭龔秀才文禮部尚書崔公行狀吏部侍郎沈公行狀第十五黃州刺史謝上表賀平党項表進撰故江西韋大夫遺愛碑文表爲中書門下請追尊號表賀生檎衡州草賊鄧裴表謝賜御札提舉邊將表謝賜新絲表壽昌節宴謝賜音樂狀謝賜茶酒等狀代裴相公譲平章事表代謝賜批荅表又代謝賜告身鞍馬狀論閤内延英奏對書時政記狀謝許受江西送綵絹等狀内宴百寮上壽酒及謝恩謝賜物等辭三首代人舉周敬復自代狀代人舉蔣係自代狀第十六上李太尉論北邊事啓賀中書門下平澤潞啓上白相公啓上周相公啓上鄭相公狀上淮南李相公狀上吏部高尚書狀上刑部崔尚書狀上安州崔相公啓薦韓乂啓上知已文章啓獻詩啓薦王寕啓上宰相求湖州第一啓上宰相求湖州第二啓上宰相求湖州第三啓上宰相求杭州啓爲堂兄慥求澧州第十七髙元𥙿除吏部尚書制崔璪除刑部尚書蘇滌除左丞崔璵除兵部侍郎等制裴休除禮部尚書裴諗除兵部侍郎等制畢諴除刑部侍郎制韋有翼除御史中丞制趙真齡除右散騎常侍制韓賔除户部郎中裴處權除禮部郎中孟璲除工部郎中等制鄭處晦守職方貟外郎兼侍御史知雜事制庾道蔚守起居舎人李汶儒守禮部貟外郎充翰林學士等制李朋除刑部貟外郎李從誨除都官貟外郎等制權審除戸部貟外郎制皇甫鉟除右司貟外郎鄭溒除侍御史等制韋退之除户部貟外郎裴徳融除殿中侍御史盧頴除監察御史等制李蔚除侍御史盧潘除殿中侍御史等制盧告除左拾遺制蕭現除太常博士制杜濛除太常博士制馬曙除右庶子王固除太僕少卿王球除太府少卿等制李叔玫除太僕卿髙証除均州刺史葛分除施州刺史等制李玨贈司空制歸融贈左僕射制令狐定贈禮部尚書制第十八李訥除浙東觀察使兼御史大夫制盧搏除廬州刺史等制李文舉除睦州刺史制竇弘餘加官依前台州刺史蘇荘除鄧州刺史等制李曁除絳州刺史魏中庸除亳州刺史曹慶除威逺營使等制李誠元除朔州刺史制薛逺除秦州刺史制田克加撿校國子祭酒依前宥州刺史制薛淙除鄧州任如愚除信州虞藏玘除卭州刺史等制鄭液除通州刺史李蒙除陳州刺史等制王晏實除齊州吴𥘉本巴州陳侹渝州刺史等制郭瓊除渠州郭宗元除興州等刺史王康除建陵臺令等制吴從蓬州