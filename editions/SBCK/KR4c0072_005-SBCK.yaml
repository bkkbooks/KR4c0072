front:
  text: 樊川文集第五
  hash: sha256:29e937da2e44ded8bc44c18883670b88cde38def7c421d219baf78c8f5dccda1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_005-1a}
body:
  text: 中書舎人杜牧字牧之罪言國家大事牧不當官言之實有罪故作罪言生人常病兵兵祖於山東胤於天下不得山東兵不可死山東之地禹畫九土曰兾州野舜以其分太大離爲幽州爲并州程其水土與河南等常重十一二故其人沉贄多材力重許可䏻辛苦自魏􅀳已下胤浮羡􅁋工機纎雜意態百岀俗益蕩弊人益脆弱唯山東敦五種本兵矢他不䏻蕩而自若也復産健馬下者日馳二百里所以兵常當天下兾州以其恃強不循理兾其必破弱雖巳破兾其復強大也井州力足以并吞也幽州幽隂慘殺也故聖人因其風俗以爲之名黄帝時􅃖尤爲兵階阪帛在今嬀川縣自後帝王多居其地豈尚其俗都之邪自周劣齊覇不一世皆太常傭役諸侯至秦萃銳三􅀳經六世乃䏻得韓遂折天下脊復得趙因拾取諸國秦末韓信聮齊有之故蒯通知漢楚􅁿重在信光武始扵上谷成扵鄗魏武舉官渡三分天下有其二晉亂胡作至宋武號爲英雄得蜀得關中盡得河南地十分天下有八然不能使一人渡河以窺胡至于髙齊荒蕩宇文取得隋文因以滅陳五百年間天下乃一家隋文非宋武敵也是宋不得山東隋得山東故隋爲王宋爲覇由此言之山東王者不得不可爲王覇者不得不可爲覇猾賊得之是以致天下不安國家天寳末燕盗徐起出入成臯函潼間若渉無人地郭李輩常以兵五十萬不䏻遇鄴自爾一百餘城天下力盡不得尺寸人望之若廻鶻􅄍蕃義無有敢窺者國家因之畦河脩障戍塞其街蹊齊魯梁蔡􅀍其風流因亦爲㓂以裏拓表以表撑裏混􅐓廻轉顛倒横斜未嘗五年間不戰生人日頓委四夷日猖熾天子因之幸陜幸漢中焦焦然七十餘年矣嗚呼運遭孝武澣衣一肉不畋不樂自卑冗中拔取􅀅相凢十三年乃䏻盡得河南山西地洗削更革罔不順適唯山東不服亦再攻之皆不利以返豈天使生人未至於帖㤗耶豈其人謀未至耶何其艱哉何其艱哉今日天子聖明超出古昔志於平理若欲悉使生人無事其要在於去兵不得山東兵不可去是兵殺人無有巳也今者上䇿莫如自治何者當貞元時山東有燕趙魏叛河南有齊蔡叛梁徐陳汝白馬津盟津襄鄧安黄夀春皆戍厚兵凡此十餘所纔足自護治所實不輟一人以他使遂使我力解􅀔弛熟視不􅁤者無可柰何階此蜀亦叛吳亦叛其他未叛者皆迎時上下不可保信自元和􅀄至今一十九年間得蜀得吳得蔡得齊凢􅀵郡縣二百餘城所未䏻得唯山東百城耳土地人户財物甲兵校之徃年豈不綽綽乎亦足自以爲治也法令制度品式條章果自治乎賢才姧惡搜選置捨果自治乎障戍鎮守干戈車馬果自治乎井閭阡陌倉廪財賦果自治乎如不果自治是助虜爲虜環土三千里植根七十年復有天下隂爲之助則安可以取故曰上䇿莫如自治中䇿莫如取魏魏於山東最重於河南亦最重何者魏在山東以其䏻􅃒趙也既不可越魏以取趙固不可越趙以取燕是燕趙常取重於魏魏常操燕趙之性命也故魏在山東㝡重􅀺陽距白馬津三十重新郷距盟津一百五十里􅀺陽新郷並属衞州陴壘相望朝駕暮戰是二津虜能潰一則馳入成皐不數日間故魏於河南間亦㝡重今者願以近事明之元和中纂天下兵誅蔡誅齊頓之五年無山東憂者以能得魏也田弘正來降昨日誅滄頓之三年無山東憂者亦以能得魏也史憲誠來降長慶􅀄誅趙一日五諸侯兵四出潰解以失魏也田布死昨日誅趙罷如長慶時亦以失魏也李聽反故河南山東之輕重常懸在魏明白可知也非魏強大能致如此地形使然也故曰取魏爲中䇿冣下䇿爲浪戰不計地勢不審攻守是也兵多粟多歐人使戰者便於守兵少粟少人不歐自戰者便於戰故我常失於戰虜常困於守山東之人叛且三五丗矣今之後生所見言語舉止無非叛也以爲事理正當如此沉酣入骨髓無以爲非者指示順向詃侵族臠語曰叛去酋酋起矣至於有圍急食盡餤屍以戰以此爲俗俗豈可與史一勝一􅀒哉自十餘年來凢三收趙食盡且下堯山敗郗尚書趙復振下博敗杜牧良趙復振舘陶敗李􅃪趙復振故曰不計地勢不審攻守爲浪戰㝡下䇿也原十六衛國家始踵隋制開十六衛將軍緫三十貟屬官緫一百二十八貟署宇分部夾峙禁省厥􅀄歷今未始替削然自今觀之設官言無謂者其十六衛乎本原事跡其實天下之大命也始自貞觀中旣武遂文内以十六衛畜養戎臣襃公鄂公之徒並爲諸衛將軍外開折衝果毅府五百七十四以儲兵伍或有不幸方二三千里爲㓂土數十百萬人爲㓂兵變夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一􅁀勃消削單車一符將命四走莫不信順此時戎臣當提兵居内當其居内也官爲將軍綬有朱紫章有金銀千百􅀐趨奉朝廟第觀車馬歌兒舞女念功賞勞出於曲賜所部之兵散舎諸府上府不越一千二百人五百七十四府凢有四十萬人三時耕稼撥芳味切襫音釋耞音加耒一時治武􅀐劒兵矢禆衛以課父兄相言不得業他籍藏將府伍散田畒力解勢破人人自愛雖有􅃖􅀹爲師雅亦不可使爲亂耳及其當居外也縁部之兵􅀍撽乃來受命於朝不見妻子斧􅃏在前爵賞在後以首爭首以力搏力飄􅁀交捽豈暇異略雖有􅃖尤爲師雅亦無能爲叛也自貞觀至于開元末百五十年間戎臣兵伍未始逆􅆲此聖人所䏻柄統􅁿重制障表裏聖筭聖術也至於開元末愚儒奏章曰天下文勝矣請罷府兵詔曰可武夫奏章曰天下力強矣請􅅮四夷詔曰可於是府兵内剷邉兵外作戎臣兵伍湍奔矢徃内無一人矣起遼走蜀繚絡萬里事五強㓂奚契丹吐審雲南犬石國十餘年中亡百萬人尾大中乾成燕偏重去聲而天下掀然根萌燼燃七聖旰㑹求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈐鍵哉然爲國者不䏻無也居外則叛韓黥七囯近者禄山僕固是也居内則􅆲卓莽曹馬巳下是也使外不叛内不􅆲兵不離伍無自焚之患􅀅保頸領無烹狗之諭古今巳還法術最長其置府立衛乎近代巳來於其􅀅也弊復爲甚人􅅝曰廷詔命􅀅矣名出視之率市兒輩盖多賂金玉􅀒􅀝幽隂折劵交貨所􅀎也絶不識父兄禮義之教復無慷慨感槩之氣百城千里一朝得之其強傑愎勃者則撓削法制不使縛巳斬族忠良不使違巳力壹勢便罔不爲㓂其隂泥去聲巧狡者亦能家􅄸口歛委於邪倖由卿市公去都得都四􅂂所治指爲別舘或一夫不幸而夀則戞割生人略匝天下是以天下每每兵亂湧溢齊人乾耗郷黨風俗􅁋窳衰薄教化恩澤壅抑不下召來災沵􅀍及牛馬嗟乎自愚而知之人其盡知之乎且武者任誅如天時有秋文者任治如天時有春是天不􅀎倒春秋是豪傑不􅀎總文武是此輩受􅃏誅􅁀乎曰於是乎在某人行教乎曰於是乎在欲禍蠧不作者未之有也伏惟文皇帝十六衞之㫖誰復而原其實天下之大命也故作原十六衛戰論并序兵非脆也榖非殚也而戰必挫北是曰不循其道也故作戰論焉河北視天下猶珠璣也天下視河北猶四支也珠璣苟無豈不活身四支苟去吾不知其爲人何以言之夫河北者俗儉風渾􅁋巧不生朴毅堅強果於戰耕名城堅壘􅩨音頁嶭五結切相貫髙山大河盤互交鏁加以土息健馬便於馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶大農之家不待珠璣然後以爲冨也天下無河北則不可河北既虜則精甲銳卒利刀良弓健馬無有也卒蔟忽反然夷狄驚四邉摩封疆出表裏吾何以禦之是天下二支兵去矣河東盟津滑䑓大梁彭城東平盡􅀫厚兵以塞虜衝是六郡之師嚴飾護疆不可他使是天下二支兵去矣六郡之師厥數三億低首仰給橫拱不爲則㳂淮巳北循河之南東盡海西叩洛經數千里赤地盡取才䏻應費是天下三支財去矣咸陽西北戎夷大屯嚇呼膻臊徹于帝君周秦單師不􅀎排闢於是盡剷吳越荆楚之饒以啖兵戍是天下四支財去矣乃使吾用度不周徴徭不常無以膏齊民無以接四夷禮樂刑政不暇脩治品式條章不􅀎僃具是天下四支盡解頭腹兀然而巳焉有人解四支其自以䏻乆爲安乎今者誠􅀎治其五敗則一戰可定四支可生夫天下無事之時殿􅀉大臣偷處榮逸爲家治具戰士離落兵甲鈍弊車馬刓弱而未嘗爲之簡帖整飾天下雜然盗發則疾歐疾戰此􅀫敗之師也何爲而不北乎是不蒐練之過者其敗一也夫百人荷戈仰食縣官則挾千夫之名大將小禆操其餘羸以虜壮爲幸以師老爲娯是執兵者常少糜食者常多築壘未乾公嚢巳虛此不責實科食之過其敗二也夫戰􅂺小勝則張皇其功奔走獻状以邀上賞或一日再賜一月累封凱還未歌書品巳崇爵命極矣田官廣矣金繒溢矣子孫官矣焉肯搜竒外死勤於我矣此賞厚之過其敗三也夫多䘮兵士顛翻大都則跳身而來刺􅀖而去廻視刀鋸菜色甚安一􅀊未更旋巳立於壇墀之上矣此䡖罰之過其敗四也夫大􅀅􅀅兵柄不得專恩臣詰第來揮之至如堂然􅀅陣殷然􅀅鼓一則曰必爲偃月一則曰必爲魚麗三軍萬夫環旋翔佯愰駭之間虜􅀐乗之遂取吾之鼓旗此不專任責成之過其敗五也元和時天子急太平嚴約以律下常􅇛兵數十萬以誅蔡天下乾耗四􅀊然後䏻取此盖五敗不去也長慶􅀄盗子孫悉來走命是内地無事天子寛禁厚恩與人休息未㡬而燕趙甚亂引師起􅀅五敗益甚登壇注意之臣死竄且不暇復焉􅀎加威於反虜哉今者誠欲調持干戈洒掃垢汗以爲萬世安而乃踵前非踵前非是不可爲也古之政有不善士傳言庻人謗發是論者亦且􅀅書于謗木傳于士大夫非偶而巳守論并序徃年兩河盗起屠囚大臣劫戮二千石國家不議誅洗束兵自守反條大暦貞元故事而行姑息之政是使逆輩益橫去聲終唱患禍故作守論焉厥今天下何如哉干戈朽缺錢鈍含引混貸煦育逆孽而殆爲故常而執事大人曽不歴筭周思以爲􅀫謀方且嵬岸抑􅀭自以爲廣大繁昌莫巳若也嗚呼其不知乎其俟蹇頓顛傾而後爲之支計乎且天下㡬里列郡㡬所而自河巳北蟠城數百金堅蔓織角奔爲㓂伺吾人之顦顇天時之不利則􅀅與其朋伍羅絡郡國􅀅駭亂吾民於掌股之上耳今者及吾之壮不圖擒取而乃偷處恬逸苐苐相付以爲後世子孫背脅疸根此復何也今之議者咸曰夫倔強之徒吾以良􅀅勁兵以爲銜䇿髙位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大暦貞元所以守􅀖也亦何必疾戰焚煎吾民然後以爲快也愚曰大暦貞元之間適以此爲禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自􅀣一家破制削法角爲尊奢天子飬威而不問有司守恬而不呵王侯通爵越録受之覲聘不來几杖扶之逆息虜胤皇子嬪之装縁采飾無不備之是以地益廣兵益強僣擬益甚侈心益昌於是土田名器分劃殆盡而賊夫貪心未及畔岸遂有􅁋名越號或帝或王盟詛自立恬淡不畏走兵西略以飽其志者也是以趙魏燕齊卓起大倡梁蔡吳蜀躡而和之其餘混澒軒􅅝欲相效者徃徃而是運遭孝武宵旰不忘前英後傑夕思朝議故䏻大者誅鋤小者惠來不然周秦之郊㡬爲犯獵哉大抵生人油然多欲欲而不得則怒怒則爭亂随之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大暦貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支㡬不䏻相運掉也今者不知非此而反用以爲經愚見爲盗者非止於河北而巳鳴呼大曆貞元守􅀖之術永戒之哉論相吕公善相人言女吕後當大貴冝以配季季後爲天子吕后復稱制天下王吕氏子弟悉以大國隋文帝相工來和軰數人亦言當爲帝者後簒竊果得之誠相法之不謬矣吕氏自稱制通爲后凢二十餘年間隋氏自簒至滅凢三十六年間男女族屬殺滅殆盡當􅁗末吕氏大族也周末楊氏爲八柱國公侯相襲乆矣一旦以一女一男子偷竊位号不三二十年間壯老嬰兒皆不得其死不知一女子爲吕氏之福邪爲禍邪一男子爲楊氏之禍邪爲福邪得一時之貴滅百丗之族彼知相法者當曰此必爲吕氏楊氏之禍乃可爲善相人矣今斷一指得四海凢人不欲爲况以一女子一男子易一族哉余讀荀卿非相因感吕氏楊氏知卿爲大儒矣樊川文集第五
