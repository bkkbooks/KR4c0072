front:
  text: 樊川别集序
  hash: sha256:48b6f55c581da2adafcd2082d08e355cdbfb4a0cffd979153a0a37223430280a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_021-1a}
body:
  text: 中書舎人杜牧字牧之集賢校理斐延翰編次牧之文號樊川集者二十卷中有古律詩二百四十九首且言牧始少得恙盡搜文章閱千百􅁓擲焚之纔屬留者十二三疑其散落于世者多矣舊傳集外詩者又九十五首家家有之予徃年於棠郊魏處士野家得牧詩九首近汶上盧訥處又得五十篇皆二集所逸者其後池泛舟宴送王十秀才詩乃知外集所亡取别句以􅀘題今編次作一卷俟有所得更益之熈寜六年三月一日杜陵田槩序寓言暖風遟日柳􅀄含顧影看身又自慙何事明朝獨惆悵杏花時節在江南猿月白煙青水暗流􅀌猿㗸恨呌中秋三聲欲㫁疑腸㫁饒是少年須白頭懷歸塵埃終日滿䆫前水態雲容思浩然争得便歸湘浦去却持竿上釣魚船邉上晚秋黒山南面更無州馬放平沙夜不􅀵風送孤城臨晚角一聲聲入客心愁傷友人悼吹簫妓玉簫聲㫁没流年滿目春愁隴􅀣煙艶質巳隨雲􅀨散鳯樓空鎻月明天訪許顔門近寒溪䆫近山枕山流水日潺潺長嫌世上浮雲客老向塵中不解顔春日古道傍作萬古榮華旦暮齊樓䑓春盡草萋萋君看陌上何人墓旋化紅塵送馬蹄青塜青塜前頭隴水流燕山山上暮雲秋蛾眉一墜窮泉路夜夜􅀌䰟月下愁大夢上人自廬􅄘廻行脚㝷常到寺稀一枝藜杖一禪衣開門滿院空秋色新向廬􅄘過夏歸洛中二首柳動晴風拂路塵年年宫闕鎻濃春一從翠輦無廵幸老却蛾眉㡬許人風吹柳帶揺晴緑蝶遶花枝戀暖香多把芳菲泛春酒直敎愁色對愁腸邉上聞胡笳三首何處吹笳薄暮天塞垣髙鳥没狼煙遊人一􅃪頭堪白蘇武争禁十九年海路無塵邉草新榮枯不見緑楊春白沙日暮愁雲起獨感離郷萬里人胡雛吹􅅇上髙䑓寒鴈驚飛去不廻盡日春風吹不散只應分付客愁來春日􅀉許渾先輩葪北鴈􅀄去湘南春又歸水流滄海急人到白頭稀塞路盡何處我愁當落暉終須接鴛鷺霄漢共髙飛經闔閭城遺蹤委衰草行客思悠悠昔日人何處終年水自流􅀌煙村戌逺亂􅀨海門秋吟罷獨歸去煙雲盡慘愁并州道中行役我方倦苦吟誰復聞戍樓春帶雪邉角暮吹雲極目無人迹廻頭送鴈群如何遣公子髙卧醉醺醺别懷相别徒成泣經過總是空勞生慣離别夜夢苦西東去路三湘浪歸程一片風他年􅀉消息書在鯉魚中漁父白髪滄浪上全忘是與非秋潭垂釣去夜月叩船歸煙影侵蘆岸潮㾗在竹扉終年狎鷗鳥來去且無機秋夢寒空動髙吹月色滿清砧殘夢夜䰟㫁美人邉思深􅀌鴻秋出塞一葉暗辭林又􅀉征衣去迢迢天外心早秋客舎風吹一片葉萬物巳驚秋獨夜他郷淚年年爲客愁别離何處盡揺落㡬時休不及磻溪叟身閑長自由逢故人故交相見稀相見倍依依塵路事不盡雲巖閑好歸投人銷壮志徇俗變真機又落他郷涙風前一滿衣秋晚江上遣懐􅀌舟天際外去路望中賖貧病逺行客夢䰟多在家蝉吟秋色􅀣鵶噪夕陽沙不擬徹􅀟􅁂他方擲􅀊華長安夜月寒光垂静夜浩彩滿重城萬國盡分照誰家無此名古槐踈影薄仙桂動秋聲獨有長門裏蛾眉對曉晴雲東西郍有礙出處豈虚心曉入洞庭闊暮歸巫峽深渡江隨鳥影擁􅀣隔猿吟莫􅀮髙唐去枯苗待作霖春懷年光何太急倐忽又青春明月誰家主江山暗換人鸎花潜運老榮樂漸成塵遥憶朱門栁别離應更頻逄故人年年不相見相見却成悲教我淚如霰嗟君髪似􅁝正傷携手處况值落花時莫惜今宵醉人間忽忽期閑題男兒所在即爲家百鎰黄金一朶花借問春風何處好緑楊深巷馬頭斜金谷園繁華事散逐香塵流水無情草自春日暮東風怨啼鳥落花猶似堕樓人重登科星漢離宫月出輪滿街含􅀏綺羅春花前每􅀍青娥問何事重來只一人遊邉黄沙連海路無塵邉草長枯不見春日暮拂雲堆下過馬前逄著射鵰人􅀅赴池州道中作青陽雲水去年㝷黄絹歌詩出翰林投轄暫停留酒客綘帷斜繋滿松隂妖人􅀏我不相問道者應知歸路心南去南來盡郷國月沉秋水只沉沉隋宫春龍舟東下事成空蔓草萋萋滿故宮亡國亡家爲顔色露桃猶自恨春風蠻中醉瘴塞蠻江入洞流人家多在竹棚頭青山海上無城郭唯見松牌出象州寓題把酒直須判酩酊逢花莫惜暫淹留假如三萬六千日半是悲哀半是愁送趙十二赴舉省事却因多事力無心翻似有心來秋風郡閣殘花在别後何人更一杯偶呈鄭先輩不語亭亭儼薄粧􅀞裙􅀟鳯欝金香西京才子旁看取何似喬家郍窈娘子規蜀地曽聞子規鳥宣城又見杜䳌花一呌一回腸一㫁三春三月憶三巴江樓獨酌芳春酒登樓已半醺誰驚一行鴈衝㫁過江雲旅􅀫旅舘無良伴凝情自悄然寒燈思舊事㫁鴈警愁眠逺夢歸侵曉家書到隔年湘江好煙月門繋釣魚船杜䳌杜宇竟何寃年年呌蜀門至今銜積恨終古弔殘䰟芳草迷觴結紅花染血㾗山川盡春色嗚咽復誰論聞蝉火雲􅀄似滅曉角欲微清故國行千里新蝉忽數聲時行仍髣髴度日更分明不敢頻傾耳唯憂白髪生送友人十載名兼利人皆與命爭青春望不住白髪自然生夜􅀨滴郷思秋風從别情都門五十里馳馬逐雞聲旅情䆫虚枕簟凉寢倦憶瀟湘山色㡬時老人心終日忙松風半夜􅀨簾月滿堂霜匹馬好歸去江頭橘正香曉望獨起望山色水雞鳴蓼洲房星隨月曉楚木向雲秋曲渚疑江盡平沙似浪浮秦原在何處澤國碧悠悠貽友人自是東西客逄人又送人不應相見老秪是别離頻度日還知暮平生未識春儻無遷谷分歸去飬天真書事自􅀏走紅塵流年舊復新東風半夜􅀨南國萬家春失計抛漁艇何門化涸鱗是誰添􅀊月老却暗投人别鶴分飛共所從六翮􅀔催風聲㫁碧雲外影􅀌明月中青田歸逺路丹桂舊巢空矯翼知何處天涯不可窮晚泊㠶濕去悠悠停橈􅀫渡頭亂煙迷野岸獨鳥出中流蓬􅀨延郷夢江風阻暮秋儻無身外事甘老向扁舟山寺峭壁引行徑截溪開石門泉飛濺虚楹雲起漲河軒隔水看來路踈籬見定猿未閑難乆住歸去復何言早行垂鞭信馬行數里未雞鳴林下帶殘夢葉飛時忽驚霜凝􅀌鶴逈月曉逺山横僮僕休辭慮時平路復平秋日偶題荷花兼栁葉彼此不勝秋玉露滴􅀄泣金風吹更愁緑眉甘棄墜紅臉恨飄流數息是游子少年還白頭憶歸新城非故里終日想柴扃興罷花還落愁來酒欲醒何人􅀄髪白㡬處亂山青逺憶湘江上漁歌對月􅃪偶見黄州作朔風髙緊掠河樓白􅈹騧郎白罽裘有箇當壚明似月馬鞭斜揖􅀏回頭醉倒日晴空樂下仙雲俱在凉亭送使君莫辭一盞即相請還是三年更不聞酬許十三秀才兼依來韻多為裁詩歩竹軒有時凝思過朝昏篇成敢道懷金璞吟苦唯應似嶺猿迷興每慙花月夕􅀉愁長在别離䰟煩君把卷侵寒燭麗句時傳􅀞㦸門後池泛舟送王十秀才城日晚悠悠絃歌在碧流夕風飄度曲煙嶼􅀮行舟問拍疑新令憐香占彩毬當筵雖一醉寜復緩離愁書情誰家洛浦神十四五來人媚髪􅁿垂額香衫軟着身摘蓮紅䄂濕窺渌翠娥頻飛鵲徒來徃平陽公主親兵部尚書席上作華堂今日綺筵開誰召分司御史來偶發狂言驚滿坐三重粉靣一時囬驌驦坂荆州一萬里不如蒯易度仰首望飛鳴伊人何異趣樊川别集
