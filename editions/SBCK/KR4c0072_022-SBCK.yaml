body:
  text: 中書舎人杜牧字牧之班竹筒簟血染班班成錦紋昔年遺恨至今存分明知是湘妃泣何忍􅀅身卧淚㾗和嚴惲秀才落花共惜流年留不得且環流水醉流柸無情紅􅃩年年盛不恨凋零却恨開倡樓戲贈細栁橋邉深半春纈衣簾裏動香塵無端有􅀉閑消息背挿金􅁫􅀏向人􅀄上舩留􅀉煙水本好尚親交何慘悽况爲珠􅂂客即泊錦帆堤沙鴈同舩去田鵶遶岸啼此時還有味必臥日從西秋岸河岸微退落栁影微彫踈舩上聽呼穉堤南趂漉魚數帆旗去疾一艇箭廻􅀄曽入相思夢因慿附逺書過大梁聞河亭方讌贈孫子端築園縱翫歸應少賦雪搜才去必頻板路豈縁無罰酒不教客右更添人題吳興消暑樓十二韻晴日登攀好危樓物象饒一溪通四境萬岫遶層霄鳥翼舒華屋魚鱗棹短撓浪花機乍織雲葉近新雕䑓榭羅嘉卉城池敞麗譙蟾蜍來作鑑螮蝀引成橋燕任随秋葉人空集早潮楚鴻行盡直沙鷺立偏翹暮角凄遊旅清歌慘沈寥景牽遊目困愁託酒膓銷逺吹流松韻殘陽渡栁橋時陪􅁃公賞還悟脫煩􅅝奉送中丞姊夫儔自大理卿出鎮江西叙事書懷因成十二韻惟帝憂南紀搜賢與大藩梅仙調歩驟􅁃亮拂􅐤鞬一室何勞掃三章自不􅁈精明如定國􅀌峻似陳蕃灞岸秋猶嫩藍橋水始喧紅旓罣石壁黒矟㫁雲根􅅬閣丹霄􅀝章江碧玉奔一聲仙妓唱千里暮江痕私好􅀄童稚官榮見子孫流年休挂念萬事至無言玉輦君頻過馮唐􅀅未論傭書醻萬債竹塢問樊村中丞業深韜略志在功名再奉長句篇兼有諮勸檣似鄧林江拍天越香巴錦萬千千滕三閣上柘枝鼓徐孺亭西鐵軸船八部元侯非不貴萬人師長豈無權要君嚴重踈歡樂猶有河湟可下鞭時收河湟且止三州六􅀜和裴傑秀才新櫻桃新果眞瓊液未應宴紫蘭圎疑􅀼龍頷色巳奪雞冠逺火微微辨繁星歴歷看茂先知味好曼倩恨偷難忍用烹騂酪從將翫玉盤流年如可駐何必九華丹春思豈君心的的嗟我淚㳙㳙綿羽啼來乆錦鱗書未傳獸爐凝冷􅃩羅幕蔽晴煙自是求佳夢何湏訝晝眠代人作樓髙春日早屏束麝煙堆盼眄凝䰟别依稀夢雨來緑鬟羞妥麽紅頰思夭偎闘草憐香蕙簮花間雪梅戍遼雖􅍋切遊蜀亦遲廻錦字梭懸壁琴心月滿臺􅀏筵凝貝啓眠箔暁珠開臘破征車動􅂁􅁭對淚裁偶題二首勞勞千里身􅁭􅃑滿行塵深夜懸􅀟涙短亭思逺人蒼江程未息黒水夢何頻明月輕橈去唯應釣赤鱗有恨秋來極無端别後知夜䦨終耿耿明發竟遟遟信巳慿鴻去歸唯與燕期只應明月見千里兩相思冬至日遇京使發􅀉舎弟逺信初逢􅀟鯉去他郷正遇一陽生鐏前豈解愁家國輦下唯能憶弟兄旅館夜憂姜􅀍冷暮江寒􅁴晏裘輕竹門風過還惆悵疑是松䆫雪打聲洛下送張曼容赴上黨召歌闋鐏殘恨起偏慿君不用設離筵未趍雉尾隨元老且驀羊腸過少年七葉漢貂眞宻近一枝詵桂亦徒然羽書正急徴兵地湏遣頭風處處痊宣州留贈紅鈆濕盡半羅裙洞府人間手欲分滿面風流雖似玉四年夫壻恰如雲當春離恨盃長滿􅀝柱關情日漸曛爲報眼波湏穏當五陵遊宕莫知聞􅀉題宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人爲􅀝東樓柱正是千山雪漲溪贈張祐詩韻一逄君平生􅁛所聞粉毫唯􅀞月瓊尺只裁雲黥陣人人懾秋星歴歴分數篇留别我羞殺李􅀅軍殘春獨來南亭因􅀉張祐煖雲如粉草如茵獨歩長堤不見人一嶺桃花紅錦黦半溪山水碧羅新髙枝百舌猶欺鳥帶葉梨花獨送春仲蔚欲知何䖏在苦吟林下拂詩塵宣州開元寺南樓小樓纔受一床横終日看山酒滿傾可惜和風夜來􅀨醉中虚度打牎聲􅀉逺人終日求人􅁲廻廻道好音那時離别後入夢到如今别沈䖏士舊事參差夢新程邐迤秋故人如見憶時到寺東樓留贈舞鞾應任閑人看􅀏臉還湏待我開不用鏡前空有淚薔薇花謝即歸來奉和僕射相公春澤稍􅄽聖君軫慮嘉雪忽降品彚昭蘇即事書成四韻白相國飄來鷄樹鳯池邊漸􅎹瓊枝凍碧漣銀闕􅀟髙銀漢裏玉山横列玉墀前昭陽殿下風􅅆急承露盤中月彩圎上相抽毫歌帝徳一篇風雅羙豐年􅀉李播評事子列光殊價明時忍自髙寕無好舟擑不汎惡風濤大翼終難戢竒鋒且自韜春來煙渚上幾淨雪霜毫送牛相出鎮襄州盛時常注意南雍暫分茅紫殿辭明主巖廊别舊交危憧侵碧霧寒斾獵紅旓德業懸秦鏡威聲􅀮楚郊拜塵先灑淚成厦昔容巢遥仰沉碑㑹鴛鴦玉佩敲送薛邽二首可憐走馬􅀐驢漢豈有風光肯占伊只有三張最惆悵下山廻馬尚遲遲小捷風流巳俊才便􅀅紅粉作金臺明年未去池陽郡更乞春時却重來見穆三十宅中庭梅榴花謝矜紅掩素似多才不待櫻桃不逐梅春到未曽逢宴賞雨餘爭解免低徊巧窮南國千般􅃩趂得東風二月開堪恨王孫浪遊去落英狼籍始歸來留誨曹師等詩萬物有醜好各一姿状分唯人即不爾學與不學論學非探其花要自撥其根孝友與誠實而不忘爾言根本既深實柯葉自滋繁念爾無忽此期以慶吾門洛陽文爭武戰就神功時似開元天寳中巳建玄戈􅀵相土應廽翠㡌過離宫侯門草滿冝寒兎洛浦沙深下塞鴻疑有女蛾西望䖏上陽煙􅀣正秋風􅀉唐州李玭尚書累代功勲照世光奚胡聞道死心降書功筆秃三千管領節門排十六􅀟先揖耿弇聲寂寂今看黄霸事摐摐時人欲識胷􅁭否彭蠡秋連萬里江南陵道中南陵水靣漫悠悠風緊雲輕欲變秋正是客心􅀌逈䖏誰家紅䄂凭江樓登九峯樓晴江灔灔含淺沙髙低逺郭滯秋花牛酒漁笛山月上鷺渚鶖梁溪日斜爲郡異郷徒泥酒杜陵芳草豈無家白頭搔殺􅀝柱遍歸棹何時聞軋鴉别家􅀄􅀊嬌兒未識爺别爺不拜手吒义拊頭一别三千里何日迎門却到家歸家穉子牽衣問歸來何太遟共誰爭􅀊月贏得鬂邉􅁝􅀨連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠􅀌客耳主人䆫外有芭蕉送人鴛鴦帳裏暖芙蓉低泣􅀜山幾萬重明鑑半邊􅁫一股此生何處不相逢遣懐道泰時還泰時來命不來何當離城市髙卧愽山隈醉贈薛道封飲酒論丈四百刻水分雲隔二三年男兒事業知公有賣與明君直幾錢歙州盧中丞見惠名醖誰憐賤子啓窮途太守封來酒壹壷攻破是非渾似夢削平身丗有如無醺醺若借嵆康􅂴兀兀仍添寗武愚猶念悲秋更分賜夾溪紅蓼映風蒲詠襪鈿尺裁量减四分纎纎玉笋裏輕雲五陵年少欺他醉􅀏把花前出􅀞裙官詞二首蝉翼􅁿綃傅體紅玉膚如醉向春風深宫鎻閉猶疑惑更取丹沙試辟宫􅁥宫引出暫開門随例湏朝不是恩銀錀却􅀵金鎻合月明花落乂黄昏月三十六宫秋夜深昭陽歌㫁信沉沉唯應獨伴陳皇后照見長門望幸心忍死留别獻鹽鐵裴相公二十叔賢相輔明主蒼生夀域開青春辭白日幽壤作黄埃豈是無多士偏􅂪不棄才􅀌墳一尺土誰可爲培栽悲吳王城二月春色江上來水精波動碎樓䑓吳王宮殿栁含翠蘇小宅房花正開解舞細􅆎何處徃䏻歌姹女逐誰廻千秋萬古無消息國作荒原人作􅁅閨情代作梧桐葉落鴈􅀄歸迢遞無因􅀉逺衣月照石泉金􅀧冷鳯酣簫管玉聲微佳人力杵秋風外蕩子從征夢寐希遥望戍樓天欲曉滿城鼕鼓白雲飛􅀉沈褒秀才晴河萬里色如刀處處浮雲卧碧桃仙桂茂時金鏡暁洛波飛處玉容髙雄如寳劒衝牛斗麗似鴛鴦飬羽毛他日憶君何處望九天香滿碧蕭騷入關東西南北數衢通曽取江西徑過東今日更㝷南去路未秋應有北歸鴻及第後􅀉長安故人東都放牓未花開三十三人走馬廻秦地少年多辦酒巳􅀅春色入關來偶作才子風流詠暁霞􅀝樓吟住日􅀄斜驚殺東隣繡床女錯􅀅黄暈􅎹檀花贈終南蘭若僧北闕南山是故郷兩枝仙桂一時芳休公都不知名姓始􅁴禪門氣味長遣懷落魄江南載酒行楚􅆎腸㫁掌中輕十年一􅁴揚州夢占得青樓薄倖名春日途中田園不事來遊宦故國誰教爾别離獨􅀝關亭還把酒一年春盡送春時秋感金風萬里思何盡玉􅀣一䆫秋影寒獨掩此門明月下淚流香􅃑􅀝欄干贈漁父蘆花深澤静垂綸月夕煙朝㡬十春自􅀃􅀌舟寒水畔不曽逄着獨醒人歎花自恨㝷芳到巳遟徃年曽見未開時如今風擺花狼籍緑葉成隂子滿枝題劉秀才新竹數莖幽玉色曉夕翠煙分聲破寒䆫夢根穿緑蘚紋漸籠當檻日欲礙入簾雲不是山隂客何人愛此君山行逺上寒山石徑斜白雲生䖏有人家停車坐愛楓林晚霜葉紅於二月花書懷滿眼青山未得過鏡中無那􅁂􅁝何秖言旋老轉無事欲到中年事更多紫薇花曉迎秋露一枝新不占園中最上春桃李無言又何在向風偏􅀏豔陽人醉後呈崔大夫謝傅秋凉閱管絃徒教賤子侍華筵溪頭正雨歸不得辜􅀒南䆫一􅁴眠知宣州沈大夫登北樓書懐兵符嚴重辭金馬星生光芒射斗牛筆落青山飄古韻帳開紅斾照髙秋香連日彩浮綃幕溪逐歌聲遶􅀞樓可惜登臨佳麗地羽儀湏去鳯池遊夜􅀨九月三十日􅀨聲如别秋無端滿階葉共白幾人頭􅀧滴侵寒夢蕭騷著淡愁漁歌聽不唱蓑濕棹廻舟方響數條秋水挂琅玕玉手丁當怕夜寒曲盡連敲三四下恐驚珠淚落金盤􅀅出關􅀫層􅄘驛却􅀉李諌議􅀌驛在重阻雲根掩柴扉數聲暮禽切萬壑秋意歸心馳碧泉澗目㫁青􅃈闈明日武關外夢魂勞逺飛使廻枉唐州崔司馬書兼􅀉四韻因和清晨候吏把酒來十載離憂得暫開癡叔去時還讀易仲容多興索衘盃人心計日殷勤望馬首隨雲早晚廻莫爲霜臺愁􅀊暮潜龍湏待一聲雷郡齋秋夜即事􅀉斛斯處士許秀才有客誰人肯夜過獨憐風景柰愁何邉鴻怨處迷霜乆庭􅀣空來見月多故國杳無千里信綵弦時伴一聲歌馳心秪待城烏暁㡬對虚簷望白河同趙二十二訪張明府郊居聮句陶潜官罷酒缾空門掩楊花一夜風牧古調詩吟山色裏無絃琴在月明中嘏逺簷髙􅀣冝幽鳥出岫孤雲逐晚虹牧别後東籬數枝菊不知閑醉與誰同嘏早春題眞上人院生天寳􅀄清羸已近百年身古寺風煙又一春寰海自成戎馬地唯師曽是太平人對花微疾不飲呈坐中諸公花前雖病亦提壷數調持觴興有無盡日臨風羡人醉雪香空伴白髭􅂡酬王秀才桃花園見􅀉桃滿西園淑景催㡬多紅􅃩淺深開此花不逐溪流出􅀳客無因入洞來走筆送杜十三歸京煙鴻上漢聲聲逺逸􅂹㝷雲歩歩髙應􅀏内兄年六十郡城閑坐飬霜毛送王十至褒中因􅀉尚書闕下經年别人間兩地情壇􅂣新漢􅀅煙月古隋城鴈去梁山逺雲髙楚岫明君家荷藕好緘恨􅀉遥程後池泛舟送王十相送西郊暮景和青蒼竹外遶寒波爲君蘸甲十分飲應見離心一倍多重送王十分􅃑還應立馬看向來離思始知難鴈飛不見行塵滅景下山遥極目寒洛陽秋夕泠泠寒水帶霜風更在天橋夜景中清禁漏閑煙􅀣寂月輪移在上陽宫贈獵􅀐巳落􅀟鵰血尚新鳴鞭走馬又翻身慿君莫射南來鴈恐有家書􅀉逺人懷吳中馮秀才長洲苑外草蕭蕭却筭遊程􅀊月遥唯有别時今不忘暮煙秋􅀨過楓橋􅀉東塔僧􅀄月微明漏白煙碧松梢外挂青天西風靜起傳深業應送愁吟入夜蟬秋夕紅燭秋光冷􅀞屏輕羅小扇撲流螢􅁋階夜色凉如水坐看牽牛織女星瑶瑟玉仙瑶瑟夜􅃢􅃢月過樓西桂燭殘風景人間不如此動揺湘水徹明寒送故人歸山三清洞裏無端别又拂塵衣欲卧雲看著挂冠迷處所北山蘿月在移文聞角暁樓煙檻出雲霄景下林塘巳寂寥城角爲秋悲更逺護霜雲破海天遥押兵甲發谷口􅀉諸公曉澗青青桂色􅀌楚人隨玉上天衢水辭谷口山寒少今日風頭校暖無和令狐侍御賞蕙草㝷常詩思巧如春又喜幽亭蕙草新本是馨香比君子遶欄今更爲何人偶題道在人間或可傳小還輕變巳多年今來海上昇髙望不到􅅾萊不是仙三川驛伏覧座主舎人留題舊跡依然巳十秋雪山當面照銀鈎懷恩淚盡霜天曉一片餘霞映驛樓陜州醉贈裴四同年凄風洛下同覊思遟日棠隂得醉歌自􅀏與君三歳别頭銜依舊􅁂􅁝多破鏡佳人失手鏡􅀄分何日團圎再㑹君今朝萬里秋風起山北山南一片雲長安雪後秦陵漢􅁐參差雪北闕南山次第春車馬滿城原上去豈知惆悵有閑人華清宫零葉飜紅萬樹霜玉蓮開蘂暖泉香行雲不下朝元閣一曲淋鈴淚數行冬日題智門寺北樓滿懷多少是恩酬未見功名巳白頭不爲㝷山試筋力豈能寒上背雲樓别王十後遣京使累路附書重􅀜曉度宿雲寒羸馬縁知歩歩難此信的應中路見亂山何處拆書看許秀才至辱李蘄州絶句問斷酒之情因􅀉有客南來話所思故人遥枉醉中詩暫因微疾湏防酒不是歡情减舊時送張判官歸兼謁鄂州大夫處士聞名早遊秦獻䟽廻腹中書萬卷身外酒千盃江􅀨春波闊園林客夢催今君拜旌㦸凛凛近霜臺􅀫長慶寺南行歩歩逺浮塵更近青山昨夜鄰髙鐸數聲秋撼玉霽河千里暁横銀紅渠影落前池淨緑稻香來野逕頻終日官閑無一事不妨長醉是游人望少華身隨白日看􅀅老心與青雲自有期今對晴􅄘無十里世縁多累暗生悲文字波中去不還物情􅀄與是非閑時名竟是無端事羞對􅂕山道愛山眼看雲鶴不相隨何看塵中事作爲好伴羽人深洞去月前秋􅃪玉參差登澧州驛樓􅀉京兆韋尹尹曽典此郡一話涔陽舊使君郡人廻首望青雲政聲長與江聲在自到津樓日夜聞長安晴望翠屏山對鳯城開碧落揺光霽後來迴識六龍廵幸處飛煙閑繞望春臺歳日朝迴口號星河猶在整朝衣逺望天門再拜歸􅀏向春風初五十敢言知命且知非驌驦駿瑶池罷游宴良樂委塵沙遭遇不遭遇鹽車與鼓車龍丘途中二首漢苑殘花别吴江盛夏來唯看萬樹合不見一枝開水色饒湘浦灘聲怯建溪淚流迴月上可得更猿啼宫人􅊘盡是離宫院中女苑墻城外􅊘纍纍少年入内教歌舞不識君王到老時􅀉浙西李判官燕臺上客意何如四五年來漸漸踈直道莫抛男子業遭時還與故人書青雲滿眼應驕我白髮渾頭少恨渠唯念賢哉崔大讓可憐無事不歌魚􅀉杜子不識長楊事北胡且教紅䄂醉來扶狂風烈熖雖千尺豁得平生俊氣無武牢關吏應相􅀏箇底年年徃復來若問使君何處去爲言相憶首長廻盧秀才􅀅出王屋髙歩名􅂣江南相逢贈别王屋山人有古文欲攀青桂弄氛氲􅀅擕徤筆干明主莫向山壇問白雲馳逐寜教爭䖏讓是非偏忌衆中分交遊話我慿君道除却鱸魚更不聞送劉三復郎中赴闕横溪辭寂寞金馬去追逰好是鴛鴦佀正逢霄漢秋玉珂聲􅃈􅃈錦帳夢悠悠㣲􅀏知今是因風謝釣舟羊欄浦夜陪宴會弋檻營中夜未央􅀨沾雲惹侍襄王毬來香䄂依稀暖酒凸觥心汎灔光紅絃髙􅂃聲聲急珠唱鋪圓裊裊長自比諸生最無取不知何䖏亦升堂送杜顗赴潤州幕少年才俊赴知音丞相門欄不覺深直道事人男子業異郷加飯弟兄心還須整理韋弦佩莫獨矜誇玳瑁簮若去上元懷古去謝安墳下與沉吟有感宛溪垂栁最長枝曽􅀍春風盡日吹不堪攀折猶堪看陌上少年来自遟書懷􅀉盧州謝山南畔州風物最宜秋太守懸金印佳人敞􅀞樓凝缸暗醉夕殘月上汀州可惜當年􅁂朱門不得遊賀崔大夫崔正字内舉無慙古所難燕䑓遥想拂塵冠登龍有路水不峻一鴈背飛天正寒别夜酒餘紅燭短映山帆去碧霞殘謝公樓下潺湲響離恨詩情添㡬般江南送左師江南爲客正悲秋更送吾師古渡頭惆悵不同塵土别水雲蹤跡去悠悠寢夜蛩唱如波咽更深似水寒露華驚弊􅄄燈影挂塵冠故國􅀄離夢前溪更下灘紛紛毫髪事多少宦遊難十九兄郡樓有宴病不赴十二層慺敞畫簷連雲歌盡草纎纎空堂病怯階前月燕子嗔垂一行簾愁聚散竟無形廻腸自結成古今留不得離别又潜生䧏虜􅀅軍思窮秋逺客情何人更憔悴落第泣秦京隋苑一云定子牛相小青紅霞一抺廣陵春定子當筵睡臉新却􅀏丘墟隋煬帝破家亡國爲誰人芭蕉芭蕉爲􅀨移故向䆫前種憐渠􅀧滴聲留得歸郷夢夢逺莫歸郷􅁴來一翻動汴人舟行荅張祐千萬長河共使船􅃪君詩句倍滄然春風野岸名花發一道㠶檣畫栁煙牧陪昭應盧郎中在江西宣州佐今吏部沈公幕罷府周歳公宰昭應牧在淮南縻職叙舊成二十韻用以􅄬􅀉燕鴈下楊州凉風栁陌愁可憐千里夢還是一年秋宛水環朱檻章江敞碧流謬陪吾益友祗事我賢侯印組縈光馬鋒鋩看解牛井閭安樂易冠蓋愜依􅄬政簡稀開閤功成每運籌送春經野塢遲日上高樓玉裂歌聲㫁霞飄舞帶收􅅺情斜拂印别臉小低頭日晩花枝爛釭疑粉彩稠未曾孤酩酊剰肯􅃗淹留重德俄徴寵諸生苦宦遊分途之絶國灑淚拜行輈聚散眞漂梗光隂極轉郵銘心徒歴歴屈指盡悠悠君作烹鮮用誰膺仄席求卷懷能憤悱卒歳且優游去矣時難遇沽哉價莫酬滿枝爲皷吹􅂨甲避戈矛隋帝宮荒草秦王土一丘相逢好大􅀏除此揔雲浮樊川外集
