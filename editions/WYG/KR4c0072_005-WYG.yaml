body:
  text: 罪言國家大事牧不當言言之實一作實言之有罪故作罪言生人常病兵兵祖於山東𦙍於天下不得山東兵不可死山東之地禹畫九土曰冀州野一無野字舜以其分太大離為幽州并州程其水土與河南等常重十一二故其人沉鷙多材力重許可能辛苦自魏晉已下𦙍浮羡淫工機纎雜意態百出俗益蕩蕩一作卑弊人益脆弱唯山東敦五種本兵矢他不能蕩而自若也復産健馬下者日馳二百里所以兵常甲天下冀州以其恃强不循理冀其必破弱雖已破冀其復强大也并州力足以并吞也幽州幽隂慘殺也故聖人因其風俗以為之名黃帝時蚩尤為兵階阪泉在今媯川縣自後帝王多居其地豈尚其俗都之邪自周劣齊霸不一世晉文常傭役諸侯至秦萃銳三晉經六世乃能得韓遂折天下脊復得趙因拾取諸國秦末韓信聨齊有之故蒯通知漢楚輕重在信光武始於上谷成於鄗魏武舉官渡三分天下有其二晉亂胡作至宋武號為英雄得蜀得闗中盡得河南地十分天下有八然不能使一人渡河以窺胡至于高齊荒蕩宇文取得隋文因以滅陳五百年間天下乃一家隋文非宋武敵也是宋不得山東隋得山東故隋為王宋為霸由此言之山東王者不得不可為王霸者不得不可為霸猾賊得之是以致天下不安國家天寳末燕盗徐起出入成皋函潼間若涉無人地郭李輩常以兵五十萬不能過鄴自爾一百餘城天下力盡不得尺寸人望之若回鶻吐蕃義無有敢窺者國家因之畦河修障戍塞其街蹊齊魯梁蔡被其風流因亦為冦以裏拓表以表撐裏混澒迴轉顛倒橫斜未嘗五年間不戰生人日頓委四夷日猖熾天子因之幸陜幸漢中焦焦然七十餘年矣嗚呼運遭孝武澣衣一肉不畋不樂自卑冗中拔將取相凡十三年乃能盡得河南山西地洗削更革罔不順適唯山東不服亦再攻之皆不利以返豈天使生人未至於帖泰耶豈其人謀未至耶何其艱哉何其艱哉今日天子聖明超出古昔志於平理若欲悉使生人無事其要在於去兵不得山東兵不可去是兵殺人無有已也今者上策莫如自治何者當貞元時山東有燕趙魏叛河南有齊蔡叛梁徐陳汝白馬津盟津襄鄧安黃壽春皆戍厚兵凡此十餘所纔足自䕶治所資不輟一人以他使遂使我力解勢弛熟視不軌者無可奈何階此蜀亦叛吳亦叛其他未叛者皆迎時上下不可保信自元和初至今一十九年間得蜀得吳得蔡得齊凡收郡縣二百餘城所未能得唯山東百城耳土地人户財物甲兵校之往年豈不綽綽乎亦足自以為治也法令制度品式條章果自治乎賢才奸惡捜選置捨果自治乎障戍鎮守干戈車馬果自治乎井閭阡陌倉廩財賦能自治乎如不果自治是助敵為㓂環土三千里植根七十年復有天下隂為之助則安可以取故曰上䇿莫如自治中策莫如取魏魏於山東最重於河南亦最重何者魏在山東以其能遮趙也既不可越魏以取趙固不可越趙以取燕是燕趙常取重於魏魏常操燕趙之性命也故魏在山東最重黎陽距白馬津三十里新鄉距盟津一百五十里黎陽新鄉並屬衛州陴壘相望朝駕暮戰是二津虜能潰一則馳入成皋不數日間故魏於河南亦最重今者願以近事明之元和中纂天下兵誅蔡誅齊頓之五年無山東憂者以能得魏也田𢎞正來降昨日誅滄頓之三年無山東憂者亦以能得魏也史憲誠來降長慶初誅趙一日五諸侯兵四出潰解以失魏也田布死昨日誅趙罷如長慶時亦以失魏也李聽反故河南山東之輕重常懸在魏明白可知也非魏强大能致如此地形使然也故曰取魏為中策最下策為浪戰不計地勢不審攻守是也兵多粟多敺人使戰者便於守兵少粟少人不敺自戰者便於戰故我常失於戰敵常困於守山東之人叛且三五世矣今之後生所見言語舉止無非叛也以為事理正當如此沉酣入骨髓無以為非者指示順向詆侵族臠語曰叛去酋酋起矣至於有圍急食盡餤屍以戰以此為俗俗豈可與决一勝一負哉自十餘年來凡三收趙食盡且下堯山敗郗尚書趙復振下博敗杜叔良趙復振館陶敗李聽趙復振故曰不計地勢不審攻守為浪戰最下策也原十六衛國家始踵隋制開十六衛將軍總三十員屬官總一百二十八員署宇分部夾峙禁省厥初厯今未始替削然自今觀之設官言無謂者其十六衛乎本原事跡其實天下之大命也始自貞觀中既武遂文内以十六衛畜養戎一作武臣褒公鄂公之徒並為諸衛將軍外開折衝果毅府五百七十四以儲兵伍或有不幸方二三千里為冦土數千百萬人為冦兵蠻夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一暴勃消削單車一符將命四走莫不信順此時戎臣當提兵居内當其居内也官為將軍綬有朱紫章有金銀千百騎趨奉朝謁第觀車馬歌兒舞女念功賞勞出於曲賜所部之兵散舍諸府上府不越一千二百人五百七十四府凡有四十萬人三時耕稼襏芳味切襫音釋耞音加耒一時治武騎劍兵矢裨衛以課父兄相言不得業他籍藏將府伍散田畝力解勢破人人自愛雖有蚩尤為師帥亦不可使為亂耳及其當居外也縁部之兵被檄乃來受命於朝不見妻子斧鉞在前爵賞在後以首爭首以力搏力飄暴交捽豈暇異畧雖有蚩尤為師帥亦無能為叛也自貞觀至于開元末百五十年間戎臣兵伍未始逆簒此聖人所能柄統輕重制障表裏聖筭神術也至于開元末愚儒奏章曰天下文勝矣請罷府兵詔曰可武夫奏章曰天下力強矣請搏四夷詔曰可於是府兵内剷邊兵外作戎臣兵伍湍奔矢往内無一人矣起遼走蜀繚絡萬里事五强㓂奚契丹吐蕃雲南石國十餘年中亡百萬人尾大中乾成燕偏重去聲而天下掀然根萌燼燃七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈐鍵哉然為國者不能無也居外則叛韓鯨七國近者禄山僕固是也居内則簒卓莾曹馬已下是也使外不叛内不簒兵不離伍無自焚之患將保頸領無烹狗之諭古今已還法術最長其置府立衛乎近代以來於其將也弊復為甚人囂曰廷詔命將矣名出視之率市兒輩葢多賂金玉負倚幽隂折劵交貨所能也絶不識父母禮義之教復無慷慨感㮣之氣百城千里一朝得之其强傑愎勃者則撓削法制不使縛已斬族忠良不使違已力壹勢便罔不為寇其隂泥去聲巧狡者亦能家筭口歛委於邪倖由卿市公去郡得都四履所治指為别館或一夫不幸而壽則戞割生人略匝天下是以天下每每兵亂湧溢齊人乾耗鄉黨風俗淫窳衰薄敎化恩澤壅抑不下召來災沴被及牛馬嗟乎自愚而知之人其盡知之乎且武者任誅如天時有秋文者任治如天時有春是天不能倒春秋是豪傑不能摠文武是此輩受鉞誅暴乎曰於是乎在某人行教乎曰於是乎在欲禍蠧不作者未之有也伏惟文皇帝十六衛之旨誰復而原其實天下之大命也故作原十六衛戰論并序兵非脆也穀非殫也而戰必挫北是曰不循其道也故作戰論焉河北視天下猶珠璣也天下視河北猶四支也珠璣苟無豈不活身四支苟去吾不知其為人何以言之夫河北者俗儉風渾淫巧不生朴毅堅强果於戰耕名城堅壘峉音額嶭五結切相貫高山大河盤互交鏁加以土息健馬便於馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶大農之家不待珠璣然後以為富也天下無河北則不可河北既虜則精甲銳卒利刀良弓健馬無有也卒蔟忽反然夷狄驚四邊摩封疆出表裏吾何以禦之是天下一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝是六郡之師嚴飾䕶疆不可他使是天下二支兵去矣六郡之師厥數三億低首仰給橫拱不為則㳂淮已北循河之南東盡海西叩洛經數千里赤地盡取才能應費是天下三支財去矣咸陽西北邊騎雲屯吐蕃囘紇逼于帝京周秦單師不能排闢於是盡剷吳越荆楚之饒以啖兵戍是天下四支財去矣乃使吾用度不周徴徭不常無以膏齊民無以接四夷禮樂刑政不暇脩治品式條章不能僃具是天下四支盡解頭腹兀然而已焉有人解四支其自以能乆為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿寄大臣偷處榮逸為家治具戰士離落兵甲鈍弊車馬刓弱而未嘗為之簡帖整飭天下雜然盗發則疾敺疾戰此宿敗之師也何為而不北乎是不蒐練之過者其敗一也夫百人荷戈仰食縣官則挾千夫之名大將小裨操其餘贏以虜壯為幸以師老為娛是執兵者常少糜食者常多築壘未乾公囊已虚此不責實科食之過其敗二也夫戰輙小勝則張皇其功奔走獻狀以邀上賞或一日再賜一月累封凱還未歌書品已崇爵命極矣田宫廣矣金繒溢矣子孫官矣焉肯捜竒外死勤於戎矣此賞厚之過其敗三也夫多喪兵士顛翻大都則跳身而來刺邦而去迴視刀鋸氣色甚安一嵗未更旋已立於壇墀之上矣此輕罰之過其敗四也夫大將將兵柄不得專恩臣詰責迭來揮之至如堂然將陣殷然將鼓一則曰必為偃月一則曰必為魚麗三軍萬夫環旋翔佯恍駭之間虜騎乘之遂取吾之鼓旗此不專任責成之過其敗五也元和時天子急太平嚴約以律下常團兵數十萬以誅蔡天下乾耗四嵗然後能取此葢五敗不去也長慶初盗子孫悉來走命是内地無事天子寛禁厚恩與人休息未幾而燕趙甚亂引師起將五敗益甚登壇注意之臣死竄且不暇復焉能加威於反虜哉今者誠欲調持干戈洒掃垢汙以為萬世安而乃踵前非踵前非是不可為也古之政有不善士傳言庶人謗發是論者亦且將書于謗木傳于士大夫非偶而已守論往年兩河盗起屠囚大臣刼戮二千石國家不議誅乃束兵自守反脩大厯貞元故事而行姑息之政是使逆輩益橫去聲終倡患禍故作守論焉厥今天下何如哉干戈朽鈇鉞鈍含𢎞混貸煦育逆孽殆為故常而執事大人曽不厯筭周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇頓顛傾而後為之支計乎且天下幾里列郡幾所而自河已北蟠城數百金堅蔓織角奔為寇伺吾人之顦顇天時之不利則將與其朋伍羅絡郡國將駭亂吾民於掌股之上耳今者及吾之壯不圖擒取而乃偷處恬逸苐苐相付以為後世子孫背脅疽根此復何也今之議者咸曰夫倔强之徒吾以良將勁兵以為銜策高位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大厯貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越録受之覲聘不來几杖扶之逆息虜𦙍皇子嬪之裝縁采飾無不僃之是以地益廣兵益强僣擬益甚侈心益昌於是土田名器分劃殆盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵西畧以飽其志者也是以趙魏燕齊卓起大倡梁蔡吳蜀躡而和之其餘混傾軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者恵來不然周秦之郊幾為犯獵哉大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大厯貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也今者不知非此而反用以為經愚見為盗者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉論相吕公善相人言女吕后當大貴宜以配季季後為天子吕后復稱制天下王吕氏子弟悉以大國隋文帝相工來和輩數人亦言當為帝者後簒竊果得之誠相法之不謬矣吕氏自稱制通為后凡二十餘年間隋氏自簒至滅凡三十六年間男女族屬殺滅殆盡當秦末吕氏大族也周末楊氏為八柱國公侯相襲乆矣一旦以一女一男子偷竊位號不三二十年間壯老嬰兒皆不得其死不知一女子為吕氏之福邪為禍邪一男子為楊氏之禍邪為福邪得一時之貴滅百世之族彼知相法者當曰此必為吕氏楊氏之禍乃可為善相人矣今斷一指得四海凡人不欲為况以一女子一男子易一族哉余讀荀卿非相因感吕氏楊氏知卿為大儒矣樊川集巻二欽定四庫全書樊川集巻三唐杜牧撰
