body:
  text: 上宣州崔大夫書某再拜閣下以德行文章有位於明時如望江漢見其去之沓淼沉汪澶漫不知其所為終始也復自開幕府已來辟取當時之名士禮接待遇各盡其意後進絜絜以節業自持者無不願受閣下迴首一顧舒氣快意自以滿足今藩鎮之貴土地兵甲生殺與奪在一出口終身矜高與門下後進之士㩁得失去就於分寸銖黍間多是其人也獨閣下不自矜高不設壍壘曲垂情意以盡待士之禮然知後進絜絜以節義自持者願受閣下迴首一顧舒氣快意自以滿足此固然也非敢苟佞其辭以取媚也不知閣下俯仰延遇之去就幣帛篚筐之多少飲食獻酬之和樂各用何道閑夜永日三五相聚危言峻論知與不知莫不願盡心於閣下壽考福祿祝之無窮某雖不肖則亦千百間其一人數也鹿鳴宴羣臣詩曰既飲食之復實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣吉日詩曰宣王能慎微接下無不盡心以奉其上焉自古雖尊為天子未有不用此而能得多士盡心也未有不得多士之盡心而得樹功立業流於歌詩也况於諸侯哉夫子曰君子疾没世而名不稱司馬遷曰自古富貴其名磨滅不可勝記靜言思之令人感動激發當寐而寤在饑而飽伏希閣下濬之益深築之益高緘鐍之益固使天下之人異日奉閣下之德不替今日之為宰相長育人材興起教化國朝房杜姚宋不足過也某也於流輩無所知識承風望光徒有輸心効節之志今謹錄雜詩一巻獻上非敢用此求知盖欲導其志無以為先也往年應進士舉投獻筆語亦䝉函稱於時今十五年矣於頑懜中為之不知矣於其事能不有稍工不敢再錄新述恐煩尊重無任惶懼某再拜上池州李使君書景業足下僕與足下齒同而道不同足下性俊達堅明心正而氣和飾以温慎故處世顯明無罪悔僕之所稟濶畧疎易輕微而忽小然其天與其心知邪柔利已偷苟諛謟可以進取知之而不能行之非不能行之抑復見惡之不能忍一同坐與之交語故有知之者有怒之者怒不附已者怒不恬言柔舌道其盛美者怒守直道而違已者知之者皆齒少氣鋭讀書以賢才自許但見古人行事真當如此未得官職不覩形勢絜絜少輩之徒也怒僕者足以裂僕之腸折僕之脛知僕者不能持一飯與僕僕之不死已幸况為刺史聚骨肉妻子衣食有餘乃大幸也敢望其他然與足下之所受性固不得伍列齊立亦抵足下疆壠畦畔間耳故足下憐僕之厚僕仰足下之多在京城間家事人事終日促束不得日出所懷以自曉自然不敢以輩流間期足下也去歳乞假自江漢間歸京乃知足下出官之由勇於為義向者僕之期足下之心果為不謬私自喜賀足下果不負天所付與僕所期向二者所以為喜且自賀也幸甚幸甚夫子曰吾少也賤故多能鄙事復曰不試故藝聖人尚以少賤不試乃能多能有藝况他人哉僕與足下年未三十為諸侯幕府吏未四十為天子廷臣不為甚賤不為不試矣今者齒各甚壯為刺史各得小郡俱處僻左幸天下無事人安穀熟無兵期軍須逋負諍訴之勤足以為學自強自勉於未聞未見之間僕不足道雖能為學亦無所益如足下之才之時真可惜也向者所謂俊達堅明心正而氣和飾以温慎此才可惜也年四十為刺史得僻左小郡有衣食無為吏之苦此時之可惜也僕以為天資足下有異日名聲跡業光于前後正在今日可不勉之僕常念百代之下未必為不幸何者以其書具而事多也今之言者必曰使聖人微旨不傳乃鄭𤣥輩為注解之罪僕觀其所解釋明白完具雖聖人復生必挈置數子坐於游夏之位若使𤣥輩解釋不足為師要得聖人復生如周公夫子親授微旨然後為學是則聖人不生終不為學假使聖人復生即亦隨而猾之矣此則不學之徒好出大言欺亂常人耳自漢已降其有國者成敗廢興事業蹤跡一二億萬青黄白黒據實空有皆可圖畫考其來由裁其短長十得四五足以應當時之務矣不似古人窮天鑒𤣥躡於無蹤筭於忽微然後能為學也故曰生百代之下未必為不幸也夫子曰三人行必有我師焉此乃隨所見聞能不亡失而思念至也楚王問萍實對曰吾往年聞童謡而知之此乃以童子為師耳參之於上古復酌於見聞乃能為聖人也諸葛孔明曰諸公讀書乃欲為博士耳此乃葢滯於所見不知適變名為腐儒亦學者之一病僕自元和已來以至今日其所見聞名公才子之所論討典刑制度征伐叛亂考其當時參於前古能不忘失而思念亦可以為一家事業矣但隨見隨忘隨聞隨廢輕目重耳之過此亦學者之一病也如足下天與之性萬萬與僕相逺僕自知頑滯不能苦心為學假使能學之亦不能出而施之懇懇欲成足下之美異日既受足下之教於一官一局而無過失而已自古未有不學而能垂名於後代者足下勉之大江之南夏候鬱濕易生百疾足下氣俊胷臆間不以悁忿是非貯之邪氣不能侵慎防是晩多食大醉繼飲其他無所道某再拜投知已書夫子曰不怨天不尤人下學而上達知我者其天乎復曰知我者其春秋罪我者亦以春秋此聖人操心不顧世知人是非也柱厲叔事莒敖公莒敖公不知及莒敖公有難柱厲叔死之不知我則已反以死報之葢怨不知之深也豫讓謂趙襄子曰智伯以國士待我我以國士報之此乃烈士義夫有材感其知不顧其生也行無聖明之異材無尺寸之用泛泛然求知於人知則不能有所報不知則怒此乃衆人之心也聖賢義烈之士既不可到小生有異於衆人者審已切也審已之行審已之材皆不出衆人亦不求知於人已或有知之者則藏縮退避唯恐知人葢深自度無可以為報效也或有因緣他事不得已求知於人者苟不知未嘗退有懟言怨色形於妻子之前此乃比於衆人唯審已求知也太和二年小生應進士舉當其時先進之士以小生行可益進業可益修喧而譽之爭為知已者不啻二十人小生邇來十年江湖間時時以家事一抵京師事已即返嘗所謂喧而譽之為知已者多已顯貴未嘗一到其門何者自十年來行不益進業不益修中夜忖量自愧於心欲持何説復於知已之前為進拜之資乎黙黙藏縮苟免寒飢為幸耳昨李巡官至忽傳閣下旨意似知姓名或欲異日必錄在門下閣下為世之偉人鉅德小生一獲進謁一陪燕享則亦榮矣况欲異日終置之於榻席之上齒於數子之列乎無攀緣絲髮之因出特達倜儻之知小生自度宜為何才可以塞閣下之求宜為何道可以報閣下之德是以自承命已來審已愈切撫心獨驚忽忽思之而不自知其然也若䝉待之以衆人之地求之以衆人之才責之以衆人之報亦庶幾異日受約束指顧於簿書之間知無不為為不及私亦或能提筆伸紙作詠歌以發盛德止此而已其他望於古人責以不及非小生之所堪任伏恐閣下聽聞之過求取之異敢不特自發明導説其衷一開閣下視聽其他感激發憤懷愧思德臨紙汗發不知所裁某恐懼再拜答莊充書某白莊先輩足下凡為文以意為主氣為輔以辭彩章句為之兵衞未有主強盛而輔不飄逸者兵衞不華赫而莊整者四者高下圓折步驟隨主所指如鳥隨鳳魚隨龍師衆隨湯武騰天潜泉横裂天下無不如意苟意不先立止以文彩辭句繞前捧後是言愈多而理愈亂如入闤闠紛紛然莫知其誰暮散而已是以意全勝者辭愈朴而文愈髙意不勝者辭愈華而文愈鄙是意能遣辭辭不能成意大抵為文之旨如此觀足下所為文百餘篇實先意氣而後辭句慕古而尚仁義者苟為之不已資以學問則古作者不為難到今以某無可取欲命以為序承當厚意惕息不安復觀自古序其文旨皆後世宗師其人而為之詩書春秋左氏以降百家之説皆是也古者其身不遇於世寄志於言求言遇於後世也自兩漢已來富貴者千百自今觀之聲勢光明孰若馬遷相如賈誼劉向揚雄之徒斯人也豈求知於當世哉故親見揚子雲著書欲取覆醬瓿雄當其時亦未嘗自有誇目况今與足下並生今世欲序足下未已之文此固不可也苟有志古人不難到勉之而已某再拜上河陽李尚書書伏以三城所治兵精地要北鏁太行東塞黎陽左京河南指為重輕自艱難已來儒生成名立功者葢寡於前代是以壯健不學之徒不知儒術不識大體取其微效終敗大事不可一二悉數伏以尚書有才名德望知經義儒術加以儉克好立功名今横據要津重兵在手朝廷搢紳之士屈指延頸佇觀政能况聖主掀擢豪俊考校古今退朝之後急於觀書已築七關取隴城緝為郡縣今親誅虜收其土田取其良馬為耕戰之具西復涼州東取河朔平一天下不使不貢不覲之徒敢自專擅此實聖主之心事業已彰臣下明明無不知之伏自尚書樹立鍛錬教訓㨂拔法術尺寸取於古人若受指顧必立大功使天下後學之徒知成功立事非大儒知今古成敗者而不能為之復使儒生舒展胸臆得以誨導壯健不學之徒指蹤而使之令其心服正在今日某多病早衰志在耕釣得一二郡資其退休以活骨肉亦能作為歌詩以稱道盛德其餘息心亦已久矣下情日增瞻仰戀德之切某恐懼再拜上鹽鐵裴侍郎書伏以鹽鐵重務根本在於江淮今諸監院頗不得人皆以權勢干求固難悉議停替其於利病豈無中策某自池州睦州實見其弊葢以江淮自廢留後已來凡有寃人無處吿訴每州皆有土豪百姓情願把鹽每年納利名曰土鹽商如此之流兩稅之外州縣不敢差役自罷江淮留後已來破散將盡以監院多是誅求一年之中追呼無已至有身行不在須得父母妻兒錮身驅將得錢即放不二年内盡恐逃亡今譬於常州百姓有屈身在蘇州歸家未得便可以蘇州下狀論理披訴至如睦州百姓食臨平監鹽其土鹽商被臨平監追呼求取直是睦州刺史亦與作主不得非裹四千里糧直入城役使即須破散奔走更無他圖其間捜求胥徒針抽鏤取千計百校唯恐不多除非吞聲别無赴訴今有明長吏在上旁縣百里尚敢公為不法况諸監院皆是以貨得之恣為奸欺人無語路况土鹽商皆是州縣大戸言之根本實可痛心比初停罷留後衆皆以為除煩去冗不知其弊及於疲羸即是所利者至微所害者至大今若䝉侍郎改革前非於南省郎吏中擇一清慎依前使為江淮留後減其胥吏不必一如向前多置人數即自嶺南至於汴宋凡有寃人有可控吿奸贓之輩動而有畏數十州土鹽商寃至破減除江淮之太殘為侍郎之隂德以某愚見莫過於斯若問於鹽鐵吏即不欲江淮别有留後若有留後其間百事自能申狀諮呈安得財貨表裏計㑹分其權力言之可知伏惟俯察愚衷不賜罪責某再拜與汴州從事書汴州境内最弊最苦是牽船夫大寒虐暑窮人奔走斃踣不少某數年前赴官入京至襄邑縣見縣令李式年甚少有吏才條疏牽夫甚有道理云某當縣萬户已來都置一板簿每年輪檢自差欲有使來先行文帖尅期令至不㨂貧富職掌一切均同計一年之中一縣人户不著兩度夫役如有逺户不能來者即任納錢與於近河雇夫對面分付價直不令所由欺隱一縣之内稍似蘇息葢以承前但有使來即出帖差夫所由得帖富豪者終年閑坐貧下者終日牽船今即自以板簿在手輪流差遣雖有黠吏不能用情某每任刺史應是役大及竹木瓦塼工巧之類並自置板簿若要使役即自檢自差不下文帖付縣若下縣後縣令付案案司出帖分付里正一鄉只要兩夫事在一鄉徧著赤帖懷中藏却巡門掠斂一徧貧者即被差來若籍在手中巡次差遣不由里胥典正無因更能用情以此知襄邑李式之能可以惠及夫役更有良術即不敢知以某愚見且可救急因襄邑李生之績効知先輩思報幕府之深誠不覺亦及拙政以為證明豈敢自述今為治患於差役不平詩云或栖遲偃仰或王事鞅掌此葢不平之故長吏不置簿籍一一自檢即奸胥貪冒求取此最為甚某恐懼再拜樊川集巻十欽定四庫全書樊川集卷十一唐杜牧撰黄
