body:
  text: 上李太尉論北邊事啟某啟伏以聖主垂衣太尉當軸威德上顯和澤下流諸侯無異心百姓無怨氣星辰順靜日月光明天業益昌聖統無極既功成而理定實道尊而名垂今則未聞縱東山之遊樂後園之醉惕惕若不足兢兢而如無豈不以邊障尚驚殊虜未殄防其入冦猶須徵兵伏以回鶻種落人數非多校於突厥絶為小弱今者國破衆叛逃來漠南為羇旅之魂食草萊之實白髪驪騂之騎凋耗已無湩酪皮毳之資饑寒皆盡寄命瀚海藏跡隂山取之及時可以一戰今者度虜之計不出二者時去時來徊翔不決必有所在西戎已得要約伺其氣勢同為侵擾此其一也心膽破壞馬畜殘少且於美水薦草暖日廣川牧馬養習以俟強大此其二也今者徵中國之兵與之首尾久戍則有師老費財之憂深入則有大寒瘃墜之苦示戎狄之弱生奸傑之心今者不取恐貽後患敢以管見上干尊重自兩漢伐虜皆是秋冬不過百日驅中國之人入苦寒之地此時匈奴勁弓折膠重馬免乳畜肥草壯力全氣盛與之相校勝少敗多故匈奴云漢實大國也但其人不能辛苦爾此所謂避虛而擊實逃短而攻長至於後魏崔浩因見其理蠕蠕強盛屢犯北邊浩請討之曰蠕蠕恃其地逺自寛來久故夏則散衆放畜秋肥乃聚背寒向暄南來冦抄今出其慮表掩其不備大兵卒至必驚駭星分向塵奔走牡馬䕶牧牝馬戀駒驅馳難制不得水草未過數日則聚而困斃可一舉而滅矣武帝從之及軍入境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍撲討東西五千里南北三千里凡所俘虜及獲畜産彌漫山澤髙車因殺蠕蠕種類歸降者三十餘萬落虜遂散亂帝㳂弱水西行至涿邪山諸大將慮深入有伏兵勸帝停止不追浩先勸窮追之不從後聞涼州賈胡言若更前行三日則盡滅之矣帝深恨之以某所見今若以幽并突陣之騎酒泉教射之兵整飾誡誓仲夏潜發計隂山與涿邪之逺近十不一二校蠕蠕回鶻之強弱猶如虎鼠五月節氣在中夏則熱到隂山尚寒中國之兵足以施展行軍於枕席之上翫冦於掌股之中䡉轠懸瓶湯沃晛雪一舉無類必然之策今冰合防秋冰銷解戍行之已久虜為長然出其意外實為上策議者或云比取黠戞今討回鶻伏以黠戞起於别種超為可汗必是英傑天時必助賢材必用法令必明滅回鶻之後便是勍敵况示之以弱必為所輕今者四海九州同風共貫諸侯用命年穀豐熟可以瘞𤣥玉於常山孑遺人於河壠顧兹殊㓂豈遺子孫伏惟太尉相公文德素昭武功復著畫地而兵形盡見按璅而邊事無遺唯一指踪即可掃跡昔漢武帝之求賢也有上書不足採者輒報罷去未嘗罪之故能羈越臣胡大興禮樂今太尉與仁聖天子同德有志之士無不願死伏惟特寛狂狷不賜誅責生死榮荷無任感恩攀戀惶懼汗慄之至謹啟賀中書門下平澤潞啟某啟伏以上黨之地肘京洛而履蒲津倚太原而跨河朔戰國時張儀以為天下之脊建中日田悦名曰腹中之眼帶甲十萬籍土五州太行夷儀為其扄關健馬強弓為其羽翼自逆黨專有僅及一世頗聞教育實曰精強昨者凶豎專地之請初陳聖主整旅之詔將下中外逺邇皆疑難攻蜂蠆螗蜋頗亦自負伏惟相公上符神斷潜運廟謀仗宗社威靈驅風雲雷電掌上必取彀中難逃纔逾周星果梟逆首周公東征之役捷至三年憲皇淮夷之師尅聞四歲校虜冦之強弱曾不等倫考攻取之敗亡何至容易若非睿筭英略借筯深謀比之前修一何逺出自此鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆為壽域之人赤子秀睂共老止戈之代某謬分符竹實由恩知慶快懽抃之誠倍百常品不宣謹啟上白相公啟某啟伏惟相公上佐聖主獨專魁柄封殖良善修整紀綱練羣臣謹百職考功績覈名實大張公室盡閉私門盛德大功直筆實先於簡策清節細行祝史不愧於神明天下望之為準繩朝廷倚之為依據畢公克勤小物周公煥發大猷邴吉陋案吏於公庭袁安不錮人於聖代衛將軍有長揖之客張子孺無謝恩之人吉甫率由舊章魏相能明故事房杜不以求備取人不以已長格物姚梁公先有司修舊法下位各得言其志百司各得盡其才求於古人之賢皆集相公之德如以尺量刀解粉布墨畫小大銖參丸角尖缺各盡其分皆當其任是以庶人不議鄉校無言天下欣欣若更生者自此黄髮之老待哺之子不見兵戈不離抱撫清廟之祭四夷來助蒼生之願百志皆成顒顒萬方實懸斯望某逺守僻左無因起居但採風謠亦能歌詠無任攀戀激切之至謹啟上周相公啟某啟伏奉三月八日敕除尚書司勲員外郎史館修撰承命榮懼啟處無地伏以聖主順上帝之則率四海以仁神化風行家至日見古先哲王之德也有求必至有開必先是以傅吕得於夢卜申甫降於山嶽伏惟相公待主乃用為時而生當考室構厦之時膺督繩削墨之任賛傑俊遂賢良調隂陽提紀律類能而使度材受官常切如家之憂每懷撻市之恥是以朝廷禮樂天下清明人不凋傷神不怨悵萬物由道百度皆貞雖周獲仁人商得元哲夢卜降嶽之得豈能逾焉某樸􅈪之才糞朽之賤遭逢盛業三帶郡符自審事宜實以逾忝伏以睦州治所在萬山之中終日昏氛侵染衰病自量忝官已過不敢率然請吿唯念滿歳得保生還不意相公拔自汚泥昇於霄漢却收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返遊魂言於重恩無以過此雖買臣懷紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手校於榮忝無以為喻言念微生難酬殊造伏以相公自數載已來朝廷篤老四海俊賢皆因挈維盡在門館毗輔聖主巍為元勲自有明神以相百祿固唯賤末報效無門感激血誠涕淚迸溢無任攀戀懇欵之至謹啟上鄭相公啟某啟伏以相公自專魁柄一闡大猷鎮撫四夷訓導百吏無不信順皆有程品猶尚不遺微賤特降慰誨重叠滿幅榮耀闔門捧戴生光啟處無地聞於白屋之輩皆願殺身詢於黄耉之徒以為異事慰示天下長育人材魚頡鴻㝠之潜丘中島上之隱皆可以結戀隨指效用盡心接地際天日出月入盡得臣妾無不謳歌蒼生顒顒實有所望某一門骨肉皆受恩知效命之誠瀝血自誓無任攀戀感激懇悃之至謹狀上淮南李相公狀某啟伏以近日當州人吏往來及諸道賔客行過皆傳相公以淮海之地災旱累年仁憫之心憂念深切廣求人瘼大革土風䘏養疲羸抑挫豪猾備職者思勵其已業官者得用其能鰥寡孤惸飛沉動植仁煦必及惠愛無遺吏不敢欺法能必束上行下效家至户到閭里安泰史冊未聞竊以聖上倚注既深相公勲業愈重况兹異政即達宸聰伏料窮邊絶塞將議息兵宣室明庭必思舊德重秉鈞軸固在旬時某忝跡門牆不勝抃躍攀望棨㦸下情無任戀結之至謹狀上吏部髙尚書狀某啟人惟樸􅈪材實朽下三守僻左七換星霜拘攣莫伸抑鬱誰訴毎遇時移節換家逺身孤弔影自傷向隅獨泣將欲漁釣一壑栖遲一丘無易仕之田園有仰食之骨肉當道毎歎末路難循進退唯艱憤悱無吿今者大君繼統賢相秉鈞遺墜必舉髦雋並作伏惟尚書秩髙天爵德冠人倫為搢紳之紀綱作朝廷之標表凡遊門館莫非雋賢至於小人最為凡器頃者幸以屬郡祇事廉車奉約束而雖嚴滌昏䝉而無術實多􅄽闕毎賴恩容敢望尊嚴特自褒舉手示逺降羈魂震驚感激彷徨涕淚迸落便無跛倚如生羽翰全忘鼠循忽欲鳥舉雖闕下一召歲中四遷校其光榮不能踰越禮曰君子愛其死有以待也養其身有以為也是小人忘生殺身之地刳腸奉首之報今得之矣復何求焉江山絶域登臨已秋猿吟鳥思草衰木墜黎侯寓衛有式微之詩趙王遷房創山木之詠流落多戚今古同塵迴望門牆涕戀唯積起居末由無任血誠懇悃之至上刑部崔尚書狀某啟某比於流輩疎濶慵怠不知趨嚮唯好讀書多忘為文格卑十年為幕府吏每促束於簿書宴遊間刺史七年病弟孀妹百口之家經營衣食復有一州賦訟私以貧苦焦慮公以愚恐敗悔仍有嗜酒多睡厠於其間是數者相遭於多忘格卑之中書不得日讀文不得專心百不逮人所尚業復不能尺寸銖兩自強自進乃庸人輩也復何言哉今者欲求為贄於大君子門下尚可以為文而為其禮詩所謂有靦面目視人罔極者也謹敢繕冩所為文凡二十首伏地汗赧不知所云謹狀上安州崔相公啟某啟某比於流輩一不及人至於讀書為文日夜不倦凡諸所為亦未有以過人至於㑹昌三年八月中所獻相公長啟鋪陳功業稱校短長措於史記兩漢之間讀於文士才人之口與二子並無愧容伏恐機務殷繁不暇省覽今者竊敢再錄啟本重干尊嚴付於史官而不誣懸於後代而不泯其於取重豈在小人復敢別錄所為新舊文兩巻凡一十九首上陳視聽一希鐫琢重叠過越惶懼伏深伏惟照察謹啟薦韓乂啟昨日所啟言韓拾遺事非與韓求衣食救饑寒也御史亦豈為救饑寒之官乎中丞必曰大梁奏取韓以饑寒何不去夫幕吏乃古之陪臣以人焉北面雖布衣無恥之士亦宜訪其樂與不樂况有道之君子乎韓以旅寓洛中非不樂梁也不甘不吿之請耳韓及第後歸越中佐沈公江西宣城府罷唐扶中丞辟於閩中罷府歸路由建州妻與元晦同髙祖妹惡晦為人不省之及晦得越乃棄産避之居常州殷儼者仰韓之道自閩寄百縑遺之及門不開書緘而斥去之某比兩府同院但見其廉慎髙潔亦未知其道太和八年自淮南有事至越見韓君於境上三畆宅兩頃田樹蔬釣魚唯召名僧為侣餘力究易嬉嬉然無日不自得也未嘗及身名出處之語未嘗入公府造請與幕吏宴遊因此不為搢紳相所見禮蕭髙二連帥至即日造其廬詢以政事稱先人梓材有文學髙名没於越之府幕故不願復為越賔及髙至許下厚禮辟之其為人也貞潔芳茂非其人不與遊非其食不敢食蕭舍人考功崔員外是趍於韓交者某復趍於蕭崔二君子者即韓之去某其間不啻容數十人矣某安得知其賢而言之復不僣乎伏恐中丞謂韓求官以衣食干交朋者中丞初在憲府固宜慎選御史御史固非救饑寒之官某久承恩知但欲薦賢於盛時雖至淺陋亦知不可以交友饑寒求清秩以干大君子者伏慮未審誠懇故此具陳本末伏惟照察謹啟上知已文章啟某啟某少小好為文章伏以侍郎文師也是敢謹貢七篇以為視聽之汚伏以元和功德凡人盡當歌詠紀叙之故作燕將錄往年弔伐之道未甚得所故作罪言自艱難以來卒伍傭役輩多據兵為天子諸侯故作原十六衛諸侯或恃功不識古道以至于反側叛亂故作與劉司徒書處士之名即古之巢由伊吕輩近者往往自名之故作送薛處士序寶厯大起宫室廣聲色故作阿房宫賦有廬終南山下嘗有耕田著書志故作望故園賦雖未能深窺古人得與揖譲笑言亦或的的分其狀貌矣貞元四年來在大君子門下恭承指顧約束於政理簿書間永不執巻上都有舊第唯書萬巻終南山下有舊廬頗有水樹當以耒耜筆硯居其間及齒髮甚壯冀有成立他日捧持一遊門下為拜謁之先或希一奬今者所獻但有輕黷尊嚴之罪亦何所取伏希少假誅責生死幸甚謹啟獻詩啟某啟某苦心為詩本求髙絶不務竒麗不涉習俗不今不古處於中間既無其才徒有其竒篇成在紙多自焚之今謹錄一百五十篇編為一軸封留獻上握風捕影鑄木鏤冰敢求恩知但希鐫琢冒黷尊重下情無任惶懼謹啟薦王寧啟前渭南縣令王寧前件官實有吏才稱於衆口年少強力一也遇事必能裁割二也既藴智能無頭角誇誕三也廉直可保四也處於驕將内臣之間必能和同五也今者邊將生事雜虜起戎不憂兵甲唯在饋運某過承恩奬輒敢薦才伏惟取舍之間特賜恕察謹啟上宰相求湖州第一啟某啟人有愛某者言於某曰吏部員外郎例不為郡子不可求假使已求慎勿堅懇至于再三答曰某雖不學按六典令式及諸故事多無此例國史復無賢相名卿懸之以為格言此乃急於進趨之徒自為其説若以言例貞元初故相國盧公邁由吏部員外郎出為滁州近者澶王傅李疑為鹽鐵使江淮留後豈曰無例人曰盧事太逺李為擢用此不足徵某曰不知今者視之古事在書取為今證逺自三代兩漢近至隋氏國初尚可援引况前十五年名相故事反不足為例乎况盧公邁止以骨肉寒餓來守滁陽非如某以親弟廢痼寒餓仍之是盧公有一某有二與盧公所切復為不同仲尼曰雍也可使南面今刺史古之南面諸侯行天子教化刑罰者江淮鹽鐵留後求利小臣校量輕重與刺史相懸求利小臣乃可吏部員外郎為之十萬户州天下根本之地曰吏部員外郎不可為其刺史即是本末重輕顛倒乖戾莫過於此某弟顗世胄子孫二十六一舉進士及第嘗為上裴相公書遒壯温潤詞理傑逸賈生司馬遷能為之非班固劉向輩亹亹之詞流於後輩人皆藏之朱崖李太尉迫以世舊取為浙西團練使巡官李太尉貴驕多過凡有毫髮顗必疏而言之後謫袁州於倉惶中言於親吏曹居實曰如杜巡官愛我之言若門下人盡能出之吾無今日李太尉在袁州顗客居淮南牛公欲辟為吏顗謝曰荀爽為李膺御以此顯名今受命為幕府下執事御李膺矣然李公困謫逺地未願仕宦牛公嘆美之聰明雋傑非尋常人也某自省事已來未聞有後進名士喪明廢棄窮居海上如顗比者今有一兄仰以為命復不得一郡以飽其衣食盡其醫藥非今日海内無也言於所傳聞亦未有也自古言喜莫若虢國太子以其死而復生言懇莫若申包胥求救於秦七日七夜哭聲不絶某今懇如包胥但未哭爾若䝉恩憫特遂血懇其喜也不下虢太子詞語煩碎頻干尊重足及軒闥神驚汗流不勝憂恐懇悃之至謹啟上宰相求湖州第二啟某啟某幼孤貧安仁舊第置於開元末某有屋三十間去元和末酬償息錢為他人有因此移去八年中凡十徙其居奴婢寒餓衰老者死少壯者當面逃去不能呵制有一豎戀戀憫歎挈百巻書隨而養之奔走困苦無所容歸死延福私廟支拄欹壞而處之長兄以驢遊丐于親舊某與弟顗食野蒿藿寒無夜燭黙所記者凡三周歲遭遇知已各及第得官文宗皇帝改號初年某為御史分察東都顗為鎻海軍幕府吏至二年間顗疾眼暗無所覩故殿中侍御史韋楚老曰同州有眼醫石公集劍南少尹姜沔喪明親見石生針之不一刻而愈其神醫也某迎石生至洛吿滿百日與石生俱東下見病弟于揚州禪智寺石曰是狀也腦積毒熱脂融流下葢塞瞳子名曰内障法以針旁入白睛穴上斜撥去之如蠟塞管蠟去管明然今未可也後一周歲脂當老硬如白玉色始可攻之某世攻此疾自祖及父某所愈者不下二百人此不足憂其年秋末某載病弟與石生自揚州南渡入宣州幕至三年冬某除補闕石生自曰明年春眼可針矣視童子中脂色玉白果符初言堂兄慥守潯陽泝流不逺刺史之力也復可以飽石生所欲令其盡心此即家也京中無一畆田豈可同歸遂如潯陽四月二日某於潯陽北渡赴官與弟顗決手哭曰我家世德汝復無罪其疾也豈遂痼乎然有石生慎無自撓其年四月石生施針九月再施針俱不效五年冬某為膳部員外郎乞假往潯陽取顗西歸顗固曰歸不可議俟兄慥所之而隨之㑹昌元年四月兄慥自江守蘄某與顗同舟至蘄某其年七月即歸京師明年七月出守黄州在京時詣今虢州庾使君問庾使君眼狀庾云同州有二眼醫石公集是一也復有周師達者即石之姑子所得當同周老石少有術甚妙似石不及某常病内障愈于周手豈少老間工拙有異某至黄州以重幣卑詞致周至蘄周見弟眼曰嗟乎眼有赤脉凡内障脂凝有赤脉綴之者針撥不能去赤脉赤脉不除針不可施除赤脉必有良藥某未知之是石生業淺不達此理妄再施針周不針而去時西川相國兄始鎮揚州弟兄謀曰揚州六郡為天下通衢世稱異人術士多遊其間今去值有勢力可為久安之計冀有所遇其年秋顗遂東下因家揚州與顗一相見別八年矣坐一室中不復有再生意住三十日而西臨岐與決曰此行也必祈大郡東來謀汝醫藥衣食庶幾如志近聞九疑山南有隱士綦母𢎞者人言異人能愈異疾忠州豊都縣有仙都觀後漢時仙人隂長生於此白日昇天今聞道士龔法義年逾八十精嚴其法人之所謂有前世負累今世還以痼疾者奏章于上帝能為解之刺史之力二人或可致是以去歲閏十一月十四日輒獻長啟乞守錢塘葢以私懇有素非敢率然言念病弟喪明坐廢十五年矣但能識某聲音不復知某髮已半白顔面衰改是某今生可以見顗而顗不能復見某矣此天也無可奈何某能見顗而不得去此豈天乎而懇在相公若小人微懇終不能上動相公相公恩憫終不下及小人是日月下親兄弟終無相見期况去歲淮南小卑衣食益困目無所見復困於衣食即海内言窮苦人無如顗者今敢以情事再書懇迫上干尊重伏料仁者必為憫惻然某早衰多病今春耳聾積四十日四月復落一牙耳聾牙落年七八十人將謝之候也今未五十而有七八十人將謝之候葢人生受氣堅強脆弱品第各異也堅強者七八十而衰脆弱者四五十而衰其不同也亦與草木中蒲柳松栢同也某今生四十八矣自今年來非唯耳聾牙落兼以意氣錯寞在羣衆懽笑之中常如登髙四望但見莽蒼大野荒墟廢壠悵望寂黙不能自解此無他也氣衰而志散真老人態也自省人事已來見親舊交遊年未五十尚壯健而死者衆矣况某早衰敢望六七十而後死乎願未死前一見病弟異人術士求其所未求以甘其心厚其衣食之地某若先死使病弟無所不足死而有知不恨死早湖州三歲可遂此心伏惟仁憫念病弟望某東來之心察某欲見病弟之志一加哀憐特遂血懇披剔肝膽重此吿訴當盛暑時敢以私事及政事堂啟干丞相治其罪可也伏紙流涕俯俟嚴命不勝憂惶激切之至謹啟上宰相求湖州第三啟某啟某去歲閏十一月十四日輒書微懇列在長啟干黷尊重乞守錢塘以便家事自嘆精誠不能上動相公不遂私便伏以病弟孀妹因緣事故寓居淮南京中無業今者不復西歸遂於淮南客矣病孤之家假使旁有強近救接庇借歲供衣月供食日問其所欠闕尚猶戚戚多感無樂生意况乎為客於大藩喧囂雜沓之中無俸祿之氣勢食不繼月用不給日閉門於荒僻之地取容於里胥遊徼之輩部曲臧獲可以氣凌鼠侵又不能制止所可仰以為命者在三千里外一郎吏爾復有衣食生生之所須悉多欠闕取其安活而無歎吒悲恨不可得也去歲伏䝉恩念出於私曲語今青州鄭常侍云更與一官必任東去某承受仁㫖不敢不重以錢塘更塵視聽今自勲曹擢為廢置在某更授一官已榮遇矣在相公必任東去之言鏘然在耳近者累得書吿以羇旅困乏聞於他人可為酸鼻况於某心豈易排遣今年七月湖州月滿敢輒重書血誠再干尊重伏希憐憫特賜比擬某伏念骨肉悉皆早衰多病常不敢以壽考自期今更得錢三百萬資弟妹衣食之地假使身死死亦無恨湖州三考可遂此心湖州名郡也私誠難遂也不遇知已豈得如志瀝血披肝伏紙迸淚伏希殊造或賜濟活下情無任懇悃惶懼之至謹啟上宰相求杭州啟某啟某於京中唯安仁舊第三十間支屋而已長兄慥罷三原縣令閑居京城弟顗一舉進士及第有文章時名不幸得痼疾坐廢十三年矣今與李氏孀妹寓居淮南並仰某微官以為糇命某前任刺史七年給弟妹衣食有餘兼及長兄亦救不足是某一身作刺史一家骨肉四處安活自去年八月時䝉奬擢授以名曹郎官史氏重職七年棄逐再復官榮歸還故里重見親戚言於鄙誠已滿素志自去年十二月至京以舊第無屋與長兄異居今秋已來弟妹頻以寒餒來吿某一院家累亦四十口狗為朱馬緼作由袍其於妻兒固宜窮餓是作刺史則一家骨肉四處皆泰為京官則一家骨肉四處皆困謀於知友曰杭州大郡今月滿可求欲干吿吾相以活家命以為如何皆曰子七年三郡今始歸無不感涕伏以相公上佐聖主蔚為元勲恩隨風翔德與氣游唯一物之微四海之大鎔造所及罔不得宜伏念庫部家兄承一顧之恩二紀不替伏恐機務繁重不時記憶心迫情切輒敢重干尊嚴戰汗憂惶伏地待罪謹啟為堂兄慥求澧州啟某啟庫部家兄昨者特䝉奬拔却忝班行實以聽聞稍難不敢更求榮進今在郢州溳口草市絶俸已是累年孤外生及姪女堪嫁者三人仰食待衣者不啻百口脱粟蒿藿纔及一飡伏䝉仁恩頻賜顧問必許援拯授以涔陽活於闔門缺樊川集巻十三欽定四庫全書樊川集巻十四唐杜牧撰
