body:
  text: 王釗除皇城留守制勅銀青光禄大夫檢校刑部尚書前兼左金吾衛大將軍御史大夫充左街使太原郡開國公食邑二千户王釗常侍文陛召見武臺願以五千獨當一隊思長策久安之術避必戰敢死之虜頗嗤免胄獨能全師洎繁纓趨朝執金入侍夷險一貫忠勞兩兼子尾之疾雖平郤克之步尚蹇官崇環衛職實司武入座副相不失舊榮且務優安勉於遵養可檢校刑部尚書兼右領軍衛上將軍御史大夫充大内皇城留守散官如故王知信除左衛將軍史寰除右監門衛將軍等制勅昭武軍校尉前守右驍衛將軍上柱國賜緋魚袋王知信等古人之為理也不以一𤯝而掩大功克廣紹子文之宗霍陽繼博陸之後知信烈祖貝兵之戰可庇十代豈止曾孫寰父伯仲亦效忠懇提挈全魏歸於朝廷今者寵以將軍旌其舊徳豈惟獨舉賞延之典亦欲使列士諸將自為孫謀彛鎬明誼入仕巳久皆無悔吝故有序遷臨封逺邦蔡亳兵部分憂佐理無忘謹亷可依前件張直方授左驍衛將軍制勅朕據南面之尊制一代之命先講百官之法後行四方之政若有罪不問是倒持太阿有頑不磨是廢去砥石則拱視天下何以為理雲麾將軍起復檢校刑部尚書兼右羽林統軍將軍御史大夫張直方席其先人任為邊將披誠向闕執玉來朝近臣勞郊大匠理第典兵於禁門之内立侍於交㦸之中校其寵榮無與等比而乃每輕法檢恣為遨盪擅去宿衛潜遊異縣有司問狀持舌不言以至再三始引􅄽闕古人有云語人必於其倫觀過必於其黨念其生自戎旅素不鐫琢既觸法􅃠亦可矜容加膝墜泉予常自愼小懲大戒爾宜知恩不失將軍之榮仍存兼官之重足得湔洗以俟甄升可銀青光禄大夫檢校刑部尚書兼右驍衛將軍御史大夫朱叔眀授右武衛大將軍制勅金紫光禄大夫檢校工部尚書兼左武衛上將軍御史大夫上柱國吳興郡開國公食邑二千户朱叔明司馬軍令黄帝李法兵家尚嚴始可尅敵邊將破虜詐增首級亦罪之小者漢文時魏尚囚繫漢宣時田順自殺開元中幽州長史趙含章大破奚虜旋坐贓賄放流瀼州縱有功勞不贖罪犯是以拓土萬里垂功中興自長慶巳還益輕邊事選拔將帥多非賢良豪奪種落蹄角之畜割削士卒衣食之賜見利則往見弱則欺㒺酬恩榮不顧亷恥積帛藏鏹丘累陵聚是以戰士離落兵甲鈍弊積三十年擲之不問近者伐叛益知其由屢下詔書誥誡深切豈知頑昧不可鐫琢嗟爾叔眀材惟樸􅈪性命淺狹其兄叔夜以贓抵刑不出私門可視覆轍忝據藩翰巳積嵗時料甲峙糧既乏素效事虜接戰不報寸功而乃公欺降戎乾没戰馬歸充伏櫪告以弊帷人之無良一至於此昔曹劌請戰卜式輸財俱是匹夫不與公食爾乃貴擁旄鉞任倚邊陲何其用心與古相萬諫臣拜疏前罰未塞尚為恩貸不失將軍分務洛師可以循省可右武衛大將軍分司東都散官勲封如故梁榮幹除檢校國子祭酒兼右神策軍將軍制勅北落親軍夾峙宫省選忠勇者為吾爪牙右神策軍奉天鎮都知兵馬使銀青光禄大夫檢校國子祭酒兼右威衛將軍御史大夫上柱國安定郡開國公食邑二千户梁榮幹射必落鵰力能振武自晦雄毅益守謙恭故能塞䕶長榆兵分細柳恩加士卒名著勤勞今日擢掌五兵榮懸三綬勉礪鋒鍔上答寵光可檢校國子祭酒兼右神策軍將軍知軍事御史大夫充馬軍都虞侯散官勲封如故呂衛除左衛將軍李銖右威衛將軍令狐朗除滑州别駕等制勅忠武將軍前左武衛將軍兼濃州長史合川郡公賜紫金魚袋吕衛等衛為天驕之魁來就諸臣之位誠敬忠信不失其常銖朗入仕歳久閱官頗多聞無尤違是率理道將軍上佐半刺之任言於清時皆為美仕帖以禄秩之授用嘉慕義之心愼無自輕勉於敬畏可依前件張㓜彰程修巳除諸衛將軍翰林待詔等制勅翰林待詔昭武校尉前守左驍衛將軍上柱國賜紫金魚袋張㓜彰等㓜彰修巳鴻都奏伎攻於丹青用志不分與古爭品審以武進晚能知書屢以辭章上干丞相知實以謹良綰務師儒以詳練守職或藝或勞或遷或拔將軍佐僚皆為寵擢各守職秩無忘專愼可依前件一品孫李明逺授左千牛備身等制勅一品孫李明逺三品孫韓鍔等立侍交㦸纔能勝冠出入見君父之尊師資益忠孝之道流離少好騏驥老成宜念聿修愼無欲速明逺可致果副尉守左千牛備身鍔可翌麾校尉守左千牛備身李鄠除檢校刑部員外郎充鹽鐵嶺南留後鄭蕃除義武軍推官等制勅前鳯翔節度副使朝議郎侍御史内供奉賜緋魚袋李鄠等五嶺之表地逺京邑吏以法制奉公下以文律自持葢亦寡矣而鹽鐵搉束之籍延袤萬里若當其才非惟山澤之饒歸於公上亦得以逺人利病聞於朝廷今吾丞相揣摩新規改易舊制以鄠文學亷愼當官挺然嘗倅賢侯號為名士以此委任必有可觀蕃瑾嗣閔咸有才能佐藩評刑知巳所請各進官秩皆為榮遇宜思報效無累薦延可依前件韋宗立授檢校倉部員外郎知鹽鐵廬夀院等制勅權知鹽鐵廬夀院事朝請郎侍御史内供奉韋宗立等近者恢復河湟訓定羌虜江湖之間人安而不擾供饋之費財有餘而力不蹙實由管𣙜委之名臣今者尚書休以爾宗立等上言咸曰清白處巳勤謹奉公予安能知無不可者暨頡與潜皆稱名士自有丞相為爾巳知守職佐藩無忝新命可依前件房次𤣥除檢校員外郎充度支靈鹽供軍使等制勅前知度支河南院事朝散大夫試太子司議郎兼侍御史上柱國賜緋魚袋房次𤣥等有司臣各言爾等或以科名文學或以清白才用列於薦籍其辭甚美分金穀榷運之務無忘謹亷佐諸侯將軍之府宜竭裨助報知苟盡能不逹乎爾其勉之可依前件李知讓加御史中丞依前邠州刺史韋瓊加侍御史充振武軍掌書記等制勅大中大夫使持節邠州諸軍事守邠州刺史充兵馬留後上柱國賜紫金魚袋李知讓等以知讓所理雜以華夷宜假霜臺用壓戎落瓊璹觀等皆吾卿大夫之令子弟也戎臣知之請為佐理夫幕吏之道有事必言知無不為考於職分亦無本局各思報效勿事依違可依前件崔彦曾除山南西道副使季詵山東道推官楊元汶京兆府法曹等制勅朝議郎行鄭州管城縣令上柱國賜緋魚袋崔彦曽等戎臣請士京兆求賢披其薦籍皆曰才能彦曾左官非罪理人異等詵張王賢客梁苑辭人元汶官决平之司無舞文之過移為典獄陟在賔階不累巳知惟有直道可依前件李承慶除鳯翔節度副使馮軒除義成軍推官等制勅朝議郎前守太常丞上柱國李成慶等以文學升名於有司以才能入仕於官次諸侯辟之佐於賔席天子用之升於朝廷次第等級大小高下亦與古之鄉舉里選考徳試言無以異也爾等皆吾卿大夫之令子弟也清風素範克肖家聲屬辭彫章能取科第既有知巳皆為才人賢觀與遊逹視所舉今爾賔主兩皆得之義則進否則退無為美疢以求苟容可依前件夏侯曈除忠武軍節度副使薛途除涇陽尉充集賢校理等制勅前昭義軍節度判官朝議郎殿中御史内供奉夏侯曈等曈以科名辭學開敏多才久遊諸侯常藴令聞周知吏理兼能潔身戎臣上言願為毗贊既諾仕以委質宜直道以酬知途以文行策名節趨清逺言於後進實為秀人延閣典校丞相所請勉循階級以至堂奥可依前件蕭孜除著作佐郎裴祐之陜府巡官崔滔櫟陽縣尉集賢校書等制勅在春秋時晉為諸侯國也尚立公族大夫教育諸卿之子富有賢哲不假捜聘召同列而㑹者三百餘年况今天覆盡得而禹畫無遺名卿賢相之家清風素範之族子孫森羅髦俊並作次第叙用豈歎乏才匭使判官將仕郎守國子監太學博士蕭孜等或以秀異得舉文學决科或以行實立身遭逢知巳皆後生可畏之士為當時有才之人東觀著述殿閣典校參畫幕府開導獻納清秩美職二者兼之不由階級安至堂奥勉於修愼以候超升可依前件楊知退除鄆州判官薛廷望除美原尉直𢎞文館等制勅將仕郎前守京兆府藍田縣主簿楊知退等國家盪定齊魯餘三十年多用名儒鎭之以還古俗其賔吏皆為秀彦𢎞文館四部羣書十八學士詳考理亂鋪陳王道此乃貞觀之故事也若非名士固不與焉知退與途文行温雅副幕府之求廷望才學聲華膺丞相之選當戰伐之後切於供饋庠績自以謹幹稱於有司予非能知咸徇其請各宜率勵無累所舉可依前件白從道除東渭橋巡官陶祥除福建支使劉蛻壽州巡官等制勅度支東渭橋給納使巡官將仕郎試大理評事兼監察御史白從道等朕以國計出入委以表臣尚書郎當戰伐之餘財穀殫蹷斷長補短以無為有今者上言三吏皆曰周才校其智能足應事役暨守臣貽孫等亦曰祥蛻文學温愼可在賔階才者得失之端士者功名之本勉於自勵無負已知可依前件盧籍除河東副使李推賢殿中丞高湜除湖南推官薛廷傑桂管支使等制勅河東節度副使朝散大夫檢校大理少卿攝御史中丞上柱國盧籍等夫諸侯之任重矣其行道也得以阜俗變俗其行法也得以刑人賞人若張政化得以助業某等上言咸舉可用籍等或負才器倜儻不羣或以文章策名俊秀或有幹局可佐囹圄皆徇所請予安能知并州近胡王業滋始艱難以來何戰不㑹長沙始安頗聞旱耗各宜良士以佐賢侯夫直道枉道無他故也取容盡節而巳勿慮後患宜竭報知暨殿省佐僚縣道為郡豈曰虛授亦當爾才正霜臺之舊名班芸閣之初命各服寵禄勉於自强可依前件鄭碣除江西判官李仁範除東川推官裴䖍餘除山南東道推官處士陳威除西川安撫巡官等制勅浙江西道都團練判官將仕郎監察御史裏行鄭碣李仁範暨虔餘等咸以文行策名清時諸侯知之命為幕吏少㣲四星處士毗輔之宿也天之布列在軒轅前此乃天意親近賢良先於妃后威者吾能言之耕延陵之臯荷石門之蓧沉如魚濳㝠若鴻翔非吾賢相爾不肯起徇酬知巳以壯在野並可依前件裴詒除監察御史裏行桂管支使等制勅前鄆曹濮等州觀察支使朝散大夫試大理評事裴詒等守臣有司上言請士皆曰詒等士旅之中有政事科名清亷公謹嘗經職守稱有才能古人於一飯之恩尚有殺身以報况於知巳得不勉之可依前件石賀除義武軍書記崔涓除東川推官等制勅朝議郎行秘書省著作佐郎石賀等朕寄惟侯之事重矣大者教化風俗小者惠養黎衆環千里之疆綰三軍之衆講求倚用不五六人守臣公度仲郢所請賀等各以文學决科愷悌干禄觀其褒舉皆是才名能報所知在爾賔主予不與焉暨鑲與鈞亦稱智敏神州作掾五庫掌財足展幹能無惰官守可依前件顧湘除涇原營田判官夏侯覺除鹽鐵巡官等制勅前振武軍節度判官文林郎監察御史裏行顧湘等近者循名責實科指稍峻諸侯有司亦各捜選才良以佐物務湘覺本以文進兼通吏理從周暨魯皆稱幹能于以聲韻上獻律吕精工雖曰小道亦有可觀徇請酬勞咸加新命各守職分無忘用心可依前件趙元方除户部和糴巡官陳洙除長安縣尉王巖除右金吾使判官等制勅攝户部巡官宣徳郎試秘書省校書郎兼殿中侍御史趙元方等各為長才自有知巳地官平糴專豐耗發斂之任京尉坐曹决事得操豪猾交㦸之内贊佐衛臣言於仕進皆曰得路勉思報效無累所舉並可依前件韋承鼎除左贊善大夫韋諝除尚食奉御柳謙除夀安縣令韋選除義昌軍推官錢琦除滄景支使等制勅前度支東渭橋給納使巡官徵仕郎試大理司直兼殿中侍御史柱國韋承鼎等持身謹潔美才周通奉公當官先勞後禄端雅守道俊秀升名久遊賢侯衆稱君子參東朝之贊諭分五尚之職秩糺大府羣吏之失提王畿生齒之籍方六七十長億萬夫金臺嘉招武幄與食法官憲秩以壯藩垣進於清時皆為美仕近者屢譴幕吏予豈無意葢欲廓賔階敢言之路誡諸侯自是之尊惟滄新造控制兩河付之誠臣尤藉良畫若免後患愼勿苟容各修官業無自媮薄可依前件康從固除翼王府司馬制勅新授銀青光禄大夫檢校國子祭酒兼濮州長史殿中侍御史上柱國康從固其父秀榮實為名將李廣多爭死之士竇嬰無入家之金一收七關易如拾芥念爾跨馬事敵執戎同仇壯比文鴦勇同李敢子之能仕父教之忠古人之言信不虛設今者願留闕下以奉朝請念其垂誨可見至誠曳裾憲寮用爾恩寵宜思終始上報君親可檢校國子祭酒兼翼王府司馬殿中侍御史散官勲如故張正度除汾州别駕等制勅中散大夫前守青州别駕上柱國張正度等各以才能仕進謹慎修身積日累時咸有知巳或以序進或徇所請皆佐列郡無怠官常可依前件馬逈除蜀州别駕等制勅中散大夫前守彭王府司馬上柱國馬逈等以爾入仕歳久愈知為理半刺上佐得與二千石參校政事短長利病者也今以名郡藉其佽助各有兼授以峻等衰愼守官常無自偷惰可依前件樊川集巻十六欽定四庫全書樊川集巻十七唐杜牧撰高
