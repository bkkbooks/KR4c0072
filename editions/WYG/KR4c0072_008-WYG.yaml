front:
  text: 陽公主墓誌銘憲宗皇帝即位八年出嫡女册封岐陽公主下嫁于今工部尚書判度支杜公悰始憲宗時宰相權徳輿有壻獨孤郁為翰林學士帝愛其材因命宰相曰我嫡女既笄可嫁徳輿得壻獨孤我豈不得耶可求其比後丞相吉甫進言曰前所奉詔臣謹搜其人因名我烈祖司徒岐公曰有孫兒悰年始弱冠有徳行文學秀朗嚴整臣嘗為司徒吏熟其家事官族世婚習尚守治臣一皆忖度疑悰可以奉詔帝即召尚書見與語大悦受殿中少監服章金紫以元和八年某月日主下嫁于杜氏上御正殿禮畢由西朝堂出節幡鼔鐸儀物畢備引就昌化里賜第上御延喜樓駐止主輪尚書及賔待酒食金帛奏内樂降嬪御送行賜第堂有四廡繢椽藻櫨丹白其壁派龍首水為沼主外族因請願以尚父汾陽王大通里亭沼為主别館當其時隆貴顯榮莫與為比主實憲宗皇帝嫡女穆宗皇帝母妹敬宗皇帝今天子親姑尚父汾陽王子儀外曾孫太皇太后始以正妃事憲宗以太后太皇太后愛養三朝凡四十年德厚慈恕化充六宫主以一女之愛降于杜氏逮事舅姑杜氏大族其他宜為婦禮者不翅數十人主卑委怡順奉上撫下終日惕惕屏息拜起一同家人禮度二十餘年人未嘗以絲髮間指為貴驕始與尚書合謀曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者自是閉門落然不聞人聲尚書讀書考今古治亂主職婦事承奉夫族時歲獻饋吉凶賻助必親自經手池塞館陊闢毬塲種樹不數十年搢紳間雜然稱尚書為賢尚書旋出為澧州刺史主後尚書行郡縣聞主且至殺牛羊犬為數百人供具主至後不二十人六七婢乗驢闒茸約所至不得肉食驛吏立門外舁飯食以返不數日間聞于京師衆譁說以為異事尚書在澧州三年主始入後出中間不識刺史㕔屏尚書治澧州考治行為天下第一後為大司徒京兆尹鳯翔節度使朝廷屈指比數以為凡有中外重難非尚書不可主賢益彰雖至宫闈貴號亦加尊敬姑凉國太夫人寢疾比喪及葬主奉養蚤夜不解帶親自嘗藥粥飯不經心手一不以進既而哭泣哀號感動他人尚書後為忠武軍節度使所治許州創為節度府五十年南迫於蔡屋室庳主居無正堂處東支屋恬然六年許軍彊雄且撐劇冦自始多用武臣治各出巳部曲家人疵政弛法習為尋常有司用比邊障遠地擲置不問民亦甘心尚書再治之老民相率兩走闕下遮丞相馬叩頭乞留請樹生祠及詔追去攀緣携扶哭於道路尚書治外主治内尚書所至必稱崱崱為名公偉人主實有内助焉穆宗以皇太后敬主尤為親信俯首益卑車服侍使愈自貶抑覲謁温凊外口不言他事訖穆宗朝人不以親貴稱當貞元時德宗行姑息之政王武俊王士真張孝忠子聯為國壻憲宗初寵于頔來朝以其子配以長女皆挾恩佩勢衆少俠狗馬為事日截馳道縱撃平人豪取民物官不敢問戚里相尚不以為窮弱自主降于尚書璧絶外之初怒中笑後皆敬畏累聖亦指示主德以誡警之至于今以主尚書顯重於中外戚里亦皆自檢歛隨短長為善於是舊俗滅不復有尚書自許奉急追詔主有疾小愈強不肯留曰去朝興慶宫縱死於道吾無恨以開成二年十一月某日薨於汝州長橋驛亭年若干上廢朝三日其年十二月某日主喪至京師比及葬兩宫弔問相繼於道開成三年某月日上御正殿詔丞相嗣復攝中書令正衙宣册諡曰莊淑大長公主某年某月日袝葬于萬年縣洪原鄉少陵原尚書先塋禮也生男二人長曰輔九年十歲次曰楊十始二歲女二人某於尚書為從父弟得以實銘銘曰章武皇帝唐中興主刑于正妃敎及嫡女婉婉帝子下嫁時賢影逐響荅隨順纒綿杜氏大族枝蔓蟬聯上有舅姑髙堂儼然螭綬龜章玉佩金軒養色悅意侍後承前人不我貴我敬我䖍始終盡禮大小周旋餘二十年誰興間言貴不召驕富不期侈是此四者倐相首尾自古名士或泥於此孰謂帝子超脫擺棄婦職是勤夫言是指池荒館陊屏外不履淑徳柔風天下傾耳宜乎壽考歸女婚子不錫全祉孰提神紀幽不有誌顯筆有史流于千祀
  hash: sha256:a1c91a3a14b083c08493a6f56b05d05d055a3dd79596e2a5d76749290cc0487d
