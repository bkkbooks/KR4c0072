body:
  text: 唐故宣州觀察使御史大夫韋公墓誌銘韋公會昌五年五月頭始生瘡召子壻張復魯曰三稚女得良壻死以是託墓宜以池州刺史杜牧為誌復魯曰公去歲兩瘡生頭今始一尚㣲何言之深公曰吾年二十九官校書郎時嘗夢涉滻水既中流有二人若舉符召我者其一人曰墳墓至大萬日始成今未也今萬日矣天巳告我我其可逃乎謝醫不問以某月十四日年五十八薨於位公從父弟某書公功行以公命來命牧牧位哭序且銘之公諱温字𢎞育韋氏自殷周秦漢丘明馬遷班固輩爭書其人以光其所為書至後周逍遥公夐出世家貴富中隱身行道當其時及後代論者以蜀嚴鄭谷口不能為比逍遥公五世生潞州上黨尉贈諫議大夫希元上黨生吏部侍郎贈太尉肇吏部生右補闕翰林學士右散騎常侍致仕贈司空綬常侍生公於逍遥公為九代孫年十一以明經取第為太常寺奉禮郎秘書省校書郎選判入等咸陽尉監察御史公曰是官豈奉養所宜耶上疏乞改著作佐郎當貞元中常侍公事德宗為翰林學士帝深於文學明察人間細㣲事事有宻切多委之歲乆憂畏病心帝曰某之心我其盡之以致仕官屏居西一作四郊公早夜侍側温凊飲食迎情解意一經心手積二十餘年丁常侍喪哀毁不欲生後相國李公逢吉以相印鎮武昌皆虚上職書卑辭至公門起赴武昌未至府拜監察御史遷左補闕故事文宗皇帝時宰相百吏願條帝功德譔號上獻公獨再疏曰今蜀之東川水溢殺萬家京師雪積五尺老稚多凍一作餓死豈崇虛名報上帝時耶帝乃止遂訖十五年不答尊號事改侍御史尚書吏部考功員外郎當太和九年文宗思拔用德行超出者以新􅌶音義亦悚同天下故公自考功不數月拜諌議大夫召為翰林學士遂欲相之公立銀臺外門下拜送疏入具道先常侍遺誡子孫不令任宻職言懇志决因命掌書舍人閤下公復堅讓不半歲轉太常少卿一歲遷給事中皇太子侍讀公復陳先誡以侍讀辭自宰相皆曰帝以一子請教於公是宜避邪公不聽凡拜送三章帝終不能奪靈武節度使王晏平罷靈武以戰馬四百疋兵器數萬事去罪成貶康州司戸不旬日改撫州司馬仙韶縣官尉遲璋以樂官授光州長史晏平以財賂貴倖璋大有寵於上公皆封詔書上還上比諭之公持益急竟以康州還晏平璋免長史莊恪太子得罪上召東西省御史中丞郎官於内殿悉數莊恪過欲立廢之曰是宜為天子乎羣公低首唯唯公獨進曰陛下惟一子不教䧟之至是太子豈獨過乎上意稍平不數日遷尚書右丞朱衣魚章遷兵部侍郎亟請丞相願為治人官出為陜州防禦使兼御史大夫服章金紫囘鶻窺邊劉稹繼以上黨叛東徴天下兵西出禁兵陜當其衝公撫民供事就不兩告苦入為吏部侍郎典二冬選老吏無所賣復以御史大夫出為宣歙池等州觀察使賦多口衆最於江南公急惡寛窮益自儉苦刑律其俗凡周一歲無所更改自至大治公㓜不戯弄冠為老成人解褐得官出羣衆中人不敢旁發戯嫚及為公卿在朝廷省閤中大臣見公若臨絶壑先忖度語言舉止然後出發其所執持不可者筆一落紙言一出口雖天子宰相知不能奪俯委遂之不以德行尚人人自敬畏不施要結於人人自親慕後進凡持節業自許者獲公一言矜奮刻削益自貴重官卑家貧時主將家事在私閫内髙曾兄弟鐫琢教誘嫁娶衣食無有二等疾甚將終悉召親屬賔吏稱先常侍詩句云在室愧屋漏因曰今知没身不負斯誡遂涕下不禁當夫子世得七十子國小俗儉復有聖人為之師使生於今與公相後先必有能品之者夫人隴西李氏賛善大夫慫之女先公四歲終生四男長璀前國子監四門助教次曰璆前明經次曰瓖次未免未免二字一作尚乳女四人長嫁南陽張復魯復魯得進士第有名於時為試太常寺恊律郎鄂岳觀察支使其下皆稚齒相次銘曰德則至矣位其充乎如其充兮可大厥功以施生人天先告之萬日之期天實為之唐故處州刺史李君墓誌銘君諱方𤣥字景業刑部尚書贈司空貞公長子貞公事憲宗皇帝兄弟受寄四鎮在漢南時戰淮西未利監軍使崔談峻讒言中入為太子賔客後淮西平李光顔移鄭滑陳許無帥帝閑讌獨言曰勁兵三萬誰可付者談峻侍側曰有大臣家不三十口俸錢委庫不取小僮跣足市薪此可乎帝曰誰為者談峻即以貞公言帝即日起貞公為陳許帥其儉德服人如此景業少有文學年二十四一貢進士舉以上第升名解褐裴晉公奏以秘書省校書郎校集賢殿秘書聦明才敏老成人爭與之交後以恊律郎為江西觀察支使裴誼觀察判官有殺人獄法曹官斷成當死者十二人景業訊覆數日内活十二人寃尚書以上下奏考裴公移宣城授大理評事團練判官後尚書馮公宿自兵部侍郎節鎮東川以監察裏行為觀察判官不一歲御史府取為員御史分察鹽池左藏吏盗隱官錢千萬獄竟遷左補闕遇事必言不知其他丞相固言以門下侍郎出鎮西蜀奏景業以檢校禮部員外郎參節度軍謀事仍賜緋魚袋徴拜起居郎出為池州刺史始至創造籍簿民被徭役者科品高下鱗次比比一在我手至當役役之其未及者吏不得弄景業嘗嘆曰沈約身年八十手寫簿書葢為此也使天下知造籍役民民庶少活復定户稅得與豪猾沉浮者凡七千户衮八貧弱不加其賦堤州南五里以涉為衢凡裁減蠧民者十餘事城東南隅樹九峯樓見數十里鑿齊山北面得洞穴怪石不可名狀刋石於巖下自紀其事凡四年政之利病無不為而去之罷去上道老民攀哭景業季父刑部侍郎建與貞公以德行文學俱高一時時之秀俊半歸李氏門下景業復聰明英銳儉苦温謹卑與長者遊備知天下之所治嘗慷慨有意於經綸少在諸侯府入為朝官出為刺史早夜勤苦為學不已屈指計量必伸已志雖時之名士亦以此許之罷池亷使韋公温館于宣城會昌五年四月某日卒于宣城客舍年四十三七代祖逺後周柱國大將軍都督熊陜十六州陽平郡公曾王父珍玉綿州昌明令昌明生雅州别駕贈右僕射僕射生貞公遜先夫人滎陽鄭氏贈本縣太君後夫人范陽盧氏男若干女若干人銘曰顯莫識其端幽莫見其緒已乎景業何付與之多而奪之何遽夭顏病冉孔子不知其故景業兮杳欲何語嗚呼哀哉唐故歙州刺史邢君墓誌銘亡友邢渙思諱羣牧太和初舉進士第於東都一面渙思私自約曰邢君可友後六年牧於宣州事吏部沈公渙思於京口事王并州為幕府吏二府相去三百里日夕聞渙思佽助并州鉅細合宜後一年牧奉沈公命北度揚州聘丞相牛公徃來留京口并州峭重入幕多賢士京口繁要游客所聚易生譏議并州行事有不合理言者不入渙思必能奪之同舍以為智不以為顓并州以為賢不以為借侵㳺客賢不肖不能私諭議以一司公事宴懽渙思口未言足未至缺若不圓牧曰徃年私約邢君可友今真可友也盧丞相商鎮京口渙思復以大理評事應府命令吏部侍郎孔温業自中書舍人以重名為御史中丞牧以補闕為閑客孔吏部曰中丞得以御史為重輕補闕宜以所知相救告以渙思中丞曰我不素知願聞其為人牧具以京口所見對後旬日詔下為監察御史會昌五年渙思由户部員外郎出為處州時某守黃州歲滿轉池州與京師人事離闊四五年矣聞渙思出大喜曰渙思果不容於會昌中不辱吾御史舉矣渙思罷處州授歙州某自池轉睦歙州相去直西東三百里問來人曰邢君何以為治曰急於束縛黠吏冗事弊政不以乆逺必務盡根本某曰邢君去縉雲日稚老泣送於路用此術也復問閑日何為曰時飲酒高歌極歡某曰邢君不喜酒今時飲酒且歌是不以用繁慮而不快於守郡也復問曰日食幾何曰嗜彘肉日再食某凡三致専書曰本草言是肉能閉血脉弱筋骨壯風氣嗜之者必病風數月渙思正握管兩手反去背仆于地竟日乃識人果以風疾廢舟東下次于睦兩扶相見言澁不能拜語及家事曰為官俸錢事骨肉親友隨手皆盡葢壯未期病病未期死今病必死未死得至洛幸矣妻兒不能知矣君進士及第厯官九厯職八始太子校書郎協律郎大理評事監察御史京兆府司録殿中侍御史户部員外郎處州刺史歙州刺史職為浙西團練巡官觀察推官度支巡官再為浙西觀察推官轉支使為户部員外郎判度支案伐劉稹為制使使鎮魏科軍食賜緋服銀章初副李丞相回再副高尚書銖撫安上黨三面征師太和三年六月八日卒於東都思恭里年五十邢氏周公次子靖淵封為邢侯國滅因以為氏西漢宇為太尉子綏為司空曾孫世宗光武時為驃騎將軍世宗𤣥孫顒因居河間顒當曹魏時參太祖丞相事終於太常邢有河間當陽君實河間人太常後也後至晉魏已降皆有官禄唐麟臺郎中舉於君為曾祖麟臺生奉天令侍封奉天生緱氏丞至和君即緱氏子兩娶前夫人隴西李氏忠州刺史佐次女今夫人南陽張氏壽州刺史植女四男曰懌惜温郎壽郎用某年某月某日葬于偃師縣某鄉里葬有月日其孤立使者哭告于柩來京師請銘銘曰十五知書二十有文三十登進士五十終刺史才能温良并包與之而止於斯七政在天一迴一旋差以􅈊數能窮知賢賢者多夭不肖壽考誰為聖魁孔不能究無可奈何付之以命曰其如命何樊川集巻五欽定四庫全書樊川集巻六唐杜牧撰
