body:
  text: 黄州刺史謝上表臣某言臣奉某月日敕㫖自某官授臣黄州刺史以某月日到任上訖誠惶誠恐頓首頓首臣某自出身已來任職使府雖有官業不親治人及登朝二任皆參臺閣優游無事止奉朝謁今者䝉恩權授刺史專斷刑罰施行詔條政之善惡唯臣所繫素不更練兼之昧愚一自到任憂惕不勝動作舉止唯恐罪悔伏以黄州在大江之側雲夢澤南古有夷風今盡華俗戸不滿二萬税錢才三萬貫風俗謹朴法令明具久無水旱疾疫人業不耗謹奉貢賦不為罪惡臣雖不肖亦能守之然臣觀東漢光武明帝稱為明主相繼聯續五十年當時以深刻刺舉號為稱職治古之風廢俗吏之課髙於此時循吏衞䬃任延王景魯恭劉寛陳寵之徒上一縣宰獨能不徇時俗自行教化唯德是務愛人如子廢鞭笞責削之文用忠恕撫字之道百里之内勃生古風凡違衆背時徇古非今王者公侯尚難其事豈一縣宰能移其俗此葢人為治古之人法為一時之法以治古之教教之即治古之人以一時之法齊之即一時之人國家自有天下已來二百三十餘年間專用仁恕每後刑罰是以内難外難作者相繼土地甲兵權柄號令盡非我有終能擒之此實恩澤慈愛入人骨髓俗厚風古不可揺動今自陛下即位已來重罪不殺小過不問普天之下蠻貊之邦有罹艱凶一皆存恤聖明睿哲廣大慈恕逺僻隱阨無不歡戴十四聖之生育張二百四十年之基宇臣於此際為吏長之敢不遵行國風彰揚至化小大之獄必以情恕孤獨鰥寡必躬問撫庶使一州之人知上有仁聖天子所遣刺史不為虛受烝其和風感其歡心庶為瑞為祥為歌為詠以裨盛業流乎無窮在臣心之則然豈材術之能及無任感激悃懇血誠之至謹奏進撰故江西韋大夫遺愛碑文表右臣奉某月日敕牒令撰故江西觀察使韋丹遺愛碑文臣官卑人微素無文學恩生望外事出非常承命震驚以榮為懼伏以洪為州府逾於千年言念疲羸常患水火風俗如此改革無因韋丹受朝廷分憂為百姓去弊不踐舊跡特建宏謀凡三年苦心去千嵗大患兼之灌溉種蒔豐其衣食渤海潁川之治召父杜母之恩校之於丹未足為比伏惟皇帝陛下陟降順帝施設如神納諫若轉丸去惡如反掌是以兵刑措寢年榖豐登而猶念切疲人及於循吏緬韋丹巳效之績慰江西去思之心特與彰揚創為碑紀是宜使内直學士西掖辭臣振發雄文流傳後代至於臣者最為鄙陋明命忽臨牢讓無路俯仰慙懼神魂驚飛臣不敢深引古文廣徴樸學但首叙元和中興得人之盛次述韋丹在任為治之功事必直書辭無華飾所冀通衢一建百姓皆觀事事彰明人人曉㑹但率誠樸不近文章受曲被之恩私如生羽翼報非次之拔擢宜裂肝腸無任感激懇悃血誠之至其碑文本謹隨狀封進以聞謹奏為中書門下請追尊號表臣某等言伏以收復河湟廓開土宇北絶梓嶺西過榆溪壯中夏起塞之雄奪西戎理弓之地至使强虜不敢觸鋒山鏁七闗地闢千里歌貍首而息射詠杖杜以勞旋聖徳神功超今越古某月日臣某等於延英殿面奉徳音陛下以尅定舊疆獲成先志歸功祖考追尊鴻名臣等伏念國家之為治也溢三皇之軌躅奮百代之上下天寶之末天下泰寧恃富庶而醉飽無虞韜干戈而兇逆潜作大厯貞元之際河北河南之地朝廷行姑息之政郡國皆叛亂之臣苟且之令行畫一之法廢月増日長雄唱雌和李錡宗子劉闢書生東據石頭西斷劍閣朝廷所有唯止兩京伏惟憲宗皇帝順上帝之心酌列聖之法爵不踰等舉不失賢親莊正之人去側媚之士然後提挈綱紀震叠雷霆誅夷羣兇洒掃四海百度如律九功可歌天業益張聖統無極詩曰恵我無疆子孫保之復曰周雖舊邦其命維新伏惟元和之初實開中興之業伏惟聖敬文思和武光孝皇帝陛下修先王之大道行天下之達徳廣問延諌褒直盡下首雪寃獄常對法官是則虞舜恤刑文王慎罰無以過也開張聰明延納諌諍守職業者無職不舉被言責者無事不言皆獲甄升豈唯假借夫仲尼以三人有我師大禹以愚夫能勝予是仲尼之好問大禹之拜言無以過也是以百姓手足皆安於措置四海風俗益臻於和平尚猶午夜觀書日昃聴政下採人病上求天瑞帝典曰聖敬日躋湯銘曰日日新是陛下之徳有以過之仲尼曰禹立三年百姓以仁仰陛下之至理知孔聖之可驗夫西戎强盛自古無之包有引弓之人盡為跨馬之國天下獻力備邊不充四海輸賦養兵不足廣川薦草盡為所有健兵倅馬不可當鋒雖李廣才能充國沉勇但能閉壘豈敢交綏伏惟聖敬文思和武光孝皇帝陛下畜睿筭於霄漢之表盡聖謨於造化之先捕盗將軍射聲校尉羽林突陣之騎酒泉校射之兵親自指蹤同時受命信星效祉靈旗呈祥壁壘言言而洞開渠魁纍纍而自縳解辮削袵投戈委弓懾怛威靈歡呼冠帶破種徙域空漠静邉指北海而封燕然中西域而立幕府鄭吉之理烏壘班超之鎮焉耆大庇生人一寛天下昔漢武帝之逐匈奴四海耗半殷髙宗之伐鬼方三年乃克尚書班史稱徳詠功今陛下用仁義為干戈以恩信為疆埸所求必至有開必先不遺一矢不頓一刃洗八聖旰食之恨雪百年亡地之羞小雅盡興大業無極為而不有歸功先帝禮曰天子有善上讓於天仲尼曰武王周公其達孝乎盖以善於繼述能光祖考今者陛下謙讓之道符於禮經繼述之孝稱於孔聖臣等待罪宰相日覩昇平謹具太常追尊順宗皇帝憲宗皇帝諡號如前伏聴敕㫖賀生擒衡州草賊鄧裴表臣某等言伏見湖南團練使奏生擒衡州草賊鄧裴及徒黨等伏以湖湘旱耗百姓饑荒遂有奸兇敢圖嘯聚今承擒滅已盡根株臣等誠懽誠抃頓首頓首臣聞三代之英兩漢之盛姦兇亂常之類挺災搆逆之黨乗間即有遇隙便生伏惟聖敬文思和武光孝皇帝陛下威極風霆徳滋雨露正開壽域盡納羣生永戢干戈將臻富庶逆賊鄧裴鮿爾小孽敢因艱食漸誘饑人剥亂鄉閭陵驚郡邑徒堅黨合事鉅冦牢或據深山或閉官道遂使湖嶺之外人不聊生慎由指揮義徒總齊武士仰憑睿筭逺仗皇威不經嵗時盡剪豺虺党項已寧於朔北妖黨復殄於巴西今擒鄧裴一清湖嶺用夷狄為四守統華夏為一家言念秋毫無非帝力臣等備位台鼎日奉聖謨無任抃舞慶快歡呼踴躍之至謝賜御扎提舉邉將表伏奉宸翰以邊塞未静將帥乏才唯務誅求不謀兵食者伏以陛下自即位已来正朝廷而舉典法肥天下而夀羣生故能不血刃以收河湟用文誥而降羌冦干戈偃戢逺邇安寕今者尚以戍邉未得髙枕深憂將帥不副憂勤或但恣於侵貪或不事其兵食須有戒勵形於詔書此乃周文小心克勤大禹不自滿假比於聖徳無以過焉臣等備立鼎司親奉睿㫖望鏤肝膈專令防虞無任抃躍屏營之至謝賜新絲表右中使某至奉宣聖㫖賜臣等新絲者伏以繭蠶所繋在於纂組言功之大與食争先陛下仁徳動天雨澤順序柔桑沃若蠶女功勤皛比凝霜縈如委霧繭税不逋於鄉井被覆皆徧於華夷盡荷皇慈同歌帝力臣等備位台席親逢盛時無任踴躍歡抃感恩之至壽昌節宴謝賜音樂狀右臣某言伏以降誕之辰生靈同慶合鈞天之廣樂九奏諧和令錫宴於仙祠百辟歡抃臣等幸生聖代獲備台階雖欲殺身豈酬大造無任感恩踴躍之至又謝賜茶酒狀右臣某等言伏以大慶吉辰榮霑錫宴鴻恩繼至王人薦臨㫖酒名茶玉食仙果来於御府莫匪天慈適口㤀憂已滿小人之腹殺身粉骨難酬聖主之恩臣無任感恩抃躍之至代裴相公讓平章事表臣某言伏奉今月日制書除臣某官同中書門下平章事祇奉成命進退失圗捧詔兢惶銜恩戰慄臣誠惶誠恐頓首頓首臣本書生仕逢聖代掌綸言於西掖作藩守於名邦自顧才能已是踰越陛下奬遇不次拔擢過分春闈典貢地官掌財咸無政能粗免􅄽闕及擢為筦㩁累受寵榮雖竭盡疲駑欲裨萬一而才智疎拙不效涓塵夫宰相之任前賢有言如涉川有舟如幽室有燭代天理物為人具瞻豈伊小臣而膺大任今朝廷髦俊並作名德森然或多歴庶官或皆有功實或四方屏翰已著勲勞舉而用之無不可者如臣凡淺豈宜委任伏乞俯迴天鑑更擇時賢必能丹青帝圖金玉王度使微臣無尸禄之誚聖主有得賢之名非唯微臣獲安實亦天下幸甚無任悃懇血誠之至又代謝賜批答表臣某言臣伏奉今月日批答令臣宜斷來表不許牢譲者仰承鴻澤跪捧芝緘戰越失圖啟處無地臣某誠惶誠恐頓首頓首臣昨奉詔書付以魁柄自顧斗筲之器樸􅈪之才乗恩寵時竊棟梁任只合效蔡謨堅臥孔霸懇辭尚猶拜謝天顔進見卿士榮忝既積憂惶實深是以拜章上陳懇辭自叙冀迴聖鑑更擇時賢豈意睿㫖重臨綸音再下不令徇志且遣守官大君之成命已行微臣之丹懇不遂誓當戮力盡瘁粉骨捐軀知無不為見死寧避冀答君親生成之德用酬乾坤覆育之恩無任感激血誠慙惶戰越之至又謝賜吿身鞍馬狀右中使某奉宣聖㫖賜臣吿身一通馬一疋并鞍轡臣生逢聖代竊位巖廊奉吿令之詔書丹霄之雨露猶濕錫代勞之駿馬内棧之風雲尚隨寶軸煥絲綸之言逸足騁權竒之態螢光爝火何裨日月之明弱質孤根但荷乾坤之德殺身寧報撫已知慙無任感恩抃躍懇悃之至論閣内延英奏對書時政記狀右舊例宰臣每於閣内及延英奏論政事及退歸中書知印宰臣盡書其日德音及宰臣奏事送付史館名時政記史官憑此編入簡策伏以敷陳時政承奉聖㫖事非一端時移數刻退朝循省執筆讃論但記出已之辭或忘同列之對若獻替之説或闕則史冊之書不詳臣今商量每閣内奏事及延英對迴陛下所降德音宰臣所奏公事人自為記共成一篇既得精詳必無遺漏付與史氏便得直書伏乞天恩永為常式謝許受江西送綵絹等狀右今月十八日中使某至奉宣聖㫖令臣領江西觀察使紇干衆所寄撰韋丹遺愛碑文人事綵絹三百疋者恩隨幸至榮與利并抃躍慙惶罔知所措伏惟皇帝陛下皇天縱聖赫日資明大奬功勞不計存没舉韋丹江西之績特令微臣撰碑墮淚之思豈慙羊祜黄絹之妙實愧蔡邕今者更䝉恩私廣受絲帛捧戴兢惕無地容身不勝感恩慙惶之至内宴請上壽酒具官臣某等言伏惟聖敬文思和武光孝皇帝陛下天覆地容堯仁舜孝四海波靜三春物華故於彤庭大開錫宴竊以三事大僚百司庶府願持玉巵上千萬壽未敢專擅伏俟德音輕瀆宸嚴無任戰越之至宴畢殿前謝辭具官臣某等言遲日正麗廣揚洞開張仙樂者三千餘人列正羞者二十六豆酒傾瑤罋食置雕盤列圭組以成行酌金罍以為勞屬饜而止飽德以歸既醉太平之風共樂仁壽之域千年一遇百辟同歡臣等備位台司親同聖日歡呼抃躍不能自勝謝賜物狀具官臣某等言叨陪錫宴竊覩鈞天百品並陳三酒皆具微臣所志已極滿盈豈意鴻澤重霑錫賚殊等朱綠𤣥黄之繒綵精金文錦之珍竒捧戴自天啟處無地不勝抃躍感恩之至代人舉周敬復自代狀前件官執德以進嚮道而行藹有令名備歴清貫掌綸言於西掖才稱發揮參密命於内庭衆推忠慎自珥貂近侍主鑰東門聲實益重於搢紳磨涅始彰其堅白伏以南省實天下根本兩丞為百司管轄苟非其選必致敗官今若以臣所任迴授敬復庶能肅清臺閣提舉紀綱既曰陟明實不虚受伏乞天恩允臣所請代人舉蔣係狀伏准某年月日敕内外文武常參官上後三日宜舉一人自代者伏以前件官仁義素彰文學早著􅆒歴臺閣宣昭令名嘗為諌官無所避忌及領藩鎮實惠疲羸頃者不附權臣例遭左官今逢明代猶典小州伏以封還詔書駮正時事職業實重選擇宜精今若以臣此官迴與蔣係既不虛受實為陟明伏乞聖慈允臣所請謹狀樊川集巻十二欽定四庫全書樊川集巻十三唐杜牧撰
