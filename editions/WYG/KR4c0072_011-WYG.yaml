body:
  text: 上李司徒相公論用兵書伏覩明詔誅山東不受命者廟堂之上事在相公雖樽俎之謀筭畫已定而賤末之士芻蕘敢陳伏希捨其狂愚一賜聽覽某太和二年為校書郎曾詣淮西將軍董重質詰其以三州之衆四歲不破之由重質自誇勇敢多筭之外復言其不破之由是徴兵太雜耳徧徴諸道兵士上不過五千人下不至千人既不能自成一軍事湏帖附地主名為客軍每有戰陣客軍居前主人在後勢羸力弱心志不一既居前列多致敗亡如戰似勝則主人引救以為已功小不勝主人先退至有殱焉初戰二年已來戰則必勝是多殺客軍及二年已後客軍殫少止與陳許河陽全軍相搏縱使唐州軍不能因雪取城蔡州事力亦不支矣其時朝廷若使鄂州壽州唐州祇令保境不用進戰但用陳許鄭滑兩道全軍帖以宣潤弩手令其守隘即不出一歲無蔡州矣今者上黨之叛復與淮西不同淮西為冦僅五十歲破汴州襄州襄城盡得其財貨輸之懸瓠復敗韓全義於溵上多殺官軍四萬餘人輸輦財穀數月不盡是以其人味為冦之腴見為冦之利風俗益固氣􅆋已成自以為天下之兵莫我與敵父子相勉僅於兩世根深源濶取之固難夫上黨則不然自安史南下不甚附𨽻建中之後每奮忠義是以卿公抱真能窘田悅走朱滔常以孤窮寒苦之軍橫折河朔强梁之衆貞元中節度使李長策卒中使提詔授與本軍大將但軍士附者即授之其時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事中使言面奉進㫖只令此軍取大將拔與節鉞朝廷不别除人希皓固辭押衙盧從史其位居下因潜與監軍相結超出伍曰去來大夫不肯受詔某請且勾當此軍監軍曰盧中丞若肯如此此亦固合聖旨中使因探懐取詔以授之從史捧詔再拜舞蹈希皓迴揮同列使北面稱賀軍士畢集更無一言從史爾後漸畜奸謀養義兒三千人日夕喣沬及父䖍死軍士留之表請起復亦只義兒與之唱和其餘大將王翼元烏重𦙍第五釗等及長行兵士並不同心及至被擒烏重𦙍坐於軍門喻以禍福義兒三千一取約束及河陽取孟元陽為之統師一軍無主僅一月日曾無犬吠况於他謀以此証驗人心忠赤習尚專一可以盡見及元和十五年授與劉悟時當幽鎮入覲天下無事柄廟筭者議必銷兵雄健敢勇之士百戰千攻之勞坐食租賦其來已乆一旦黜去使同編戸紛紛諸鎮停解至多是以天下兵士聞之無不忿恨至長慶元年七月幽鎮乘此首唱為亂昭義一軍初亦鬱咈及詔下誅叛使温起居造宣慰澤潞便令發兵其時九月天巳寒四方全師未頒冬衣服聚之授詔或伍或離垂手强項往往誶語及温起居立於重榻大布恩旨并疏昭義一軍自七十餘年忠義戰伐之功勞安史已還叛逆滅亡之明效辭語既畢無不懽呼人衣短褐爭出効命其時用兵處處敗北唯昭義一軍於臨城縣北同果堡下大戰殺賊五千餘人所殺皆樓下步射搏天飛者賊之精勇無不殱焉賊中大震更一月日田布不死賊亦自潰後一月其軍大亂殺大將磁州刺史張汶因劫監軍劉承階盡殺其下小使此實承階侮媟一軍侵取不已張汶隨王承元出於鎮州乆與昭義相攻軍人惡之汶既因依承階謀欲殺悟自取軍人忌怒遂至大亂非悟獨能使其如此劉悟卒從諌求繼與扶同者只鄆州隨來中軍二千耳其副倅賈直言入責從諌曰爾父提十二州地歸之朝廷其功非細秖以張汶之故自謂不潔淋頭竟至羞死爾一孺子安敢如此從諌恐悚不敢出言一軍聞之皆隂然直言之說值寳厯多故因以授之今纔二十餘歲風俗未改故老尚存雖欲劫之必不用命伏以河陽西北去天井闗强一百里闗屬澤州闗隘多山井泉可鑿雖有兵力必恐無功若以萬人為壘下窒其口髙壁深壍而與之戰忽有敗負勢驚洛師葢河陽軍士素非精勇戰則不足守則有餘成德一軍自六十年來世與昭義為敵訪聞無事之日村落鄰里不相往來今王司徒代君反側思一自雪况聨姻戚願奮可知六十年相讐之兵仗朝廷委任之重必宜盡節以荅殊私魏博承風亦當效順然亦止於圍一城攻一堡刋木堙井係纍稚老而已必不能背二十城長驅上山徑擣上黨其用武之地必取之策在於西面今者嚴紫塞之守備謹白馬之隄防祇以忠武武寧兩軍以青州五千精甲三齊兵青州最勁宣潤二千弩手由絳州路直東徑入不過數日必覆其巢何者昭義軍糧盡在山東澤潞兩州全居山内土塉地狹積穀全無是以節度使多在邢州名為就糧山東糧穀既不可輸山西兵士亦必單鮮擣虚之地正在於此後周武帝大舉伐齊路由河陽吏部宇文㢸曰夫河陽要衝精兵所聚盡力攻圍恐難得志如臣所見彼汾之曲戍小山平用武之地莫過於此帝不納無功而還後復大舉竟用㢸計遂以滅齊前秦苻堅遣將王猛伐後燕慕容暐大破暐將慕容評於潞州因遂滅之路亦由此北齊髙歡再攻後周路亦由此而後周名將韋孝寛齊王攸常鎮勲州王壁城今絳州稷山縣是也故東西相伐每由此路以古為證得之者多以某愚見不言劉稹終不能取貴欲速擒免生他患昨者北虜纔畢復生上黨賴相公廟筭深遠北虜即日敗亡倘使北虜至今尚存㳂邊猶須轉戰迴顧上黨豈能計除天下雖言無事若上黨乆不能解别生患難此亦非難自古皆因攻伐未解旁有他變故孫子曰兵聞拙速未睹巧之乆也伏聞聖主全以兵事付於相公某受恩最深切敢干冒威靈逺陳愚見無任戰汗某頓首再拜上李太尉論江賊書伏以太尉持柄在上當軸處中未及五年一齊四海德振法束貪亷懦立有司各敬其事在位莫匪其任雖九官事舜十人佐周較於太尉未可為比伏以江淮賦稅國用根本今有大患是劫江賊耳某到任纔九月日尋窮詢訪實知端倪夫劫賊徒上至三舩兩舩百人五十人下不減三二十人始肯行劫劫殺商嬰孩不留所劫商人皆得異色財物盡將南渡入山博茶葢以異色財物不敢貨於城市唯有茶山可以銷受盖以茶熟之際四逺商人皆將錦繡繒纈金釵銀釧入山交易婦人稚子盡衣華服吏見不問人見不驚是以賊徒得異色財物亦來其間便有店肆為其囊槖得茶之後出為平人三二十人挾持兵仗凡是鎮戍例皆單弱止可供億漿茗呼召指使而已鎮戍所由皆云賖死易就死難縱賊不捉事敗扺法謂之賖死與賊相拒立見殺害謂之就死若或人少被捉罪扺止於私茶故賊云以茶壓身始能行得言隨身有茶即人不疑是賊凡千萬輩盡販私茶亦有已聚徒黨水劫不便逢遇草市泊舟津口便行陸劫白晝入市殺人取財多亦縱火唱棹徐去去年十月十九日劫池州青陽縣市凡殺六人内取一人屠刳心腹仰天祭拜自邇已來頻於隣州大有劫殺沉舟滅跡者即莫知其數凡江淮草市盡近水際富室大户多居其間自十五年來江南江北凡名草市劫殺皆徧只有三年再劫者無有五年獲安者一劫之後州縣糜費所由尋捉烽火四出凡是平人多被恐脅求取之外恩讐並行追逮證驗窮根尋葉狼虎滿路狴牢充塞四五月後炎鬱蒸濕一夫有疾染習多死免之則踪跡未白殺之則贓狀不明一獄之中凡五十人中二十人悉是此輩至於真賊十人不得一濠亳徐泗汴宋州賊多劫江西淮南宣潤等道許蔡甲光州賊多劫荆襄鄂岳等道劫得財物皆是博茶北歸本州貨賣循環徃來終而復始更有江南土人相為表裏校其多少十居其半盖以倚淮介江兵戈之地為郡守者罕得文吏村鄉聚落皆有兵仗公然作賊十家九親江淮所由屹不敢入其間所能捉獲又是㳂江架舩之徒村落負擔之類臨時脅去分得涓毫雄健聚嘯之徒盡不能獲為江湖之公害作鄉閭之大殘未有革釐實可痛恨今若令宣潤洪鄂各一百人淮南四百人每舩以三十人為率一千二百人分為四十舩擇少健者為之主將仍於本界江岸剏立營壁置本判官專判其事㨂擇精銳牢為舟楫晝夜上下分畨巡檢明立殿最必行賞罰江南北岸添置官渡百姓率一盡絶私載每一宗舩上下交送同阻風風便同發名為一宗是桴鼓之聲千里相接私渡盡絶江中有兵安有烏合蟻聚之輩敢議攻劫或曰制置太大不暇如此荅曰今西北邊禦未來之冦備向化之戎長傾東南物產供百萬口况長江五千里來往百萬人日殺不辜水滿寃骨至於嬰稚曾不肯留葛伯殺餉童子湯征滅之盖以童子無知而殺之王者不捨其罪今長江連海羣盜如麻驟雨絶絃不可尋逐無關可閉無要可防今者自出五道兵士不要朝廷添兵活江湖賦稅之鄉絶冦盗劫殺之本政理之急莫過於斯若此制置凡去三害而有三利人不寃死去一害也鄉閭獲安無有追逮證驗之苦去二害也每擒一私茶賊皆稱買賣停泊恣口㸃染鹽鐵監院追擾平人捜求財貨今私茶盡黜去三害也商旅通流萬貨不乏獲一利也鄉閭安堵狴犴空虚獲二利也私茶之饒盡入公室獲三利也三害盡去三利必興窮根尋源在劫賊耳故江西觀察使裴誼召得賊帥陳璠署以軍中職名委以江湖之任陳璠健勇分毫不私自後亷察悉皆委任至今陳璠每出彭蠡湖口領徒東下商舩百數隨璠行止璠去之後惘然相弔安有清朝盛時太尉在位反使萬里行旅依一陳璠某詳觀格律勑條百二十巻其間制置無不該備至於微細亦或再三唯有江冦未嘗言及今四夷九州文化武伏奉貢走職罔不如法言其功德皆歸太尉敢率愚衷上干明慮冀禆億萬之一無任戰汗惶懼之至某謹再拜上門下崔相公書天生相公輔仁聖天子外齊武事内治文教被權衡稱量者不失銖黍受威烈懾怛者蚓縮魚藏百職率治中外平一伏惟相公功德無與為比往者彭城驕强頑卒數萬聨三齊舊風振天下餉道重弓柬矢大刀長矛不受指揮自有信誓王侍中生於其間稱為健黠奔馬潜敢迴顧高僕射寛厚聞名能治軍事拜于堂下及乎下受李司徒臠食其使者風波不迴氣勢已去自淮北渡由洛東下漕輓行役出泗上者稚長相賀藩鎮欲生事樹功者橫徼旁搆廟堂謀議不知所出相公殿一家僮馳入萬衆無不手垂目瞪露刃弦弓偶語腹非或離次失伍相公氣壓其驕文誘其順指示叛臣賊子覆滅之踪鋪陳忠臣義士榮顯之效皇威坌湧於言下狼心頓革於目前然後剔刮根節銷磨頑獷日教月化水順雪釋吐飯飽之解衣暖之威驅恩收禮訓法束一年人畏二年人愛三年化成截成一邦俗同三輔當此之時遲迴之間有勇力者一唱而起徴兵數十萬大小且百戰然後傅其壘鉤其垣得其罪人天下固已困矣而天下議者必曰某名將也某善用兵也雖疏爵上公裂土千里其酬尚薄此必然之說也故曰見勝不過衆人之所知非善之善者也戰勝而天下曰善非善者也百戰百勝非善之善者也能不戰而屈人之兵乃善之善者也是相公手携暴虎貪狼化為耕牛乘馬退數十萬兵解天下之縳祇於談笑俯仰燕享筆硯之間耳以此校之斯過古人萬萬遠矣復自持綂大相開張教化外制四夷内循百度長育人材興起頽弛心迎志釋罔有怨嗟是以天下帖泰蝗死災去饑人復飽流人復安内外遠近率職奉法不聞其他如周有召穆公仲山甫漢有魏相邴吉國朝姚宋二公文事武事居中處外罔不是倚國家有天下二百三十餘年盛溢兩漢功侔三代今復生相公輔佐仁聖天子天時人事即自將來福禄昌熾卜之無窮天下孰不幸甚某僻守荒郡亦被陶鈞齒髮甚壯志尚未衰敢不自強冀荅天造無任感激悃懇之至某恐懼再拜上昭義劉司徒書今日輕重望于幾人相位將權長材厚德與輕則輕與重則重將軍豈能譲焉昔者齊盗坐父兄之舊將七十年來海北河南泰山課賦三千里科甲一百縣獨據一面橫挑天下利則伸鈍則滿鏃而不發約在子與孫孫與子血絶而已此雖使鐵偶人為六軍取不孔易况席征蔡之弊天下消耗燕蟠趙伏用齊卜我當此之時一年不能勝則百姓半流二年不能勝則闗東之國孰知其變化也將軍一心仗忠半夜興義昧旦而已齊族矣疆土籍口探出僣物重寳仰闗輦上是以趙一揺燕一呼爭來汗走一日四海廓廓然無事矣伏惟將軍之功德今誰比哉是以初守滑臺為尚書守潞為僕射乃作司空乃作司徒爰開丞相府平章天下越録躐等驟得富貴古今之人亦以為將軍止此而已矣將軍德於國家甚信大國家復之於將軍雅亦無與為大矣今者上黨足馬足甲馬極良甲極精後負燕前觸魏側肘趙彼三虜屠囚天子耆老劫良民使叛銜尾交頸各蟠千里不貢不覲私贍妻子王者在上此輩何也今者上黨馳其精良不三四日與魏决於漳水西不五六日與趙合於汦水東縈太原挑飛狐緩不二十日與燕遇於易水南此天下之郡國足以事區區於忠烈無如上黨者明智武健忠寛信義知機便多筭畫攻必巧戰不負能使萬人樂死赴敵足以事區區於忠烈天下之人無如將軍者爵號禄位富貴榮顯宜驅三旋上校恩澤宜出萬死以副倚注天下之人亦無如將軍者是將軍負天下三無如之望也始者將軍賴齊然後得禄仕入卧内等子弟一身聨齊累世之逆卒境上爭首其恩甚厚其勢甚不便將軍以為大仁可以殺身大忠不顧細謹終探懷而取之今者將軍負三無如之望上戴天子四海之大以為緩急所宜日夜具申喧請今黙而處者四五嵗矣負天下之三無如者宜如是邪不宜如是邪是以天下之小人以為將軍始者取齊見利而動今者安潞見義而止而若是則天下利無窮義有限走無窮背有限則安可識之哉其有識者則曰不然夫桓文之霸也先脩刑政然後事事近有山東士人來者咸道上黨之政軍士兵吏之詳男子畝婦人桑老者養孤者庇上下一切罔有紕事暨乎政庭則將軍不知尊布衣不知卑諸侯之驕乆矣是以高才之人不忍及門仁政不施乆矣是以暴亂不止若此者將軍是行仁政來高才苟行仁政來高才若非止暴亂尊九廟峻中興復何汲汲如是邪在漢伯通在晉牢之二人功力不寡一旦誅死人豈寃之苻秦相猛將終戒視後禍大唐太尉房公忍死表止伐遼此二賢當時德業不在諸人尚死而不已葢以輔君活人為事非在矜伐邀引為心也伏惟將軍思伯通牢之所以不終仰相猛房公之所以垂休則天下之人口祝將軍之福壽目覩將軍盛德之形容手足必不敢加不肖於將軍之草木此乃上下萬世烈丈夫口念心禱而求者今將軍盡能有之豈可容易而棄哉大唐二百年向外叛者三十餘種大者三得其二小者亦包裹千里燕趙魏潞齊蔡吳蜀同歡共悲手足相急陳刺死帳下死圍悉死伏劒死斬死絞死大者三歲小或一日已至于盡死曰忠曰義則有父子同壇兄弟繼踵論罪則曰有某功論功則曰捨某罪伏惟十二聖之仁一何汪汪焉天之校惡滅逆復何一切焉此乃盡將軍所識復何云云小人無位而謀當死罪某恐懼再拜樊川集巻八欽定四庫全書樊川集巻九唐杜牧撰
