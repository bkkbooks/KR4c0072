body:
  text: 高駢除祭酒兼侍御史依前充職右神策軍兵馬使制勅右神策軍右廂兵馬使兼押衙銀青光禄大夫檢校國子祭酒前靈州大都督府左司馬殿中侍御史上柱國高駢禁旅典兵為吾爪士言念付禄未稱輸勞外之王官帖以憲秩可曰榮遇無忘盡悴可檢校國子祭酒兼濮王府司馬侍御史餘如故忠武軍都押衙檢校太子賔客王仲𤣥等加官制勅忠武軍節度右都押衙銀青光禄大夫檢校太子賔客兼殿中侍御史王仲𤣥等自艱難巳來言念許師何役不行何戰不㑹居常則長法知禮臨敵則致命爭登摽於和門不忝忠武爾等短衣長劍事㓂乗邊觸履艱危無所顧慮將軍列狀憲班酬勞勿矜常勝無忘淬礪可依前件右神策軍檢校押衙太子賔客尚漢美等叙勲制勅前件等拔以貔貅之勇籍於禁旅之中大刀長矛重弓束矢林㑹山立星羅翼舒惟以忠勤拱我宸極錫之勲寵以酬勞瘁可依前件右龍武軍大將軍劉誠信等三十三人叙階制勅右龍武軍大將兵馬都知正議大夫檢校太子賔客上柱國賜紫金魚袋右龍武軍宿衛劉誠信等技以勇聞任因信普力可挾輈以走敵藝能奪矟以制人常礪鋒銛無所迴避自拱宸極益展忠勞思以報之何惜階級可依前件柳師𤣥除衢州長史知夏州進奏等制勅夏州節度押衙知進奏朝議郎前權知杭州長史兼監察御史上柱國柳師𤣥等將軍䕶塞師𤣥主留邸之職從瑜繼怤以墨縗狥公喪葬告滿珪專書府藂委之務咸有勞能遷奬正名亦其常也各宜專謹勿罹悔尤可依前件賴師貞除懷州長史周少􅅠除虢州司馬王桂直除道州長史等制勅鳯翔府節度押衙知進奏銀青光禄大夫檢校秘書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事少􅅠專史閣錯雜之務皆公謹歲久官次宜遷𤣥爽俾佐郡符亦有可取湖外饑人相聚為㓂蕩覆鄉縣勢如燎火葢不得已遂至剪伐桂直用命一舉滅之言念功勤宜有褒賞名郡上佐帖以憲秩耀爾軍旅可增義勇可依前件景思齊授官知宣武軍進奏制勅宣武軍節度押衙知進奏起復銀青光禄大夫檢校太子賔客兼歙州司馬上柱國景思齊等諸侯之任各有職貢小者得循事例大者决於朝廷聞白啟導屬在留邸爾等咸以謹宻能膺任使或外除喪服或超授新命不失職禄勉於忠勤可依前件馮少端等湖南軍將授官制勅湖南同團練副使馮少端等皆長沙勇士同戮兇徒言念功勤咸宜升奬帖之憲秩試以崇班名郡椽曹亦為美稱特加恩寵非用彛章耀爾轅門可増忠壯可依前件朱諌周豹二人委本道量事優奬官健陞滿等一百二十八人弩手并子弟周質等四百八十五人並委本道酌事量加賞給武官授折衝果毅等制勅具官某等夫折衝果毅皆吾武位以延勇士國朝用此以進立戰功至將軍者衆矣自府兵一廢名存實亡今之來者豈其人哉近以邊障隙開㓂戎患結豈無萬人之敵奮於下位之中但使披文空増拊髀並可依前件張直方貶恩州司户制勅朕聞先王之理也設法誤罹雖大必捨不忌故犯縱小必誅况乎凶狠不悛罪戾日積更欲矜免其如法何銀青光禄大夫檢校刑部尚書兼左驍衛大將軍御史大夫張直方念以來朝嘉其慕善付之寵禄頗極尊榮為執金吾鞭小過而至死作禁軍統去異縣以恣遊尚以生自邊陲素乏教義退之散秩以懲非心俟其収抵舊痕湔洗前過必欲牽復用存始終豈暴虐得於天生險悍著於心本抵冐刑憲縱恣胷臆法所惡者爾皆為之白晝九衢指憎萬手作横日甚而不自知滿於聽聞豈可悉數禮曰凡有罪惡屏於四裔不留中國惟舜能之况之堅頑有不移之姿􅃠羅無屢開之典荒服作掾猶曰寛恩爾能自新豈惜後命可守恩州司户參軍員外置同正員仍即馳驛發遣王著貶端州司户制勅守愛州九員縣尉員外置同正員王著漢家之制雖丞員相子亦當戍邊隋文之令盗邊穀一升坐法斬首葢以西北鎮戍華夏保障法苟不立所虞非細爾當羌㓂犯塞之日天子拊髀之時命守關防以為遮打而乃占兵糧自取傭直屏之荒服以謹其類乃令厥子呌閽稱寃再命坐獄備見罪狀幸以得無逋負可以矜寛為列郡之掾曹換萬里之一尉足得循省吾不負人可守端州司戸參軍置同正員仍即馳驛發遣李玕貶撫州司馬制勅朝散大夫守光禄少卿李玕昔開元致理之初冀州刺史平嗣光闕温凊之禮遂奪其官放歸田里是故四十餘年風俗忠厚教化之本豈先斯乎爾為將相之家窮極富貴坐有大第官為亞卿母子異居僅將十載有司彈劾事狀昭著於吾用法爾當何罪俾佐名郡尚曰寛恩可守撫州司馬員外置同正員仍即馳驛發遣姜閱貶岳州司馬等制勅朝議郎前守景陵臺令上柱國姜閱等盗逆無狀輒犯陵寢侵攘法物聞之震驚爾等官業在於守奉懈怠所政是誰之過言於末減朕不敢議各宜佐官用正典刑可依前件仍並馳驛發遣武易簡量移梧州司馬制勅守崖州司户參軍員外置同正員武易簡冦來乗城不能死節以此播棄爾亦何辭然漢誅李陵是為虐典魏捨于禁實得中道力不足者法宜矜焉守臣教為吾爪牙能與别白使易簡導生還之路朝廷無失入之刑咨爾三事大僚百司庶尹率能守此可期治平各宜盡規朕不惜失可守梧州司馬員外置同正員王元宥除右神策軍䕶軍中尉制勅繁纓趨朝交㦸入侍委以兵衛固須信臣内樞宻使驃騎大將軍行右威衛大將軍知内侍省事上柱國晉國公食邑二千户王元宥儉而多才忠而能力事君盡禮處巳無私自主樞要益見誠信今者十萬全師北落禁旅視吳漢差强人意非韓信無可計事是以輟自心腹寄兹爪牙以盡爾材出於余志爾戢斂豪猾整肅威容無使鄉閭致有侵害勉酬倚任以報君親可行右驍衛上將軍知内侍省事充右神策軍䕶軍中尉兼右街功徳使散官勲封如故周元植除鳯翔監軍制勅控秦塞之西扼胡苑之左乃睠岐隴為國藩牆命以監撫宜崇班秩鳯翔監軍使銀青光禄大夫右領軍衛大將軍員外置同正員上柱國汝南郡開國公食邑二千户賜紫金魚袋周元植事君以敬處仕無私節操凌霜而不凋肝膽開忠而洞見謙以自得高而益兢累監三軍推誠一貫言念西塞未得高枕用其聲實以䕶藩垣夫處於兵戎予今誡汝無怨不過於逺利伏衆莫若於律身立事成功酬恩垂美在此二者汝其勉之寵以内省之崇仍兼將軍之貴往服休命無忝恩榮可守右監門衛大將軍知内侍宋叔康妻封邑號制勅詩稱鵲巢禮榮翟茀既彰爪牙之効宜齊伉儷之榮左神䇿軍中尉兼左衛功徳使特進左領軍衛大將軍内侍省事上柱國廣平縣開國侯食邑一千户宋叔康妻清河縣君居氏懿兹柔淑作配忠勲能潔蘋蘩克叶姻族成此内則穆其壼風稱為令人實光婦道爰疏封爵用舉典章可服寵榮勉於輔佐可封清河郡夫人吐突士煜妻封邑號制勅詩美夫人禮稱内子允膺腹心之任宜崇家室之榮弓箭軍器等使特進行右領軍衛大將軍知内侍省事上柱國隂山縣開國公食邑一千五百户吐突士煜妻咸陽縣君田氏生於富貴作配忠貞柔婉自卑儀範可則職勤賔祭道睦姻親既諧閨風克成婦徳爰加禮秩之貴以彰輔佐之勤榮我疏封無忘内助可封雁門郡夫人新羅王子金元𢎞等授太常寺少卿監丞簿制勅某臣等感恩知義奉贄不闕居大海之外為有禮之賔爾國是也自列國卿至於署丞皆吾文吏之選次第授爾亦所以表他國不同禮也將我恩寵耀爾殊隣慎勿怠違永作藩屏並可依前件仍並放還蕃西州回鶻授驍衛大將軍制勅古者天子守在四夷葢以恩信不虧羈縻有禮春秋列潞子之爵西漢有隰隂之封考於經文其來尚矣西州放首頡干伽思俱宇合逾越宻施莫賀都督宰相安寧等忠勇奇志魁健雄姿懐西戎之腹心作中夏之保障相其君長頗有智謀今者交臂來朝稽顙請命乂爼寸即高仁重爵舉以授爾用震殊隣無忘敬恭宜念終始可雲麾將軍守左驍衛大將軍外置同正員餘如故沙州專使押衙吳安正等二十九人授官制勅沙州專使衙前左廂都知押衙吳安正等自天寶以降中原多故莫大之虜盗取西陲男為戎臣女為戎妾不暇弔伐今將百年自朕君豈敢偷惰乃命將帥収復七闗爰披地圖實得天險遂使朝廷聲聞聞於燉煌爾帥議潮果能抗忠臣之丹心折昆夷之長角竇融西河之故事見於盛時李陵教射之奇兵無非義旅爾等咸能竭盡肝膽奉事長帥將其誠命經厯艱危言念忠勞豈吝爵位官我武衛仍峻階級以慰皇華用震殊俗可依前件燉煌郡僧正慧菀除臨壇大徳制勅燉煌管内釋門都監察僧正兼州學博士僧慧菀燉煌大藩久䧟戎壘氣俗自異果産名僧彼上人者生於西土利根事佛餘力通儒悟執迷塵俗之身譬喻大宅舉君臣父子之義教爾青襟開張法門顯白三道遂使悍戾者好空惡殺義勇者狥國忘家裨助至多品地宜峻領生徒坐於學校貴服色舉以臨壇若非出羣之才豈獲兼榮之授勉𢎞兩教用化新邦可充京城臨壇大徳餘如故契丹賀正使大酋領等授官制勅幽州道入朝賀正契丹大酋領討魯等天子有道守在四夷爾今來朝予亦増愧綏之玉帛榮以班秩宜懐㤙寵永保封疆可依前件仍並放還蕃黔中道朝賀牂牁大酋長等十六人授官制勅黔中道朝賀牂牁大酋長攝充州刺史趙瓊林等夫西南諸國自古多順在法度之外居繩墨之表來朝有禮歸貢不闕玉帛以將厚意階級以峻等衰各服寵榮無忘恭敬可依前件仍並放還蕃樊川集巻十七
