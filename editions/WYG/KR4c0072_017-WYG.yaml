body:
  text: 髙元裕除吏部尚書制勅昔有虞氏貴徳尚齒言於四代其道最優今吾卿老富有道徳以大冢宰表率羣寮顧予敢專得於僉議前山南東道節度管内觀察處置等使銀青光禄大夫檢校尚書使持節襄州諸軍事兼襄州刺史御史大夫上柱國渤海縣開國男食邑三百户髙元裕始以御史諫官在長慶寳厯之際匡拂時病磨切貴近罔有顧慮知無不為復以諫議舎人在太和末詞摧凶魁坐以左宦繼為中丞京兆公卿藩服朕始在位徵歸朝廷爰自尚書裂分茅土為政以徳行己惟仁信而履之服而樂之餘三十年道益昭著夫中外之任迭有重輕今者干戈藴藏戎狄信順將欲詳考典禮開張教化使吾丞相巳降有所咨禀非爾元裕其誰膺之至於官業豈勞倚任祇聽出納無忘教戒可守吏部尚書散官勲封如故崔璪除刑部尚書蘇滌除左丞崔璵除兵部侍郎等制勅喉舌百官之本綱轄天下之要戎政國之大事三人為衆一舉得之惟君知臣予不敢讓正議大夫尚書左丞上柱國賜紫金魚袋崔璪徳可標凖言成文章􅆒歴中外道益光顯左省駁議不畏強禦分憂陜服尹兹東郊政既安人化能披俗擢任藻鑒旋職牢籠材皆適宜官無逋事分鎭股肱之郡遂成功實之臣陟處綱曹副以中憲毎師蘧瑗常慕史魚抨彈之勇正當時病翰林學士承㫖銀青光禄大夫行尚書兵部侍郎知制誥武功縣開國男食邑三百户蘇滌行冠人倫爵高天秩仁義禮樂之是務克伐怨欲之不行翺翔禁闥出入諷議汲黯為郡嘗聞卧理下惠去國皆以直道洎宣室思賈甘泉召雄造膝盡忠代言稽古近以微恙懇請自便君子之道進退可觀正議大夫前權知尚書戶部侍郎上柱國博陵縣開國子食邑五百户賜紫金魚袋崔璵上知自得不器難名既擅高文兼通樸學掌言綸閣典貢春闈詞同三代之風士掇一時之秀振舉職業昭宣令名詩曰多士文王以寧禮曰官備天子為樂咨爾璪等實瑞清時予為爾之徳鄰爾膺予之愼選典刑不忘於哀敬提綱惟在於公勤舉司馬法勿踵近習各膺重任企伸上酬宜於夙夜無孤官業璪可守刑部尚書散官勲賜如故滌可行尚書左丞散官封如故璵可權知尚書兵部侍郎散官勲封賜如故裴休除禮部尚書裴諗除兵部侍郎等制勅冉有仲由孔氏門人之高弟也尚曰處於小國可為具臣况今照臨百官撫御四海綰牢籠漕輓之職掌五兵六師之重次第超擢為吾大寮若非僉諧豈敢輕授正議大夫守尚書兵部侍郎兼御史大夫充諸道鹽鐵轉運使上柱國河東縣開國子食邑五百户賜紫金魚袋裴休仁義禮樂文行忠信積此八者以為成人前宣歙池等州都團練觀察處置等使太中大夫撿校左散騎常侍兼御史大夫上柱國河東縣開國男食邑三百户賜紫金魚袋裴諗在元和代惟帝念功四夷九州文化武伏咨爾先父貴著大勲天必祚仁門有令嗣道直才富行備名高文學而浹洽專精率履而清浄恭儉而皆周歴華顯踐更臺閣處事可法出言成章咸輟自綸闈任寄方伯教訓以禮生聚以仁千里封疆一口歌詠休乃命以取士時稱得人用其公方委之管𣙜事為之制曲為之防鈎校姧贓末減賦取公財不耗疲人樂生望為凖䋲立作據伏名實兼備徳位兩高漢史曰理行尤異者就加禮曰有功於人者進律秩崇八座官副夏卿舉以授之予亦何怪夫宰相佐天子公卿助宰相股肱指臂任同一身有事必言未為越局無由愛惜勉答寵榮休可禮部尚書依前充諸道鹽鐵轉運等使諗可權知尚書兵部侍郎散官勲封賜如故畢諴除刑部侍郎制勅士師臯陶之恤刑司㓂蘇公之用獄既盡哀敬能致治平擢為大寮膺兹慎選出於予志委以諴臣翰林學士朝散大夫守中書舎人上柱國平隂縣開國男食邑三百户賜紫金魚袋畢諴學臻壼奥文越拘攣常以忠信用為前後爰自郎署擢居内庭謀議有同於夀王奇異輒委於嚴助竭盡心力裨補機要既乆嵗序須議遷昇今者耕夫服田戎馬不駕欲使凡一手足皆獲措置是故用汝典予刑罰汝其徃哉吾今告汝吾聞孔子曰古之聽獄求所以生之今之聽獄求所以殺之宜念格言深思倫要九服休命以稱朕意可權知尚書刑部侍郎散官勲封賜如故韋有翼除御史中丞制勅昔貞觀開元之為理也逺隱必見情偽必知天下如一家兆庶如一人無他道也綱目皆振法令必行祖宗在天方册在地人存政舉行之非艱故用正臣委之邦憲朝請大夫守尚書刑部侍郎上柱國賜紫金魚袋韋有翼戴仁而行抱義以處牆仞裏峻壇宇外寛介特守君子之强文學盡儒者之業周歴華貫擢為諍臣攻予甚專言事頗切願試佐輔移理陜郊馮翊之恐失倪寛潁川之意得黄霸壺漿迎路襁屬攀車徵為公卿愈見風采恤刑愼罰守法當官巍然立朝為時凖直今者跡其率理委之紏䋲爾其念惠文彈理之言思立秋授署之㫖三尺律令四海紀綱所宜公共無即上意古人有言曰凡為虎鼠計於用舎今者倚任佇觀爾能惟名知臣無累所舉可守御史中丞散官勲封賜如故趙眞齡除右散騎常侍制勅仲尼曰愼擇爾臣為人之導夫語言應對之選為顧問耳目之官若非善良必致壅害朝散大夫守太子賓客上柱國漢中郡開國公食邑二千户賜紫金魚袋趙眞齡其先君子祗事祖宗出入屏毗餘四十載爾為令嗣克肖素風好學頗專樹善不倦凡曰賢彦無不與遊雲水登臨多聞放志風塵趨競殊不縈心是以長人有慈惠之名處官無纎介之失其為行巳斯亦多矣丹墀文陛之内貂羽金蟬之榮超以授之無忝所舉可守右散騎常侍散官勲封賜如故韓賔除户部郎中裴處權除禮部郎中孟璲除工部郎中等制勅朝散大夫守尚書水部郎中上柱國韓賓等尚書天下之本郎官皆為清秩非科名文學之士罕與其選以賔端貞有守以處權俊乂出羣以璲才能適用皆荗鄉里之稱咸為名實之士各服休命勉於官業可依前件鄭處晦守職方員外郎兼侍御史知雜事制勅朝議郎行尚書職方員外郎上柱國賜緋魚袋鄭處晦御史中丞韋有翼上言曰御史府其屬三十人例以中臺郎官一人稽參其事以重風憲如曰處晦族清胄貴能文博學人倫義理無不講求朝廷典章飽於聞見乞為副貳以佐紀綱以爾處晦常居内庭草具宻命自以疾去於今惜之頗俞其言如我自得有翼為爾之知巳余為有翼之徳隣上下交舉豈有私愛勉修職業所報非一可守本官兼御史知雜事散官勲賜如故庾道蔚守起居舎人李㳊儒守禮部員外郎充翰林學士等制勅天下為公選賢與能也况乎伎出流輩超侍帷幄豈惟獨以文學止於代言亦乃宻參機要得執所見若非賢彦豈膺選擢將仕郎守起居舎人庾道蔚善行必備重價無對嘗自侯府升為諫臣每直言而盡誠不違忠而偶意朝議郎行尚書禮部員外郎賜緋魚袋李汶儒才行冠時名聲譁衆􅆒歴臺閣宣昭職業無入而不得其道守正而莫混其源並為儒者之英咸藴賢人之操久遊安在相見何晚禮曰君子稱人之美則必爵之我既言矣亦能縶維宜盡忠讜以酬寵遇並可守本官充翰林學士餘皆如故李朋除刑部員外郎李從誨除都官員外郎等制勅書曰庶獄庶事予敢㒺知此乃周文王之所理天下也惟獄惟事㑹於南宫求郎之難豈敢輕易將仕郎侍御史内供奉李朋能積行實發其詞華勁正端愼官業克舉天平軍節度副使朝議郎檢校尚書祠部員外郎兼侍御史賜緋魚袋李從誨宗室子弟美秀而文嘗經磨湼不改堅白今者取自憲府擢於幕吏各有所授皆為清秩當自宣室受讞之際思滿堂飲酒之言至於刑章尤繫念慮予曰罪爾勿罪予曰寛爾勿寛問法何如無即上意各宜勉勵勿自輕怠朋可守尚書刑部員外郎散官如故從誨可守尚書都官員外郎散官如故權審除户部員外郎制勅文林郎守尚書水部員外郎權審湖嶺旱暵百姓枵耗老弱死道上强壯入賊中爰求使臣以救其弊執事者上言爾審學古有文通知理道遂使馳驛視吾饑人果能臨事知權受命逹㫖撫慰流散宣導恩澤蠲貸逋逸能裁濶狹大小輕重各合事宜雖古所謂直指繡衣美俗使者言之於爾無以過焉用超名曹以酬徃效無曠官業勉服休命可守尚書户部員外郎散官如故皇甫鉟除右司員外郎鄭潨除侍御史内供奉等制勅夫聖人之聖百代同道無他術也綱紀盡舉而關轄不寛故提綱主轄之司為邦立理之本言於其屬豈敢輕取浙西道都團練副使朝議郎檢校尚書刑部員外郎兼侍御史賜緋魚袋皇甫鉟鄉里秀人臺閣名士能以文學發為官業朝議大夫前守河南縣令上柱國鄭潨生於清族克肖素風凡守郡邑皆著理行㑹府藂委之任憲司抨彈之職委之授汝得不戒之夫為政也日夜思之勤而行之此乃子産之言也剛亦不吐柔亦不茹此乃詩人之所稱也四海百司之條目舉之在勤破制壞法之奸蠧紏之在敢率是二者可曰當官各服寵榮無忝遷擢鉟可尚書右司員外郎散官賜如故潨可侍御史内供奉散官封勲如故韋退之除户部員外郎裴徳融除殿中侍御史盧頴除監察御史等制勅仲尼見負版者則必式之此言為國根本不敢不敬况其官屬豈可輕用漢家授署御史多於立秋葢以風霜始嚴鷹隼初擊古人垂㫖可以知之朝議郎行殿中侍御史韋退之等皆章甫高危逢掖襃博表裏文行師法典常退之嘗歴憲臺久居官次性既安靜事皆逹練徳融典校延閣服膺羣書美價廣譽旁溢逺暢頴佐賢侯名聲籍甚留滯在外而非所宜地官為郎南臺持斧皆有職業佇見風采各思率勵以副甄昇並可依前件李蔚除侍御史盧潘除殿中侍御史等制勅將仕郎守殿中侍御史李蔚劒南西川節度判官朝議郎檢校尚書禮部員外郎兼侍御史上柱國賜緋魚袋盧潘等夫法不立而化行惡不去而善進雖使堯舜在上未之有也故御史之舉職者前代有埋輪都亭之奏國朝亦有戴豸正殿之劾若非端勁知名之士不在斯選蔚以文行進用巳著勞效潘以儒雅流聞今膺拔擢有司列狀詞者頗公使吾綱目盡張隄防不壞不在法吏其在他乎朕闢祗官之門開天下之口企以待理無有厚薄爾等吐茹侮畏之道能不愧於詩人斯塞職矣可不勉之蔚可侍御史散官如故潘可殿中侍御史散官勲如故盧告除左拾遺制勅承奉郎行京兆府長安縣尉直史館盧告朕觀不理之代無他道也取唯諾之士為耳目之官是以太宗皇帝之理天下也徳為聖人尊為聖帝三日不諫必責侍臣况予寡昧固多遺闕不官才彦安能知之告是吾賢卿老之令子弟也以甲科成名以家行稱著取自史閣拔居諫垣夫朕之不徳吏之不平政之失中人之不寧四者之闕悉陳其志此乃漢文帝開諫諍之詔也忠告不倦爾當奉職自用則小予不吝過勉思有犯無事遜言可依前件蕭峴除太常博士制勅禮至則無怨樂至則不爭揖讓而理天下者禮樂是也今國家上法三代下採兩漢質文隆殺皆有舊章今命博士非欲革其儀法但欲提舉考習而巳登仕郎守秘書省著作佐郎蕭峴聞爾昆弟之間著友愛之稱復能於知巳依投之地竭力報効况乎富有文學黙守恬退執心處巳不亦多乎爾其為吾折衷輕重詳校疑似使祝宗卜史之徒不敢以近習欺爾斯則可矣勉於自强可守太常博士散官如故杜濛除太常博士制勅守左拾遺杜濛爾五廟祖嘗佐太宗同安生人共為天下者也爾能自以文學策名清時升為諫臣豈曰虛授如聞同列牆進而不爾容爾亦拜章自陳極辭貢憤乃令徵辨盡知其由僉曰爾以齒少有才不能韜晦或處衆矜巳或遇事褊衷言於愼㣲則亦乖矣仕於清貫斯豈廢乎考衆惡必察之言徵怨不在大之説官移禮寺跡去掖垣屈既伸睂事亦存體酌此二者頗得中道説乎職業至重藴蓄可施無使衆多復有窺測可太常博士馬曙除右庻子王固除太僕少卿王球除太府少卿等制勅前度支河東振武天徳等道營田供軍使檢校太僕卿兼御史中丞馬曙等或以文學策名或以吏才進用久更官次皆著勞效西漢趙充國八十老將通知四夷以為排折羌虜非穀不可今浚稽山南遮虜障北坐甲待食不下十萬曙以文學之暇頗好論邊果能峙糧飽吾戰士固此為郡亦報善政球倅賓席得專留事兵於其郊所命皆具東朝崇秩列等貳卿各服官榮以俟昇擢可依前件李叔玟除太僕卿高証除均州刺史萬汾除施州刺史等制勅壯武將軍檢校太子賓客前兼右金吾衛將軍監察御史上柱國襲岐國公食邑三千户食實三百七十户賜紫金魚袋李叔玟等夫伊吕之為將也每以救扶為心故其苖裔福隨殷周我西平王功存社稷慶流後嗣子孫多賢裂土分茅玟𢎞毅知書洵美且武儒士多譽將才頗高慶忌一門盡有爪牙之用金敞舉族皆著忠厚之名置將軍之符列卿寺之任曰文曰武惟上所命酋為才士實曰寶臣証之與汾為吏歲久文學績效皆有可觀清江武當有人有賦豈自薄小宜遵詔條無忝寵榮以稱朕意可依前件李珏贈司空制維大中六年歲次壬申五月丁卯朔十六日壬午皇帝若曰國有元老道可咨禀天命不助倐然去我宜加褒命以慰重泉咨爾故淮南節度副大使知節度事管内營田觀察處置等使金紫光禄大夫檢校尚書右僕射兼揚州大都督府長史御史大夫上柱國賛皇縣開國公食邑一千五百户李珏立徳行道繼長增高貴而益修老而彌篤在文宗朝徧歴清近内備顧問嘗摧奸兇外領事權善提故典爰付魁柄實肖象求鎮撫四夷莫不信順訓導百吏皆有程品左官荒服衆寃非罪事君以道知我其天李固之確論無私周公之金縢終啟自朕統御尊敬舊老分委戎輅作鎮孟津訓兵令行治人化洽飽聞聲聞渴見風采以大冢宰徵歸朝廷讜直忠貞骨鯁魁礨凡所陳啟無非法誡遂乃裂授東夏表率諸侯能救饑艱克為康泰初陳㣲恙請捐重寄驛騎奔問侍醫臨理旋聞大病却食涕流命也奈何痛悼不及今遣使某官副使某官某持節冊贈爾為司空魂而有知鑑兹誠意嗚呼哀哉歸融贈左僕射制勅有禄位而享富貴啟手足而歸壤樹身殁名著生榮死哀蔚為大臣宜遵贈典故金紫光禄大夫守太子少傅分司東都上柱國晉陵郡開國公食邑二千户歸融發於文華􅆒歴清近業冠前輩才高當時揔領屬官預聞政事凡曰繁劇無不踐更刃皆有餘施無不可徧處重位内修典法三乘戎輅外作屏毗富而不驕貴而愈謹曾參三省太叔九言服以行之終身不倦實士林之君子為朝廷之表臣未䆒高年遽聞長夜爰舒痛悼用加顯位命之寮長以慰重泉可贈尚書僕射令狐定贈禮部尚書制勅朕有表臣作鎮南服天不我助遽此殱奪用崇飾終之典以舒痛悼之誠故桂州本管都防禦觀察處置等使銀青光禄大夫檢校左散騎常侍持節都督桂州諸軍事兼桂州刺史御史大夫上柱國令狐定始自結髪至於夀考直道而行靡有悔徳初以友愛謁閨門之風中以文學膺鄉里之選終以徳業為名實之臣爰自郎吏至於藩翰事藂必理刃皆有餘去載桂陽雖云旱耗聞其風俗芬若椒蘭昔爾元昆輔我聖考令汝猶子相予冲人公忠貞正衡鏡法式煥乎當代萃於一門上有佽助急難之名下有慈愛教誨之道聞於論者爾其得之跡去難留川逝不捨追命宗伯以慰重泉徃而有知鑑我厚意可贈禮部尚書樊川集卷十四欽定四庫全書樊川集巻十五唐杜牧撰
