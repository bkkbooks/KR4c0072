front:
  text: 州准赦祭百神文㑹昌二年歳次壬戌夏四月乙丑朔二十三日丁亥皇帝御宣政樓百辟卿士稽首再拜敢上仁聖文武至神大孝尊號于皇帝受册禮畢御丹鳳樓因大赦天下刺史宜祭境内神祗有益於人者可抽常所上賦以備具牧為刺史實守黄州夏六月甲子朔十八日辛巳伏准赦書得祭諸神因為文稱讃皇帝功德用饗神云皇帝嗣位勅天所付壬申年坐統大業慈明寛恩聖明文武或曰誅殛曰我父母譬彼嬰兒豈不可恕或曰畋遊苑大林深喈嘐跳突千毛萬羽豹裂鵬擒其樂無伍皇帝曰不匪我不知言豈假汝未撫四夷未考百度天地宗廟未陳簋簠如寐未寤如癢未愈斥退狗馬未可以御或曰酒飲順氣完神奠樂工習自祖自父瑶簮繡裾千萬侍女酬以觥斚助之歌舞富貴四海不樂何苦皇帝曰不如聞四海蝗蔽田畝或曰亢旱或曰淫雨稚老孤寡未盡得所聞一有是首不能舉乃拔俊良乃登耆老夕思朝議依規約矩詳刑定法深刻不取操揭典制酌之中古逺師太宗近法憲宗怵慄思惟不治是懼四國既平六職攸序黍稷稻粱嘔啞俯僂父子供養嬰兒撫乳萬里齊俗實皇帝力繄眠而食罔知其故皇帝乃曰予見郊廟嚴法物旓旐旗五帝坐壇百神立坫嵬嶷􅆄蠁捧爵是醮海外天内戎狄蠻夷竒服異貌伏于除外懽喜呌噪迴御丹鳳大赦四海改元㑹昌減論有罪紹功嗣德捜剔幽昧寒暑合節風輕雨碎穀溢陳囷畜繁腯大東南西北限岸畺紀無有頓憚不識災害三事大夫邦伯諸侯曰皇帝德古不能侔謳歌謡詠安能可稱百工庶人亦有聚謀拜章口呼願上大號神聽天聞欲揚宏休皇帝曰無功不可虚受懇請不已出涕叩頭皇帝不能止曰予慙羞曰因大赦維新九州不窮不詐不饑不偷有窮有饑實吏之尤予實天吏許之省修約束致誡纎悉丁寧品類細偉各當源流皇帝曰俞股肱耳目誠示竭力寒暑風雨宜神是酬匪神之力其誰能謀凡爾守土各報爾望剝烹羮胾無愛牛羊天下聞命奔走承事牧實遭遇亦忝刺史齋齋惕慄臨谷臨墜視牲啓毛濯爵置羃不委下吏餚羞具潔罔有不備衣冠待曉坐以假寐步及神宇蹐足屏氣神實在前敬恭跪起詩不云乎皇天上帝伊誰云憎天憎罪人天可止視止殃其身豈可傍熾刺史有罪可病可死其身未塞可及妻子無作水旱以及閭里皇帝仁聖神祗聰明唱和符同相為表裏黄治雖逺黄俗雖鄙皇符視之近逺一致洋洋在上實提人紀無負皇帝自作羞愧月惟孟夏日惟辛巳實神降止神如有言我答皇帝寒暑風雨其期必至瘥癘水旱永永止弭爾為官人勉其爾治某敬再拜流汗霑地
