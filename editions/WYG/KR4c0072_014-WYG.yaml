body:
  text: 祭城隍神祈雨文下土之人天實有之百穀豐實寒暑合節天實生之苖房甲而水湮之苗秀好而旱莠之饑即必死天實殺之也天實有人生之孰敢言天之仁殺之孰敢言天之不仁刺史吏也三歳一交如彼管庫敢有其寶玉如彼傳舍敢治其居室東海孝婦吏寃殺之天實寃之殺吏可也東海之人於婦何辜而三年旱之刺史性愚治或不至厲其身可也絶其命可也吉福殃惡止當其身胡為降旱毒彼百姓謹書誠懇本之於天神能格天為我升聞又牧為刺史凡十六日未嘗為吏不知吏道黄境蔡鄰治出武人近五十年令行一切後有文吏未盡削除伏臘節叙牲牢雜須吏僅百輩公取於民里胥因縁侵竊十倍簡科民費變於公租刺史知之悉皆除去鄉正材長強為之名豪者尸之得縱強取三萬戸中多五百人刺史知之亦悉除去蠒絲之租兩耗其二銖租穀之賦斗耗其一升刺史知之亦悉除去吏頑者笞而出之吏良者勉而進之民物吏錢交手為市小大之獄面盡其詞棄於市者必守定令人口非多風俗不雜刺史年少事得躬親疽拔其根矣苗去其莠矣不侵不蠧生活自如公庭盡日不聞人聲刺史雖愚日無縱過使有過力短不及恕亦可也殺亦可也稚老孤寡指苗燃鼎將穗秀矣忍令萎死以絶民命古先聖哲一皆稱天舉動行止如天在旁以為天道仁即福之惡即殺之孤窮即憐之無過即遂之今旱已久恐無秋成謹具刺史之所為下人之將絶再吿於神神其如何祭木𤓰神文維㑹昌六年歳次丙寅某月某日某官敬吿于木𤓰山之神惟神聰明格天能降雲雨郡有災旱必能救之前後刺史祈無不應去歳七月苗將萎死禱神之際甘雨隨至槁然凶歳化為豐年仰神之靈感神之德願新祠宇以崇祭祀今易卑庳變為華敞正位南面廟貌嚴整風雷雲雨師伯必備侍衞旗㦸羅列森然惟神繫雲在襟貯雨在缶視人如子渴即與之不容凶邪不降疾疫千萬年間使池之人敬仰不怠伏惟尚饗祭故處州李使君文維㑹昌五年歳次乙丑某月日池州刺史杜牧謹遣軍事押衙王鏶謹以清酌庶羞之奠敬致祭于亡友李君起居之靈憶昔相遇兩未生鬚京師衆中跡猶甚疎一言道合盡寫有無我於宣城忝跡賔吏君隨幕府東下繼至復與友人故薛子威邂逅釋願如相為期放論劇談各持是非攻強討深張矛彀機怒或赩赫終成笑嬉於後七年君拜左史來蜀西川我官補闕云愧我先拜章請代葢私我焉我有家事乞假南來循出里第君出離杯令弟在席恣為詼諧耳熱膽張觥聮相􅀈我歸墜馬一枝幾摧君來我坐側倚旁隈時聞酸吟戲口猶開云君我殺以酒相加忌我之才及我南去君刺池陽我守黄岡葭葦之場唯君書信前後相望辭意纎悉勉我自強筆我性情補短裁長一函毎發沉憂併忘幸㑹交代㳂檝若飛江山九月凉風滿衣為别幾時多少懽悲志業益廣不可窺知長人之術酋為吏師縱酒十日舞袖僛垂語公之餘且及其私許以季女配我長兒莫云稚齒可以指期各負少壯輕後㑹時寓居宣城書札日馳一疾不起訃來猶疑嗚呼哀哉惟先僕射儉德冠古凡二十年四領茅土所至所治曰人父母官俸餘半委庫不取京師里第蓬茅數畝慶餘生君曰天酬補何聰明才智兮不使施為何付與之多兮折之何暴天陽地隂高厚相侔上有河漢鈲反横流百刻晝夜平分不饒皎不隂晦一月幾朝二男三女俗率如此三男二女無有其地君子小人鼻目並列與小人校㑹無百一於百一中以秀奪實凡禀隂陽生於其間陽常不勝賢者宜艱自古皆然欲復何言撫孤一弔拍棺一哭咫尺不遂涕下相續期於没齒盡力嗣子嗚呼哀哉伏惟尚饗祭周相公文維大中五年歳次辛未七月辛未朔八日戊寅故吏朝議郎知湖州諸軍事守湖州刺史杜牧謹遣軍事押衙司馬素謹以清酌庶羞之奠敬祭于故相國僕射贈司徒周公之靈伏惟相公之道徧於天下至如牧者受恩叢深爰自稚齒即䝉顧許及在官途援挈益至㑹昌之改柄者為誰忿忍隂汗多逐良善牧實忝幸亦在遣中黄岡大澤葭葦之場繼來池陽西在孤島僻左五歳遭逢聖明牧拾寃沉誅破罪惡牧於此際更遷桐廬東下京江南走千里曲屈越嶂如入洞穴驚濤觸舟幾至傾没萬山環合才千餘家夜有哭鳥晝有毒霧病無與醫饑不兼食仰喑偪塞行少臥多逐者紛紛歸軫相接唯牧逺棄其道益艱相公慳憫極力掀拔爰及作相首取西歸授之名曹帖以重職虢國太子絳市諜人死而復生未足為喻旌旂西去拜於都門賢士大夫無不攀惜皆曰相公事君盡忠保道輕位大張宮室盡閉私門彼由徑者跛倚不進天下賢彦明知所趨重德壯年衆期在入牧牧吴興繼奉手示但休退不言疾恙訃書忽至慟哭問天嗚呼蒼生未濟而喪吾相吾為蒼生慟豈獨私恩想像音容思惟恩紀期於令嗣可以効死呉洛相逺逾於三千無因拜柩見歸九泉哭送使者致誠奠筵伏惟尚享祭龔秀才文維大中五年歳次辛未五月朔二日湖州刺史杜牧謹遣軍事十將徐良敬致祭於故龔秀才之靈死者生之極折脛而夭復死之極言於前定莫得而推出於偶然魂其寃哉鄉里何在骨肉何人卞山之南可以栖魂嗚呼哀哉伏惟尚饗銀青光禄大夫檢校禮部尚書兼御史大夫充浙江西道都團練觀察處置等使上柱國清河郡開國公食邑三千戸贈吏部尚書崔公行狀曾祖綜皇任醴泉縣令右散騎常侍祖浩皇任太子中允贈父倕皇任檢校吏部侍郎兼御史中丞袁州刺史贈太師公諱郾字廣畧威儀秀偉神深氣厚即之如鑑望之如春既冠識者知不容於風塵矣貞元十二年中第十六年平判入等受集賢殿校書郎陜虢觀察使崔公琮願為賔而不樂之潔辭載幣使者數返公徐為之起且曰不闗上聞攝職可也受署為觀察巡官後轉京兆府鄠縣尉遷監察御史殿中侍御史刑部員外丁邠國太夫人憂扶而能起人無間言服除拜吏部員外郎判南曹事千人百族必應進而進公親自挾格肖法必留戾程必出每懸牓舉牘富室權家汗而仰視不敢出口其宿吏逡巡縛手係舌願措一奸不能得之凡三年遷左司郎中吏部郎中加朝散大夫旋拜諌議大夫兼知匭使穆宗皇帝春秋富盛稍以畋遊聲色為事公晨朝正殿揮同列進而言曰十一聖之功德四海之大萬國之衆之治之亂懸於陛下自山已東百城千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至氣直天子為之動容斂袖慰而謝之遷給事中敬宗皇帝始即位旁求師臣今相國竒章公上言曰非公不可遂以本官充翰林侍講學士命服金紫旋拜中書舍人仍兼舊職侍帝郊天加銀青光祿大夫髙承簡罷鄭滑節度使滑人叩闕乞為承簡樹德政碑内官進曰翰林故事職由掌詔學士上曰承簡功臣𦙍也治吾咽喉地克有善政罷而請紀入人深矣吾以師臣之辭且寵異焉居數月魏博節度使史憲誠拜章為故帥田季安樹神道碑内官執請亦如前辭上曰魏北燕趙南控成臯天下形勝地也吾以師臣之辭且慰安焉居數月陳許節度使王沛拜章乞為亡父樹神道碑内官執請如前辭上曰許昌天下精兵處也俗忠風厚沛能撫之吾視如臂吾以師臣之辭而彰其忠孝焉是三者皆御札命公令刻其辭恩禮親重無與為比厯歳願出守本官辭懇而遂禮部缺侍郎上曰公可也遂以命之二年選士七十餘人大抵後浮華先材實轉兵部侍郎今上即位四年公亟請於丞相閣曰願得一方疲人而治之除陜虢觀察使兼御史大夫先是陜之官人人必月尅俸錢五千助輸貢于京師者歳至八十萬公曰官人不能贍私安能恤民吾不能獨治安可自封即以常給廉使雜費下至于鹽酪膏薪之品十去其九可得八十萬歳為代之官人感悦隨治短長不忍為欺萬國西走陜實其衝復有江淮梁徐許蔡之戍兵北出朔方上郡回中汧隴間踐更往來不虚一時民之供億吏須必應生活之具至于缾缶缶匙常碎於四方之手公曰此猶束炬以焚民也於是御宴賞截浮費凡金漆陶木絲枲之用悉為具之可饗數千人民一不知復有詔㫖支税粟輸太倉者歲數萬斛始斂民也逺逺近近就積佛寺終輸于河復藉民而載之民之巨牛大車半頓于路前政咸知計不能出公曰管仲曰粟行五百里民有饑色斯言粟重物也不可推遷民受其弊况今遷直之計有不翅五百里乎公乃大索有無親執籌而計之北臨黄河樹倉四十間穴倉為槽下澍于舟因隙償直不敗時務自此壯者斛幼者斗負挈囊槖委倉而去不知有輸他境之民越逸奔走軫駢爭鬭願為陜民政成化行上國下國更口讃頌凡二年改鄂岳安黄蘄申等州觀察使囊山帶江三十餘城繚繞數千里洞庭百越巴蜀荆漢而㑹注焉五十餘年比有蔡盜於是安鏁三闗鄂練萬卒皆傖楚善戰浸有戰風稱為難治有往自矣公始臨之簡復伍旅脩理械用親之以文齊之以武大剙所事以張威容造䝉衝小艦上下千里武士用命盡得羣盜公日即于水渚以盡殺為習雖值童耉而無捨焉比附他盜刑不可等於是一死之内必累加之盜相戒曰公法威嚴勿觸其境然後黜棄奸冒用公法也升陟廉能用公舉也撫獲窮約用公惠也豪商大賈不得輕役不得隱田父子兄弟不得同販於是闔境之内有餘不足自公而均復建立儒宫置博士設生徒廩餼必具頑惰必遷敬讓之風人知家習八年秋江水漲溢公曰安得長堤而禦之言訖軍士齊民雲鍤雨杵一揮立就令行恩結有如此者千里之内如視堂廡雖僻左下里歳臘男子必以雞黍賀饋女子能以簮瑱相問遺富樂歡康肩於治古凡五年遷浙西觀察使加禮部尚書公曰三吴者國用半在焉因髙為旱因下為水者六歳矣輕賦兵役不減於民上田沃土多歸豪強荀悦所謂公家之惠優於三代豪強之酷甚於亡秦今其是也於是料民等第籍地沃塉均其征賦一其徭役經費宴賞約事裁節民有宿逋不可減於上供者必代而輸之誠禱山川歳獲大稔復曰衣冠者民之主也自艱難已來軍士得以氣加之商賈得以財侮之不能自奮者多栖於吴土遂立延賔館以待之苟有一善必接盡禮因訪里閭益知民之疾苦隨以治之纔逾期歳而吴民復振開成元年十月二十日薨于治所多士相弔曰使公相天子貞觀開元之俗可期而見也豈公不幸實生民之不幸也主上痛悼輟朝一日贈吏部尚書公知生靈和自干名立朝為公卿為侯伯未嘗須㬰間汲汲牽率欲顯名欲合道而仁義忠信明智恭儉􅊊積發溢自然相隨不立約結而善人自親不設溝壘而不肖自逺不志於榮達而官位自及公内外閥閱源流清顯拔於甲族而復甲焉親昆仲六人皆至達官公與伯兄季弟五司禮闈再入吏部自國朝已來未之有也上至公相方伯下及再命一命幕府部吏屬遍滿内外皆公門生公俯首益恭如孤臣客相自惕而多畏也自為重鎮苞苴金幣之貨不自耀門親戚舊故周給衣食畢其婚喪悉出俸錢不以家為在家怡然未嘗訓勉子弟自化皆為名人居室卑庳不設步廊賔至值雨長葢躡屐而就于外位初鎮于陜或東巡經月不鞭一人至于驛馬令五歳幸全則為代之著為定制曰致一物於必窮之地君子不為其為仁愛而臻於此及遷鎮鄂渚嚴峻刑法至於誅戮未嘗貰一等後一刻或問於公曰陜鄂之政不一俱臻於理何也公曰陜土瘠民勞吾撫之不暇尚恐其驚鄂之民剽土沃雜以夷俗非用威刑莫能致理政貴知變葢為此也聞者服焉嗚呼公之德行材器真哲人君子没而不朽者也易名定諡為國常典敢書先烈達于執事附于史氏云爾謹狀唐故尚書吏部侍郎贈吏部尚書沈公行狀曾祖某皇任泉州司户參軍贈屯田員外郎祖某皇任婺州武義縣主簿父某皇任尚書禮部員外郎贈太子少保公諱某字某明春秋能文攻書未冠知名我烈祖司徒岐公與公先少保友善一見公喜曰沈氏有子吾無恨矣因以馮氏表生女妻之貞元末舉進士時許公孟容為給事中權文公為禮部侍郎時稱權許進士中否二公未嘗不相聞於其間者其年禮部畢事文公詣許曰亦有遺恨曰為誰曰沈某一人耳許曰誰家子某不之知文公因具言先少保名字許曰若如此我故人子後數日徑詣公且責不相見公謝曰聞於丈人或援致中第是累丈人公舉遣某孤進故不敢自達許曰如公者可使我急賢詣公不可使公因舊造我明年中第文公門生七十人時人比公為顔子聮中制策科授太子校書鄠縣尉直史館左拾遺左補闕史館修撰翰林學士歴尚書司門員外郎司勲兵部郎中中書舍人命服朱紫時穆宗皇帝親任學士時事機秘多考決在内必取其長循為宰相公密補𢎞多同列每欲面陳拜章互來吿公必取規議用為進退歳久當為其長者凡再公皆逡巡不就上欲面授之公奏曰學士院長參議大政出為宰相臣自知必不能為凡宰相之任非能盡知天下物情苟為之必致敗橈况今百姓甚困燕趙適亂臣以死不敢當願得治人一方為陛下長養之因出稱疾特降中使劉泰倫起之公稱疾篤故相國李公德裕與公同列友善亦欲公之起辭説甚切公終不出因詔以本官兼史職出歸綸閣久處密近思效用於外懇請於丞相不已由是出為湖南觀察使兼御史大夫凡二歳轉為人困事繁惡易滋長官人調授少得防寃疎通蹊逕人情物理無不曲盡吏欲為欺於此照驗之端必明於彼民有未伸於彼開張之路必在於此亹亹循環皆極根本為重刑罰杖十五至於死者每有一犯必具獄斷刑之後遍爾示幕府吏雖十人有一人以為小未可者必再詳究經費遊宴約事裁節歳有水旱不可減于常貢者必為代之江西宣州連歳承災所貸萬計公善養性情自居方伯生殺之任喜怒好惡四者閉覆渾然雖終歳伺之不見毫髮故黠吏欲窺公之所向髙下其事終不可得每處一事未嘗不從容盡理故所至之處富庶懽康理行第一每去任人吏泣送出境不絶自宣城入為吏部侍郎二年考檄捜舉品第倫比時稱精能宰物之望屬於僉議公每願用所長復治於外及薨於位知與不知莫不相弔上悼惜輟朝一日贈吏部尚書公與先少保俱掌國史撰憲宗實録未竟出鎮湖南詔以隨之成於理所時論榮之公生得靈粹沛然而仁自幼及長未嘗須㬰閒汲汲牽率欲及於道温良恭儉明智忠信内積外溢自然相隨自布衣至于達官凡所交友皆當時名公奬美所長覆救所不及三十年間無有携間者公常居中雖有重名每苦於飢寒兩求廉鎮時宰許之皆先要公曰欲用某為從事可乎公必拒之至有怒者公曰誠如此願息所請故二鎮幕府皆取孤進之士未嘗有吏一人因權勢入嘗擇邸吏尹倫戇滯闕事寮佐皆患之固請易之公曰某出京師面誡倫曰止可闕事不可多事是倫適能如此受不虛矣故二鎮號為富饒凡十年間權勢貴倖之風不及於公耳苞苴寶玉之賂亦不至權門雖有怒者亦不敢以言議公公然侵公其為守道自得皆如此類在家無杖笞呵責家人自化兄弟生姪雖絶服者入門飲食衣服指使其奴婢無二等親戚故舊周給所得皆出俸錢不以家為於京師開化里致第價錢三百萬訖二鎮牽率滿之及在牀之日周身之飾易以任器京師士人雜然言議以為非今之有指為異事嗚呼公之德行可以稱古君子矣牧分實通家義惟先世復以孱昧叨在賔席幼熟懿行長奉指教泣涕撰記以備遺闕以附于史氏云爾謹狀樊川集巻十一欽定四庫全書樊川集巻十二唐杜牧撰
