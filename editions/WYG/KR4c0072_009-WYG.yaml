body:
  text: 唐故平盧軍節度巡官隴西李府君墓誌銘牧太和元年舉進士及第鄉貢上都有司試於東都在二都羣進士中往往有言前十五年有進士李飛自江西來貌古文高始就禮部試賦吏大呼其姓名熟視符驗然後入飛曰如是選賢耶即求貢如是自以為賢耶因袖手不出明日往返江東某曰誠有是人吾輩不可得與為伍矣後二年事故吏部沈公於鍾陵宣城為幕吏兩府凡五年間同舍生蘭陵蕭寘京兆韓乂博陵崔壽每品量人之等第必曰有道有學有文如李處士戡者寡矣是卑進士不舉嘗名飛者牧益恨未面其人且喜其人之在世也太和九年為監察御史分司東都今諫議大夫李中敏左拾遺韋楚老前監察御史盧簡求咸言於某曰御史法當檢謹子少年設有與遊宜得長厚有學識者因訪求得失資以為官洛下莫若李處士戡某謝曰某所恨未見者即日造其廬遂旦夕往來開成元年春二月平盧軍節度使王公彦威聞君名挈卑辭於簡副以幣馬請為節度巡官明年春平盧府改西歸病於路卒於洛陽友人王廣思恭里第享年若干君諱戡字定臣七代祖渤海王奉慈祖杠衢州盈川令父登婺州浦陽尉浦陽晩無子夫人吳興沈氏夢一人狀甚偉捧一嬰兒曰予為孔丘以是與爾及期而生君因名曰天授君幼孤旁無羣從可以附託年十餘歲即好學寒雪拾薪自炙夜無然膏黙念所記年三十盡明六經書解决㣲隱蘇融雪釋鄭𤣥至于孔頴達輩凡所為疏注皆能短長其得失一舉進士恥不肯試歸晉陵陽羡里得山水居之始開百家書縁飾事業每有小功喪訖制不食肉飲酒語言行止皆有法度陽羡民有鬭諍不决不之官人必以詣君所著文數百篇外于仁義一不關筆嘗曰詩者可以歌可以流於竹鼓於絲婦人小兒皆欲諷誦國俗薄厚扇之於詩如風之疾速嘗痛自元和已來有元白詩者纎艶不逞非莊士雅人多為其所破壊流於民間疏于屏壁子父女母交口教授淫言媟語冬寒夏熱入人肌骨不可除去吾無位不得用法以治之欲使後代知有發憤者因集國朝已來類於古詩得若干首編為三巻目為唐詩為序以導其志居江南秀人張知實蕭寘韓乂崔壽宋邧楊發王廣皆趨君交之後皆得進士第有名聲官職君尚為布衣然於君不敢稍怠君在洛中困甚河陽節度使蕭洪移鎮鄜州諌議大夫蕭俶以君言於洪洪素敬諌議即欲謁君以請君曰人皆譁言洪盗籍外戚一窺其面能易吾死尚且不忍死况為其黨乎居數月洪果敗娶𢎞農楊氏女早卒子二人長曰審之次曰鼎郎始五歲以某年月權葬於常州義興縣某鄉里某於君為晩交得君最厚因為之銘曰命如煙雲道比宫宅煙雲飄揚莫知往來為道不至無以偃息有道有命偶然相值命不在我不肖亦貴豈可指此與彼為市嗚呼定臣曰德孔修曰學必聖飭我兢兢不一言命可傳其心以教後生嗚呼哀哉唐故淮南支使試大理評事兼監察御史杜君墓誌銘君諱顗字勝之曾祖凉州節度使襄陽公贈左僕射希望大父司徒平章事太保致仕岐國公贈太師佑皇考駕部員外郎贈禮部尚書從郁君幼孤多疾目視昏近先夫人不令就學年十七讀尚書十三篇禮記七篇漢書至賈誼傳不復執巻年二十四明年當舉進士始握筆草闕下獻書與裴丞相度指言時事成合數千字不半歲遍傳天下進士崔岐有文學峭澁不許可人詣門贈君詩曰賈馬死來生杜顗中間寥落一千年二十五舉進士二十六一舉登上第時賈相國餗為禮部之年朝士以進士干賈公不獲有傑强毀嘲者賈公曰我只以杜顗敵數百輩足矣始命試秘書正字匭使判官李丞相德裕出為鎮海軍節度使辟君試協律郎為巡官後貶袁州語親善曰我聞杜巡官言晩十年故有此行太和九年夏君客揚州六月授咸陽尉直史館君曰訓注必亂可徐行俟之至之汴三兇敗及洛以疾辭東下居揚州之龍興寺丞相牛公僧孺請君入幕府君謝曰李公在困未願副知已開成二年春目益昏冬遂喪明李為淮南節度使復請為試評事兼監察觀察御史支使兄牧自馮翊迎醫石生曰是狀腦脂下融名曰内障如蠟塞管蠟去管明俟脂凝可以抉去無不愈者後二年石曰可治治不效自馮翊别迎醫醫曰嗟乎障有赤脉如木根橫去牢不可斷是法名曰日脚内障生日脚者法不可治君因居淮南築室治生不復言治眼事聞於天下無不嗟嘆君安泰自如令人旁讀十三代史書一聞不遺客來與之議論證引聽者忘去年四十五大中五年二月二十五日卒一男麟師年十嵗女曰暑兒始五嵗六年二月八日歸葬先塋實萬年縣洪原鄉陵西南二里某今年五十假使更生十年為六十人不夭矣與君别止三千六百日爾况早衰多病敢期六十人乎忍不抑哀以銘吾弟銘曰古之達人以生為寄為夢以死為歸為覺不知生偶然乎其有裁受乎偶然即泯為大空與不生同其有裁受乎嗚呼勝之今既歸而覺矣其自知矣何為而然乎嗚呼哀哉唐故灞陵駱處士墓誌銘灞陵駱處士名峻字肅之華州華隂人也當建中四年年二十遊京師值泚亂為其黨源休拘委以事處士逸一日夕行二百里拜親於華隂因啓度賊終不能東出百里間鄉里不足憂願得一見天子於艱危中遂入奉天至漢中屢以兵食干執事者後長安李懷光踵叛闗中公私饑李馬渾兵十餘萬計日餉食有司因請授處士岳州灞陵尉繋職於饋運間後四遷上揚州士曹參軍至元和初以母喪去職哀哭濵死終喪因曰汚吾跡二十餘年者食豐衣鮮以有養也今可以行吾志也乃於灞陵東坡下得水樹以居之相國杜公黃裳在蒲津相國張公𢎞靜在并州大梁渾尚書鎬在易定潘侍郎孟陽在蜀之東川司徒薛公革在鄭滑皆挈卑詞幣馬至門曰處士不能一起助我為治乎皆以疾辭長慶初桂府觀察使杜公凡兩拜章乞為梧州刺史詔因授之衆皆曰今黃家洞賊熾邕容兵連敗縮首不出猶鼎鼈爾交阯殺都䕶復旱亂相仍朝廷豈捐此三處不以公治之而久置公為梧守耶處士慘而讓祇以疾辭解訖不言其他爾後人知其堅不可復動矣田三百畝菓蔬占其一捽墾辛苦不受人一錢惠朝之名士多造其廬未嘗以栖退超脫之高露於言色温敬畏下如勇於仕進者論及當代利病活人緩邊之策必亹亹盡吐冀達於在位者至於安危機鍵之語黙不出口尤不信浮圖學有言者必約其條目引六經以窒之曰是乃其徒盗夫子之㫖而為其辭是安能自為之善畫山水狀鑑者比之朱審王維之儔里百家鬬訴凶吉一來决凡三十六年無一日不自得也以會昌元年十一月某日卒年七十九以某月日歸葬於華隂縣先人之墓處士嘗曰相國劉公晏不急征不橫賦承亂亡之餘食數十萬兵者二十餘年斯過蕭何逺矣每長短校量今古富人強國之術我烈祖司徒岐國公趙國公李公當貞元元和時儒學術業冠天下每與處士語未嘗不嗟嘆其才恨其尚壯不可屈以仕優禮接之嗚呼賢哉銘曰不見可欲使心不亂古之作者窮栖自斷去聲子伯子至王霸久臥向栩相趙馬良車煥子夏高弟心中交戰處士之居洛青門畔文駟連羈繡軒交貫危冠自喜前縈後絆言訖揖去一如不見我齒未衰誰為已知岐公主師見必迎喜語必移時論兵計食屈指無遺功名富貴不能鈎之諸侯六辟南服一麾笑而不答亦無是非三百畝田百實繁滋三十六年食具衣完人其去矣誰知其端嗚呼賢哉復州司馬杜君墓誌銘公諱銓字謹夫河西隴右節度使襄陽公贈司空之曽孫司徒岐國公贈太師之孫司農少卿贈給事中之子公以岐公䕃調授揚州參軍同州馮翊縣丞衛尉考主簿鄂州江夏縣令復州司馬年六十某年月日終于漢上别業岐公外殿内輔凡十四年貴富繁大兒孫二十餘人晨昏起居同堂環侍公為之親不以進門内家事條治裁酌至於筐篋細碎悉歸於公稱謹而治自罷江夏令卜居於漢北泗水上烈日笠首自督耕夫而一年食足二年衣食兩餘三年而室完新六畜肥繁器用皆具凡十五年起於墾荒不假人之一毫之助至成富家翁常曰忍恥入仕不縁妻子衣食者舉世幾人彼忍恥我勞力等衣食爾顧我何如後授復州司馬半歲棄去終不復仕以某月日歸葬於長安城南少陵原司馬村先塋某為從父弟泣涕而書銘曰公侯之家所業唯官薄官業農墾荒室完入仕多恥以農力勞等衣食爾勞力者賢歸全故丘慶期孫子唐故邕府巡官裴君墓誌銘君諱希顏字某裴氏於百氏中獨標其族曰眷三分之為東西中君東眷裴在國朝名位最著曰冕艱難中定册立肅宗於靈武而相之繼相代宗僅十五年國史有傳冕於君為堂伯祖父王考某終朗州刺史娶宣州寧國令滎陽鄭某女生四男君為首生朗州為盩厔河西令道朗二州刺史公亷剛簡强於愛人凡闗百姓一毫事與京兆尹節度使爭論大聲於廷府間前如無人然未嘗以杖責治家家人有過失則諭之諭不變者出之為良人終不忍牽鬻於市將終鄭夫人泣請遺令曰吾之廏騾為盩厔時役之今踰十年聽其老死慎不可賣言訖而絶君生寖染仁父之化温良柔友窮居鄠縣饑寒餘二十年未嘗出一言以愠不足司農卿裴及為邕府經畧使辟君為從事得南方疾歸大中二年某月日卒于其家享年若干不娶無子某娶裴氏實君之私其弟覺泣來請銘銘曰淑其性生無位死無子孰識其端唐故范陽盧秀才墓誌銘秀才盧生名霈字子中自天寳後三代或仕燕或仕趙兩地皆多良田畜馬生年二十未知古有人曰周公孔夫子者擊毬飲酒馬射走兎語言習尚無非攻守戰鬭之事鎮州有儒者黃建鎮人敬之呼為先生建因語生以先王儒學之道因復曰自河而南有土地數萬里可如燕趙比者百數十處有西京東京西京有天子公卿士人畦居兩京間皆億萬家萬國皆持其土產出其珍異時節朝貢一取約束無禁限疑忌廣大寛易嬉遊終日但能為先王儒學之道可得其公卿之位顯榮富貴流及子孫至老不見戰爭殺戮生立悟其言即隂約母弟雲竊家駿馬日馳三百里夜扺襄國界捨馬步行徑入王屋山請詣道士觀道士憐之置之外門廡下席地而處始開孝經論語布褐不襪捽草為茹或竟日不得食如此凡十年年三十有文有學日閑習人事誠敬通達汝洛間士人稍稍知之開成三年來京師舉進士於羣輩中酋酋然凡曰進士名者多趨之願與之為交生嘗曰丈夫一日得志天子召座於前以笏畫地取山東一百二十城唯我知其甚易爾因言燕趙間山川夷險教令風俗人情之所短長三十年來王師攻擊利與不利其所來由明白如彩畫一一可以目覩開成四年客逰代州南歸某月日於晉州霍邑縣界晝日盗殺之京師名進士聞之多有哭者資其弟雲至霍邑取生喪來長安以某年月日葬於城南某鄉里其所資費皆出於交遊間曾祖昌嗣涿州刺史祖顗易州長史父勸鎮州石邑令某常以生之材節薦生於公卿間聞生之死哭之因誌其墓唐故進士龔軺墓誌會昌五年十二月某自秋浦守桐廬路由錢塘龔軺袖詩以進士名來謁時刺史趙郡李播曰龔秀才詩人兼鼔琴因令操流波弄清越可聽及飲酒頗攻章程謹雅而和飲罷某南去舟中閱其詩有山水閑淡之思後四年守吳興因與進士嚴憚言及鬼神事嚴生曰有進士龔軺去歲來此晝坐客館中若有二人召軺者軺命馬甚速始跨鞍馬驚墮地折左脛旬日卒余始了然憶錢塘見軺時徐徐尋思如昨日事因知尚殯于野乃命軍吏徐良改葬于卞山南去州城西北一十五里嚴生與軺善亦不知其鄉里源流故不得記嗚呼胡為而來二鬼驚馬折脛而死哉大中五年辛未歲五月二日記自撰墓銘牧字牧之曾祖某河西隴右節度使祖某司徒平章事岐國公贈太師考某駕部員外累贈禮部尚書牧進士及第制䇿登科𢎞文館校書郎試左武衛兵曹參軍江西團練巡官轉監察御史裏行御史淮南節度掌書記拜真監察分司東都以弟病去官授宣州團練判官殿中侍御史内供奉遷左補闕史館修撰轉膳部比部員外郎皆兼史職出守黃池睦三州遷司勲員外郎史館修撰轉吏部員外以弟病乞守湖州入拜考功郎中知制誥周歲拜中書舍人某平生好讀書為文亦不出人曹公曰吾讀兵書戰䇿多矣孫武深矣因注其書十三篇乃曰上窮天時下極人事無以加也後當有知之者去歲七月十日在吳興夢人告曰爾當作小行郎復問其次曰禮部考功為小行矣言其終典耳今歳九月十九日歸夜困亥初就枕寢得被勢乆酣而不夢有人朗告曰爾改名畢十月二日奴順來言炊將熟甑裂予曰皆不祥也十一月十日夢書片紙皎皎白駒在彼空谷傍有人曰空谷非也過隙也予生於角星昴畢於角為第八宫曰病厄宫亦曰八殺宫土星在焉火星繼木星王楊晞曰木在張於角為第十一福德宫木為福德大君子救於其旁無虞也予曰自湖守不周歲遷舍人木還福於角足矣土火還死於角宜哉復自視其形視流而疾鼻折山根年五十斯壽矣某月某日終于安仁里妻河東裴氏朗州刺史偃之女先某若干時卒長男曰曹師年十六次曰秜秜年十二别生二男曰蘭曰興一女曰真皆幼以某月日葬於少陵司馬村先塋銘曰後魏太尉顒封平安公及子九世皆葬少陵嗟爾小子亦克厥終安于肅宫樊川集卷六欽定四庫全書樊川集巻七唐杜牧撰
