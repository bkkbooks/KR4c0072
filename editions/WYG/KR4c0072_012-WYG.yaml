body:
  text: 上周相公書某再拜伏以大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人已來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維清奏象舞之篇曰維清緝熈文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受殷王專征之命也七年五伐留戰陣刺伐之法遺之武王武王用以伐紂而有天下致之清平為周家之禎祥周公居攝祀文武於清廟作此詩以歌舞文武之德其次兵之先者莫若鈎援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周之詩曰以爾鈎援與爾臨衝以伐崇墉臨衝閑閑崇墉言言此實文王伐崇墉傅于其城以臨車衝鈎援其城文王親自爲之夫文王何人也周公詩之夫子刪而取之列于大雅以美武王之功德手絃而口歌之不知後代之人何如此三聖人安有謀人之國有暴亂橫起戎狄乗其邊坐於廟堂之上曰我儒者也不能知兵不知儒者竟可知兵乎竟不可知兵乎長慶兵起自始至終廟堂之上指蹤非其人不可一二悉數高宗朝薛仁貴攻吐蕃大敗於大非川仁貴曰今年歲在庚午不當有事于西方此乃鍾鄧伐蜀身誅不返昨者誅討党羌徴闗東兵用於西方是不知天道也邊地無積粟師無見糧不先屯田隨日隨餉是不知地利也兩漢伐虜騎兵取於山東所謂冀之北土馬之所生馬良而多人習騎戰非山東兵不能伐虜昨者以歩騎百不當一是謂不知人事也天時地利人事此三者皆不先計量短長得失故困竭天下不能滅樸樕之虜此乃不學之過也不敎人之戰是謂棄之則謀人之國不能料敵不曰棄國可乎某所注孫武十三篇雖不能上窮天時下極人事然上至周秦下至長慶寳厯之兵形勢虚實隨句解析離為三編輒敢獻上以備閱覽少希鑑悉苦心即為至幸伏増惶惕之至某頓首再拜上宣州高大夫書某頓首再拜自去歲前五年執事者上言云科第之選宜與寒士凡為子弟議不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潜䑕遁無入仕路某竊惑之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盗取讐取於夷狄豈計其所由來况國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公已降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名不令得美仕則自堯已降聖人賢人率多子弟凡此數者進退取舍無所依據某所以憤懣而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄柳下惠出於公子無駭諸侯之子稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武莊之族也舉其尤者華元子罕向戍是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚甯武子卿大夫之裔也齊之晏嬰晏桓子子也曹之子臧公子也吳之季扎王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子產子張子大叔是也楚之良臣子囊子西子期皆王子也子庾王孫也其卿大夫之裔鬭氏生令尹子文後有鬭辛鬭巢鬭懷昭王國皆有功蒍氏生蒍賈孫叔敖蒍文薳啓疆薳子憑薳掩薳罷屈氏生屈蕩屈到屈建材六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為強其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏已下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不知論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公𤣥齡進士也相太宗凡二十一年為唐宗臣比之伊吕周召者郝公處俊亦進士也為宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李𤣥義皆進士也後為宰相濟助長孫太尉褚河南共摧武后者後突厥入塞免胄戰死儀革廢武后召𤣥義助處俊言不可以位與武后婁侍中師德亦進士也吐蕃强盛為監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積穀八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公柬之亦進士也年八十為相敺致四王手提社稷上還中宗郭代公元振亦進士也鎮凉州僅十五年北却突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也為宰相發太平公主謀以佐𤣥宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐𤣥宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制䇿科與𤣥宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普於韋后黨中小許公佐𤣥宗朝號為蘇宋張燕公說登制策科排張易之兄弟賛睿宗請𤣥宗監國竟誅太平公主招致文學士開内學館𤣥宗好書尚古封中太山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守珪不斬安禄山謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周歲拒賊十三萬兵出天寳雜記使賊不能東進尺寸以全江淮元和中宰相河東司空公中書令裴公皆進士也裴公仍再得宏辭制䇿科當貞元時河北叛齊蔡亦叛階此蜀亦叛吳亦叛其他未叛者皆高下其目熟視朝廷希嚮強弱而施其所為司空公始相憲宗廢權倖之機牙令不得張收歛百職歸於有司命節度使出朝廷不由兵士始自撫州徐袁相為滑州滑州凡二月無帥三軍無事憲宗始信之自此不用貞元制專以行軍副使大將軍為節度使抜取沉滯各還其官開州取唐會人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用也然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡忠剪蔡劇賊於洛師脅下招來常山質其二子以累其心取十三城使不得與齊交手為冦因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者也不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅說命高宗曰監于先王成憲其永無愆故殷道復興鴻鴈美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁公佐𤣥宗亦以務舉貞觀之法制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其旨意所向皆本仁義而歸忠信加以辭彩遒茂皎無塵土况有誠明長厚之譽於千人中倘使前五六年得進士第今可以出入諌官御史助明天子為治矣古人云三月不仕則相弔安有凡五六年來選取進士施設􅃠罟如防盗賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古今未前聞也某因覽三郎文章不覺發憤略言大槩干觸尊重無任惶懼某再拜上李中丞書某入仕十五年間凡四年在京其間卧疾乞假復居其半嗜酒好睡其癖已痼往往閉户便經旬日弔慶參請多亦廢闕至於俯仰進趨隨意所在希時徇勢不能逐人是以宦途之間比之輩流亦多困躓自顧自念守道不病獨處思省亦不自悔然分於當路必無知已黙黙成戚守日待月冀得一官以足衣食一自拜謁門館似䝉奬飾敢以惡文連進几案特遇采録更不因人許可指教實為師資接遇之禮過等詢問之辭悉纎雖三千里僻守小郡上道之日氣色濟濟不知沉困之在已不知昇騰之在人都門帶酒笑别親戚斯乃大君子之遇難逢世途之不偶常事雖為逺官適足自寛某世業儒學自高曾至于某身家風不墜少小孜孜至今不怠性顓固不能通經于治亂興亡之跡財賦兵甲之事地形之險易逺近古人之長短得失中丞即歸廊廟宰制在手或因時事召置堂下坐之與語此時迴顧諸生必期不辱恩奬今者志尚未泯齒髮猶壯敢希指顧一罄肝膽無任感激血誠之至某恐懼再拜與人論諌書某疎愚放惰不識機括獨好讀書讀之多矣每見君臣治亂之間興亡諌諍之道遐想其人䑛筆和墨則冀人君一悟而至于治平不悟則烹身滅族唯此二者不思中道自秦漢已來凡千百輩不可悉數然恐諌而激亂生禍者累累皆是納諌而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑凌尊以下干上是以諌殺人者殺人愈多諌畋獵者畋獵愈甚諌治宫室者宫室愈崇諌任小人者小人愈寵觀其旨意且欲與諌者一鬭是非一决怒氣耳不論其他是以每於本事之上尤増飾之今有兩人道未相信甲謂乙曰汝好食某物慎勿食果食之必死乙必曰我食之乆矣汝謂我死必倍食之甲若謂乙曰汝好食某物第一少食苟多食必生病乙必因而謝之減食何者迂險之言則欲反之循常之說則必信之此乃常人之情世多然也是以因諌而生亂者累累皆是也漢成帝欲御樓船過渭水御史大夫薛廣德諫曰宜從橋陛下不聽臣自刎以血汚車輪陛下不廟矣不得入廟祠也上不說張猛曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶謂諫諍之言當如猛之詳善乃從橋近者寳厯中敬宗皇帝欲幸驪山時諌者至多上意不决拾遺張權輿伏紫宸殿下叩頭諌曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡𤣥宗皇帝宫驪山而禄山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶耶我宜一往以驗彼言後數日自驪山迴語親倖曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚髙論令可行也今人閑居無事友朋骨肉切磋規誨之間尚宜旁引曲釋亹亹繹繹使其樂去其不善而樂行其善况於君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諌而直諌為下前數披閤下諌疏錫以幣帛僻左且遠莫知其故近於逰客處一睹閤下諌草明白辯婉出入有據吾君聖明宜為動心數日在手味之不足且抃且喜且慰三者交并不能自止吾君聞諌既且行之仍復寵錫誘能諌者斯乃堯舜禹湯文武之心也聞於遠地宜為吾君抃也閤下以忠孝文章立於朝廷勇於諌而且深於其道果能動吾君而光世德某䝉閤下之厚愛冀於異時資閤下知以進尺寸能不為閤下之喜復自喜也吾君今日披一疏而行之明日聞一言而用之賢才忠良之士森列朝廷是以奮起志慮各盡所懐則文宗武宗之業窮天盡地日出月入皆可掃洒以復厥初某縱不得効用但於一官一局筐篋簿書之間活妻子而老身命作為歌詩稱道仁聖天子之所為治則為有餘能不自慰故獲閤下之一疏抃喜慰三者交并真不虚也宜如此也無因面讃其事書紙言誠不覺繁多某再拜上浙西盧大夫書某頓首再拜某年二十六由校書郎入沈公幕府自應舉得官凡半歲間既非生知復未涉人事齒少意銳舉止動作一無所據至於報效施展朋友與遊吏事取舍之道未知東西南北宜所趨向此時郎中六官一顧憐之手携指畫一一誘教丁寧纎悉兩府六年不嫌不怠使某無大過而粗知所以為守者實由郎中之力也去歲給乞路由漢上員外七官以某嘗獲知於郎中惠然不疑推置於肺肝間某恃郎中之知亦敢自道其志公私謀議各悉所懐一俯一仰如乆而深者乆欲資郎中員外之為階級遠干尊重欲望成䘏䑛筆伸紙以復踰於三四因曰既階級矣步欲升堂與排闗而入者事不同日式㣲詩曰何其處也必有與也言必有仁義與我所以處而不去也進退計忖不宜得罪今敢謹寫所為文十四首編為一巻繼進於後愛之不倦為之不已不至於工今以為獻無任慙惶然特為進說之端非敢因此求知不勝攀戀惕懼之至某再拜樊川集巻九欽定四庫全書樊川集巻十唐杜牧撰
