body:
  text: 李訥除浙東觀察使兼御史大夫制勅仲尼以舉賢才則理大禹以能官人則安况西界浙河東奄左海機杼耕稼提封七州其間繭税魚鹽衣食半天下不有可仗豈宜委之正議大夫使持節華州諸軍事守華州刺史兼御史中丞充潼闗防禦鎮國軍等使上柱國隴西縣開國男食邑三百户賜紫金魚袋李訥温良恭儉齊莊中正實以君子之徳華以才人之辭􅆒歴清顯昭彰令聞輟自掌言式是近輔子貢為清廟之器仲弓有南面之才智莫能欺剛亦不吐表率教化皆有法度今者兵為農器革作軒車言於共理在擇循吏是故用巳效之績託分寄之任擁蒨斾而服𤣥玉化千里而有三軍儒者之榮莫過於此孔子曰仁者愛人智者知人愛人則疲羸可蘇知人則才幹不棄土宇既廣殺生在我考此二者可以報政榮加副相用壓大邦爾其勉之無忝所舉可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練觀察處置等使散官勲封賜如故盧搏除廬州刺史制勅夫立人伯長此周文王所以敬事上帝也况廬江五城環地千里口衆賦重豈可輕授朝議郎守尚書刑部郎中柱國賜緋魚袋盧搏以文學策名才能入仕周歴臺閣嘗宰繁劇欝有佳譽兼報善政今者出郎官之帳懸太守之章言於清時不為不遇上有命則違之上有好則效之此乃成王命君陳之言也故行令不如行化律人不如律身念兹二者可長人矣無忝分寄李暨除絳州刺史魏中庸除亳州刺史曹慶除威逺營使等制勅中散大夫使持節亳州諸軍事守亳州刺史充本州團練鎮遏使雲騎尉賜紫金魚袋李暨等昔貞觀末遣孫伏伽等二十二人各以六條巡察郡縣以能進者止二十人獲死者七人流竄黜免僅千百輩以太宗皇帝上聖憂勤之切百執事奉法公謹之心守臣為奸如此之衆况今黜陟乆廢仕進多門緬思疲人每渴良吏牧守之念予嘗軫懷暨實文士出典兵郡不薄為吏愛我百姓盗賊奸宄寢而不作鰥寡孤獨皆有所養中庸再分符竹聞立善政凡為理者皆高仰之今用已効之才各委共理之任簿書刀筆俗吏事耳慈惠教化君子宜之二者較然爾欲何取慶乃身帶兩綬兵分禁營得佩牛刀立於交戰或有鄉里之譽克肖友悌之風百里長人在王畿内各思答效無忝寵榮可依前件李誠元除朔州刺史制勅銀青光禄大夫檢校國子祭酒前使持節都督勝州諸軍事兼勝州刺史御史中丞充本州押蕃落及義勇軍等使上柱國李誠元開元時吐蕃上書悖慢無禮皆邊將造偽交鬭華夷冀立功勲以求爵賞自長慶巳降怠於制置西北守帥多非其人侵虐種落厚自封殖至使忿鷙之性不甘欺奪之苦近者聚為内㓂至乃騷動天下因令循撫果效信順是以屢詔執事愼於選求僉曰誠元家本北邊志氣慷慨將軍之子頗傳父業學萬人敵知四夷事跡榆林之前政寄馬邑之名邦仍留兼官用震殊俗夫車馬甲兵戰之器也禮樂慈愛戰所蓄也然後要之誠信禦以堅明雖曰戎夷豈不畏服深期國士無頽家聲可檢校國子祭酒使持節朔州諸軍事兼朔州刺史御州中丞散官勲如故薛逵除秦州刺史制勅兵者凶器也將者死官也若不擇才必有䧟敗銀青光禄大夫檢校右散騎常侍使持節隴州諸軍事兼隴州刺史御史大夫充本州防禦使上柱國薛逵匈奴犯塞李廣逢時爪牙甚堅翅翼頗健任以泝隴倚戎守封當賜輒分軍租不入士爭為死虜不敢犯今以天水名郡號為新都用汝守之期於鎮靜無召戎生事無翫戎邀功正封疆守禮信險走集嚴候伍邊將之道莫過於斯弄印貂冠皆為榮秩壯爾軍旅惟恐不多勉礪鋒鋩以期報效可檢校右散騎常侍使持節秦州諸軍事兼秦州刺史御史大夫充天雄軍使兼秦成兩州經畧及義寧軍行營鎮遏都知兵馬使本道營田等使散官勲如故田克加檢校國子祭酒依前宥州刺史制勅銀青光禄大夫檢校太子賔客使持節宥州諸軍事兼宥州刺史御史中丞充經畧軍使押蕃落副使左神策軍宥州行管都知兵馬使上柱國雁門郡開國侯食邑一千户田克梟俊無敵感激輕生李信之氣葢關中陳安之勇聞隴上委以邊郡能得士心㓂圍隂河守陴甚寡爾乃萬死不顧一奮無前奇兵徑衝驍騎横挑圍開孤壘戰敗豪羌言念忠勞豈愛爵賞帖以崇秩用酬奇功畢萬匹夫也百戰皆獲有馬百乗死於牖下死不在㓂此乃趙鞅誓衆之辭也宜念古人之言勉作萬夫之特可檢校國子祭酒餘俱如故薛淙除鄧州任如愚除信州虞藏玘除卬州刺史等制勅朝議郎前使持節坊州諸軍事守坊州刺史薛淙等仲尼對魯哀公曰人道之大莫先為政漢宣帝曰與我共治者其惟良二千石乎念先師賢聖之言思疲人良吏之選夙興夜寐不忘於此淙以文科入仕命守邊郡屬當伐叛兵於其郊處劇不繁事叢皆辦如愚進以門子屢為長吏其有政化可差古人藏玘與逢閱官簿而頗多言理名而亦著紹元嘗聞謹慎可宰百里巳所不欲勿施於人無忘格言副我優寄可依前件鄭液除通州刺史李䝉除陳州刺史等制勅朝議郎前守太原府晉陽縣令上柱國鄭液等今之郡守為人師帥宣上教化者也以液乆在官途嘗宰大邑聞其為治人歌舞之以䝉執殳前驅予之雄也光禄䕶塞居延視胡虜不敢窺士爭為死各委分寄實曰遷升通州雜以華夷淮南兩有兵賦爾其徃哉今用誡爾為天子之守臣作百姓之長吏言於仕進可曰顯榮夫君子之道先有諸巳後求諸人苟能律身始可檢下勉詳詔令用謹理行從規始於門子入仕恭謹無尤自州佐而升在朝班列五尚而職三服亦為良遇無忝官常可依前件王晏實除齊州吳初本巴州陳侹渝州刺史等制勅正議大夫前使持節淄州諸軍事守淄州刺史上柱國太原縣開國男食邑五百户賜紫金魚袋王晏實等俟善政而後用或蔑無所聞滯序進之常途則怨生於下古今政柄患斯二者晏實初本侹等三人入仕年多亦嘗為郡聞無悔吝是孰詔條濟南跨河有兵有賦巴渝夷俗慷慨豪健刑於樂典爾其往哉古之人有言曰子苟為善誰敢不勉身率以正孰敢不正欲謹於行在於㢘平𢎞宗温愼有餘王屬咸為清秩銖以文學嘗佐賢侯作掾京兆亦曰美仕皆有官業愼無自薄可依前件郭瓊除渠州郭宗元除興州等刺史王康除建陵臺令等制勅太中大夫前使持節文州諸軍事守文州刺史兼侍御史充本州鎭遏使上柱國郭瓊等鄰山順政僻處山谷罕知文律易為欺奪瓊與宗元守郡宰邑聞無悔吝爾其往哉仲尼曰正身而人正欲善而人善撫我疲俗宜遵格言苟或不臧貽爾之戚雅康入仕嘗在班列青宫贊導陵邑守奉若非謹慎不膺斯任可依前件吳從除蓬州賈師由除瓊州蕭蕃除羅州刺史等制勅中散大夫前使持節柳州諸軍事守柳州刺史上柱國賜紫金魚袋吳從等地逺京邑俗雜蠻夷不知文律易為欺奪朝廷選置多無名人小則抑欝不伸大則聚以為冦蓬縁巴徼其風忿勁瓊處海外在兩漢時往往小反羅居百越磎洞深阻咨爾三吏比嘗為郡亦執有政勿以荒服侮我疲人或異詔條必寡厥辟涓當叙進優以上佐苟有聞見無忘裨助可依前件裴閲除温州刺史伊實除獻陵臺令等制勅正議大夫前使持節忠州諸軍事守忠州刺史上柱國裴閱等江峽之間其俗剽悍聞爾為理人惜其去若不遷陟豈酬政能洎師素等久居官常皆無悔吝半刺列郡人所咨禀衣冠弓劍之地霜露感思之心尤藉謹良以顓守奉各服休命勉於始終可依前件陸紹除信州刺史封載除遂州刺史鄭宗道除南鄭縣令等制勅中大夫前使持節申州諸軍事守申州刺史上柱國賜紫金魚袋陸紹等夫以冉求之才方六七十為之三年然後可使足人今者一州之地五六於此况上饒參以越俗遂寧旁縁巴徼號為沃野皆有厚賦委之分寄實難其人以紹其先君子仍代作相能以儒學縁飾吏理以載頗有長者之舉聞於士林之間夫二千石所繫朕常留念舉以授爾能不誨乎䘏孤獨逮不足修其教狥其宜凢此四者著於王制勉循古道以活疲民宗道宰邑卓然善政㢘使上課書為第一列於遷陟得以不時無易初心以失前效可依前件張徳翁除歸州刺史李承訓除福昌縣令盧審矩除陽翟縣令等制勅朝議郎前京兆府渭南縣令上柱國張徳翁等徳翁承訓審矩為天子之守臣作百姓之長吏仕而至此斯亦逹矣匹夫為善人猶則之守令所為誰敢不化詩曰爾之教矣人胥效矣可不勉之量助奉陵邑以謹愼選執臨師景參諒等各以序進亦為良遇可依前件王樟除雅州刺史郭錥除右諭徳等制勅朝議郎前守成都縣令上柱國賜緋魚袋王樟等盧山江關扼束控西南夷置吏不善所虞非細以樟嘗宰劇縣在㑹府中條令和平吏人嘉美跡爾前政撫予逺人禮曰人之所好巳亦好之人之所惡巳亦惡之以此用心何憂不理暨錥與綬門子清族閱其官簿入仕巳久東朝諭導名藩上寮頗為幽閑宜服休命可依前件傅孟恭除威州刺史宣敏加祭酒兼侍御史依前宣歙道兵馬使知防秋事等制勅開府儀同三司檢校國子祭酒前使持節都督銀州諸軍事兼銀州刺史御史中丞充本州押蕃落及監牧副使兼度支銀州營田使上柱國清河郡開國公食邑二千户傅孟恭等孟恭山西將門并州壯士雖長鉟都尉黑矟將軍校其忠勇無以過也左官非罪志氣益堅守邦有聞官業克奉今以威州新造虵豕之衛非爾材力不能震壓遂以武健佐助戎臣觀其列狀頗著勤效敏於窮塞提挈孤軍樹立和門繕完械用翬飛虹亘者三百間耀雪吹毛者數萬事言其勞績亦少比倫各兼憲班或伏熊軾可曰榮遇無自懈怠可依前件姚克柔除鳯州刺史韋承鼎除櫟陽縣令王仲連贊善大夫等制勅中散大夫前使持節利州諸軍事守利州刺史上柱國姚克柔等仲尼曰人道之大莫先為政之功者其長人乎克柔嘗典一邦愈知為理承鼎增宙等開敏有材幹能堪事河池名郡畿内小侯仕於清時皆為良遇大凡為理之要先事孤弱譬諸草木無倦栽培仲連荏苒宦途歲月滋久東朝贊導亦曰升遷各愼厥官無忝榮命可依前件朱載言除循州刺史袁循除渭南縣令張公及除獻陵令韋㓜章除京兆府倉曹等制勅前靈鹽節度掌書記朝請郎試大理司直兼殿中侍御史朱載言等刺史縣令皆古之五等諸侯行詔條紀綱專教化殺生者也得其才則疲人蘇息非其任則百姓愁怨載言循省問逺等或以吏理進官或以科名入仕當此選擇聞無悔尤海豐越俗王畿名邑夫邪正表前之影教令草上之風若非律身不能為理公及以謹勤膺陵邑愼選㓜章以才敏坐京兆劇曹各有官業無自廢怠可依前件支某除鄆王傅盧賔除融州刺史趙全素除福陵令等制勅銀青光禄大夫前使持節邢州諸軍事守邢州刺史兼侍御史充本州團練使上柱國支某等近者控名責實事不苟且量材適用咸當所宜咨爾某等各於進官亦以勞久至門為傅越徼分憂洎守奉園陵毗佐列郡皆曰美秩盡獲優安各務清勤無掇悔吝可依前件鄭㥄除大理少卿致仕制勅朝散大夫檢校太僕少卿前兼江陵少尹上柱國鄭㥄四代所貴事皆不同至於尚齒其道一也聞爾久居官次年踰月制家惟四壁身無一簮今者致政里居亞列半俸足得安枕几而就頥養敬老之道亦為優異可守大理少卿致仕散官勲如故樊川集巻十五欽定四庫全書樊川集巻十六唐杜牧撰
