  text: 樊川文集第十五
  hash: sha256:83198f7a89d7d09fbb04c76d1c6908f7c04bbe519ebf3877b8d60fa9caaacec5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_015-1a}
body:
  text: 中書舍人杜牧字牧之黃州刺史謝上表臣某言臣奉某月日勑旨自某官授臣黃州刺史以某月日到任上訖誠惶誠恐頓首頓首臣某自出身巳來任職使府雖有官業不親治人及登朝二任皆參臺閣優遊無事止奉朝謁今者蒙恩擢授刺史專斷刑罰施行詔條政之善惡唯臣所繫素不更練兼之昧愚一自到任憂惕不勝動作舉止唯恐罪悔伏以黃州在大江之側雲夢澤南古有夷風今盡華俗戶不滿二萬稅錢才三萬貫風俗謹朴法令明具久無水旱疾疫人業不耗謹奉貢賦不為罪惡臣雖不肖亦能守之然臣觀東漢光武明帝稱為明主相繼聮五十年當時以深刻刺舉號為稱職冶古之風廢俗吏之課髙於此時循吏衛颯任延王景魯恭劉寬陳寵之徒上一縣宰獨能不徇時俗自行教化唯德是務愛人如子廢鞭笞責削之文用忠恕撫字之道百里之內勃生古風凡違衆背時徇古非今王者公侯尚難其事豈一縣宰能移其俗止蓋人為治古之人法為一時之法治以之教教之即治古之人以一時之法齊之即一時之人正國家自有天下巳來二百三十餘年間專用仁恕每後刑罰是以內難外難作者相繼土地甲兵權柄號令盡非我有終能擒之此實恩澤慈愛入人骨髓俗厚風古不可搖動今自陛下即位巳來重罪不殺小過不問普天之下蠻貊之邦有罹艱凶一皆存恤聖明睿哲廣大慈恕逺僻隱厄無不歡戴十四聖之生育張二百四十年之基宇臣於此際為吏長之敢不遵行國風彰揚至化小大之獄必以情恕孤獨鰥寡必躬問撫庶使一州之人知上有仁聖天子所遣刺史不為虛受蒸其和風感其歡心庶為瑞為祥為歌為詠以禆盛業流乎無窮在臣心之則然豈材術之能及無任感激悃懇血誠之至謹奏賀平黨項表臣某言伏奉三月二十七日勑黨項剪除北邊寧靜華夏同慶道路歡呼臣誠慶誠抃頓首頓首伏以上天有震耀殺戮王者有攻討誅夷是以不暫討者不久寧不一勞者不永逸伏以自古夷狄處中華未有不為患者春秋時長狄攻魯北戎病齊破衛陵燕侵秦撓晉西漢趙充國納先零於內地東朝馬文泉置當煎於三輔自後熾大侵亂關中戰爭十年騷擾四海陵逼京邑發掘園陵假熲不生終不能滅後至曹公因胸奴衰弱分為五部處在汾晉散而居之元海傑然首亂華夏中原喪沒凡數百年國朝貞觀之𥘉突厥破滅太宗惑彥博之利口忽文貞之成算處其降衆置於河南不數十年果殘燕趙興師命將輸榖饋財天下騷然始能殄滅是知今古夷狄處在中土未有不為亂者伏以黨羌雜種本在河外生西北之徑俗稟天地之戾氣為西戎所蹙舉種來降國家納之置於內地爰受冠帶兼伏征徭角觡既成抵觸是務天寶至德之際北燕偏重去聲中原一掀大曆建中之際逆胡餘波巨盜再起黨羌因此亦恣猖狂兔伏鳥飛為戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正強且須羈縻未可重撅於是邉疆日駭種類嵗繁每至徑弓折膠重馬免乳以魁健之質張忿鷙之凶劫饋穀以焚舟殺軺車而閉道衆虺盤結群犬吽牙依㨜深山出沒險徑近在宇下遊於彀中艱難巳來不能剷削伏惟聖敬文思和武光孝皇帝皇天縱聖赫日資明威極風霆謀先造化潛運睿算獨決神機箕宿禡牙狼星斂角戍日禱馬太白揚眉按瑣而邊事無遺聚米而兵形盡見披其要地搗以竒兵獸窮搏人鹿急走隘囊封赤白雜沓繼來雉走檄書逺近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍於枕席之上敗虜於險阻之中或以利戈春喉或以長矛挾脅僵尸積疊千山之草木飛腥霆電轟喧萬里之威稜大震詩曰不弔昊天亂靡有定此言中國不振蠻夷入伐下人號天以告亂也復曰宣王薄伐小雅中興是知武功不成文德不洽皋陶無遺之誡史佚非類之言若不殄除何為家國自此兵為農器革作軒車泥紫金於常山沉殘戎於青海天覆盡得禹畫無遺統華夏為一家用夷狄為四守萬物由道百度皆貞逺超三代之風使無一人之獄臣僻左小郡朴樕散材空過流年徒生聖代尚能為詩見志作歌極情上詠神功庶垂後代限以守土不獲稱慶無任踴躍欵懇之至謹奉表陳賀以聞臣誠惶誠恐頓首頓首謹言進撰故江西韋大夫遺愛碑文表右臣奉某月日勑牒令撰故江西觀察使韋丹遺愛碑文臣官卑人微素無文學恩生望外事出非常承命震驚以榮為懼伏以洪為州府逾於千年言念疲羸常患水火風俗如此改革無因韋丹受朝廷分憂為百姓去弊不踐舊迹特建宏謀凡三年苦心去千嵗大患兼之灌溉種蒔豐其衣食渤海頴川之治邵父杜母之恩授之于丹未足為比伏惟皇帝陛下陟降順帝施設如神納諌若轉丸去惡如反掌是以兵刑措寢年穀豐登而猶念切疲人及於循吏𬗟韋丹巳效之績慰江西去思之心特與彰揚創為碑紀是冝使內直學士西掖辭臣振發雄文流傳後代至於臣者最為鄙陋明命忽臨牢讓無路俯仰慙懼神魂驚飛臣不敢深引古文廣徴朴學但首敘元和中興得人之盛次述韋丹在任為治之功事必直書辭無華飾所兾通衢一建百姓皆觀事事彰明人人曉會但率誠朴不近文章受曲𬒳之恩私如生羽翼報非次之拔擢冝裂肝腸無任感激懇悃血誠之至其碑文本謹隨狀封進以聞謹奏為中書門下請追尊號表臣某等言伏以收復河湟廓開土宇北絶梓嶺西過榆溪壯中夏起塞之雄奪西戎理弓之地至使強虜不敢觸鋒山鎖七關地闢千里歌狸首而息射詠枤杜以勞旋聖德神功超今越古某月日臣某等於延英殿面奉德音陛下以尅定舊疆獲成先志歸功祖考追尊鴻名臣等伏念國家之為治也溢三皇之軌躅奮百代之上下天寶之末天下泰寧恃冨庶而醉飽無虞韜干戈而凶逆潛作大曆貞元之際河北河南之地朝廷行姑息之政郡國皆叛亂之臣苟且之令行畫一之法廢月增日長雄唱雌和李錡宗子劉闢書生東據石頭西斷劒閣朝廷所有唯止兩京伏惟憲宗皇帝順上帝之心酌列聖之法爵不踰等舉不失賢親莊正之人去側媚之士然後提挈綱紀震疊雷霆誅夷群凶灑掃四海百度如律九功可歌天業益張聖統無極詩曰惠我無疆子孫保之復曰周雖舊邦其命惟新伏惟元和之功實開中興之業伏惟聖敬文思和武光孝皇帝陛下修先王之大道行天下之逹德廣問延諌褒直盡下首雪冤獄常對法官是則虞舜恤刑文王慎罰無以過也開張聰明延納諌諍守職業者無職不舉𬒳言責者無事不言皆獲甄升豈唯假借夫仲尼以三人有我師大禹以愚夫能勝豫是仲尼之好問大禹之拜言無以過也是以百姓手足皆安於措置四海風俗益臻於和平尚猶午夜觀書日􅉴聽政下採人病上求天端帝典曰聖敬日躋湯銘曰日日新是陛下之德有以過之仲尼曰禹立三年百姓以仁仰陛下之至理知孔聖之可驗夫西戎強盛自古無之包有引弓之人盡為跨馬之國天下獻力備邉不充四海輸賦飬兵不足廣川薦草盡為所有健兵倅馬不可當鋒雖李廣材能充國沉勇但能閉壘豈敢交綏伏惟聖敬文思和武光孝皇帝陛下畜睿算於霄漢之表盡聖謨於造化之先捕虜將軍射聲校尉羽林突陳之騎酒泉校射之兵親自指蹤同時受命信星效祉靈旗呈祥壁壘言言而洞開渠魁纍纍而自縛解辮削袵投戈委弓懾怛威靈歡呼冠帶破種徙域空漠靜邉指北海而封燕然中西域而立幕府鄭吉之理烏壘班超之鎮他乾大庇生人一寬天下昔漢武帝之逐北虜四海耗半殷髙宗之伐鬼方三年乃克尚書班史稱德詠功今陛下用仁義為干戈以恩信為疆埸所求必至有鬪必先不遺一矢不頓一刃洗八聖旰食之恨百年亡地之羞小雅盡興大業無極為而不有歸功先帝禮曰天子有善上讓於天仲尼曰武王周公其逹孝乎蓋以善於繼述能光祖考今者陛下謙讓之道符於禮經繼述之孝稱於孔聖臣等待罪宰相日覩升平謹具太常追尊順宗皇帝憲宗皇帝諡號如前伏聽勑旨賀生擒衡州草賊鄧裴表臣某等言伏見湖南團練使奏生擒衡州草賊鄧裴及徒黨等伏以湖湘旱耗百姓飢荒遂有姧凶敢圖嘯聚今承擒滅巳盡根株臣等誠􅌚誠抃頓首頓首臣聞三代之英兩漢之盛姦宄亂常之類挻災構逆之黨乘間即有遇隙便生伏惟聖敬文思和武光孝皇帝陛下威極風霆德滋雨露正開壽域盡納群生永戢干戈將臻冨庶逆賊鄧裴鮿爾小孽敢因艱食漸誘飢人剝亂鄉閭陵驚郡邑徒堅黨合事巨寇牢或據深山或閉官道遂使湖嶺之外人不聊生愼由指揮義徒總齊武士仰慿睿算逺仗皇威不經歲時盡翦豺虺黨項巳寧於朔北妖黨復殄於巴西今擒鄧裴一清湖嶺用夷狄為四守統華夏為一家言念秋毫無非帝力臣等備位台鼎日奉聖謨無任抃舞慶快歡呼踴躍之至謝賜御札提舉邊將表伏奉宸翰以邊塞未靜將帥乏才唯務誅求不謀兵食者伏以陛下自即位巳來正朝廷而舉典法肥天下而壽群生故能不血刃以收河湟用文誥而降羌寇干戈偃戢逺邇安寧今者尚以戍邊未得髙枕深憂將帥不副憂勤或但恣於侵貪或不事其兵食須有戒勵形於詔書此乃周文小心克勤大禹不自滿假比於聖德無以過焉臣等僃位鼎司親奉睿旨銘鏤肝鬲專令防虞無任抃躍屏營之至謝賜新絲表右中使某至奉宣聖旨賜臣等新絲者伏以繭𧖟所繫在於纂組言功之大與食爭先陛下仁德動天雨澤順序柔桑沃若𧖟女功勤皛比凝霜縈如委霧繭稅不逋於鄉井𬒳覆皆遍於華夷盡荷皇慈同歌帝力臣等僃位台席親逄盛時無任踴躍歡抃感恩之至夀昌節宴謝賜音樂狀右臣某言伏以降誕之辰生靈同慶合鈞天之廣樂九奏諧和令錫宴於仙祠百辟歡抃臣等幸生聖代獲僃台階雖欲殺身豈酬大造無任感恩踴躍之至又謝賜茶酒狀右臣某等言伏以大慶吉辰榮霑錫宴鴻恩繼至王人荐臨旨酒名茶玉食仙果來於御府莫匪天慈適口忘憂巳滿小人之腹殺身粉骨難酬聖主之恩臣無任感恩抃躍之至代裴相公讓平章事表臣某言伏奉今月日制書除臣某官同中書門下平章事祗奉成命進退夫圖捧詔兢惶銜恩戰栗臣誠惶誠恐頓首頓首臣本書生仕逢聖代掌綸言於西掖作藩守於名邦自顧才能巳是踰越陛下奬遇不次拔擢過分春闈典貢地官掌財咸無政能粗免愆闕及擢為管榷纍受寵榮雖竭盡疲駑欲禆萬一而才智踈拙不效涓塵夫宰相之任前賢有言如涉川有舟如幽室有燭代天理物為人具瞻豈伊小臣而膺大任今朝廷髦俊並作名德森然或多歷庶官或皆有功實或四方屏翰巳著勳勞舉而用之無不可者如臣凡淺豈冝委任伏乞俯廽天鑑更擇時賢必能丹青帝圖金玉王度使微臣無尸祿之誚聖主有得賢之名非唯微臣獲安實亦天下幸甚無任悃懇血誠之至又代謝賜批答表臣某言臣伏奉今月日批答令臣冝斷來表不許牢讓者仰承鴻澤跪捧芝緘戰越失圖啓處無地臣某誠惶誠恐頓首頓首臣昨奉詔書付以魁柄自顧斗筲之器朴樕之才乘恩寵時竊棟梁任只合效蔡謨堅卧孔霸懇辭尚猶拜謝天顔進見卿士榮忝既積憂惶實深是以拜章上陳懇辭自敘兾廽聖鑑更擇時賢豈意睿旨重臨綸言再下不令徇志且遣守官大君之成命巳行微臣之丹懇不遂誓當戮力盡瘁粉骨捐軀知無不為見死寧避兾答君親生成之德用酬乾坤覆育之恩無任感激血誠慙惶戰越之至又謝賜告身鞍馬狀右中使某奉宣聖旨賜臣告身一通馬一匹并鞍轡臣生逢聖代竊位巖廊奉告令之詔書丹霄之雨露猶濕錫代勞之駿馬內棧之風雲尚隨寶軸煥絲綸之言逸足騁拳竒之態螢光爝火何禆日月之明弱質孤根但荷乾坤之德殺身寧報撫已知慙無任感恩抃躍懇悃之至論閣內延英奏對書時政記狀右舊例宰臣每於閣內及延英奏論政事及退歸中書知印宰臣盡書其日德音及宰臣奏事送付史館名時政記史官慿此編入簡䇿伏以敷陳時政承奉聖旨事非一端時移數刻退朝循省執筆讃論但記出巳之辭或忘同列之對若獻替之説或闕則史册之書不詳臣今啇量每閣內奏事及延英對回陛下所降德音宰臣所奏公事人自為記共成一篇既得精詳必無遺漏付與史氏便得直書伏乞天恩永為常式謝許受江西送綵絹等狀右今月十八日中使某至奉宣聖旨令臣領江西觀察使紇干衆所寄撰韋丹遺愛碑文人事綵絹三百匹者恩隨幸至榮與利并抃躍慙惶罔知所措伏惟皇帝陛下皇天縱聖赫日資明大奬功勞不計存沒舉韋丹江西之績時令微臣撰碑墮淚之思豈慙羊祜黃絹之妙實愧蔡雍今者更蒙恩私廣受絲帛捧戴兢惕無地容身不勝感恩慙惶之至內宴請上壽酒具官臣某等言伏惟聖敬文思和武光孝皇帝陛下天覆地容堯仁舜孝四海波靜三春物華故於彤庭大開錫宴竊以三事大僚百司庶府願持玉巵上千萬壽未敢專擅伏俟德音輕瀆宸嚴無任戰越之至宴畢殿前謝辭具官臣某等言遲日正麗廣埸洞開張仙樂者三千餘人列正羞者二十六豆酒傾瑶甕食置雕盤列圭組以成行酌金罍以為勞屬饜而止飽德以歸既醉太平之風共樂仁壽之域千年一遇百辟同歡臣等備位台司親逢聖日歡呼抃躍不能自勝謝賜物狀具官臣某等言叨陪錫宴竊覩鈞天百品並陳三酒皆具微臣所志巳極滿盈豈意鴻澤重霑錫賚殊等朱緑玄黃之繒綵精金文錦之珍竒捧戴自天啓處無地不勝抃躍感恩之至代人舉周敬復自代狀前件官執德以進嚮道而行藹有令名備歷清貫掌綸言於西掖才稱發揮參密命於內庭衆推忠慎自弭貂近侍主鑰東門聲實益重於搢紳磨涅始彰其堅白伏以南省實天下根本兩丞為百司管轄苟非其選必致敗官今若以臣所任回授敬復庶能肅清臺閣提舉紀網既曰陟明實不虛受伏乞天恩允臣所請代人舉蔣係伏準某年月日勑內外文武常參官上後三日冝舉一人自代者伏以前件官仁義素彰文學早著揚歷臺閣宣昭令名嘗為諫官無所避忌及領藩鎮實惠疲羸頃者不附權臣例遭左官今逢明代猶典小州伏以封還詔書駮正時事職業實重選擇冝精今若以臣此官回與蔣係既不虛受實為陟明伏乞聖慈允臣所請謹狀樊川文集第十五
