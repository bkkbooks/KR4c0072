  text: 樊川文集第八
  hash: sha256:7c2c56881fed68667e1416c40943f59c7b296af509c2085c1687f81bbe535d3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_008-1a}
body:
  text: 中書舍人杜牧字牧之唐故歧陽公主墓志銘憲宗皇帝即位八年出嫡女册封歧陽公主下嫁于今工部尚書判度支杜公悰始憲宗時宰相權德輿有壻獨孤郁為翰林學士帝愛其才因命宰相曰我嫡女既笄可嫁德輿得壻獨狐我豈不得耶可求其比後丞相吉甫進言曰前所奉詔臣謹搜其人因名我烈祖司徒歧公曰有孫兒悰年始弱冠有德行文學秀㓪嚴整臣嘗為司徒吏熟其家事官族世婚習尚守治臣一皆忖度疑悰可以奉詔帝即召尚書見與語大恱受殿中少監服章金紫以元和八年某月日主下嫁于杜氏上御正殿禮畢由西朝堂出節幡鼓鐸儀物畢備引就昌化里賜第上御延喜樓駐止主輪尚書及賔侍酒食金帛奏內樂降嬪御送行賜第堂有四廡繢椽藻櫨丹白其壁派龍首水為沼主外族因請願以尚父汾陽王大通里亭沼為主别館當其時隆貴顯榮莫與為比主實憲宗皇帝嫡女穆宗皇帝母妹敬宗皇帝今天子親姑尚父汾陽王子儀外曽孫太皇太后始以正妃事憲宗以太后太皇太后愛飬三朝凡四十年德厚慈恕化充六宫主以一女之愛降于杜氏逮事舅姑杜氏大族其他冝為婦禮者不翅尹試數十人主卑委怡順奉上撫下終日惕惕屏息拜起一同家人禮度二十餘年人未嘗以絲髮間指為貴驕始與尚書合謀曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者自是閉門落然不聞人聲尚書讀書考今古治亂主職婦事承奉夫族時歲獻饋吉凶􅉠助必親自經手池塞館陊闢毬場種樹不數十年搢紳間雜然稱尚書為賢尚書旋出為澧州刺史主後尚書行郡縣聞主且至殺牛羊大為數百人供具主至後不二十人六七婢乘驢闒茸約所至不得肉食驛吏立門外舁飯食以返不數日間聞于京師衆譁説以為異事尚書在澧州三年主始入後出中間不識刺史廳屏尚書治澧州考治行為天下第一後為大司徒京兆尹鳯翔節度使朝廷屈指比數以為凡有中外重難非尚書不可主賢益彰雖至宫闈貴號亦加尊敬姑涼國太夫人寢疾比喪及葬主奉飬蚤夜不解帶親自嘗藥粥飯不經心手一不以進既而哭泣哀號感動他人尚書後為忠武軍節度使所治許州創為節度府五十年南迫于蔡屋室痺主居無正堂處東支屋恬然六年許軍強雄且撑劇寇自始多用武臣治各出已部曲家人疪政弛法習為循常有司用比邉障遠地擲置不問民亦甘心尚書再冶之老民相率兩走闕下遮丞相馬叩頭乞留請樹生祠及詔追去攀緣携扶哭于道路尚書治外主冶內尚書所至必稱崱崱士力反為名公偉人主實有內助焉穆宗以皇太后敬主尤為親信俯首益卑車服侍使愈自貶抑覲謁溫清外口不言他事訖穆宗朝人不以親貴稱當貞元時德宗行姑息之政王武俊王士真張孝忠子聮為國壻憲宗𥘉寵子頔來朝以其子配以長女皆挾恩佩勢聚少俠狗馬為事日截馳道縱擊平人豪取民物官不敢問戚里相尚不為以為窮弱自主降于尚書壁絶外之𥘉怒中笑後皆敬畏纍聖亦指示主德以誡警之至于今以主尚書顯重于中外戚里亦皆自檢斂隨短長為善於是舊俗滅不復有尚書自許奉急追詔主有疾小愈強不肯留曰去朝興慶宫縱死於道吾無恨以開成二年十一月某日薨於汝州長橋驛亭年若干上廢朝三日其年十二月某日主喪至京師比及葬兩宫弔問相繼於道開成三年某月日上御正殿詔丞相嗣復攝中書令正衙宣册諡曰莊淑大長公主某年某月日祔葬于萬年縣洪原鄉少陵原尚書先塋禮也生男二人長曰輔九年十歲次曰楊十始二歲女二人某於尚書為從父弟得以實銘銘曰章武皇帝唐中興主刑于正妃教及嫡女婉婉帝子下嫁時賢影逐響答隨順纒綿杜氏大族枝蔓蟬聮上有舅姑髙堂儼然螭綬龜章玉佩金軒飬色恱意侍後承前人不我貴我敬我虔始終盡禮大小周旋餘二十年誰興間言貴不召驕冨不期侈是此四者倐相首尾自古名士或泥于此孰謂帝子超脫擺棄婦職是勤夫言是指池荒館陊屏外不履淑德柔風天下傾耳冝乎壽考歸女婚子不錫全祉孰提神紀幽石有志顯筆有史流千千祀唐故宣州觀察使御史大夫韋公墓志銘并序韋公會昌五年五月頭始生瘡召子壻張復魯曰三稚女得良壻死以是託墓冝以池州刺史杜牧為志復魯曰公去歲兩瘡生頭今始一尚微何言之深公曰吾年二十九官校書郎時嘗夢涉滻水既中涴有二人若舉符召我者其一人曰墳墓至大萬日始成今未也今萬日矣天巳告我我其可逃乎謝醫不問以其月十四日年五十八薨於位公從父弟某書公切行以公命來命牧牧位哭序且銘之公諱溫字弘育韋氏自殷周秦漢丘明馬遷班固輩爭書其人以光其所為書至後周逍遙公敻出丗家貴富中隱身行道當其時及後代論者以蜀嚴鄭谷口不能為比逍遙公五丗生潞州上黨尉贈諌議大夫希元上黨生吏部侍郎贈太尉肇吏部生右輔闕翰林學士古散騎常侍致仕贈司空綬常侍生公於逍遙公為九代孫年十一以明經取第為太常寺奉禮郎祕書省校書郎選判入等咸陽尉監察御史公曰是官豈奉飬所冝耶上疏乞免改著作佐郎當貞元中常侍公事德宗為翰林學士帝深於文學明察人間細微事事有密切多委之歲久憂畏病心帝曰某之心我其盡之以致仕官屏居西郊公早夜侍側溫凊飲食迎情解意一經心乎積二十餘年丁常侍喪自毀不欲生後相國李公逄吉以相印鎮武昌皆虛上職書卑辭至門公起赴武昌未至府拜監察御史遷左輔闕事文宗皇帝時宰相百吏源條帝功德撰號上獻公獨再疏曰今蜀之東川川溢殺萬家京師雪積五尺老多凍死豈崇虛名報上帝時耶帝乃止遂訖十五年不答尊號事改侍御史尚書吏部考功貟外郎當大和九年文宗思拔用德行超出者以􅋏天下故公自考功不數月拜諌議大夫召為翰林學士遂欲相之公立銀臺外門下拜送疏入具道先常侍遺誡子孫不令任密職言懇志決因命掌書舍人閣下公復堅讓不半歲轉太常少卿一歲遷給事中皇太子侍讀公復陳先誡以侍讀辭自宰相皆曰帝以一子請教於公是冝避邪公不聽凡拜三章帝終不能奪靈武節度使王晏平罷靈武以戰馬四百匹兵器數萬事去罪成貶康州司戶不旬日改撫州司馬仙詔院樂官尉遲璋以樂官授光州長史晏平以財膠貴幸璋大有寵於上公皆封詔書上還上比諭之公持益急竟以康州還晏平璋免長史莊恪太子得罪上召東西省御史中丞郎官於內殿悉疏莊恪過惡欲立廢之曰是冝為天子乎群公低首唯唯公獨進曰陛下唯一子不教陷之至是太子豈獨過乎上意稍平不數日遷尚書右丞朱衣魚章遷兵部侍郎亟請丞相願為治人官出為陜州防禦使兼御史大夫服章金紫回鶻窺邊劉稹繼以上黨叛東徴天下兵西出禁兵陜當其衝公撫民供事就不兩告苦入為吏部侍郎典一冬選老吏無所賣復以御史大夫出為宣歙池等州觀察使賦多口衆最於江南公急惡寬窮益自儉苦刑律其俗凡周一歲無所更改自至大治公幼不戲弄冠為老成人解褐得官出羣衆中人不敢旁發戲嫚及為公卿在朝廷省閣中大臣見公若臨絶壑先忖度語言舉止然敢出發其所執持不可者筆一落𥿄言一出口雖天子宰相知不能奪俯委遂之不以德行尚人人自敬畏不施要結於人人自親慕後進凡持節業自許者獲公一言矜奮刻削益自貴重官卑家貧時主將家事在私閫內髙曽兄弟鐫琢教誘嫁娶衣食無有二等疾甚將終悉召親屬賔吏稱先常侍詩句云在室愧屋漏因曰今知沒身不負斯誡遂涕下不禁當夫子世得七十子國小俗儉復有聖人為之師使生於今與公相後先必有能品之者夫人隴西李氏贊善大夫慫之女先公四歲終四男長礭前國子監四門助教次曰璆前明經次曰瓖次未免乳女四人長嫁南陽張復魯復魯得進士第有名於時為試太常寺協律郎鄂嶽觀察支使其下皆稚齒相次銘曰德則至矣位其充乎如其充兮可大厥功以施生人天先告之萬日之期天實為之唐故處州刺史李君墓志銘并序君諱方玄字景業刑部尚書贈司空貞公長子貞公事憲宗皇帝兄弟受寄四鎮在漢南時戰淮西未利監軍使崔談峻讒言中入為太子賔客後淮西平李光顔移鄭滑陳許無帥帝間宴獨言曰徑兵三萬誰可付者談峻侍側曰有大臣家不三十口俸錢委庫不取小僮跣足市薪此可乎帝曰誰為者談峻進即以貞公言帝即日起貞公為陳許帥其儉德服人如此景業少有文學年二十四一貢進士舉以上第升名解褐裴晉公奏以祕書省校書郎校集賢殿祕書聰明才敏老成人爭與之交後以協律郎為江西觀察支使裴誼觀察判官有殺人獄法曹官斷成當死者十二人景業訊覆數日內活十二人冤尚書以上下奏考裴公移宣城授大理評事團練判官後尚書馮公宿自兵部侍郎節鎮東川以監察裏行為觀察判官不一歲御史府取為真御史分察鹽池左藏吏盜隱官錢千萬嶽竟遷左輔闕遇事必言不知其他丞相固言以門下侍郎出鎮西蜀奏景業以檢校禮部貟外郎參節度軍謀事仍賜緋魚袋徴拜起居郎出為池州刺史始至創造籍簿民𬒳徭役者科品髙下鱗次比比一在我手至當役役之其未及者吏不得弄景業嘗嘆曰沈約身年八十手寫簿書蓋為此也使天下知造籍役民民庶少活復定戶稅得與豪猾沉浮者凡七千戶衮入貧弱不加其賦堤州南五里以涉為衢凡裁減蠧民者十餘事城東南隅樹九峯樓見數千里鑿齊山北靣得洞穴怪石不可名狀刋石於巖下自紀其事凡四年政之利病無不為而去之罷去上道老民攀哭景業季父刑部侍郎建與貞公以德行文學俱髙一時時之秀俊半歸李氏門下景業復聰明少鋭儉苦溫謹卑與長者遊備知天下之所治嘗慷慨有意於經綸少在諸侯府入為朝官出為刺史早夜勤苦為學不巳屈指計量必伸巳志雖時之名士亦以此許之罷池廉使韋公溫館干宣城會昌五年四月某日卒于宣城客舍年四十三七代祖逺後周柱國大將軍都督熊陜十六州陽平郡公曽王父珍玉綿州昌明令昌明生雅州别駕贈右僕射僕射生貞公遜先夫人滎陽鄭氏贈本縣太君後夫人范陽盧氏男若干女若干人銘曰顯莫識其端幽莫見其緒巳乎景業何付與之多而奪之何遽夭顔病冉孔不知其故於景業兮杳欲何語嗚呼哀哉唐故歙州刺史邢君墓志銘并序亡友邢渙思諱群牧大和𥘉舉進士第于東都一靣渙思私自約曰邢君可友後六年牧於宣州事吏部沈公渙思於京口事王并州俱為幕府吏二府相去三百里日夕聞渙思佽助并州巨細合冝後一年某奉沈公命北渡揚州聘丞相牛公往來留京口并州峭重入幕多賢士京口繁要遊客所聚易生譏議并州行事有不合理言者不入渙思必能奪之同舍以為智不以為顓并州以為賢不以為僣侵遊客賢不肖不能私諭議以一辭公事宴歡渙思口未言足未至缺若不圓某曰往年私約邢君可友今真可友也盧丞相商鎮京口渙思復以大理評事應府命今吏部侍郎孔溫業自中書舍人以重名為御史中丞某以輔闕為賀客孔吏部曰中丞得以御史為重輕輔闕冝以所知相告某以渙思言中丞曰我不素知願聞其為人某具以京口所見對後旬日詔下為監察御史會昌五年渙思由户部貟外郎出為處州時某守黃州歲滿轉池州與京師人事離闊四五年矣聞渙思出大喜曰渙思果不容於會昌中不辱吾御史舉矣渙思罷處州授歙州某自池轉睦歙州相去直西東三百里問來人曰邢君何以為治曰急於束縛黠夷冗事弊政不以久逺必務盡根本某曰邢君去縉雲日稚老泣送於路用此術也復問間日何為曰時飲酒髙歌極歡某曰邢君不喜酒今時飲酒且歌是不以用繁慮而不快於守郡也復問曰日食幾何曰嗜彘肉日再食某凡三致專書曰本草言是肉能閉血脈弱筋骨壯風氣嗜之者必病風數月渙思正握管兩手反去背仆于地竟日乃識人果以風疾廢舟東下次干睦兩扶相見言澀不能拜語及家事曰為官俸錢事骨肉親友隨手皆盡蓋壯未期病病未期死今病必死未死得至洛幸矣妻兒不能知矣君進士及第歷官九歷職八始太子校書郎協律郎大理評事監察御史京兆府司録殿中侍御史户部貟外郎處州刺州歙州刺史職為浙西團練巡官觀察推官度支巡官再為浙西觀察推官轉支使為戶部貟外郎判度支案伐劉稹為制使使鎮魏料軍食賜緋服銀章𥘉副李丞相回再副髙尚書銖撫安上黨三面征師大和三年六月八日卒於東都思恭里年五十邢氏周公次子靖淵封為邢侯國滅因以為氏西漢宇為太尉子綏為司空曽孫丗宗光武時為驃騎將軍丗宗玄孫顒因居河間顒當曹魏時參太祖丞相事終於太常邢有河間南陽君實河間人太常後也後至晉魏巳降皆有官祿唐麟臺郎中舉於君為曽祖麟臺生奉天令待封奉天生緱氏丞至和君即緱氏子兩娶前夫人隴西李氏忠州刺史佐次女今夫人南陽張氏壽州刺史植女四男曰懌惜溫郎壽郎用某年某月某日葬于偃師縣某鄉里葬有月日其孤立使者哭告于柩來京師請銘銘曰十五知書二十有文三十登進士五十終刺史才能溫良并包與之而止於斯七政在天一回一旋差以氂數能窮知賢賢者多天不肖壽考誰為聖魁孔不能究無可奈何付之以命曰其如命何樊川文集第八
