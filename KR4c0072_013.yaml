front:
  text: 樊川文集第十三
  hash: sha256:ca191767c0442f3a81311580ada2245921cfe0e962844963f63d6c9d5aa42d1a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_013-1a}
body:
  text: 杜牧字牧之上宣州崔大夫書某再拜閤下以德行文章有位於明時如望江漢見其去之呇天沉汪澶漫不知其所爲終始也復自開幕府巳來辟取當時之名士禮接待遇各盡其意後進絜絜以節業自持者無不願受閤下廻首一顧舒氣快意自以滿足今藩鎮之貴土地兵甲生殺與奪在一出口終日矜高與門下後進之士搉得失去就於分寸銖黍間多是其人也獨閤下不自矜高不設壍壘曲垂情意以盡待士之禮然知後進絜絜以節義自持者願受閤下廻首一顧舒氣快意自以滿足此固然也非敢茍佞其辭以取媚也不知閤下俯仰延遇之去就幣帛篚篚之多少飲食獻酬之和樂各用何道閑夜永日三五相聚危言峻論知與不知莫不願盡心於閤下壽考福禄祝之無窮某雖不肖則亦千百間其一人數也鹿鳴宴羣臣詩曰旣飲食之復實幣帛筐筐以将其厚意然後忠臣嘉賔得盡其心矣吉日詩曰宣王䏻慎㣲接下無不盡心以奉其上焉自古雖尊爲天子未有不用此而能得多士盡心也未有不得多士之盡心而得樹功立業流於歌詩也况於諸侯哉夫子曰君子疾没世而名不稱司馬遷曰自古冨貴其名磨滅不可勝紀而言思之令人感動激發當寐而寤在饑而飽伏希閣下濬之益深築之益高緘鐍之益固使天下之人異日捧閣下之德不替今日則爲宰相長育人材興起敎化國朝房杜姚宋不足過也某也於流輦無所知識承風望光徒有輸心效節之志今謹録雜詩一卷獻上非敢用此求知盖欲導其志無以爲先也徃年應進士舉曽投獻筆語亦蒙亟稱於時今十五年矣於頑懜中爲之不知矣於其事䏻不稍工不敢再録新述恐煩尊重無任惶懼謹再拜上池州李使君書景業足下僕與足下齒同而道不同足下性俊逹堅明心正而氣和飾以温愼故處世顯明無罪悔僕之所禀闊畧踈易輕微而忽小然其天與其心知耶柔利已偷苟讒謟可以進取知之而不䏻行之非不䏻行之抑復見惡之不䏻忍一同坐與之交語故有知之者有怒之者怒不附巳者怒不恬言柔舌道其盛美者怒守直道而違巳者知之者皆齒少氣銳讀書以賢才自許但見古人行事眞當如此未得官職不覩形勢絜絜少輩之徒也怒僕者足以裂僕之賜折僕之脛知僕者不䏻持一飯與僕僕之不死巳幸况爲刺史聚骨肉妻子衣食有餘乃大幸也敢望其他然與足下之所受性固不得伍列齊立亦抵足下疆壠畦畔間耳故足下憐僕之厚僕仰足下之多在京城間家事人事終日促束不得日出所懷以自曉自然不敢以輩流間期足下也去嵗乞假自江漢間歸京乃知足下出官之由勇於爲義向者僕之期足下之心果爲不繆私自喜賀足下果不負天所付與僕所期向二者所以爲喜且自賀也幸甚幸甚夫子曰吾少也賤故多能鄙事復曰不試故藝聖人尚以少賤不試乃䏻多䏻有藝况他人哉僕與足下年未三十爲諸侯幕府吏未四十爲天子廷臣不爲甚賤不爲不試矣今者齒各甚壮爲刺史各得小郡俱處僻左幸天下無事人安榖熟無兵期軍湏逋負諍訴之勤足以爲學自強自勉扵未聞未見之間僕不足道雖䏻爲學亦無所益如足下之才之時眞可惜也向者所謂俊逹堅明心正而氣和飾以温慎此才可惜也年四十爲刺史得僻左小郡有衣食無爲吏之苦此時之可惜也僕以爲天資足下有異日名聲跡業光于前後正在今日可不勉之僕常念百代之下未必爲不幸何者以其書具而事多也今之言者必曰使聖人㣲㫖不傳乃鄭玄輩爲注解之罪僕觀其所解釋明白完具雖聖人復生必挈置數子坐於游夏之位若使玄輩解釋不足爲師要得聖人復生如周公夫子親授㣲㫖然後爲學是則聖人不生終不爲學假使聖人復生即亦隨而猾之矣此則不學之徒好出大言欺亂常人耳自漢巳䧏其有國者成敗廢興事業蹤跡一二億萬青黃白黒據實空有皆可圖畫考其來由裁其短長十得四五足以應當時之務矣不似古人窮天鑿玄躡於無蹤筭於忽㣲然後䏻爲學也故曰生百代之下未必爲不幸也夫子曰三人行必有我師焉此乃隨所見聞能不亡失而思念至也楚王問萍實對曰吾徃年聞童謡而知之此乃以童子爲師耳參之於上古復酌於見聞乃能爲聖人也諸葛孔明曰諸公讀書乃欲爲愽士耳此乃蓋滯於所見不知適變名爲腐儒亦學者之一病僕自元和巳來以至今日其所見聞名公才人之所論討典刑制度征伐叛亂考其當時參於前古䏻不忘失而思念亦可以爲一家事業矣但隨見随忘随聞随廢輕目重耳之過此亦學者之一病也如足下天與之性萬萬與僕相遠僕自知頑滯不能苦心爲學假使䏻學之亦不䏻出而施之懇懇欲成足下之美異日旣受足下之敎於一官一局而無過失而巳自古未有不學而䏻垂名於後代者足下勉之大江之南夏候欝濕易生百疾足下氣俊胸臆間不以悁忿是非貯之邪氣不䏻侵慎防是晚多食大醉繼飲其他無所道某再拜投知巳書夫子曰不怨天不尤人下學而上逹知我者其天乎復曰知我者春秋罪我者亦以春秋此聖人操心不顧世之人是非也柱厲叔事莒敖公莒敖公不知及莒敖公有難柱厲叔死之不知我則巳反以死報之蓋怨不知之深也豫讓謂趙襄子曰智伯以國士待我我以國士報之此乃列士義夫有才感其知不顧其生也行無堅明之異材無尺寸之用泛泛然求知扵人知則不能有所報不知則怒此乃衆人之心也聖賢義列之士旣不可到小生有異扵衆人者審巳功也審巳之行審巳之才皆不出衆人亦不求知扵人巳或有知之者則蔵縮退避唯恐知之深蓋自度無可以爲報效也或有因縁他事不得巳求知扵人者茍不知未嘗退有懟言怨色形扵妻子之前此乃比扵衆人唯審巳求知也大和二年小生應進士舉當其時先進之士以小生行可與進業可益修喧而舉之爭爲知巳者不啻二十人小生邇來十年江湖間時時以家事一抵京師事巳即返嘗所謂喧而譽之爲知巳者多巳顯貴未嘗一到其門何者自十年來行不益進業不益修中夜忖量自愧扵心欲持何說復扵知巳之前爲進拜之資乎黙黙蔵縮茍免寒饑爲幸耳昨李廵官至忽傳閤下㫖意似知姓名或欲異日必録在門下閤下爲世之偉人鉅德小生一獲進謁一陪讌享則亦榮矣况欲異日終置之扵榻席之上齒扵數子之列乎無攀縁絲髪之因出特逹倜儻之知小生自度冝爲何才可以塞閤下之求宜爲何道可以報閤下之德是以自承命巳來審巳愈切撫心獨驚忽忽思之而不自知其然也若蒙待之以衆人之地求之以衆人之才責之以衆人之報亦庻㡬異日受約束指顧扵簿書之間知無不爲爲不及私亦或能提筆伸𥿄作詠歌以發盛德止此而巳其他望扵古人責以不及非小生之所堪任伏恐閤下聽聞之過求取之異敢不特自發明導說其哀一開閤下視聽其他感激發憤懷愧思德臨𥿄汗發不知所裁某恐懼再拜荅荘充書某白荘先輩足下凢爲文以意爲主氣爲輔以辭彩章句爲之兵衛未有主強盛而輔不飄逸者兵衛不華赫而荘整者四者高下圓折歩驟随主所指如鳥随鳯魚随龍師衆随湯武騰天潜泉橫裂天下無不如意苟意不先立止以文彩辭句繞前捧後是言愈多而理愈亂如入闤闠紛紛然莫知其誰暮散而巳是以意全勝者辭愈朴而文愈高意不勝者辭愈華而文愈鄙是意䏻遣辭辭不䏻成意大抵爲文之㫖如此觀足下所爲文百餘篇實先意氣而後辭句慕古而尚仁義者苟爲之不巳資以學問則古作者不爲難到今以某無可取欲命以爲序承當厚意惕息不安復觀自古序其文者皆後世宗師其人而爲之詩書春秋左氏以降百家之說皆是也古者其身不遇扵世寄志扵言求言遇扵後世也自兩漢巳來冨貴者千百自今觀之聲勢光明孰若馬遷相如賈誼劉向揚雄之徒斯人也豈求知扵當世哉故親見楊子雲著書欲取覆醬瓿雄當其時亦未嘗自有誇目况今與足下並生今世欲序足下未巳之文此固不可也苟有志古人不難到勉之而巳某再拜上河陽李尚書書伏以三城所治兵精地要北鏁太行東塞黎陽左京河南指爲重輕自艱難巳來儒生成名立功者蓋寡扵前代是以壮徤不學之徒不知儒術不識大體取其㣲效終敗大事不可一二悉數伏以尚書有才名德望知經義儒術加以儉克好立功名今橫㩀要津重兵在手朝廷搢紳之士屈指延頸佇觀政能况聖主掀擢豪俊考校古今退朝之後急扵觀書巳築七關取隴城緝爲郡縣今親誅虜收其土田取其良馬爲耕戰之具西復凉州東取河朔平一天下使不貢不覲之徒敢自專擅此實聖主之心事業巳彰臣下明明無不知之伏自尚書樹立鍜錬教訓㨂拔法術尺寸取扵古人若受指顧必立大功使天下後學之徒知成功立事非大儒知今古成敗者而不能爲之復使儒生舒展胷臆得以誨導壮徤不學之徒指蹤而使之令其心服正在今日某多病早衰恚在耕釣得一二郡資其退休以活骨肉亦能作爲歌詩以稱道盛德其餘息心亦巳乆矣下情日増瞻仰戀德之切某恐懼再拜上鹽鐵裴侍郎書伏以鹽鐡重務根本在扵江淮今諸監院頗不得人皆以權勢干求固難悉議停替其扵利病豈無中䇿某自池州睦州實見其弊蓋以江淮自廢留後巳來凡有冤人無處告訴每州皆有土豪百姓情願把鹽每年納利名曰土鹽商如此之流兩稅之外州縣不敢差役自罷江淮留後巳來破散将盡以監院多是誅求一年之中追呼無巳至有身行不在須得父母妻兒錮身驅将得錢即放不二年内盡恐逃亡今譬扵常州百姓有屈身在蘇州歸家未得便可以蘇州下状論理披訴至如睦州百姓食臨平監鹽其土鹽商𬒳臨平監追呼求取直是睦州刺史亦與作主不得非裹四千里粮直入城役使即須破散奔走更無他圖其間搜求胥徒針抽鏤取千計百校唯恐不多除非吞聲别無赴訴今有明長吏在上旁縣百里尚敢公爲不法况諸監院皆是以貨得之恣爲姧欺人無語路况土鹽商皆是州縣大戸言之根本實可痛心比𥘉停罷留後衆皆以爲除煩去冗不知其弊及扵疲羸即是所利者至㣲所害者至大今若蒙侍郎改革前非於南省郎吏中擇一清愼依前使爲江淮留後减其胥吏不必一如向前多置人數即自嶺南至於汴宋凡有冤人有可控告姧贓之輩動而有畏數十州土鹽商免至破滅除江淮之太殘爲侍郎之隂德以某愚見莫過扵斯若問扵鹽鐵吏即不欲江淮别有留後若有留後其間百事自能申状諮呈安得貨財表裏計㑹分其權力言之可知伏惟俯察愚衷不賜罪責某再拜與汴州從事書汴州境内最弊最苦是牽船夫大寒虐暑窮人奔走斃踣不少某數年前赴官入京至襄邑縣見縣令李式甚年少有吏才條䟽牽夫甚有道理云某當縣萬戸已來都置一板簿每年輪檢自差欲有使來先行文帖尅期令至不㨂貧冨職掌一切均同計一年之中一縣人戸不著兩度夫役如有遠戸不能來者即任納錢與扵近河雇人對面分付價直不令所由欺隱一縣之内稍似蘇息蓋以承前但有使來即出帖差夫所由得帖冨豪者終年閑坐貧下者終日牽船今即自以板簿在手輪轉差遣雖有黠吏不能用情某每任刺史應是役夫及竹木瓦磚工巧之類並自置板簿若要使役即自檢自差不下文帖付縣若下縣後縣令付案案司出帖分付里正一郷只要兩夫事在一郷徧着赤帖懷中藏却廵門掠斂一徧貧者即𬒳差來若籍在手中廵次差遣不由里胥典正無因更能用情以此知襄邑李式之能可以惠及夫役更有良術即不敢知以某愚見且可救急因襄邑李生之績效知先輩思報幕府之深誠不覺亦及拙政以爲證明豈敢自述今爲治患扵差役不平詩云或栖遲偃仰或王事鞅掌此蓋不平之故長吏不置簿籍一一自檢即姧胥貪冐求取此最爲甚某恐懼再拜樊川文集第十三
