  text: 樊川文集第十六
  hash: sha256:26e248c7600283700d6358ca15a5d5f2ff1aebc7e72435c9be1d4dcbedd2c798
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_016-1a}
body:
  text: 中書舎人杜牧字牧之上李太尉論北邉事啓某啓伏以聖主垂衣太尉當軸威德上顯和澤下流諸侯無異心百姓無怨氣星辰順静日月光明天業益昌聖統無極既功成而理定實道尊而名垂今則未聞縱東山之遊樂後園之醉惕惕若不足兢兢而如無豈不以邊障尚驚殊虜未殄防其入㓂猶湏徴兵伏以廽鶻種落人素非多校於突厥絶爲小弱今者國破衆叛迯來漠南爲羇旅之魂食草萊之實白髪驪騂之騎凋耗巳無湩酪皮毳之資飢寒皆盡寄命雜種蔵跡隂山取之及時可以一戰今者度虜之計不出二者時去時來徊翔不决必有所在西戎巳得要約同其氣勢同爲侵擾此其一也心膽破壞馬畜殘少且於美水薦草暖日廣川牧馬飬習以俟強大此其二也今者徴中國之兵與之首尾乆戌則有師老費財之憂深入則有大寒瘃墜之苦示戎狄之弱生姧傑之心今者不取恐貽後患敢以管見上干尊重自兩漢代虜皆是秋冬不過百日驅中國之人入苦寒之地此時匈奴勁弓折膠重馬免乳畜肥草壮力全氣盛與之相校勝少敗多故匈奴云漢實大國也但其人不䏻辛苦爾此所謂避虚而撃實逃短而攻長至於後魏崔浩因見其理蠕蠕強盛屡犯北邉浩請討之曰蠕蠕恃其地逺自寛來乆故夏則散衆放畜秋肥乃聚背寒向暄南來㓂抄今出其慮表掩其不備大兵卒至必驚駭星分向塵奔走壮馬護牧牝馬戀駒驅馳難制不得水草未過数日則聚而困斃可一舉而滅太武帝從之及軍入境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍撲討東西五千里南北三千里凡所俘虜及獲畜産彌漫山澤髙車因殺蠕蠕種類歸降者三十餘萬落虜遂散亂帝㳂弱水西行至涿邪山諸大将慮深入有㐲兵勸帝停止不追浩先勸窮追之不從後聞凉州賈胡言若更前行三日則盡滅之矣帝深恨之以某所見今若以幽并突陣之騎酒泉教射之兵整飾誡誓仲夏潜發計隂山與涿邪之遠近十不一一校蠕蠕廻鶻之強弱猶如虎䑕五月節氣在中夏則熱到隂山尚寒中國之兵足以施展行軍於枕席之上翫㓂於掌股之中軏轠懸瓶湯沃晛雪一舉無頻必然之䇿今冰合防秋冰銷解戍行之巳乆虜爲長然出其意外實爲上䇿議者或云北取黠戞今討廻鶻伏以黠戞起於别種超爲可汗必是英傑天時必助賢材必用法令必明㓕迴鶻之後便是勍敵況示之以弱必爲所輕今者四海九州同風共貫諸侯用命年糓豐熟可以瘞玄玉於常山子遺人於河壠顧兹疲虜豈遺子孫伏惟太尉相公大德素昭武功復著畫地而兵形盡見按璅而邊事無遺唯一指蹤即可掃跡昔漢武帝之求賢也有上書不足採者輙報罷去未甞罪之故能羈越臣胡大興禮樂今太尉與仁聖天子同德有志之士無不願死伏惟特寛狂狷不賜誅責生死榮幸無任感恩攀戀惶懼汗慄之至謹啓賀中書門下平澤潞啓某啓伏以上黨之地肘京洛而履蒲津倚太原而跨河朔戰國時張儀以爲天下之脊建中日田恱名曰腹中之眼帶甲十萬籍土五州太行夷儀爲其扃關健馬強弓爲其羽翼自逆黨專有僅及一世頗聞教育實曰精強昨者凶堅專地之請𥘉陳聖主整旅之詔将下中外遠邇皆疑難攻蜂蠆螗蜋頗亦自負伏惟相公上符神㫁潜運廟謨仗宗社威靈駈風雲雷電掌上必取彀中難逃纔逾周星果梟逆首周公東征之役捷至三年憲皇淮夷之師尅聞四嵗校虜㓂之強弱曾不等倫考攻取之敗亡何至容易若非睿算英略借筯深謀比之前修一何遠出自此鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆爲壽域之人赤子秀眉共老止戈之代某謬分符竹實由思知慶快懽抃之誠倍百常品不宣謹啓上白相公啓某啓伏惟相公上佐聖主獨專魁柄封殖良善脩整紀綱練羣臣謹百職考功績覈名實大張公室盡閉私門盛德大功直筆實光於簡䇿清節細行祝史不愧於神明天下望之爲凖繩朝廷倚之爲依㨿畢公克勤小物周公煥發大猷鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆爲壽域之人赤子秀眉共老止戈之代某謬分符竹實由思知慶快懽抃之誠倍百常品不宣謹啓上白相公啓某啓伏惟相公上佐聖主獨專魁柄封殖良善脩整紀綱練羣臣謹百職考功績覈名實大張公室盡閉私門盛德大功直筆實光於簡䇿清節細行祝史不愧於神明天下望之爲凖繩朝廷倚之爲依㨿畢公克勤小物周公煥發大猷邴吉陋案吏於公庭袁安不錮人於聖代衛將軍有長揖之客張子孺無謝恩之人吉甫率由舊章魏相能明故事房杜不以求備取人不以已長格物姚梁公先有司脩舊法下位各得言其志百司各得盡其才求於古人之賢皆集相公之德如以尺量刀解粉布墨畫小大銖參丸角尖鈌各盡其分皆當其任是以庶人不議郷校無言天下欣欣若更生者自此黄髪之老待哺之子不見兵戈不離抱撫清廟之祭四夷來助蒼生之願百志皆成顒顒万方實懸斯望某逺守僻左無因起居但採風謡亦能歌詠無任攀戀激切之至謹啓上周相公啓某啓伏奉三月八日勑除尚書司勲貟外郎史館修撰承命榮懼啓處無地伏以聖主順上帝之則率四海以仁神化風行家至日見吉先哲王之德也有求必至有開必先是以傳吕得於夢卜申甫降於山嶽伏惟相公待主乃用爲時而生當考室構厦之時膺篤繩削墨之任賛傑俊遂賢良調隂陽提紀律類能而使度材受官常切如家之憂每懷撻市之耻是以朝廷禮樂天下清明人不凋傷神不怨悵萬物由道百度皆貞雖周獲仁人商得元哲夢卜䧏嶽之得豈䏻逾焉某樸樕之才糞朽之賤遭逢盛業三帶郡符自審事冝實以逾忝伏以睦州治所在萬山之中終日昬氛侵染衰病自量忝官巳過不敢率然請告唯念滿歲得保生還不意相公拔自汚泥昇於霄漢却收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返遊魂言於重恩無以過此雖買臣懷紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手校於榮忝無以爲喻言念㣲生難酧殊造伏以相公自數載巳來朝廷䔍老四海俊賢皆因挈維盡在門館毗輔聖主巍爲元勲自有明神以相百禄固唯賤末報效無門感激血誠涕淚迸溢無任攀戀懇款之至謹啓上鄭相公状某啓伏以相公自專魁柄一闡大猷鎮撫四夷訓導百吏無不信順皆有程品猶尚不遺微賤特䧏慰誨重疊滿幅榮耀闔門捧戴生光啓處無地聞於白屋之輩皆願殺身詢於黄耇之徒以爲異事慰示天下長育人材魚頡鴻冥之潜丘中塢上之隱皆可以結戀随指效用盡心接地際天日出月入盡得臣妾無不謳歌蒼生顒顒實有所望某一門骨肉皆受恩知效命之誠瀝血自誓無任攀戀感激懇悃之至謹状上淮南李相公状某啓伏以近日當州人吏徃來及諸道賔客行過皆傳相公以淮海之地災旱累年仁憫之心憂念深切廣求人瘼大革土風䘏飬疲羸抑挫豪猾備職者思勵其巳業官者得用其䏻鰥寡孤惸飛沉動植仁煦必及惠愛無遺吏不敢欺法䏻必束上行下效家至户到閭里安㤗史冊未聞竊以聖上倚注既深相公勲業愈重况兹異政即逹宸聰伏料窮邉絶塞将議息兵宣室明庭必思舊徳重秉鈞軸固在旬時某忝跡門墻不勝抃躍攀望棨㦸下情無任戀結之至謹状上吏部高尚書状某啓人惟樸樕材實朽下三守僻左七換星霜拘攣莫伸抑鬰誰訴每遇時移節換家逺身孤弔影自傷向隅獨泣將欲漁釣一壑栖遲一丘無易仕之田園有仰食之骨肉當道每歎末路難循進退唯艱憤悱無告今者大君繼統賢相秉鈞遺墜必舉髦雋並作伏惟尚書秩髙天爵德冠人倫爲縉紳之紀綱作朝廷之標表凡遊門館莫非雋賢至於小人㝡爲凡器頃者幸以屬郡祗事廉車奉約束而雖嚴滌昬蒙而無術實多愆闕每頼恩容敢望尊嚴特自褒舉手示逺降羇魂震驚感激彷徨涕淚迸落便無跛倚如生羽翰全忘鼠循忽欲鳥舉雖闕下一召歳中四遷校其光榮不能踰越禮曰君子􅋢其死有以待也養其身有以爲也是小人忘生殺身之地刳腸奉首之報今得之矣復何求焉江山絶域登臨巳秋猿吟鳥思草衰木墜黎侯寓衛有式微之詩趙王遷房創山木之詠流落多戚今古同塵迴望門墻涕戀唯積起居未由無任血誠懇悃之至謹狀上刑部崔尚書狀某啓某比於流軰踈闊慵怠不知趨嚮唯好讀書多忘爲文格卑十年爲幕府吏每促束於簿書宴遊間刺史七年病弟孀妹百口之家經營衣食復有一州賦訟私以貧苦焦慮公以愚恐敗悔仍有嗜酒多睡厠於其間是數者相遭於多忘格卑之中書不得日讀文不得專心百不逮人所尚業復不能尺寸銖兩自強自進乃庸人軰也復何言哉今者欲求爲贄於大君子門下尚可以爲文而爲其禮詩所謂有靦面目視人罔極者也謹敢繕冩所爲文凡二十首伏地汗𧹞不知所云謹狀上安州崔相公啓某啓某比於流軰一不及人至於讀書爲文日夜不倦凡諸所爲亦未有以過人至於㑹昌三年八月中所獻相公長啓鋪陳功業稱校短長措於史記兩漢之間讀於文士才人之口與二子並無愧容伏恐機務殷繁不暇省覽今者竊敢再録啓本重干尊嚴付於史官而不誣懸於後代而不泯其於取重豈在小人復敢别録所爲新舊文兩卷凡一十九首上陳視聽一希鐫琢重疊過越惶懼伏深伏惟照察謹啓薦韓乂啓昨日所啓言韓拾遺事非與韓求衣食救饑寒也御史亦豈爲救饑寒之官乎中丞必曰太梁奏取韓以饑寒何不去夫幕吏乃古之陪臣以人焉北面雖布衣無耻之士亦冝訪其樂與不樂况有道之君子乎韓以旅寓洛中非不樂梁也不甘不告之請耳韓及第後歸越中佐沈公江西宣城府罷唐扶中丞辟扵閩中罷府歸路由建州妻與元晦同髙祖扶惡晦爲人不省之及晦得越乃棄産避之居常州殷儼者仰韓之道自閩寄百縑遺之及門不開書緘而斥去之某比兩府同院但見其㢘愼髙㓗亦未知其道大和八年自淮南有事至越見韓君於鏡上三畒宅兩頃田樹𬞞釣魚唯召名僧爲侣餘力究易嬉嬉然無日不自得也未嘗及身名出䖏之語未嘗入公府造請與幕吏宴遊因此不爲搢紳相所見禮蕭髙二連帥即日造其廬詢以政事稱先人梓材有文學髙名没於越之府幕故不願復爲越賔及髙至許下厚禮辟之其爲人也貞潔芳茂非其人不與遊非其食不敢食蕭舎人考功崔貟外是趍扵韓交者某復趍於蕭崔二君子者即韓之去某其間不啻容數十人矣亦安得知其賢而言之復不僣乎伏恐中丞謂韓求官以衣食干交朋者中丞𥘉在憲府固宜愼選御史御史固非救饑寒之官某乆承恩知但欲薦賢於盛時雖至淺陋亦知不可以交友饑寒求清秩以干大君子者伏慮未審誠懇故此具陳本末伏惟照察謹啓上知巳文章啓某啓某少小好爲文章伏以侍郎文師也是敢謹貢七篇以爲視聽之汚伏以元和功德凡人盡當歌詠紀叙之故作燕将録徃年弔伐之道未甚得所故作罪言自艱難來始卒伍傭役輩多㨿兵爲天子諸侯故作原十六衛諸侯或恃功不識古道以至于反側叛亂故作與劉司徒書處士之名即古之巢由伊吕輩近者徃徃自名之故作送薛䖏士序寳暦大起宫室廣聲色故作阿房宫賦有廬終南山下嘗有耕田著書志故作望故園賦雖未䏻深窺古人得與揖讓笑言亦或的的分其状貌矣自四年來在大君子門下恭承指顧約束於政理簿書間永不執卷上都有舊第唯書萬卷終南山下有舊廬頗有水樹當以耒耜筆硯聞齒髪甚壮間糞有成立他日捧持一遊門下爲拜謁之先或希一奨今者所獻但有輕黷尊嚴之罪亦何所取伏希少假誅責生死幸甚謹啓獻詩啓某啓某苦心爲詩本求髙絶不務竒麗不渉習俗不今不古䖏於中間既無其才徒有其竒篇成在𥿄多自焚之今謹録一百五十篇編爲一軸封留獻上握風捕影鑄木鏤冰敢求恩知但希鐫琢冒黷尊重下情無任惶懼謹啓薦王寜啓前渭南縣令王寜前件官實有吏才稱於衆口年少強力一也遇事必能裁割二也既藴智䏻無頭角誇誕三也廉直可保四也䖏於驕将内臣之間必䏻和同五也今者邉将生事雜虜起戎不憂兵甲唯在饋運某過承恩獎敢敢薦才伏惟取捨之間特賜恕察謹啓上宰相求湖州第一啓某啓人有愛某者言於某曰吏部貟外郎例不爲郡子不可求假使巳求愼勿堅懇至于再三荅曰某雖不學按六典令式及諸故事多無此例國史復無賢相名卿懸之以爲格言此乃急於進趨之徒自爲其說若以言例貞元𥘉故相國盧公邁由吏部貟外郎出爲滁州近者澶王傳李疑爲鹽鐡使江淮留後豈曰無例人曰盧事太逺李爲擢用此不足徴某曰不知今者視之古事在書取爲今證逺自三代兩漢近至隋氏國𥘉尚可援引况前十五年名相故事反不足爲例乎况盧公邁止以骨肉寒餓來守滁陽非如某以親弟廢痼寒餓仍之是盧公有一某有二與盧公所切復爲不同仲尼曰雍也可使南面今刺史古之南面諸侯行天子教化刑罰者江淮鹽鐵留後求利小臣校量輕重與刺史相懸求利臣乃可吏部貟外郎爲之十萬戸州天下根本之地曰吏部貟外郎不可爲其刺史即是本末重輕顛倒乖戾莫過於此某弟顗世胄子孫二十六一舉進士及第嘗爲上斐相公書酋壮温潤詞理傑逸賈生司馬遷䏻爲之非班固劉向輩亹亹之詞流於後輩人皆藏之朱崖李太尉迫以世舊取爲浙西團練使廵官李太尉貴驕多過凡有毫髪顗必䟽而言之後謪袁州於蒼惶中言於親吏曹居實曰如杜廵官愛我之言若門下人盡䏻出之吾無今日李太尉在袁州顗客居淮南牛公欲辟為吏顗謝曰荀爽爲李膺御以此顯名今受命爲幕府下執事御李膺矣然李公困謫逺地未願仕宦牛公嘆美之聰明儁傑非㝷常人也某自省事巳來未聞有後進名士䘮明廢棄窮居海上如顗比者今有一兄仰以爲命復不得一郡以飽其衣食盡其醫藥非今日海内無也言於所傳聞亦未有也自古喜莫若􅉑國太子以其死而復生言懇莫若申包胥求救扵秦七日七夜哭聲不絶某今懇如包胥但未哭爾若蒙恩憫特遂血懇其喜也不下􅉑太子詞語煩碎頻干尊重足及軒闥神驚汗流不勝憂恐懇悃之至謹啓第二啓某啓某㓜孤貧安仁舊第置於開元末某有屋三十間去元和末酬償息錢爲他人有因此移去八年中凡十徙其居奴婢寒餓衰老者死少壮者當面逃去不䏻呵制有一豎戀戀憫嘆挈百卷書隨而飬之奔走困苦無所容歸死延福私廟支拄欹壞而處之長兄以驢遊丐干親舊某與弟顗食野蒿藿寒無夜燭黙所記者凡三周歲遭遇知已各及第得官文宗皇帝改號𥘉年某爲御史分察東都顗爲鎮海軍幕府吏至二年間顗疾眼暗無所覩故殿中侍御史韋楚老曰同州有眼醫石公集劒南少尹姜沔䘮明親見石生針之不一刻而愈其神醫也某迎石生至洛告滿百日與王生俱東下見病弟于揚州禪智寺石曰是状也腦積毒熱脂融流下盖塞瞳子名曰内障法以針旁入白睛穴上斜撥去之如蠟塞管蠟去管明然今未可也後一周歲脂當老硬如白玉色始可攻之某世攻此疾自祖及父某所愈者不下二百人此不足憂其年秋末某載病弟與石生自楊州南渡入宣州幕至三年冬某除𥙷闕石生自曰明年春眼可針矣視童子中脂色玉白果符𥘉言堂兄慥守潯陽泝流不逺刺史之力也復可以飽石生所欲令其盡心此即家也京中無一畒田豈可同歸遂如潯陽四年二月某於潯陽北渡赴官與弟顗決手哭曰我家世德汝復無罪其疾也豈遂痼乎然有石生愼無自撓其年四月石生施針九月再施針俱不效五年冬某爲膳部貟外郎乞假徃潯陽取顗西歸顗固曰歸不可議俟兄慥所之而隨之㑹昌元年四月兄慥自江守蘄某與顗同舟至蘄某其年七月却歸京師明年七月出守黄州在京時詣今􅉑州庾使君問庾使君眼状庾云同州有二眼醫石公集是一也復有周師逹者即石之姑子所得當同周老石少有術甚妙似石不及某常病内障愈于周手豈少老間工拙有異某至黄州以重幣卑詞致周至蘄周見弟眼曰嗟乎眼有赤脉凡内障脂凝有赤脉綴之者針撥不䏻去赤脉赤脉不除針不可施除赤脉必有良藥某未知之是石生業淺不逹此理妄再施針周不針而去時西川相國兄始鎮揚州弟兄謀曰揚州大郡爲天下通衢世稱異人術士多遊其間今去值有勢力可爲乆安之計兾有所遇其年秋顗遂東下因家揚州與顗一相見别八年矣坐一室中不復有再生意住三十日而西臨岐與決曰此行也必祈大郡東來謀汝醫藥衣食庻㡬如志近聞九疑山南有隱士綦母弘者人言異人䏻愈異疾忠州豊都縣有仙都觀後漢時仙人隂長生於此白日昇天今聞道士龔法義年逾八十精嚴其法人之所謂有前世負累今世還以痼疾者奏章於上帝䏻爲解之刺史之力二人或可致是以去歲閠十一月十四日輙獻長啓乞守錢塘盖以私懇有素非敢率然言念病弟䘮明坐廢十五年矣但䏻識某聲音不復知某髪巳半白顔面衰改是某今生可以見顗而顗不䏻復見某矣此天也無可奈何某䏻見顗而不得去此豈天乎而懇在相公若小人㣲懇終不䏻上動相公相公恩憫終不下及小人是日月下親兄弟終無相見期况去歲淮南小旱衣食益困目無所覩復困於衣食即海内言窮苦人無如顗者今敢以情事再書懇迫上干尊重伏料仁㫖必爲憫側然某早衰多病今春耳襲積四十日四月復落一牙耳聾牙落年七八十人將謝之候也今未五十而有七八十人將謝之候蓋人生受氣堅強脆弱品第各異也堅強者七八十而衰脆弱者四五十而衰其不同也亦與草木中蒲栁松栢同也某今生四十八矣自今年來非唯耳聾牙落兼以意氣錯寞在群衆懽笑之中常如登髙四望但見莾蒼大野荒墟廢壠悵望寂黙不能自解此無他也氣衰而志散眞老人態也自省人事巳來見親舊交遊年未五十尚壯健而死者衆矣況某早衰敢望六七十而後死乎聞未死前一見病弟異人術士求其所未求以甘其心厚其衣食之地某若先死使病弟無所不足死而有知不恨死早湖州三歳可遂此心伏惟仁憫念病弟望某東來之心察某欲見病弟之志一加哀憐特遂血懇披剔肝膽重此告訴當盛暑時敢以私事及政事堂啓干丞相治其罪可也伏𥿄流涕俯侯嚴命不勝憂惶激切之至謹啓第三啓某啓某去歳閏十一月十四日輙書微懇列在長啓干黷尊重乞守錢塘以便家事自嘆精誠不䏻上動相公不遂於便伏以病弟孀妹因縁事故寓居淮南京中無業今者不復西歸遂於淮南客矣病孤之家假使旁有強近救接庇借嵗供衣月供食日問其所欠闕尚猶戚戚多感無樂生意况乎爲客於大藩喧囂雜沓之中無俸禄之氣勢食不繼月用不給日閉門於荒僻之地取容於里胥遊徼之輩部曲臧獲可以氣凌䑕侵又不䏻制止所可仰以爲命者在三千里外一郎吏爾復有衣食生生之所湏悉多欠闕欲其安活而無歎吒悲恨不可得也去歲伏蒙恩念出於私曲語今青州鄭常侍云更與一官必任東去某承受仁㫖不敢不重以錢塘更塵視聴今自勲曹擢爲廢置在某更授一官巳榮過矣在相公必任東去之言鏘然在耳近者累得書告以羇旅困乏聞於他人可爲酸鼻况於某心豈易排遣今年七月湖州月滿敢輒重書血誠再干尊重伏希憐憫特賜比擬某伏念骨肉悉皆早衰多病常不敢以夀考自期今更得錢三百萬資弟妹衣食之地假使身死死亦無恨湖州三考可遂此心湖州名郡也私誠難遂也不遇知已豈得如志瀝血披肝伏𥿄迸淚伏希殊造或賜濟活下情無任懇悃惶懼之至謹啓上宰相求杭州啓某啓某於京中唯安仁舊第三十間支屋而巳長兄慥罷三原縣令閑居京城弟顗一舉進士及第有文章時名不幸得痼疾坐廢十三年矣今與李氏孀妹寓居淮南並仰某㣲官以爲糇命某前任刺史七年給弟妹衣食有餘兼及長兄亦救不足是某一身作刺史一家骨肉四䖏安活自去年八月時蒙奨擢授以名曹郎官史氏重職七年棄逐再復官榮歸還故里重見親戚言於鄙誠巳滿素志自去年十二月至京以舊第無屋與長兄異居今秋巳來弟妹頻以寒餒來告某一院家累亦四十口狗爲朱馬緼作由𫀆其於妻兒固冝窮餓是作刺史則一家骨肉四處皆㤗爲京官則一家骨肉四處皆困謀於知友曰杭州大郡今月滿可求欲干告吾相次活家命以爲如何皆曰子七年三郡今始歸復相國知子必欲次第叙用子今復求刺史得不生相國疑怪乎某荅曰是何言與某唯恃吾相之知始敢干求今天下以江淮爲國命杭州戸十萬稅錢五十萬刺史之重可以殺生而有厚禄朝廷多用名曹正郎有名望而老於爲政者而爲之某今官爲外郎是官位未至也前三任刺史無異政聞於吾相是爲政無取也今若得遂所求非唯超顯兼活私家某若不恃吾相之知而求之是狂躁妄庸人也墜井者求出執熱者願濯古人以此二者譬喻所切也某今所切是墜於絶壑而衣掛于樹杪覆在鼎中下有熱火而水将沸與古所喻則復過之輙敢具䟽血誠上干尊重兾垂恩憐或賜援拯慺慺丹懇不勝惶懼懇悃之至謹啓爲堂兄慥求澧州啓某啓庫部家兄昨者特蒙奨㧞却忝班行實以聽聞稍難不敢更求榮進今在郢州汨口草市絶俸巳是累年孤外生及姪女堪嫁者三人仰食待衣者不啻百口脫粟蒿霍才及一飡伏蒙仁恩頻賜顧問必許援拯授以涔陽活於闔門無不感涕伏以相公上佐聖主蔚爲元勲恩隨風翔德與氣游唯一物之微四海之大鎔造所及罔不得冝伏念庫部家兄承一顧之恩二紀不替伏恐機務繁重不時記億心迫情切輙敢重干尊嚴戰汗憂惶伏地待罪謹啓樊川文集第十六
