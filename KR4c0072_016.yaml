  text: 樊川文集第十六
  hash: sha256:26e248c7600283700d6358ca15a5d5f2ff1aebc7e72435c9be1d4dcbedd2c798
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_016-1a}
body:
  text: 中書舍人杜牧字牧之上李太尉論北邉事啓某啓伏以聖主垂衣太尉當軸威德上顯和澤下流諸侯無異心百姓無怨氣星辰順靜日月光明天業益昌聖統無極既功成而理定實道尊而名垂今則未聞縱東山之遊樂後園之醉惕惕若不足兢兢而如無豈不以邊障尚驚殊虜未殄防其入寇猶須徴兵伏以廽鶻種落人素非多校於突厥絶為小弱今者國破衆叛逃來漠南為羇旅之魂食草萊之實白髮驪騂之騎凋耗巳無湩酪皮毳之資飢寒皆盡寄命雜種藏迹隂山取之及時可以一戰今者度虜之計不出二者時去時來徊翔不決必有所在西戎巳得要約同其氣勢同為侵擾此其一也心膽破壞馬畜殘少且於美水薦草暖日廣川牧馬飬習以俟強大此其二也今者徴中國之兵與之首尾久戌則有師老費財之憂深入則有大寒瘃墜之苦示戎狄之弱生姧傑之心今者不取恐貽後患敢以管見上干尊重自兩漢代虜皆是秋冬不過百日驅中國之人入苦寒之地此時胸奴徑弓折膠重馬免乳畜肥草壯力全氣盛與之相校勝少敗多故胸奴云漢實大國也但其人不能辛苦爾此所謂避虛而擊實逃短而攻長至於後魏崔浩因見其理蠕蠕強盛屢犯北邉浩請討之曰蠕蠕恃其地逺自寬來久故夏則散衆放畜秋肥乃聚背寒向暄南來寇抄今出其慮表掩其不備大兵卒至必驚駭星分向塵奔走壯馬護牧牝馬戀駒驅馳難制不得水草未過數日則聚而困斃可一舉而滅太武帝從之及軍入境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍撲討東西五千里南北三千里凡所俘虜及獲畜産彌漫山澤髙車因殺蠕蠕種類歸降者三十餘萬落虜遂散亂帝沿弱水西行至涿邪山諸大將慮深入有伏兵勸帝停止不追浩先勸窮追之不從後聞涼州賈胡言若更前行三日則盡滅之矣帝深恨之以某所見今若以幽并突陳之騎酒泉教射之兵整飾誡誓仲夏潛發計隂山與涿邪之遠近十不一一校蠕蠕回鶻之強弱猶如虎鼠五月節氣在中夏則熱到隂山尚寒中國之兵足以施展行軍於枕席之上玩寇於掌股之中軏轠懸瓶湯沃晛雪一舉無頻必然之䇿今冰合防秋冰銷解戍行之巳久虜為長然出其意外實為上䇿議者或云北取黠戞今討回鶻伏以黠戞起於别種超為可汗必是英傑天時必助賢材必用法令必明滅回鶻之後便是勍敵況示之以弱必為所輕今者四海九州同風共貫諸侯用命年穀豐熟可以瘞玄玉於常山子遺人於河壠顧兹疲虜豈遺子孫伏惟太尉相公大德素昭武功復著畫地而兵形盡見按璅而邊事無遺唯一指蹤即可掃迹昔漢武帝之求賢也有上書不足採者輒報罷去未嘗罪之故能羈越臣胡大興禮樂今太尉與仁聖天子同德有志之士無不願死伏惟特寬狂狷不賜誅責生死榮幸無任感恩攀戀惶懼汗栗之至謹啓賀中書門下平澤潞啓某啓伏以上黨之地肘京洛而履蒲津倚太原而跨河朔戰國時張儀以為天下之脊建中日田恱名曰腹中之眼帶甲十萬籍土五州太行夷儀為其扃關健馬強弓為其羽翼自逆黨專有僅及一世頗聞教育實曰精強昨者凶堅專地之請𥘉陳聖主整旅之詔將下中外遠邇皆疑難攻蜂蠆螳蜋頗亦自負伏惟相公上符神斷潛運廟謨仗宗社威靈驅風雲雷電掌上必取彀中難逃才逾周星果梟逆首周公東征之役捷至三年憲皇淮夷之師尅聞四嵗校虜寇之強弱曾不等倫考攻取之敗亡何至容易若非睿算英略借筯深謀比之前修一何遠出自此鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆為壽域之人赤子秀眉共老止戈之代某謬分符竹實由思知慶快歡抃之誠倍百常品不宣謹啓上白相公啓某啓伏惟相公上佐聖主獨專魁柄封殖良善修整紀綱練羣臣謹百職考功績核名實大張公室盡閉私門盛德大功直筆實光於簡䇿清節細行祝史不愧於神明天下望之為凖繩朝廷倚之為依據畢公克勤小物周公煥發大猷鞭笞反側灑掃河湟大開明堂再振儒校窮天盡地皆為壽域之人赤子秀眉共老止戈之代某謬分符竹實由思知慶快歡抃之誠倍百常品不宣謹啓上白相公啓某啓伏惟相公上佐聖主獨專魁柄封殖良善修整紀綱練羣臣謹百職考功績核名實大張公室盡閉私門盛德大功直筆實光於簡䇿清節細行祝史不愧於神明天下望之為凖繩朝廷倚之為依據畢公克勤小物周公煥發大猷邴吉陋案吏於公庭袁安不錮人於聖代衛將軍有長揖之客張子孺無謝恩之人吉甫率由舊章魏相能明故事房杜不以求備取人不以已長格物姚梁公先有司修舊法下位各得言其志百司各得盡其才求於古人之賢皆集相公之德如以尺量刀解粉布墨畫小大銖參丸角尖鈌各盡其分皆當其任是以庶人不議鄉校無言天下欣欣若更生者自此黃髮之老待哺之子不見兵戈不離抱撫清廟之祭四夷來助蒼生之願百志皆成顒顒万方實懸斯望某逺守僻左無因起居但採風謡亦能歌詠無任攀戀激切之至謹啓上周相公啓某啓伏奉三月八日勑除尚書司勳貟外郎史館修撰承命榮懼啓處無地伏以聖主順上帝之則率四海以仁神化風行家至日見吉先哲王之德也有求必至有開必先是以傳吕得於夢卜申甫降於山嶽伏惟相公待主乃用為時而生當考室構厦之時膺篤繩削墨之任贊傑俊遂賢良調隂陽提紀律類能而使度材受官常切如家之憂每懷撻市之耻是以朝廷禮樂天下清明人不凋傷神不怨悵萬物由道百度皆貞雖周獲仁人商得元哲夢卜降嶽之得豈能逾焉某朴樕之才糞朽之賤遭逢盛業三帶郡符自審事冝實以逾忝伏以睦州治所在萬山之中終日昏氛侵染衰病自量忝官巳過不敢率然請告唯念滿歲得保生還不意相公拔自汚泥升於霄漢却收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返遊魂言於重恩無以過此雖買臣懷紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手校於榮忝無以為喻言念微生難酬殊造伏以相公自數載巳來朝廷篤老四海俊賢皆因挈維盡在門館毗輔聖主巍為元勳自有明神以相百祿固唯賤末報效無門感激血誠涕淚迸溢無任攀戀懇款之至謹啓上鄭相公狀某啓伏以相公自專魁柄一闡大猷鎮撫四夷訓導百吏無不信順皆有程品猶尚不遺微賤特降慰誨重疊滿幅榮耀闔門捧戴生光啓處無地聞於白屋之輩皆願殺身詢於黃耇之徒以為異事慰示天下長育人材魚頡鴻冥之潛丘中塢上之隱皆可以結戀隨指效用盡心接地際天日出月入盡得臣妾無不謳歌蒼生顒顒實有所望某一門骨肉皆受恩知效命之誠瀝血自誓無任攀戀感激懇悃之至謹狀上淮南李相公狀某啓伏以近日當州人吏往來及諸道賔客行過皆傳相公以淮海之地災旱纍年仁憫之心憂念深切廣求人瘼大革土風恤飬疲羸抑挫豪猾備職者思勵其巳業官者得用其能鰥寡孤惸飛沉動植仁煦必及惠愛無遺吏不敢欺法能必束上行下效家至户到閭里安泰史册未聞竊以聖上倚注既深相公勳業愈重况兹異政即逹宸聰伏料窮邉絶塞將議息兵宣室明庭必思舊德重秉鈞軸固在旬時某忝迹門墻不勝抃躍攀望棨戟下情無任戀結之至謹狀上吏部高尚書狀某啓人惟朴樕材實朽下三守僻左七換星霜拘攣莫伸抑鬱誰訴每遇時移節換家逺身孤弔影自傷向隅獨泣將欲漁釣一壑栖遲一丘無易仕之田園有仰食之骨肉當道每歎末路難循進退唯艱憤悱無告今者大君繼統賢相秉鈞遺墜必舉髦雋並作伏惟尚書秩髙天爵德冠人倫為縉紳之紀綱作朝廷之標表凡遊門館莫非雋賢至於小人最為凡器頃者幸以屬郡祗事廉車奉約束而雖嚴滌昏蒙而無術實多愆闕每賴恩容敢望尊嚴特自褒舉手示逺降羇魂震驚感激倣徨涕淚迸落便無跛倚如生羽翰全忘鼠循忽欲鳥舉雖闕下一召歲中四遷校其光榮不能踰越禮曰君子􅋢其死有以待也養其身有以為也是小人忘生殺身之地刳腸奉首之報今得之矣復何求焉江山絶域登臨巳秋猿吟鳥思草衰木墜黎侯寓衛有式微之詩趙王遷房創山木之詠流落多戚今古同塵回望門墻涕戀唯積起居未由無任血誠懇悃之至謹狀上刑部崔尚書狀某啓某比於流輩踈闊慵怠不知趨嚮唯好讀書多忘為文格卑十年為幕府吏每促束於簿書宴遊間刺史七年病弟孀妹百口之家經營衣食復有一州賦訟私以貧苦焦慮公以愚恐敗悔仍有嗜酒多睡厠於其間是數者相遭於多忘格卑之中書不得日讀文不得專心百不逮人所尚業復不能尺寸銖兩自強自進乃庸人輩也復何言哉今者欲求為贄於大君子門下尚可以為文而為其禮詩所謂有靦面目視人罔極者也謹敢繕寫所為文凡二十首伏地汗赧不知所云謹狀上安州崔相公啓某啓某比於流輩一不及人至於讀書為文日夜不倦凡諸所為亦未有以過人至於會昌三年八月中所獻相公長啓鋪陳功業稱校短長措於史記兩漢之間讀於文士才人之口與二子並無愧容伏恐機務殷繁不暇省覽今者竊敢再録啓本重干尊嚴付於史官而不誣懸於後代而不泯其於取重豈在小人復敢别録所為新舊文兩卷凡一十九首上陳視聽一希鐫琢重疊過越惶懼伏深伏惟照察謹啓薦韓乂啓昨日所啓言韓拾遺事非與韓求衣食救飢寒也御史亦豈為救飢寒之官乎中丞必曰太梁奏取韓以飢寒何不去夫幕吏乃古之陪臣以人焉北面雖布衣無耻之士亦冝訪其樂與不樂况有道之君子乎韓以旅寓洛中非不樂梁也不甘不告之請耳韓及第後歸越中佐沈公江西宣城府罷唐扶中丞辟于閩中罷府歸路由建州妻與元晦同髙祖扶惡晦為人不省之及晦得越乃棄産避之居常州殷儼者仰韓之道自閩寄百縑遺之及門不開書緘而斥去之某比兩府同院但見其廉愼髙潔亦未知其道大和八年自淮南有事至越見韓君於鏡上三畒宅兩頃田樹𬞞釣魚唯召名僧為侣餘力究易嬉嬉然無日不自得也未嘗及身名出處之語未嘗入公府造請與幕吏宴遊因此不為搢紳相所見禮蕭髙二連帥即日造其廬詢以政事稱先人梓材有文學髙名沒於越之府幕故不願復為越賔及髙至許下厚禮辟之其為人也貞潔芳茂非其人不與遊非其食不敢食蕭舍人考功崔貟外是趍于韓交者某復趍於蕭崔二君子者即韓之去某其間不啻容數十人矣亦安得知其賢而言之復不僣乎伏恐中丞謂韓求官以衣食干交朋者中丞𥘉在憲府固宜愼選御史御史固非救飢寒之官某久承恩知但欲薦賢於盛時雖至淺陋亦知不可以交友飢寒求清秩以干大君子者伏慮未審誠懇故此具陳本末伏惟照察謹啓上知巳文章啓某啓某少小好為文章伏以侍郎文師也是敢謹貢七篇以為視聽之汚伏以元和功德凡人盡當歌詠紀敘之故作燕將録往年弔伐之道未甚得所故作罪言自艱難來始卒伍傭役輩多據兵為天子諸侯故作原十六衛諸侯或恃功不識古道以至于反側叛亂故作與劉司徒書處士之名即古之巢由伊吕輩近者往往自名之故作送薛處士序寶曆大起宫室廣聲色故作阿房宫賦有廬終南山下嘗有耕田著書志故作望故園賦雖未能深窺古人得與揖讓笑言亦或的的分其狀貌矣自四年來在大君子門下恭承指顧約束於政理簿書間永不執卷上都有舊第唯書萬卷終南山下有舊廬頗有水樹當以耒耜筆硯聞齒髮甚壯間糞有成立他日捧持一遊門下為拜謁之先或希一奬今者所獻但有輕黷尊嚴之罪亦何所取伏希少假誅責生死幸甚謹啓獻詩啓某啓某苦心為詩本求髙絶不務竒麗不涉習俗不今不古處於中間既無其才徒有其竒篇成在𥿄多自焚之今謹録一百五十篇編為一軸封留獻上握風捕影鑄木鏤冰敢求恩知但希鐫琢冒黷尊重下情無任惶懼謹啓薦王寧啓前渭南縣令王寧前件官實有吏才稱於衆口年少強力一也遇事必能裁割二也既藴智能無頭角誇誕三也廉直可保四也處於驕將內臣之間必能和同五也今者邉將生事雜虜起戎不憂兵甲唯在饋運某過承恩獎敢敢薦才伏惟取捨之間特賜恕察謹啓上宰相求湖州第一啓某啓人有愛某者言於某曰吏部貟外郎例不為郡子不可求假使巳求愼勿堅懇至于再三答曰某雖不學按六典令式及諸故事多無此例國史復無賢相名卿懸之以為格言此乃急於進趨之徒自為其説若以言例貞元𥘉故相國盧公邁由吏部貟外郎出為滁州近者澶王傳李疑為鹽鐡使江淮留後豈曰無例人曰盧事太逺李為擢用此不足徴某曰不知今者視之古事在書取為今證逺自三代兩漢近至隋氏國𥘉尚可援引况前十五年名相故事反不足為例乎况盧公邁止以骨肉寒餓來守滁陽非如某以親弟廢痼寒餓仍之是盧公有一某有二與盧公所切復為不同仲尼曰雍也可使南面今刺史古之南面諸侯行天子教化刑罰者江淮鹽鐵留後求利小臣校量輕重與刺史相懸求利臣乃可吏部貟外郎為之十萬戶州天下根本之地曰吏部貟外郎不可為其刺史即是本末重輕顛倒乖戾莫過於此某弟顗世胄子孫二十六一舉進士及第嘗為上斐相公書酋壯溫潤詞理傑逸賈生司馬遷能為之非班固劉向輩亹亹之詞流於後輩人皆藏之朱崖李太尉迫以世舊取為浙西團練使巡官李太尉貴驕多過凡有毫髮顗必疏而言之後謪袁州於蒼惶中言於親吏曹居實曰如杜巡官愛我之言若門下人盡能出之吾無今日李太尉在袁州顗客居淮南牛公欲辟為吏顗謝曰荀爽為李膺御以此顯名今受命為幕府下執事御李膺矣然李公困謫逺地未願仕宦牛公嘆美之聰明俊傑非尋常人也某自省事巳來未聞有後進名士喪明廢棄窮居海上如顗比者今有一兄仰以為命復不得一郡以飽其衣食盡其醫藥非今日海內無也言於所傳聞亦未有也自古喜莫若􅉑國太子以其死而復生言懇莫若申包胥求救于秦七日七夜哭聲不絶某今懇如包胥但未哭爾若蒙恩憫特遂血懇其喜也不下􅉑太子詞語煩碎頻干尊重足及軒闥神驚汗流不勝憂恐懇悃之至謹啓第二啓某啓某幼孤貧安仁舊第置於開元末某有屋三十間去元和末酬償息錢為他人有因此移去八年中凡十徙其居奴婢寒餓衰老者死少壯者當面逃去不能呵制有一豎戀戀憫嘆挈百卷書隨而飬之奔走困苦無所容歸死延福私廟支拄欹壞而處之長兄以驢遊丐干親舊某與弟顗食野蒿藿寒無夜燭默所記者凡三周歲遭遇知已各及第得官文宗皇帝改號𥘉年某為御史分察東都顗為鎮海軍幕府吏至二年間顗疾眼暗無所覩故殿中侍御史韋楚老曰同州有眼醫石公集劒南少尹薑沔喪明親見石生針之不一刻而愈其神醫也某迎石生至洛告滿百日與王生俱東下見病弟于揚州禪智寺石曰是狀也腦積毒熱脂融流下蓋塞瞳子名曰內障法以針旁入白睛穴上斜撥去之如蠟塞管蠟去管明然今未可也後一周歲脂當老硬如白玉色始可攻之某世攻此疾自祖及父某所愈者不下二百人此不足憂其年秋末某載病弟與石生自楊州南渡入宣州幕至三年冬某除輔闕石生自曰明年春眼可針矣視童子中脂色玉白果符𥘉言堂兄慥守潯陽泝流不逺刺史之力也復可以飽石生所欲令其盡心此即家也京中無一畒田豈可同歸遂如潯陽四年二月某於潯陽北渡赴官與弟顗決手哭曰我家世德汝復無罪其疾也豈遂痼乎然有石生愼無自撓其年四月石生施針九月再施針俱不效五年冬某為膳部貟外郎乞假往潯陽取顗西歸顗固曰歸不可議俟兄慥所之而隨之會昌元年四月兄慥自江守蘄某與顗同舟至蘄某其年七月却歸京師明年七月出守黃州在京時詣今􅉑州庾使君問庾使君眼狀庾云同州有二眼醫石公集是一也復有周師逹者即石之姑子所得當同周老石少有術甚妙似石不及某常病內障愈于周手豈少老間工拙有異某至黃州以重幣卑詞致周至蘄周見弟眼曰嗟乎眼有赤脈凡內障脂凝有赤脈綴之者針撥不能去赤脈赤脈不除針不可施除赤脈必有良藥某未知之是石生業淺不逹此理妄再施針周不針而去時西川相國兄始鎮揚州弟兄謀曰揚州大郡為天下通衢世稱異人術士多遊其間今去值有勢力可為久安之計兾有所遇其年秋顗遂東下因家揚州與顗一相見别八年矣坐一室中不復有再生意住三十日而西臨岐與決曰此行也必祈大郡東來謀汝醫藥衣食庶幾如志近聞九疑山南有隱士綦母弘者人言異人能愈異疾忠州豐都縣有仙都觀後漢時仙人隂長生於此白日升天今聞道士龔法義年逾八十精嚴其法人之所謂有前世負纍今世還以痼疾者奏章於上帝能為解之刺史之力二人或可致是以去歲閠十一月十四日輒獻長啓乞守錢塘蓋以私懇有素非敢率然言念病弟喪明坐廢十五年矣但能識某聲音不復知某髮巳半白顔面衰改是某今生可以見顗而顗不能復見某矣此天也無可奈何某能見顗而不得去此豈天乎而懇在相公若小人微懇終不能上動相公相公恩憫終不下及小人是日月下親兄弟終無相見期况去歲淮南小旱衣食益困目無所覩復困於衣食即海內言窮苦人無如顗者今敢以情事再書懇迫上干尊重伏料仁旨必為憫側然某早衰多病今春耳襲積四十日四月復落一牙耳聾牙落年七八十人將謝之候也今未五十而有七八十人將謝之候蓋人生受氣堅強脆弱品第各異也堅強者七八十而衰脆弱者四五十而衰其不同也亦與草木中蒲栁松柏同也某今生四十八矣自今年來非唯耳聾牙落兼以意氣錯寞在群衆歡笑之中常如登髙四望但見莾蒼大野荒墟廢壠悵望寂默不能自解此無他也氣衰而志散真老人態也自省人事巳來見親舊交遊年未五十尚壯健而死者衆矣況某早衰敢望六七十而後死乎聞未死前一見病弟異人術士求其所未求以甘其心厚其衣食之地某若先死使病弟無所不足死而有知不恨死早湖州三歲可遂此心伏惟仁憫念病弟望某東來之心察某欲見病弟之志一加哀憐特遂血懇披剔肝膽重此告訴當盛暑時敢以私事及政事堂啓干丞相治其罪可也伏𥿄流涕俯侯嚴命不勝憂惶激切之至謹啓第三啓某啓某去歲閏十一月十四日輒書微懇列在長啓干黷尊重乞守錢塘以便家事自嘆精誠不能上動相公不遂於便伏以病弟孀妹因緣事故寓居淮南京中無業今者不復西歸遂於淮南客矣病孤之家假使旁有強近救接庇借嵗供衣月供食日問其所欠闕尚猶戚戚多感無樂生意况乎為客於大藩喧囂雜沓之中無俸祿之氣勢食不繼月用不給日閉門於荒僻之地取容於里胥遊徼之輩部曲臧獲可以氣凌鼠侵又不能制止所可仰以為命者在三千里外一郎吏爾復有衣食生生之所須悉多欠闕欲其安活而無歎吒悲恨不可得也去歲伏蒙恩念出於私曲語今青州鄭常侍云更與一官必任東去某承受仁旨不敢不重以錢塘更塵視聽今自勳曹擢為廢置在某更授一官巳榮過矣在相公必任東去之言鏘然在耳近者纍得書告以羇旅困乏聞於他人可為酸鼻况於某心豈易排遣今年七月湖州月滿敢輒重書血誠再干尊重伏希憐憫特賜比擬某伏念骨肉悉皆早衰多病常不敢以夀考自期今更得錢三百萬資弟妹衣食之地假使身死死亦無恨湖州三考可遂此心湖州名郡也私誠難遂也不遇知已豈得如志瀝血披肝伏𥿄迸淚伏希殊造或賜濟活下情無任懇悃惶懼之至謹啓上宰相求杭州啓某啓某於京中唯安仁舊第三十間支屋而巳長兄慥罷三原縣令間居京城弟顗一舉進士及第有文章時名不幸得痼疾坐廢十三年矣今與李氏孀妹寓居淮南並仰某微官以為糇命某前任刺史七年給弟妹衣食有餘兼及長兄亦救不足是某一身作刺史一家骨肉四處安活自去年八月時蒙奬擢授以名曹郎官史氏重職七年棄逐再復官榮歸還故里重見親戚言於鄙誠巳滿素志自去年十二月至京以舊第無屋與長兄異居今秋巳來弟妹頻以寒餒來告某一院家纍亦四十口狗為朱馬緼作由𫀆其於妻兒固冝窮餓是作刺史則一家骨肉四處皆泰為京官則一家骨肉四處皆困謀於知友曰杭州大郡今月滿可求欲干告吾相次活家命以為如何皆曰子七年三郡今始歸復相國知子必欲次第敘用子今復求刺史得不生相國疑怪乎某答曰是何言與某唯恃吾相之知始敢干求今天下以江淮為國命杭州戶十萬稅錢五十萬刺史之重可以殺生而有厚祿朝廷多用名曹正郎有名望而老於為政者而為之某今官為外郎是官位未至也前三任刺史無異政聞於吾相是為政無取也今若得遂所求非唯超顯兼活私家某若不恃吾相之知而求之是狂躁妄庸人也墜井者求出執熱者願濯古人以此二者譬喻所切也某今所切是墜於絶壑而衣挂于樹杪覆在鼎中下有熱火而水將沸與古所喻則復過之輒敢具疏血誠上干尊重兾垂恩憐或賜援拯慺慺丹懇不勝惶懼懇悃之至謹啓為堂兄慥求澧州啓某啓庫部家兄昨者特蒙奬拔却忝班行實以聽聞稍難不敢更求榮進今在郢州汨口草市絶俸巳是纍年孤外生及姪女堪嫁者三人仰食待衣者不啻百口脫粟蒿霍才及一餐伏蒙仁恩頻賜顧問必許援拯授以涔陽活於闔門無不感涕伏以相公上佐聖主蔚為元勳恩隨風翔德與氣遊唯一物之微四海之大鎔造所及罔不得冝伏念庫部家兄承一顧之恩二紀不替伏恐機務繁重不時記億心迫情切輒敢重干尊嚴戰汗憂惶伏地待罪謹啓樊川文集第十六
