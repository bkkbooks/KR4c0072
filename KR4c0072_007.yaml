  text: 樊川文集第七
  hash: sha256:4fc4ef66f17b2baf43de29ca8a3fa81edbbe9e15a242157d837c585533f7c172
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_007-1a}
body:
  text: 中書舍人杜牧唐故江西觀察使武陽公韋公遺愛碑皇帝召丞相延英便殿講議政事及於循吏且稱元和中興之盛言理人者誰居第一丞相墀言臣嘗守土江西目覩觀察使契丹有大功德𬒳于八州殁四十年稚老歌思如丹尚存丞相敏中丞相植皆曰臣知丹之為理所至人思江西之政熟於聽聞乃命首臣紇干衆上丹之功狀聮大中三年正月二十日詔書授史臣尚書司勳貟外郎杜牧曰汝為丹序而銘之以美大其事臣某伏念天寶建中艱難之餘根於河北枝蔓於齊魯梁蔡闢為章句書生以蜀叛錡為宗室老以吳叛其他髙下其目跂而欲飛者往往皆是憲宗皇帝髙聽古議廣諌益聖任賢使能考校法度號令未出威先雷霆十有四年擒殛凶狠方行四海罔不率伏當是時凡五徴兵解而復合僅八周歲天下晏然不告勞苦實以守土多循良吏而丹居第一周召伯治人於陜西召穆公有武功於宣王時神尼採甘棠江漢之詩絃而歌之列于風雅班固敘漢宣帝中興名臣言治人者亦首迷黃霸龔遂次將相下今下明詔刻丹治效令得與元和功臣彰中興得人之盛懸於無窮用古道也謹案韋氏自漢丞相賢巳降代有逹官寬有大功於後周封鄖國公鄖公曽孫幼平為歧州參軍生抱貞為梓州刺史生政為漢州雒縣丞贈右諌議大夫雒縣生武陽公公字文明以明五經登科授校書郎咸陽尉以監察御史殿中侍御史佐張獻甫於邠寧府徴為太子舍人遷起居郎檢校吏部貟外郎侍御史河陽行軍司馬未行改駕部貟外郎會新羅國以喪來告且稱立君拜司封郎中兼御史中丞章服金紫弔册其嗣新羅再以喪告不果行改容州經略使築州城環十三里因悉城管內十三州教種茶麥多開屯田黃賊畏服詔加太中大夫貞元末拜河南少尹連拜檢校祕書監兼御史中丞鄭滑行軍司馬皆未至拜右諌議大夫憲宗即位劉闢以蜀叛議者欲行貞元故事請釋不誅公再上疏曰今不誅闢則朝廷可以指臂而使者唯兩京耳此外而誰不為叛因拜劒南東川節度使兼御史大夫時劉闢急攻梓州公至漢中表言攻急守堅不可易帥髙崇文客軍遠鬪無所資若與梓州綴其士心必能有功遂召拜晉慈隰三州觀察使不半歲元和二年二月拜洪州觀察使洪操章江上控百越為一都會屋居以茅竹為俗人火之餘烈日久風竹戞自焚小至百家大至蕩空霖必江溢燥必火作火水夾攻人無固志傾搖懈怠不為旬月生産計公始至任計口取俸除去冗事取公私錢教人陶瓦伐山取材堆疊億計人能為屋取官材瓦免其半賦徐責其直自載酒食以勉其勞𥘉若艱勤日成月就不二周歲凡為瓦屋萬四千間樓四千二百間縣市營廄名為棟宇無不創為派湖入江節以斗門以走暴漲闢開廣衢南北七里蕩泄汚壅築堤三尺長十二里堤成明年江與堤平鑿六百陂塘灌田一萬項益勸桑苧機織廣狹俗所未習教勸成之凡三周年成就生遂手為日覩無不如志公之為政去害興利機決勢去如孫吳乘敵不可當向輔以經術仁撫智誘慈母之心赤子之欲求必得之故人自盡力所指必就子産治鄭未及三年國人尚謗黃霸治頴川前後八年始曰愈治考二古人行事與公相次第不知如何元和五年薨年五十八其銘曰章武皇帝披攘經營凡十四年五大徴兵人不告病肩於太寧將相是矣豈無循良考第理行誰髙武陽武陽所至為人父母於洪之功洞無前古洪始有居水火是苦二者夾攻死無處所曰天所然不嗟不訴武陽始至材瓦是聚公錢不足以俸為助能為居宇貰貸付與日載酒肴如無稚乳不督不程誘以美語未二周星創數萬堵幾半重樓如詩翬羽錭以長堤繚四千步明年水平人始歌舞災久事巨一日除去灌田萬頃益種桑苧俗所未有罔不完具寂寥千年誰守兹土大中聖人元和是師圖讃功勞武陽豈遺乃命史臣刻序碑辭寵假武陽為人慰思訓勸守吏勉於為治唐故太子少師竒章郡開國公贈太尉牛公墓志銘并序唐優四帝十九年宰相牛公諱某字某八代祖弘以德行儒學相隋氏封竒章郡公贈文安侯文安後四丗諱鳯及仕唐為中書門下侍郎修國史於公為髙祖文安後五丗集州刺史贈給事中諱休充於公為曽祖集州生太常博士贈太尉紹太尉生華州鄭縣尉贈太保諱幼聞太保生公孤始七歲長安南下杜樊鄉東文安有隋氏賜由數頃書千卷尚存公年十五依以為學不出一室數年業就名聲入都中故丞相韋公執誼以聰明氣勢急於褒拔如栁宗元劉禹錫輩以文學秀少皆在門下韋公亟命栁劉於樊鄉訪公曰願一得相見公乘驢至門韋公曰是矣東京李元禮為後進師隋竒章公仁德祿位二者包而有之登進士上第元和四年應賢良直諌制數強臣不奉法憂天子熾於武功詔下第一授伊闕尉以直𬒳毀周歲凡十府奏取不下伊闕滿歲郤公士美以昭義軍書記辟凡三上請詔除河南尉拜監察御史丁母夫人憂制終復拜監察御史轉殿中侍御史遷禮部貟外郎都官貟外郎兼侍御史知雜事改考功貟外郎集賢殿學士庫部郎中知制誥賜五品命服半歲遷御史中丞宿州刺史李直臣以贓數萬敗穆宗得偏辭於中稱直臣冤且言有才宰相言格不用公以具獄奏上曰直臣有才可惜公曰彼不才者無飽食以足妻子安足慮本設法令所以縛束有才者祿山朱泚是才過人而亂天下上因可奏曰善賜章服金紫遷户部侍郎掌財賦事上益親重欲相之會中書令韓弘男公武謀曰大人守大梁二十年齊蔡誅後始來朝今不以財授中外設有飛一辭者誰與保白公武賫弘書獻公錢千萬公笑曰此何名為公亟持去明年弘公武繼卒主藏奴與吏訟於御史府上憐弘大臣父子併死稚孫將家事走中使至第盡取財簿自閲視凡中外主權多納弘貨獨朱勾細字曰某年月日送户部牛侍郎錢千萬不納上大喜以指歷簿遍視旁側曰果然吾不謬知人言訖再拜殿上皆再拜呼萬歲尋以本官平章事明年正位中書侍郎加銀青三品兼集賢大學士監修國史敬宗即位與武士畋宴無時徴天下道士言長生事公亟諌曰陛下不讀玄元皇帝五千言以清靜飬生彼道士皆庸人徒誇欺虛荒豈足師法未一歲請退不許連四月日間以疾辭乃以鄂嶽六州建節號武昌軍命公為禮部尚書平章事為節度使公始至問民尤苦皆曰城土踈惡歲輸䉴竹為苦具姧吏旁緣主為侵取費與稅等歲久前後政欲晝計策訖無所施公即除去冗長用公私錢陶磚成城凡五年乃就明年文宗即位就加吏部尚書明年急徴拜兵部尚書平章事重拜中書侍郎弘文大學士鄭注怨宋丞相申錫造言挾津王為大逆狀迹牢密上怒必殺公曰人臣不過宰相今申錫巳宰相假使如所謀豈復欲過宰相有他圖乎臣為中丞愛申錫忠良奏為御史申錫心臣敢以死保之上意解由是宋不死大和六年西戎再遣大臣贄寶玉來朝禮倍前時盡罷東嚮守兵用明臣陮李太尉德𥙿時殿劒南西川上言維州降今若冠生羌三千人燒十三橋搗戎腹心可洗久耻是韋皋二十年至死恨不能致事下尚書省百官聚議皆如劒南奏公獨曰西戎四面各萬里來貴曰何事失信養馬蔚茹川在平涼郡西上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋西南逺數千里雖百維州此時安可用棄誠信有利無害匹夫不忍為况天子以誠信見責于夷狄且有大患上曰然遂罷維州議大和六年檢校右僕射平章事淮南節度使六年至開成二年連上章請休官詔益不許公曰臣惟退罷可以行心夏五月以兵付監軍使拜疏訖就道除檢校司空留守東都明年拜左僕射上恐公不起詔曰朕比有疾良巳思一面敘公不得巳至闕下一拜謝閉門不出明年檢校司空平章事襄州節度使出都門賜黃彛樽龍杓凡六品名出周禮詔曰精金古器用以比况君子非無意也襄州七年饒假軍人入賦不一公至據地造籍免貧弱四千萬均入豪強皆曰甘心不出一怨言明年武宗即位就加司徒會昌元年秋七月漢水溢堤入郭自漢陽王張東之一百五十歲後水為最大李太尉德𥙿挾維州事曰修利不至罷為太子少師未幾檢校司徒兼太子少保明年以檢校官兼太子太傅留守東都劉稹以上黨叛誅死時李太尉專柄五年多逐賢士天下恨怨以公德全畏之言於武宗曰上黨軋左京控山東劉從諌父死擅之十年後來朝加宰相縱去不留之致稹叛竭天下力乃能取此皆公與李公宗閔為宰相時事從諌以大和六年十二月十七日拜闕下實以其月十九日節度淮南明年正月從諌以宰相東還河南少尹吕𫐠公惡其為人述與李太尉書言稹破報至公出聲歎恨上見述書復聞前縱從諌去疊二怒不一參校自十月至十二月公凡三貶至循州貟外長史天下人為公挼手吒罵公走萬里瘴海上二年恬泰若一無事今天子即位移衡州汝州長史遷太子少保少師凡四年復位大中二年十月二十七日薨于東都城南别墅年六十九天子桐傷不朝兩日册贈太尉天下善人執手相弔哭公忠厚仁恕莊重敬愼未嘗以此八者自勉而終身益篤為宰相急於銓品凡名清官不忍持一資以假非其人以道德謨於天子每指古義為據有言機利克迫必釽音華㓢力各切使之攉破三大邦去苛碎條約除大患其輕巧吏欲賊公愛惡希嚮所為渾然終不能見故所至必大治衣冠單窮出俸錢嫁其子女月與食歲與衣資送其死喪凡數百家李太尉志必殺公後南謫過汝州公厚供具哀其窮為解説海上與中州少異以勉安之不出一言及於前事鎮武昌時軍容使仇士良為監軍使公律以禮敬暑甚大合軍宴拱手至暮一不搖扇益自儉克平居非公事不出內屏周三歲語言舉止率有常度仇軍容開成未首議立武宗權力震天下每言至公必合手加顙曰清德可服人但過吝官財與人無一毫恩分耳不肯引譽不敢怨毁淡居其中公始自河南薦鄉貢士為郎官考吏部科日選三開幕府中丞宰相外凡取六十餘人上至將相次布臺閣皆當時名士每暇日宴語寮吏必言古人修身行事旁誘曲指微警教之不以巳所長人所不及裁量髙下以生重輕後進歸之承望聲光得一言許可必自矜重夫人辛氏以公封張掖郡贈僕射祕之長女士林稱為婦師凡三十年前公八年殁五男六女長曰蔚監察御史次曰藂浙南府協律郎皆以文行登進士第不籍公勢次曰奉倩河南府洛陽第二人皆稚齒長女嫁户部郎中上黨苗愔次女嫁河中節度副使檢校郎中范陽張洙次女嫁河南府士曹集賢校理常山張希復次女嫁前進士鄧叔次女未笄一人始數歲以某年月日葬少陵南某鄉某里銘曰道既訛衰必有以扶厥公之生以隆其汙幽以燭明映以雨濡以教其徒以佐天子滅絶霸駮如有樞柅摽揭峙倚巍乎二紀臣宗德老巨傑魁礨孰為忌畏譛去南海不校不辨旋復顯大百行渾圎鄰於及年以歸其全唐故東川節度檢校右僕射兼御史大夫贈司徒周公墓志銘周平王次子烈封汝墳侯秦以汝墳為汝南郡侯之孫因家焉遂姓周氏自烈十八丗至西漢周仁繼烈封侯其後逃西晉亂南去黃岡靈起仕梁為桂州刺史生炅在陳為車騎將軍炅生法明年十二一命為巴州刺史陳滅臣隋為趙之真定令隋亂歸黃岡起兵取蘄安沔黃武德中籍四州地請命授揔管安十六州軍事光祿大夫封國於道太宗命虞丗南銘書墓碑相國為六代孫曾祖惲汝州梁縣令祖沛左拾遺皇考頲右驍衛兵曹參軍贈禮部侍郎公少孤奉飬母夫人以孝聞舉進士登第始試祕書正字湖南團練巡官母夫人亡哭泣無時里人過公廬曰無驚周孝子後自留守府監察真拜御史集賢殿學士李公宗閔以宰相鎮漢中辟公為殿中侍御史行軍司馬後一年復以殿中書職徴歸時大和末注訓用事夏六月始逐丞相宗閔立朋黨語鉤挂名人凡白日逐朝士三十三輩天下悼懾以目受意附凶者屢以公為言注訓曰如去周殿中恐人益驚竟不敢議注訓取公為起居舍人文宗復二史故事公濡筆立石螭下丞相退必召語旁側窺帝每數十顧遷考功貟外郎帝曰周某不可不見冝兼前官數月以考功掌言謝日帝曰就試翰林公辭讓堅懇帝正色以手三麾之遂兼學士遷職方郎中中書舍人政事細大必𬒳顧問公終身不言事故不傳武宗即位以疾辭出為工部侍郎華州刺史八禁軍二十四內司居華下者籍役等百姓不敢妄出一辭李太尉德𥙿伺公纎失四年不得知愈治不可蓋抑遷公江西觀察使兼御史大夫公既得八州施展教令申明約束發以虔守陳弇贓坐弇以法死吏手膠拳窮鄉逺井如公在旁縛出洞寇劉大朴大朴徒數百人斸撥根脈無有遺失彭蠡東口戍五百人上下千里無一賊迹遷禮部尚書鄭滑節度使老將某項領不如教約公鞭背降為下卒聲北入魏皆曰周尚書文儒能治百姓仁愛兵士而復敢爾是豈可犯九歲入拜兵部侍郎度支兼户部吏曹事積邉糧穀九十萬石今天子即位二年五月以本官平章事後一月正位中書侍郎監修國史就加刑部尚書因河湟事議不合旨以檢校刑部尚書出為劒南東川節度使明日入謝面加檢校右僕射公自舉進士第非其人不交言旁睨後進鐫心鏤志及為將相近取遠挽悉置于位李太尉德𥙿會昌中以恩換元和朝實録四十篇益美其父吉甫為相事公上言曰人君唯不改史人臣可改乎元和實録皆當時名士目書事實今不信而信德𥙿後三十年自名父功衆所不知者而書之此若垂後誰信史竟廢新本并師王宰剷所部財貨承事貴幸自請來朝聲言我取平章事鎮大梁公上言曰宰破太原取汴州不知天下治所凡幾得如太原汴之大者可飽宰欲乞宰還鎮自輔其殘後二日還宰詔下駙馬都尉韋讓求為京兆尹公言曰尹坐堂上階下拜二赤縣令屬官將百人悉可笞辱非有德者京兆不可為豈止取吏事讓議竟寢自此非道求進者鼠循自屏及鎮東蜀一歲欲歸間洛師微得風恙公曰我今去是以疾去疾愈去非晚大中五年歲在辛未二月十七日薨于位享年五十九訃至廢朝三日册贈司徒命諌議大夫盧懿弔恤其家公信於朋友公於為官事婺姊出告返靣家事不敢自專同曽祖兄弟入門呵笞奴婢衣服飲食無二等免相位西去送公還者雖武將散秩嘆惜咨嗟曰周相公無私我惜其去豈有私乎夫人義興蔣氏先公某年終生二男一女長曰寬饒崇文校書次曰咸喜京兆參軍皆孝謹有文學女嫁起居舍人薛蒙大中六年歲次壬申二月十二日歸葬先塋河南府河南縣榖陽鄉立行里銘曰姬之支封國自為姓以周為氏入唐不盛烈後幾丗厥生賢孫當唐中興為唐相臣文思天子跨古為治提起王道以公為倚迒音剛蹊隙竅去者鳥駛誰塞誰棘勞公碎指三屏大邦駿壯武事哺撫稚老父母赤子曰將曰相公其愧幾指古為比公其無愧以公遺去聲唐而後公死不錫壽考誰其辨之樊川文集第七
