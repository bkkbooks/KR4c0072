body:
  text: 中書舍人杜牧字牧之班竹筒簟血染班班成錦紋昔年遺恨至今存分明知是湘妃泣何忍將身卧淚䀶和嚴惲秀才落花共惜流年留不得且環流水醉流柸無情紅豔年年盛不恨凋零却恨開倡樓戲贈細栁橋邉深半春纈衣簾裏動香塵無端有寄間消息背插金叉笑向人𥘉上船留寄煙水本好尚親交何慘悽况為珠履客即泊錦帆堤沙鴈同船去田鴉繞岸啼此時還有味必臥日從西秋岸河岸微退落栁影微雕踈船上聽呼稚堤南趂漉魚數帆旗去疾一艇箭回𥘉曽入相思夢因慿附逺書過大梁聞河亭方宴贈孫子端築園縱玩歸應少賦雪搜才去必頻板路豈緣無罰酒不教客右更添人題吳興消暑樓十二韻晴日登攀好危樓物象饒一溪通四境萬岫繞層霄鳥翼舒華屋魚鱗棹短撓浪花機乍織雲葉近新雕臺榭羅嘉卉城池敞麗譙蟾蜍來作鑑螮蝀引成橋燕任隨秋葉人空集早潮楚鴻行盡直沙鷺立偏翹暮角凄遊旅清歌慘沈寥景牽遊目困愁託酒腸銷逺吹流松韻殘陽渡栁橋時陪庾公賞還悟脫煩囂奉送中丞姊夫儔自大理卿出鎮江西敘事書懷因成十二韻惟帝憂南紀搜賢與大藩梅仙調步驟庾亮拂􅐤鞬一室何勞掃三章自不冤精明如定國孤峻似陳蕃灞岸秋猶嫩藍橋水始喧紅旓罣石壁黑矟斷雲根滕閣丹霄倚章江碧玉奔一聲仙妓唱千里暮江痕私好𥘉童稚官榮見子孫流年休挂念萬事至無言玉輦君頻過馮唐將未論傭書酬萬債竹塢問樊村中丞業深韜略志在功名再奉長句篇兼有咨勸檣似鄧林江拍天越香巴錦萬千千滕三閣上柘枝鼓徐孺亭西鐵軸船八部元侯非不貴萬人師長豈無權要君嚴重踈歡樂猶有河湟可下鞭時收河湟且止三州六關和裴傑秀才新櫻桃新果真瓊液未應宴紫蘭圎疑竊龍頷色巳奪雞冠逺火微微辨繁星歷歷看茂先知味好曼倩恨偷難忍用烹騂酪從將玩玉盤流年如可駐何必九華丹春思豈君心的的嗟我淚涓涓綿羽啼來久錦鱗書未傳獸爐凝冷豔羅幕蔽晴煙自是求佳夢何須訝晝眠代人作樓髙春日早屏束麝煙堆盼眄凝魂别依稀夢雨來緑鬟羞妥麼紅頰思夭偎鬪草憐香蕙簮花間雪梅戍遼雖咽切遊蜀亦遲回錦字梭懸壁琴心月滿臺笑筵凝貝啓眠箔曉珠開臘破征車動𫀆襟對淚裁偶題二首勞勞千里身襟𬒮滿行塵深夜懸雙淚短亭思逺人蒼江程未息黑水夢何頻明月輕橈去唯應釣赤鱗有恨秋來極無端别後知夜闌終耿耿明發竟遲遲信巳慿鴻去歸唯與燕期只應明月見千里兩相思冬至日遇京使發寄舍弟逺信初逢雙鯉去他鄉正遇一陽生鐏前豈解愁家國輦下唯能憶弟兄旅館夜憂薑𬒳冷暮江寒覺晏裘輕竹門風過還惆悵疑是松窗雪打聲洛下送張曼容赴上黨召歌闋鐏殘恨起偏慿君不用設離筵未趍雉尾隨元老且驀羊腸過少年七葉漢貂真密近一枝詵桂亦徒然羽書正急徴兵地須遣頭風處處痊宣州留贈紅鉛濕盡半羅裙洞府人間手欲分滿面風流雖似玉四年夫壻恰如雲當春離恨杯長滿倚柱關情日漸曛為報眼波須穩當五陵遊宕莫知聞寄題宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人為倚東樓柱正是千山雪漲溪贈張祐詩韻一逄君平生稱所聞粉毫唯畫月瓊尺只裁雲黥陳人人懾秋星歷歷分數篇留别我羞殺李將軍殘春獨來南亭因寄張祐暖雲如粉草如茵獨步長堤不見人一嶺桃花紅錦黦半溪山水碧羅新髙枝百舌猶欺鳥帶葉梨花獨送春仲蔚欲知何處在苦吟林下拂詩塵宣州開元寺南樓小樓才受一床橫終日看山酒滿傾可惜和風夜來雨醉中虛度打窗聲寄逺人終日求人卜回回道好音那時離别後入夢到如今别沈處士舊事參差夢新程邐迤秋故人如見憶時到寺東樓留贈舞鞾應任間人看笑臉還須待我開不用鏡前空有淚薔薇花謝即歸來奉和僕射相公春澤稍愆聖君軫慮嘉雪忽降品彚昭蘇即事書成四韻白相國飄來雞樹鳯池邊漸壓瓊枝凍碧漣銀闕雙髙銀漢裏玉山橫列玉墀前昭陽殿下風回急承露盤中月彩圎上相抽毫歌帝德一篇風雅美豐年寄李播評事子列光殊價明時忍自髙寧無好舟擑不泛惡風濤大翼終難戢竒鋒且自韜春來煙渚上幾淨雪霜毫送牛相出鎮襄州盛時常注意南雍暫分茅紫殿辭明主巖廊别舊交危憧侵碧霧寒斾獵紅旓德業懸秦鏡威聲隱楚郊拜塵先灑淚成厦昔容巢遙仰沉碑會鴛鴦玉佩敲送薛邽二首可憐走馬騎驢漢豈有風光肯占伊只有三張最惆悵下山回馬尚遲遲小捷風流巳俊才便將紅粉作金臺明年未去池陽郡更乞春時却重來見穆三十宅中庭梅榴花謝矜紅掩素似多才不待櫻桃不逐梅春到未曽逢宴賞雨餘爭解免低徊巧窮南國千般豔趂得東風二月開堪恨王孫浪遊去落英狼籍始歸來留誨曹師等詩萬物有醜好各一姿狀分唯人即不爾學與不學論學非探其花要自撥其根孝友與誠實而不忘爾言根本既深實柯葉自滋繁念爾無忽此期以慶吾門洛陽文爭武戰就神功時似開元天寶中巳建玄戈收相土應廽翠帽過離宫侯門草滿冝寒兔洛浦沙深下塞鴻疑有女蛾西望處上陽煙樹正秋風寄唐州李玭尚書纍代功勳照世光奚胡聞道死心降書功筆秃三千管領節門排十六雙先揖耿弇聲寂寂今看黃霸事摐摐時人欲識胸襟否彭蠡秋連萬里江南陵道中南陵水靣漫悠悠風緊雲輕欲變秋正是客心孤逈處誰家紅袖憑江樓登九峯樓晴江灔灔含淺沙髙低逺郭滯秋花牛酒漁笛山月上鷺渚鶖梁溪日斜為郡異鄉徒泥酒杜陵芳草豈無家白頭搔殺倚柱遍歸棹何時聞軋鴉别家𥘉歲嬌兒未識爺别爺不拜手吒義拊頭一别三千里何日迎門却到家歸家稚子牽衣問歸來何太遲共誰爭歲月贏得鬢邉絲雨連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠孤客耳主人窗外有芭蕉送人鴛鴦帳裏暖芙蓉低泣關山幾萬重明鑑半邊叉一股此生何處不相逢遣懷道泰時還泰時來命不來何當離城市髙卧博山隈醉贈薛道封飲酒論丈四百刻水分雲隔二三年男兒事業知公有賣與明君直幾錢歙州盧中丞見惠名醖誰憐賤子啓窮途太守封來酒一壷攻破是非渾似夢削平身丗有如無醺醺若借嵆康懶兀兀仍添寧武愚猶念悲秋更分賜夾溪紅蓼映風蒲詠襪鈿尺裁量減四分纎纎玉笋裏輕雲五陵年少欺他醉笑把花前出畫裙官詞二首蟬翼輕綃傅體紅玉膚如醉向春風深宫鎖閉猶疑惑更取丹沙試辟宫監宫引出暫開門隨例須朝不是恩銀錀却收金鎖合月明花落乂黃昏月三十六宫秋夜深昭陽歌斷信沉沉唯應獨伴陳皇后照見長門望幸心忍死留别獻鹽鐵裴相公二十叔賢相輔明主蒼生夀域開青春辭白日幽壤作黃埃豈是無多士偏蒙不棄才孤墳一尺土誰可為培栽悲吳王城二月春色江上來水精波動碎樓臺吳王宮殿栁含翠蘇小宅房花正開解舞細腰何處往能歌姹女逐誰回千秋萬古無消息國作荒原人作灰閨情代作梧桐葉落鴈𥘉歸迢遞無因寄逺衣月照石泉金點冷鳯酣簫管玉聲微佳人力杵秋風外蕩子從征夢寐希遙望戍樓天欲曉滿城鼕鼓白雲飛寄沈褒秀才晴河萬里色如刀處處浮雲卧碧桃仙桂茂時金鏡曉洛波飛處玉容髙雄如寶劒衝牛斗麗似鴛鴦飬羽毛他日憶君何處望九天香滿碧蕭騷入關東西南北數衢通曽取江西徑過東今日更尋南去路未秋應有北歸鴻及第後寄長安故人東都放榜未花開三十三人走馬回秦地少年多辦酒巳將春色入關來偶作才子風流詠曉霞倚樓吟住日𥘉斜驚殺東鄰繡床女錯將黃暈壓檀花贈終南蘭若僧北闕南山是故鄉兩枝仙桂一時芳休公都不知名姓始覺禪門氣味長遣懷落魄江南載酒行楚腰腸斷掌中輕十年一覺揚州夢占得青樓薄幸名春日途中田園不事來遊宦故國誰教爾别離獨倚關亭還把酒一年春盡送春時秋感金風萬里思何盡玉樹一窗秋影寒獨掩此門明月下淚流香𬒮倚欄干贈漁父蘆花深澤靜垂綸月夕煙朝幾十春自説孤舟寒水畔不曽逄著獨醒人歎花自恨尋芳到巳遲往年曽見未開時如今風擺花狼籍緑葉成隂子滿枝題劉秀才新竹數莖幽玉色曉夕翠煙分聲破寒窗夢根穿緑蘚紋漸籠當檻日欲礙入簾雲不是山隂客何人愛此君山行逺上寒山石徑斜白雲生處有人家停車坐愛楓林晚霜葉紅於二月花書懷滿眼青山未得過鏡中無那鬢絲何秖言旋老轉無事欲到中年事更多紫薇花曉迎秋露一枝新不占園中最上春桃李無言又何在向風偏笑豔陽人醉後呈崔大夫謝傅秋涼閲管絃徒教賤子侍華筵溪頭正雨歸不得辜負南窗一覺眠知宣州沈大夫登北樓書懷兵符嚴重辭金馬星生光芒射斗牛筆落青山飄古韻帳開紅斾照髙秋香連日彩浮綃幕溪逐歌聲繞畫樓可惜登臨佳麗地羽儀須去鳯池遊夜雨九月三十日雨聲如别秋無端滿階葉共白幾人頭點滴侵寒夢蕭騷著淡愁漁歌聽不唱蓑濕棹回舟方響數條秋水挂琅玕玉手丁當怕夜寒曲盡連敲三四下恐驚珠淚落金盤將出關宿層峯驛却寄李諌議孤驛在重阻雲根掩柴扉數聲暮禽切萬壑秋意歸心馳碧泉澗目斷青瑣闈明日武關外夢魂勞逺飛使回枉唐州崔司馬書兼寄四韻因和清晨候吏把酒來十載離憂得暫開癡叔去時還讀易仲容多興索銜杯人心計日殷勤望馬首隨雲早晚回莫為霜臺愁歲暮潛龍須待一聲雷郡齋秋夜即事寄斛斯處士許秀才有客誰人肯夜過獨憐風景奈愁何邉鴻怨處迷霜久庭樹空來見月多故國杳無千里信綵弦時伴一聲歌馳心秪待城烏曉幾對虛簷望白河同趙二十二訪張明府郊居聮句陶潛官罷酒瓶空門掩楊花一夜風牧古調詩吟山色裏無絃琴在月明中嘏逺簷髙樹冝幽鳥出岫孤雲逐晚虹牧别後東籬數枝菊不知間醉與誰同嘏早春題真上人院生天寶𥘉清羸已近百年身古寺風煙又一春寰海自成戎馬地唯師曽是太平人對花微疾不飲呈坐中諸公花前雖病亦提壷數調持觴興有無盡日臨風羡人醉雪香空伴白髭鬚酬王秀才桃花園見寄桃滿西園淑景催幾多紅豔淺深開此花不逐溪流出晉客無因入洞來走筆送杜十三歸京煙鴻上漢聲聲逺逸驥尋雲步步髙應笑內兄年六十郡城間坐飬霜毛送王十至褒中因寄尚書闕下經年别人間兩地情壇埸新漢將煙月古隋城鴈去梁山逺雲髙楚岫明君家荷藕好緘恨寄遙程後池泛舟送王十相送西郊暮景和青蒼竹外繞寒波為君蘸甲十分飲應見離心一倍多重送王十分𬒮還應立馬看向來離思始知難鴈飛不見行塵滅景下山遙極目寒洛陽秋夕泠泠寒水帶霜風更在天橋夜景中清禁漏間煙樹寂月輪移在上陽宫贈獵騎巳落雙雕血尚新鳴鞭走馬又翻身慿君莫射南來鴈恐有家書寄逺人懷吳中馮秀才長洲苑外草蕭蕭却算遊程歲月遙唯有别時今不忘暮煙秋雨過楓橋寄東塔僧𥘉月微明漏白煙碧松梢外挂青天西風靜起傳深業應送愁吟入夜蟬秋夕紅燭秋光冷畫屏輕羅小扇撲流螢淫階夜色涼如水坐看牽牛織女星瑶瑟玉仙瑶瑟夜珊珊月過樓西桂燭殘風景人間不如此動搖湘水徹明寒送故人歸山三清洞裏無端别又拂塵衣欲卧雲看著挂冠迷處所北山蘿月在移文聞角曉樓煙檻出雲霄景下林塘巳寂寥城角為秋悲更逺護霜雲破海天遙押兵甲發谷口寄諸公曉澗青青桂色孤楚人隨玉上天衢水辭谷口山寒少今日風頭校暖無和令狐侍御賞蕙草尋常詩思巧如春又喜幽亭蕙草新本是馨香比君子繞欄今更為何人偶題道在人間或可傳小還輕變巳多年今來海上升髙望不到蓬萊不是仙三川驛伏覽座主舍人留題舊迹依然巳十秋雪山當面照銀鈎懷恩淚盡霜天曉一片餘霞映驛樓陜州醉贈裴四同年凄風洛下同羈思遲日棠隂得醉歌自笑與君三歲别頭銜依舊鬢絲多破鏡佳人失手鏡𥘉分何日團圎再會君今朝萬里秋風起山北山南一片雲長安雪後秦陵漢苑參差雪北闕南山次第春車馬滿城原上去豈知惆悵有間人華清宫零葉翻紅萬樹霜玉蓮開蘂暖泉香行雲不下朝元閣一曲淋鈴淚數行冬日題智門寺北樓滿懷多少是恩酬未見功名巳白頭不為尋山試筋力豈能寒上背雲樓别王十後遣京使纍路附書重關曉度宿雲寒羸馬緣知步步難此信的應中路見亂山何處拆書看許秀才至辱李蘄州絶句問斷酒之情因寄有客南來話所思故人遙枉醉中詩暫因微疾須防酒不是歡情減舊時送張判官歸兼謁鄂州大夫處士聞名早遊秦獻疏回腹中書萬卷身外酒千杯江雨春波闊園林客夢催今君拜旌戟凛凛近霜臺宿長慶寺南行步步逺浮塵更近青山昨夜鄰髙鐸數聲秋撼玉霽河千里曉橫銀紅渠影落前池淨緑稻香來野徑頻終日官間無一事不妨長醉是遊人望少華身隨白日看將老心與青雲自有期今對晴峯無十里世緣多纍暗生悲文字波中去不還物情𥘉與是非間時名竟是無端事羞對靈山道愛山眼看雲鶴不相隨何看塵中事作為好伴羽人深洞去月前秋聽玉參差登澧州驛樓寄京兆韋尹尹曽典此郡一話涔陽舊使君郡人回首望青雲政聲長與江聲在自到津樓日夜聞長安晴望翠屏山對鳯城開碧落搖光霽後來回識六龍巡幸處飛煙間繞望春臺歲日朝回口號星河猶在整朝衣逺望天門再拜歸笑向春風初五十敢言知命且知非驌驦駿瑶池罷遊宴良樂委塵沙遭遇不遭遇鹽車與鼓車龍丘途中二首漢苑殘花别吳江盛夏來唯看萬樹合不見一枝開水色饒湘浦灘聲怯建溪淚流回月上可得更猿啼宫人冢盡是離宫院中女苑墻城外冢纍纍少年入內教歌舞不識君王到老時寄浙西李判官燕臺上客意何如四五年來漸漸踈直道莫拋男子業遭時還與故人書青雲滿眼應驕我白髮渾頭少恨渠唯念賢哉崔大讓可憐無事不歌魚寄杜子不識長楊事北胡且教紅袖醉來扶狂風烈熖雖千尺豁得平生俊氣無武牢關吏應相笑箇底年年往復來若問使君何處去為言相憶首長回盧秀才將出王屋髙步名埸江南相逢贈别王屋山人有古文欲攀青桂弄氛氲將擕健筆干明主莫向山壇問白雲馳逐寧教爭處讓是非偏忌衆中分交遊話我慿君道除却鱸魚更不聞送劉三復郎中赴闕橫溪辭寂寞金馬去追逰好是鴛鴦似正逢霄漢秋玉珂聲瑣瑣錦帳夢悠悠微笑知今是因風謝釣舟羊欄浦夜陪宴會弋檻營中夜未央雨沾雲惹侍襄王毬來香袖依稀暖酒凸觥心泛灔光紅絃髙緊聲聲急珠唱鋪圓裊裊長自比諸生最無取不知何處亦升堂送杜顗赴潤州幕少年才俊赴知音丞相門欄不覺深直道事人男子業異鄉加飯弟兄心還須整理韋弦佩莫獨矜誇玳瑁簮若去上元懷古去謝安墳下與沉吟有感宛溪垂栁最長枝曽𬒳春風盡日吹不堪攀折猶堪看陌上少年來自遲書懷寄盧州謝山南畔州風物最宜秋太守懸金印佳人敞畫樓凝缸暗醉夕殘月上汀州可惜當年鬢朱門不得遊賀崔大夫崔正字內舉無慙古所難燕臺遙想拂塵冠登龍有路水不峻一鴈背飛天正寒别夜酒餘紅燭短映山帆去碧霞殘謝公樓下潺湲響離恨詩情添幾般江南送左師江南為客正悲秋更送吾師古渡頭惆悵不同塵土别水雲蹤迹去悠悠寢夜蛩唱如波咽更深似水寒露華驚弊褐燈影挂塵冠故國𥘉離夢前溪更下灘紛紛毫髮事多少宦遊難十九兄郡樓有宴病不赴十二層慺敞畫簷連雲歌盡草纎纎空堂病怯階前月燕子嗔垂一行簾愁聚散竟無形回腸自結成古今留不得離别又潛生降虜將軍思窮秋逺客情何人更憔悴落第泣秦京隋苑一云定子牛相小青紅霞一抹廣陵春定子當筵睡臉新却笑丘墟隋煬帝破家亡國為誰人芭蕉芭蕉為雨移故向窗前種憐渠點滴聲留得歸鄉夢夢逺莫歸鄉覺來一翻動汴人舟行答張祐千萬長河共使船聽君詩句倍滄然春風野岸名花發一道帆檣畫栁煙牧陪昭應盧郎中在江西宣州佐今吏部沈公幕罷府周歲公宰昭應牧在淮南縻職敘舊成二十韻用以投寄燕鴈下楊州涼風栁陌愁可憐千里夢還是一年秋宛水環朱檻章江敞碧流謬陪吾益友祗事我賢侯印組縈光馬鋒鋩看解牛井閭安樂易冠蓋愜依投政簡稀開閣功成每運籌送春經野塢遲日上高樓玉裂歌聲斷霞飄舞帶收泥情斜拂印别臉小低頭日晚花枝爛釭疑粉彩稠未曾孤酩酊剩肯隻淹留重德俄徴寵諸生苦宦遊分途之絶國灑淚拜行輈聚散真漂梗光隂極轉郵銘心徒歷歷屈指盡悠悠君作烹鮮用誰膺仄席求卷懷能憤悱卒歲且優遊去矣時難遇沽哉價莫酬滿枝為鼓吹衷甲避戈矛隋帝宮荒草秦王土一丘相逢好大笑除此揔雲浮樊川外集
