body:
  text: 中書舎人杜牧字牧之班竹筒簟血染班班成錦紋昔年遺恨至今存分明知是湘妃泣何忍将身卧淚㾗和嚴惲秀才落花共惜流年留不得且環流水醉流柸無情紅豔年年盛不恨凋零却恨開倡樓戲贈細栁橋邉深半春纈衣簾裏動香塵無端有寄閑消息背挿金釵笑向人𥘉上舩留寄煙水本好尚親交何慘悽况爲珠履客即泊錦帆堤沙鴈同舩去田鵶遶岸啼此時還有味必臥日從西秋岸河岸微退落栁影微彫踈舩上聽呼穉堤南趂漉魚數帆旗去疾一艇箭廻𥘉曽入相思夢因慿附逺書過大梁聞河亭方讌贈孫子端築園縱翫歸應少賦雪搜才去必頻板路豈縁無罰酒不教客右更添人題吳興消暑樓十二韻晴日登攀好危樓物象饒一溪通四境萬岫遶層霄鳥翼舒華屋魚鱗棹短撓浪花機乍織雲葉近新雕䑓榭羅嘉卉城池敞麗譙蟾蜍來作鑑螮蝀引成橋燕任随秋葉人空集早潮楚鴻行盡直沙鷺立偏翹暮角凄遊旅清歌慘沈寥景牽遊目困愁託酒膓銷逺吹流松韻殘陽渡栁橋時陪庾公賞還悟脫煩囂奉送中丞姊夫儔自大理卿出鎮江西叙事書懷因成十二韻惟帝憂南紀搜賢與大藩梅仙調歩驟庾亮拂􅐤鞬一室何勞掃三章自不冤精明如定國孤峻似陳蕃灞岸秋猶嫩藍橋水始喧紅旓罣石壁黒矟㫁雲根滕閣丹霄倚章江碧玉奔一聲仙妓唱千里暮江痕私好𥘉童稚官榮見子孫流年休挂念萬事至無言玉輦君頻過馮唐将未論傭書醻萬債竹塢問樊村中丞業深韜略志在功名再奉長句篇兼有諮勸檣似鄧林江拍天越香巴錦萬千千滕三閣上柘枝鼓徐孺亭西鐵軸船八部元侯非不貴萬人師長豈無權要君嚴重踈歡樂猶有河湟可下鞭時收河湟且止三州六關和裴傑秀才新櫻桃新果眞瓊液未應宴紫蘭圎疑竊龍頷色巳奪雞冠逺火微微辨繁星歴歷看茂先知味好曼倩恨偷難忍用烹騂酪從將翫玉盤流年如可駐何必九華丹春思豈君心的的嗟我淚㳙㳙綿羽啼來乆錦鱗書未傳獸爐凝冷豔羅幕蔽晴煙自是求佳夢何湏訝晝眠代人作樓髙春日早屏束麝煙堆盼眄凝䰟别依稀夢雨來緑鬟羞妥麽紅頰思夭偎闘草憐香蕙簮花間雪梅戍遼雖咽切遊蜀亦遲廻錦字梭懸壁琴心月滿臺笑筵凝貝啓眠箔暁珠開臘破征車動𫀆襟對淚裁偶題二首勞勞千里身襟𬒮滿行塵深夜懸雙涙短亭思逺人蒼江程未息黒水夢何頻明月輕橈去唯應釣赤鱗有恨秋來極無端别後知夜䦨終耿耿明發竟遟遟信巳慿鴻去歸唯與燕期只應明月見千里兩相思冬至日遇京使發寄舎弟逺信初逢雙鯉去他郷正遇一陽生鐏前豈解愁家國輦下唯能憶弟兄旅館夜憂姜𬒳冷暮江寒覺晏裘輕竹門風過還惆悵疑是松䆫雪打聲洛下送張曼容赴上黨召歌闋鐏殘恨起偏慿君不用設離筵未趍雉尾隨元老且驀羊腸過少年七葉漢貂眞宻近一枝詵桂亦徒然羽書正急徴兵地湏遣頭風處處痊宣州留贈紅鈆濕盡半羅裙洞府人間手欲分滿面風流雖似玉四年夫壻恰如雲當春離恨盃長滿倚柱關情日漸曛爲報眼波湏穏當五陵遊宕莫知聞寄題宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人爲倚東樓柱正是千山雪漲溪贈張祐詩韻一逄君平生稱所聞粉毫唯畫月瓊尺只裁雲黥陣人人懾秋星歴歴分數篇留别我羞殺李将軍殘春獨來南亭因寄張祐煖雲如粉草如茵獨歩長堤不見人一嶺桃花紅錦黦半溪山水碧羅新髙枝百舌猶欺鳥帶葉梨花獨送春仲蔚欲知何䖏在苦吟林下拂詩塵宣州開元寺南樓小樓纔受一床横終日看山酒滿傾可惜和風夜來雨醉中虚度打牎聲寄逺人終日求人卜廻廻道好音那時離别後入夢到如今别沈䖏士舊事參差夢新程邐迤秋故人如見憶時到寺東樓留贈舞鞾應任閑人看笑臉還湏待我開不用鏡前空有淚薔薇花謝即歸來奉和僕射相公春澤稍愆聖君軫慮嘉雪忽降品彚昭蘇即事書成四韻白相國飄來鷄樹鳯池邊漸壓瓊枝凍碧漣銀闕雙髙銀漢裏玉山横列玉墀前昭陽殿下風廻急承露盤中月彩圎上相抽毫歌帝徳一篇風雅羙豐年寄李播評事子列光殊價明時忍自髙寕無好舟擑不汎惡風濤大翼終難戢竒鋒且自韜春來煙渚上幾淨雪霜毫送牛相出鎮襄州盛時常注意南雍暫分茅紫殿辭明主巖廊别舊交危憧侵碧霧寒斾獵紅旓德業懸秦鏡威聲隱楚郊拜塵先灑淚成厦昔容巢遥仰沉碑㑹鴛鴦玉佩敲送薛邽二首可憐走馬騎驢漢豈有風光肯占伊只有三張最惆悵下山廻馬尚遲遲小捷風流巳俊才便将紅粉作金臺明年未去池陽郡更乞春時却重來見穆三十宅中庭梅榴花謝矜紅掩素似多才不待櫻桃不逐梅春到未曽逢宴賞雨餘爭解免低徊巧窮南國千般豔趂得東風二月開堪恨王孫浪遊去落英狼籍始歸來留誨曹師等詩萬物有醜好各一姿状分唯人即不爾學與不學論學非探其花要自撥其根孝友與誠實而不忘爾言根本既深實柯葉自滋繁念爾無忽此期以慶吾門洛陽文爭武戰就神功時似開元天寳中巳建玄戈收相土應廽翠㡌過離宫侯門草滿冝寒兎洛浦沙深下塞鴻疑有女蛾西望䖏上陽煙樹正秋風寄唐州李玭尚書累代功勲照世光奚胡聞道死心降書功筆秃三千管領節門排十六雙先揖耿弇聲寂寂今看黄霸事摐摐時人欲識胷襟否彭蠡秋連萬里江南陵道中南陵水靣漫悠悠風緊雲輕欲變秋正是客心孤逈䖏誰家紅䄂凭江樓登九峯樓晴江灔灔含淺沙髙低逺郭滯秋花牛酒漁笛山月上鷺渚鶖梁溪日斜爲郡異郷徒泥酒杜陵芳草豈無家白頭搔殺倚柱遍歸棹何時聞軋鴉别家𥘉歲嬌兒未識爺别爺不拜手吒义拊頭一别三千里何日迎門却到家歸家穉子牽衣問歸來何太遟共誰爭歲月贏得鬂邉絲雨連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠孤客耳主人䆫外有芭蕉送人鴛鴦帳裏暖芙蓉低泣關山幾萬重明鑑半邊釵一股此生何處不相逢遣懐道泰時還泰時來命不來何當離城市髙卧愽山隈醉贈薛道封飲酒論丈四百刻水分雲隔二三年男兒事業知公有賣與明君直幾錢歙州盧中丞見惠名醖誰憐賤子啓窮途太守封來酒壹壷攻破是非渾似夢削平身丗有如無醺醺若借嵆康懶兀兀仍添寗武愚猶念悲秋更分賜夾溪紅蓼映風蒲詠襪鈿尺裁量减四分纎纎玉笋裏輕雲五陵年少欺他醉笑把花前出畫裙官詞二首蝉翼輕綃傅體紅玉膚如醉向春風深宫鎻閉猶疑惑更取丹沙試辟宫監宫引出暫開門随例湏朝不是恩銀錀却收金鎻合月明花落乂黄昏月三十六宫秋夜深昭陽歌㫁信沉沉唯應獨伴陳皇后照見長門望幸心忍死留别獻鹽鐵裴相公二十叔賢相輔明主蒼生夀域開青春辭白日幽壤作黄埃豈是無多士偏蒙不棄才孤墳一尺土誰可爲培栽悲吳王城二月春色江上來水精波動碎樓䑓吳王宮殿栁含翠蘇小宅房花正開解舞細腰何處徃䏻歌姹女逐誰廻千秋萬古無消息國作荒原人作灰閨情代作梧桐葉落鴈𥘉歸迢遞無因寄逺衣月照石泉金點冷鳯酣簫管玉聲微佳人力杵秋風外蕩子從征夢寐希遥望戍樓天欲曉滿城鼕鼓白雲飛寄沈褒秀才晴河萬里色如刀處處浮雲卧碧桃仙桂茂時金鏡暁洛波飛處玉容髙雄如寳劒衝牛斗麗似鴛鴦飬羽毛他日憶君何處望九天香滿碧蕭騷入關東西南北數衢通曽取江西徑過東今日更㝷南去路未秋應有北歸鴻及第後寄長安故人東都放牓未花開三十三人走馬廻秦地少年多辦酒巳将春色入關來偶作才子風流詠暁霞倚樓吟住日𥘉斜驚殺東隣繡床女錯将黄暈壓檀花贈終南蘭若僧北闕南山是故郷兩枝仙桂一時芳休公都不知名姓始覺禪門氣味長遣懷落魄江南載酒行楚腰腸㫁掌中輕十年一覺揚州夢占得青樓薄倖名春日途中田園不事來遊宦故國誰教爾别離獨倚關亭還把酒一年春盡送春時秋感金風萬里思何盡玉樹一䆫秋影寒獨掩此門明月下淚流香𬒮倚欄干贈漁父蘆花深澤静垂綸月夕煙朝㡬十春自說孤舟寒水畔不曽逄着獨醒人歎花自恨㝷芳到巳遟徃年曽見未開時如今風擺花狼籍緑葉成隂子滿枝題劉秀才新竹數莖幽玉色曉夕翠煙分聲破寒䆫夢根穿緑蘚紋漸籠當檻日欲礙入簾雲不是山隂客何人愛此君山行逺上寒山石徑斜白雲生䖏有人家停車坐愛楓林晚霜葉紅於二月花書懷滿眼青山未得過鏡中無那鬢絲何秖言旋老轉無事欲到中年事更多紫薇花曉迎秋露一枝新不占園中最上春桃李無言又何在向風偏笑豔陽人醉後呈崔大夫謝傅秋凉閱管絃徒教賤子侍華筵溪頭正雨歸不得辜負南䆫一覺眠知宣州沈大夫登北樓書懐兵符嚴重辭金馬星生光芒射斗牛筆落青山飄古韻帳開紅斾照髙秋香連日彩浮綃幕溪逐歌聲遶畫樓可惜登臨佳麗地羽儀湏去鳯池遊夜雨九月三十日雨聲如别秋無端滿階葉共白幾人頭點滴侵寒夢蕭騷著淡愁漁歌聽不唱蓑濕棹廻舟方響數條秋水挂琅玕玉手丁當怕夜寒曲盡連敲三四下恐驚珠淚落金盤将出關宿層峯驛却寄李諌議孤驛在重阻雲根掩柴扉數聲暮禽切萬壑秋意歸心馳碧泉澗目㫁青瑣闈明日武關外夢魂勞逺飛使廻枉唐州崔司馬書兼寄四韻因和清晨候吏把酒來十載離憂得暫開癡叔去時還讀易仲容多興索衘盃人心計日殷勤望馬首隨雲早晚廻莫爲霜臺愁歲暮潜龍湏待一聲雷郡齋秋夜即事寄斛斯處士許秀才有客誰人肯夜過獨憐風景柰愁何邉鴻怨處迷霜乆庭樹空來見月多故國杳無千里信綵弦時伴一聲歌馳心秪待城烏暁㡬對虚簷望白河同趙二十二訪張明府郊居聮句陶潜官罷酒缾空門掩楊花一夜風牧古調詩吟山色裏無絃琴在月明中嘏逺簷髙樹冝幽鳥出岫孤雲逐晚虹牧别後東籬數枝菊不知閑醉與誰同嘏早春題眞上人院生天寳𥘉清羸已近百年身古寺風煙又一春寰海自成戎馬地唯師曽是太平人對花微疾不飲呈坐中諸公花前雖病亦提壷數調持觴興有無盡日臨風羡人醉雪香空伴白髭鬚酬王秀才桃花園見寄桃滿西園淑景催㡬多紅豔淺深開此花不逐溪流出晉客無因入洞來走筆送杜十三歸京煙鴻上漢聲聲逺逸驥㝷雲歩歩髙應笑内兄年六十郡城閑坐飬霜毛送王十至褒中因寄尚書闕下經年别人間兩地情壇埸新漢将煙月古隋城鴈去梁山逺雲髙楚岫明君家荷藕好緘恨寄遥程後池泛舟送王十相送西郊暮景和青蒼竹外遶寒波爲君蘸甲十分飲應見離心一倍多重送王十分𬒮還應立馬看向來離思始知難鴈飛不見行塵滅景下山遥極目寒洛陽秋夕泠泠寒水帶霜風更在天橋夜景中清禁漏閑煙樹寂月輪移在上陽宫贈獵騎巳落雙鵰血尚新鳴鞭走馬又翻身慿君莫射南來鴈恐有家書寄逺人懷吳中馮秀才長洲苑外草蕭蕭却筭遊程歲月遥唯有别時今不忘暮煙秋雨過楓橋寄東塔僧𥘉月微明漏白煙碧松梢外挂青天西風靜起傳深業應送愁吟入夜蟬秋夕紅燭秋光冷畫屏輕羅小扇撲流螢淫階夜色凉如水坐看牽牛織女星瑶瑟玉仙瑶瑟夜珊珊月過樓西桂燭殘風景人間不如此動揺湘水徹明寒送故人歸山三清洞裏無端别又拂塵衣欲卧雲看著挂冠迷處所北山蘿月在移文聞角暁樓煙檻出雲霄景下林塘巳寂寥城角爲秋悲更逺護霜雲破海天遥押兵甲發谷口寄諸公曉澗青青桂色孤楚人隨玉上天衢水辭谷口山寒少今日風頭校暖無和令狐侍御賞蕙草㝷常詩思巧如春又喜幽亭蕙草新本是馨香比君子遶欄今更爲何人偶題道在人間或可傳小還輕變巳多年今來海上昇髙望不到蓬萊不是仙三川驛伏覧座主舎人留題舊跡依然巳十秋雪山當面照銀鈎懷恩淚盡霜天曉一片餘霞映驛樓陜州醉贈裴四同年凄風洛下同覊思遟日棠隂得醉歌自笑與君三歳别頭銜依舊鬢絲多破鏡佳人失手鏡𥘉分何日團圎再㑹君今朝萬里秋風起山北山南一片雲長安雪後秦陵漢苑參差雪北闕南山次第春車馬滿城原上去豈知惆悵有閑人華清宫零葉飜紅萬樹霜玉蓮開蘂暖泉香行雲不下朝元閣一曲淋鈴淚數行冬日題智門寺北樓滿懷多少是恩酬未見功名巳白頭不爲㝷山試筋力豈能寒上背雲樓别王十後遣京使累路附書重關曉度宿雲寒羸馬縁知歩歩難此信的應中路見亂山何處拆書看許秀才至辱李蘄州絶句問斷酒之情因寄有客南來話所思故人遥枉醉中詩暫因微疾湏防酒不是歡情减舊時送張判官歸兼謁鄂州大夫處士聞名早遊秦獻䟽廻腹中書萬卷身外酒千盃江雨春波闊園林客夢催今君拜旌㦸凛凛近霜臺宿長慶寺南行歩歩逺浮塵更近青山昨夜鄰髙鐸數聲秋撼玉霽河千里暁横銀紅渠影落前池淨緑稻香來野逕頻終日官閑無一事不妨長醉是游人望少華身隨白日看将老心與青雲自有期今對晴峯無十里世縁多累暗生悲文字波中去不還物情𥘉與是非閑時名竟是無端事羞對靈山道愛山眼看雲鶴不相隨何看塵中事作爲好伴羽人深洞去月前秋聽玉參差登澧州驛樓寄京兆韋尹尹曽典此郡一話涔陽舊使君郡人廻首望青雲政聲長與江聲在自到津樓日夜聞長安晴望翠屏山對鳯城開碧落揺光霽後來迴識六龍廵幸處飛煙閑繞望春臺歳日朝迴口號星河猶在整朝衣逺望天門再拜歸笑向春風初五十敢言知命且知非驌驦駿瑶池罷游宴良樂委塵沙遭遇不遭遇鹽車與鼓車龍丘途中二首漢苑殘花别吴江盛夏來唯看萬樹合不見一枝開水色饒湘浦灘聲怯建溪淚流迴月上可得更猿啼宫人塚盡是離宫院中女苑墻城外塚纍纍少年入内教歌舞不識君王到老時寄浙西李判官燕臺上客意何如四五年來漸漸踈直道莫抛男子業遭時還與故人書青雲滿眼應驕我白髮渾頭少恨渠唯念賢哉崔大讓可憐無事不歌魚寄杜子不識長楊事北胡且教紅䄂醉來扶狂風烈熖雖千尺豁得平生俊氣無武牢關吏應相笑箇底年年徃復來若問使君何處去爲言相憶首長廻盧秀才将出王屋髙歩名埸江南相逢贈别王屋山人有古文欲攀青桂弄氛氲将擕徤筆干明主莫向山壇問白雲馳逐寜教爭䖏讓是非偏忌衆中分交遊話我慿君道除却鱸魚更不聞送劉三復郎中赴闕横溪辭寂寞金馬去追逰好是鴛鴦佀正逢霄漢秋玉珂聲瑣瑣錦帳夢悠悠㣲笑知今是因風謝釣舟羊欄浦夜陪宴會弋檻營中夜未央雨沾雲惹侍襄王毬來香䄂依稀暖酒凸觥心汎灔光紅絃髙緊聲聲急珠唱鋪圓裊裊長自比諸生最無取不知何䖏亦升堂送杜顗赴潤州幕少年才俊赴知音丞相門欄不覺深直道事人男子業異郷加飯弟兄心還須整理韋弦佩莫獨矜誇玳瑁簮若去上元懷古去謝安墳下與沉吟有感宛溪垂栁最長枝曽𬒳春風盡日吹不堪攀折猶堪看陌上少年来自遟書懷寄盧州謝山南畔州風物最宜秋太守懸金印佳人敞畫樓凝缸暗醉夕殘月上汀州可惜當年鬢朱門不得遊賀崔大夫崔正字内舉無慙古所難燕䑓遥想拂塵冠登龍有路水不峻一鴈背飛天正寒别夜酒餘紅燭短映山帆去碧霞殘謝公樓下潺湲響離恨詩情添㡬般江南送左師江南爲客正悲秋更送吾師古渡頭惆悵不同塵土别水雲蹤跡去悠悠寢夜蛩唱如波咽更深似水寒露華驚弊褐燈影挂塵冠故國𥘉離夢前溪更下灘紛紛毫髪事多少宦遊難十九兄郡樓有宴病不赴十二層慺敞畫簷連雲歌盡草纎纎空堂病怯階前月燕子嗔垂一行簾愁聚散竟無形廻腸自結成古今留不得離别又潜生䧏虜将軍思窮秋逺客情何人更憔悴落第泣秦京隋苑一云定子牛相小青紅霞一抺廣陵春定子當筵睡臉新却笑丘墟隋煬帝破家亡國爲誰人芭蕉芭蕉爲雨移故向䆫前種憐渠點滴聲留得歸郷夢夢逺莫歸郷覺來一翻動汴人舟行荅張祐千萬長河共使船聽君詩句倍滄然春風野岸名花發一道㠶檣畫栁煙牧陪昭應盧郎中在江西宣州佐今吏部沈公幕罷府周歳公宰昭應牧在淮南縻職叙舊成二十韻用以投寄燕鴈下楊州凉風栁陌愁可憐千里夢還是一年秋宛水環朱檻章江敞碧流謬陪吾益友祗事我賢侯印組縈光馬鋒鋩看解牛井閭安樂易冠蓋愜依投政簡稀開閤功成每運籌送春經野塢遲日上高樓玉裂歌聲㫁霞飄舞帶收泥情斜拂印别臉小低頭日晩花枝爛釭疑粉彩稠未曾孤酩酊剰肯隻淹留重德俄徴寵諸生苦宦遊分途之絶國灑淚拜行輈聚散眞漂梗光隂極轉郵銘心徒歴歴屈指盡悠悠君作烹鮮用誰膺仄席求卷懷能憤悱卒歳且優游去矣時難遇沽哉價莫酬滿枝爲皷吹衷甲避戈矛隋帝宮荒草秦王土一丘相逢好大笑除此揔雲浮樊川外集
