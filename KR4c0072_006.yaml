front:
  text: 樊川文集第六
  hash: sha256:e4e27e77ebbe3712522d1a4fdc4b283a1b284d174a49ce1b90ceb09d54243767
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_006-1a}
body:
  text: 中書舎人杜牧字牧之燕將録諢忠者絳人也祖瑶天寳末令内黄死燕㓂忠豪健喜兵始去燕燕牧劉濟與二千人障曰狼口山名契丹路後將漁陽軍留范陽元和五年中黄門出禁兵伐趙魏牧田季安令其徒曰師不跨河二十五年矣今一旦越魏伐趙趙誠虜魏亦虜矣計爲之柰何其徒有超佐伍而言曰願借騎五千以除君憂季安大呼曰壯矣哉兵決出格沮者斬忠其時爲燕使魏知其謀乃入謂季安曰某之謀是引天下之兵也何者往年王師取蜀取吴筭不失一是相臣之謀今王師越魏伐趙不使耆臣宿將而專付中臣不輸天下之甲而多出禁甲君知誰爲之謀此乃天子自爲之謀欲將誇服於臣下也今若師未叩趙而先碎於魏是上之謀反不如下且能不耻於天下乎旣耻且怒於是任智畫䇿仗猛將兵練精畢力再舉渉河鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可隂遺趙人書曰魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能隂解陴障遺魏一城魏得持之奏捷天子以爲符信此乃使魏北得以奉趙西得以爲臣於趙爲角尖之耗於魏獲不世之利執事豈能無意於趙平趙人脫不拒君是魏覇基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽縣名属兾州忠歸燕謀欲激燕伐趙㑹劉濟合諸將曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕劉濟怒曰爾何不直言濟趙叛命忠繫獄因使人視趙果不備燕後一日詔果來曰燕南有趙北有胡胡猛趙孱不可捨胡而事趙也燕其爲予謹護北疆勿使予復挂胡憂而得專心於趙此亦燕之功也劉濟乃解獄召忠曰信如子斷矣何以知之忠曰潞牧盧從史外親燕内實忌之外絶趙内實與之此爲趙畫曰燕以趙爲障雖怨趙必不殘趙不必爲備一且示趙不敢抗燕二且使燕獲疑天子趙人旣不備燕潞人則走告于天子燕厚怨趙今趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦必不備燕劉濟曰今則奈何忠曰燕孕怨天下無不知今天子伐趙君坐全燕之甲一人未濟易水此正使潞人將燕賣恩於趙敗忠於上两皆售也是燕貯忠義之心卒染私趙之口不見徳於趙人惡聲徒嘈嘈於天下耳唯君熟思之劉濟曰吾知之矣乃下令軍中曰五日畢出後者醢以徇濟乃自將七萬人南伐趙屠饒陽束鹿二縣属深州殺萬人暴卒于師濟子緫襲職忠復用事元和十四年春趙人獻城十二徳州管平原安陵長河棣州管猒次商河陽信蓨平昌将陵滿臺渤海冬誅齊三分其地忠因說緫曰凢天地數窮合必離離必合河北與天下相離六十年矣此亦數之窮也必與天地復合且建中時朱泚搏天子狩畿甸李希烈僣于梁王武俊稱趙朱泚稱兾田恱稱魏李納稱齊郡國往往弄兵者低目而視當此之時可爲危矣然天下卒於無事自元和巳來劉闢守蜀棧道劒閣自以爲子孫丗丗之地然軍卒三萬數月見羈李錡横大江撫石頭全吴之兵不得一戰反束帳下田季安守魏盧從史守潞皆天下之精甲駕趙爲騎鼎立相視可爲強矣然從史繞壍五十里萬㦸自護身如大醉忽在轞車季安死墳杵未收家爲逐客蔡人𬒳重葉之甲圎三石之弦持九尺之刃突前跳後卒蔟怱反如搏鶚一可枝百者累數萬人四歳不北二三可爲堅矣然夜半大雪忽失其城齊人經地數千里倚渤海墻泰山壍大河精甲數億鈐劒其阨可爲安矣然兵折於潭趙地名鄆西六十里首竿於都市此皆君之自見亦非人力所能及蓋上帝神兵下來誅之耳今天子巨謀纎計必平章於大臣鋪樂張獵未甞戴星徘徊顐五困切玩之臣顔澁不展縮衣節口以賞戰士此志豈湏臾忘於天下哉今國兵駸駸北來趙人巳獻城十二助魏破齊唯燕未得一日之勞爲子孫壽後丗豈能帖帖無事乎吾深爲君憂之緫泣且拜曰自數人來未聞先生之言今者幸枉大敎吾心定矣明年春劉緫出燕卒于趙忠護緫喪來數日亦卒年六十四官至御史大夫忠弟憲前范陽安次令持兄喪歸葬于綘常徃來長安間元年孟春某遇於馮翊屬縣北徴中因吐其兄之状某因直書其事至於襄貶之間俟學春秋者焉張保臯鄭年傳新羅人張保臯鄭年者自其國來徐州爲軍中小将保臯年三十年少十歲兄呼保臯俱善鬪戰騎而揮槍其本國與徐州無有䏻敵者年復能没海履其地五十里不噎角其勇健保臯差不及年保臯以齒年以藝常齟齬不相下後保臯歸新羅謁其王曰遍中國以新羅人爲奴婢願得鎮清海新羅海路之要使賊不得掠人西去其王與萬人如其請自大和後海上無鬻新羅人者保臯既貴於其國年錯寞去職饑寒在泗之漣水縣一日言於漣水戍将馮元規曰年欲東歸乞食於張保臯元規曰爾與保臯所挾何如奈何去取死其手年曰饑寒死不如兵死快况死故郷邪年遂去至謁保臯保臯飲之極歡飲未卒其國使至大臣殺其王國亂無主保臯遂分兵五千人與年持年泣曰非子不䏻平禍難年至其國誅反者立王以報王遂徴保臯爲相以年代保皐天寳安禄山亂朔方節度使安思順以禄山從弟腸死詔郭汾陽代之後旬日復詔李臨淮持節分朔方半兵東岀趙魏當思順時汾陽臨淮俱爲牙門都将将萬人不相䏻雖同盤飲食常睇相視不交一言及汾陽代思順臨淮欲亡去計未決詔至分汾陽兵東討臨淮入請曰一死固甘乞免妻子汾陽趍下持手上堂偶坐曰今國亂主遷非公不能東伐豈懷私忿時耶悉詔軍吏出詔書讀之如詔約束及别執手泣涕相勉以忠義訖平劇盗實二公之方知其心不叛知其材可任然後心不疑兵可分平生積忿知其心難也忿必見短知其材益難也此保臯與汾陽之賢等耳年投保臯必曰彼貴我賤我䧏下之不冝以舊忿殺我保臯果不殺此亦人之常情也臨淮分兵詔至請死於汾陽此亦人之常情也保臯任年事出於巳年且寒飢易爲感動汾陽臨淮平生抗立臨淮之命出於天子㩁於保臯汾陽爲優此乃聖賢遟疑成敗之際也彼無他也仁義之心與雜情並植雜情勝則仁義滅仁義勝則雜情銷彼二人仁義之心旣勝復資之以明故卒成功出稱周邵爲百代人師周公擁孺子而邵公疑之以周公之聖邵公之賢少事文王老佐武王能平天下周公之心邵公且不知之苟有仁義之心不資以明雖邵公尚爾况其下哉語曰國有一人其國不亡夫亡國非無人也丁其亡時賢人不用苟能用之一人足矣竇列女傳列女姓竇氏小字桂娘父良建中𥘉爲汴州戸曹掾桂娘美顔色讀書甚有文李希烈破汴州使甲士至良門取桂娘以去將出門顧其父曰愼無戚必能滅賊使大人取冨貴於天子桂娘旣以才色在希烈側復能巧曲取信凢希烈之密雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳先竒其妻竇氏先竒寵且信之願得相往來以姊妹叙齒因徐說之使堅先竒之心希烈然之桂娘因以姊事先竒妻甞間曰爲賊兇殘不道遲晩必敗姊冝早圖遺種之地先竒妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校以卑少者代之計未决有獻含桃者桂娘白希烈子請分遺先竒妻且以示無事於外因爲蠟帛書曰前日已死殯在後堂欲誅大臣希烈僣故曰臣湏自爲計以朱染帛丸如含桃先竒發丸見之言於薛育育曰两日希烈稱疾但恠樂曲雜發盡夜不絶此乃有謀未定示暇於外事不疑矣明日先竒薛育各以所部譟於牙門請見希烈希烈子迫出拜曰願去僞号一如李納時正巳死納代爲帥先竒曰爾父勃逆天子有命因斬希烈及妻子函七首以獻暴其尸於市後兩月吴少誠殺先竒知桂娘謀因亦殺之請試論之希烈負桂娘者但劫之耳希烈僣而桂娘妃復寵信之於女子心始終希烈可也此誠知所去所就逆順輕重之理明也能得希烈權也姊先竒妻智也終能滅賊不顧其私烈也六尺男子有禄位者當希烈叛與之上下者衆矣豈才力不足邪蓋義理苟至雖一女子可以有成大和元年予客遊涔陽路出荆州松滋縣攝令王洪爲某言桂娘事淇年十一歳能念五經舉童子及第時年七十五尚可日記千言當建中亂希烈與李納田恱朱泚朱滔等僣詔書檄爭戰勝敗地名人名悉能說之聴說如一日前言竇良出於王氏實淇之堂姑子也書處州韓吏部孔子廟碑隂天不生夫子於中國中國當何如曰不夷狄如也荀卿祖夫子李斯事荀卿一日宰天下盡誘夫子之徒與書坑而焚之曰徒䏻亂人不若刑名獄吏治世之賢也彼商鞅者能耕䏻戰䏻行其法基秦爲强曰彼仁義虱官也可以置之置之言不用也自董仲舒劉向皆言司馬遷良史也而遷以儒分之爲九曰愽而寡要勞而無功不如道家者流也自有天地巳來人無有不死者海上迂怪之士持出言曰黄帝錬丹砂爲黄金以餌之晝曰乗龍上天誠得其藥可知黄帝以燕昭王之賢破強齊㡬於覇秦始皇漢武帝之雄材滅六強擗四夷盡非凡王也皆甘其說耗天下捐骨肉而不辭至死而不悟其尊於天地莫嚴於宗廟社稷梁武帝起爲梁國者以筍脯麪牲爲薦祀之禮曰佛之教牲不可殺以天子尊捨身爲其奴散髪布地親命其徒踐之有天地日月爲之主隂陽鬼神爲之佐夫子巍然統而辯之復引堯舜禹湯文武周公爲之助則其徒不爲劣其治不爲僻彼四君二臣不爲無知一旦不信背而之他仍族滅之儻不生夫子紛紜冥昧百家鬪起是巳所是非巳所非天下隨其時而宗之誰敢非之縱有非之者欲何所依擬而爲其辭是楊墨駢愼巳䧏百家之徒廟貌而血食十年一變法百年一改教横斜髙下不知止泊彼夷狄者爲夷狄之俗一定而不易若不生夫子是知其必不夷狄如也韓吏部夫子廟碑曰天下通祀唯社稷與夫子社稷壇而不屋取異代爲配未若夫子巍然當門用王者禮以門人爲配自天子至於庻人親北面而師之夫子以德社稷以功固有次第因引孟子曰生人巳來未有如夫子者也自古稱夫子者多矣稱夫子之德莫如孟子稱夫子之尊莫如韓吏部故書其碑隂云三子言性辯孟子言人性善荀子言人性惡楊子言人性善惡混曰喜曰哀曰懼曰惡曰欲曰愛曰怒夫七者情也情出於性也夫七情中愛怒二者生而能自是二者性之根惡之端也乳兒見乳必拏求不得即啼是愛與怒與兒俱生也夫豈知其五者焉既壮而五者隨而生焉或有或亡或厚或薄至於愛怒曽不須臾與乳兒相離而至扵壮也君子之性愛怒淡然不出於道中人可以上下者有愛拘於禮有怒懼於法世有禮法其有踰者不敢恣其情世無禮法亦隨而熾焉至於小人雖有禮法而不䏻制愛則求之求不得即怒怒則亂故曰愛怒者性之本惡之端與乳兒俱生相随而至於壮也凡言性情之善者多引舜禹言不善者多引丹朱商均夫舜禹二君子生人巳來如二君子者凡有㡬人不可引以爲喻丹朱商均爲堯舜子夫生於堯舜之世𬒳其化皆爲善人况生扵其室親爲父子蒸不䏻潤灼不䏻熱是其惡與堯舜之善等耳天止一日月耳言光明者豈可引以爲喻人之品類可與上下者衆可與上下之性愛怒居多愛怒者惡之端也荀言人之性惡比於二子荀得多矣塞廢井文井廢輙不塞於古無所㩀今之州府㕔事有井廢不塞居第在堂上有井廢亦不塞或匣而護之或横木土覆之至有歲乆木朽䧟人以至於死世俗終不塞之不知何典故而井不可塞井雖列在五禮在都邑中物之小者也若盤庚五遷其都者社稷宗廟尚毀其舊而獨井豈不塞邪古者井田九頃八家環而居之一夫食一頃中一頃樹𬞞鑿井而八家共汲之所以籍齊民而重泄地氣以小喻大人身有瘡不醫即死木有瘡乆不封即亦死地有千万瘡於地何如哉古者八家共一井今家有一井或至大家至于四五井十倍多於古地氣漏泄則所産脆薄人生於地内今之人不若古之人渾剛堅一寜不由地氣洩漏哉易曰改邑不改井此取象言安也非井不可塞也天下每州春秋二時天子許抽當所上賦錫宴其刺史及州吏必廓其地爲大宇以張其事黄州當是地有古井不塞故爲文投實以土題荀文若傳後荀文若爲操畫䇿取兖州比之髙光不棄關中河內官渡不令還許比楚漢成臯凡爲籌計比擬無不以帝王許之海内付之事就功畢欲邀名於漢代委身之道可以爲忠乎世皆曰曹馬且東漢崩裂紛披都遷主播天下大亂操起兵東都提獻帝於徒歩困餓之中南征北伐僅三十年始定三分之業司馬懿安完之代竊發肘下奪偷權柄殘虐狡譎豈可與操比哉若使操不殺伏后不誅孔融不囚楊彪從容於揖譲之間雖慙於三代天下非操而誰可以得之者紂殺一比干武王㫁首燒屍而滅其國桓温四十年間殺千百比干毒流其社稷可以血食乎可以壇墠父天拜郊乎假使當時無操獻帝復能正其國乎假使操不挾獻帝以令天下英雄能與操爭乎若使無操復何人爲蒼生請命乎教盗穴墻發櫃多得金玉巳復不與同挈得不爲盗乎何况非盗也文若之死冝然耶樊川文集卷第六
