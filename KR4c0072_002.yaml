  text: 樊川文集第二
  hash: sha256:6c02c5c80644f8831e47562aaec53d726fc77814d8e6e4ce0f2ce32d305e2973
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0072_SBCK_002-1a}
body:
  text: 中書舍人杜牧字牧之華清宫三十韻繡嶺明珠殿層巒下繚墻仰窺雕檻影猶想赭𫀆光昔帝登封後中原自古強一千年際會三萬里農桑几席延堯舜軒墀立禹湯雷霆馳號令星斗煥文章釣築乘時用芝蘭在處芳北扉間木索南面冨循良至道思玄圃平居厭未央鈎陳裹巖谷文陛壓青蒼歌吹千秋節樓臺八月涼神仙髙縹眇環珮碎丁當泉暖涵窗鏡雲嬌惹粉囊嫩嵐滋翠葆清渭照紅粧帖泰生靈壽歡娛歲序長月聞仙曲調霓作舞衣裳雨露偏金穴軋坤入醉鄉玩兵師漢武回手倒干將鯨鬛掀東海胡牙揭上陽喧呼馬嵬血零落羽林槍傾國留無路還魂怨有香蜀峯橫慘淡秦樹逺微茫鼎重山難轉天扶業更昌望賢餘故老花蕚舊池塘往事人誰問幽襟淚獨傷碧簷斜送日殷葉半凋霜迸水傾瑶砌踈風罅玉房塵埃羯鼓索片假荔枝筐鳥啄摧寒木蝸涎蠧畫梁孤煙知客恨遙起泰陵傍長安雜題長句六首􅒀稜金碧照山高萬國圭璋捧赭𫀆舐筆和鉛欺賈馬讃功論道鄙蕭曹東南樓日珠簾卷西北天宛玉厄豪詩曰鞗革金厄蓋小環四海一家無一事將軍擕鏡泣霜毛晴雲似絮惹低空紫陌微微弄袖風韓嫣金丸莎覆緑許公韉汗杏粘紅煙生窈窕深東第輪撼流蘇下北宫自笑苦無樓護智可憐鉛槧竟何功雨晴九陌鋪江練嵐嫩千峯疊海濤南苑草芳眠錦雉夾城雲暖下霓旄少年羈絡青紋玉遊女花簮紫蒂桃江碧栁深人盡醉一瓢顔巷日空高束帶謬趨文石陛有章曽拜皂囊封期嚴無奈睡留癖勢窘猶為酒泥慵偷釣侯家池上雨醉吟隋寺日沉鐘九原可作吾誰與師友琅琊邴曼容洪河清渭天池濬太白終南地軸橫祥雲輝映漢宫紫春光繡畫秦川明草妬佳人鈿朵色風回公子玉銜聲六飛南幸芙蓉苑十里飄香入夾城豐貂長組金張輩駟馬文衣許史家白鹿原頭回獵騎紫雲樓下醉江花九重樹影連清漢萬夀山光學翠華誰識大君謙讓德聖上不受徽號一毫名利鬪蛙蟇河湟元載相公曽借著憲宗皇帝亦留神旋見衣冠就東市忽遺弓劒不西巡牧羊驅馬雖戎服白髮丹心盡漢臣唯有涼州歌舞曲流傳天下樂間人許七侍御棄官東歸瀟灑江南頗聞自適高秋企望題詩寄贈十韻天子繡衣吏東吳美退居有園同庾信避事學相如蘭畹晴香嫩筠溪翠影踈江山九秋後風月六朝餘錦肆開詩軸青囊結道書霜巖紅薜荔露沼白芙蕖睡雨高梧密棊燈小閣虛凍醪元亮秫寒鱠季鷹魚塵意迷今古雲情識卷舒他年雪中棹陽羡訪吾廬於義興縣近有水榭李給事二首一章緘拜皂囊中栗栗朝廷有古風元禮去歸緱氏學李膺退罷歸緱氏教授生徒給事論鄭注告滿歸頴陽江充來見犬臺宫鄭注對於浴室紛紜白晝驚千古鈇鑕朱殷幾一空曲突徙薪人不會海邉今作釣魚翁晚髮悶還梳憶君秋醉餘可憐劉校尉曽訟石中書給事因忤仇軍容棄官東歸消長雖殊事仁賢每見如因看魯褒論何處是吾廬題永崇西平王宅太尉訴院六韻天下無雙將關西第一雄授符黃石老學劒白猿翁矯矯雲長勇恂恂郤縠風家呼小太尉國號大梁公太尉季弟司徒德亦封梁國公半夜龍驤去中原虎穴空隴山兵十萬嗣子握雕弓今鳯翔李尚書太尉長子東兵長句十韻上黨爭為天下脊邯鄲四十萬秦坑狂童何者欲專地聖主無私豈玩兵玄象森羅搖北落詩人章句詠東征雄如馬武皆彈劒少似終軍亦請纓屈指廟堂無失䇿垂衣堯舜待升平羽林東下雷霆怒楚甲南來組練明即墨龍文光照曜常山蛇陳勢縱橫落雕都尉萬人敵黑矟將軍一鳥輕漸見長圍雲欲合可憐窮壘帶猶縈凱歌應是新年唱便逐春風浩浩聲過勤政樓千秋佳節名空在承露絲囊丗巳無唯有紫苔偏稱意年年因雨上金鋪題魏文貞蟪蛄寧與雪霜期賢哲難教俗士知可憐貞觀太平後天且不留封德彛早春閣下寓直蕭九舍人亦直內署因寄書懷四韻御水𥘉銷凍宫花尚怯寒千峯橫紫翠雙闕憑欄干玉漏輕風順金莖淡日殘王喬在何處清漢正驂鸞秋晚與沈十七舍人期遊樊川不至邀侶以官解泛然成獨遊川光𥘉媚日山色正矜秋野竹踈還密巖泉咽復流杜村連潏水晚步見垂鉤念昔遊十載飄然繩檢外鐏前自獻自為酬秋山春雨間吟處倚遍江南寺寺樓雲門寺越州外逢猛雨林黑山髙雨腳長曽奉郊宫為近侍分明􅑷􅑷先勇切羽林槍李白題詩水西寺宣州涇縣古木回巖樓閣風半醒半醉遊三日紅白花開山雨中今皇帝陛下一詔徴兵不日功集河湟諸郡次第歸降臣獲覩聖功輒獻歌詠捷書皆應睿謀期十萬曽無一鏃遺漢武慚誇朔方地宣王休道太原師威加塞外寒來早恩入河源凍合遲聽取滿城歌舞曲涼州聲韻喜參差奉和白相公聖德和平致兹休運歲終功就合詠盛明呈上三相公長句四韻行看臘破好年光萬夀南山對未央黠戞可汗修職貢文思天子復河湟應須日御西巡守不假星弧北射狼吉甫裁詩歌盛業一篇江漢美宣王過華清宫絶句三首長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來新豐緑樹起黃埃數騎漁陽探使回帝使中使輔璆琳探祿山反否璆琳受祿山金言祿山不反霓裳一曲千峯上舞破中原始下來萬國笙歌醉太平倚天樓殿月分明雲中亂拍祿山舞風過重巒下笑聲登樂遊原長空淡淡孤鳥沒萬古銷沉向此中看取漢家何似業五陵無樹起秋風聞慶州趙縱使君與黨項戰中箭身死長句將軍獨乘鐵驄馬榆溪戰中金僕姑死綏却是古來有驕將自驚今日無青史文章爭點筆朱門歌舞笑捐驅誰知我亦輕生者不得君王丈二殳時珠切送容州中丞赴鎮交址同星座龍泉似斗文燒香翠羽帳看舞鬱金裙鷁首衝瀧浪犀渠拂嶺雲莫教銅柱北空説馬將軍夏州崔常侍自少常亞列出領麾幢十韻帝命詩書將壇登禮樂卿三邉要高枕萬里得長城對客猶褒博填門已斾旌腰間五綬貴天下一家榮野水差新燕芳郊哢夏鶯別風嘶玉勒殘日望金莖榆塞孤煙媚銀川緑草明戈矛虓虎士弓箭落雕兵魏綘言堪採陳湯事偶成若須垂竹帛靜勝是功名街西長句碧池新漲浴嬌鴉分鎖長安冨貴家遊騎偶同人鬪酒名園相倚杏交花銀鞦騕裊嘶宛馬繍鞅璁瓏走細車一曲將軍何處笛連雲芳樹日𥘉斜春申君烈士思酬國士恩春申誰與快冤魂三千賔客總珠履欲使何人殺李園相如死後無詞客延壽亡來絶盡工玉顔不是黃金少淚滴秋山入壽宫此一首奉陵宫人讀韓杜集杜詩韓集愁來讀似倩麻姑癢處􅎲天外鳯凰誰得髓無人解合續弦膠春日言懷寄􅉑州李常侍十韻岸蘚生紅藥巖泉漲碧塘地分蓮嶽秀草接鼎原芳南派潨音叢漴峥江反急風畦芷若香織蓬眠舴艋驚夢起鴛鴦論吐開冰室詩陳曝錦張貂簮荆玉潤丹穴鳯毛光子弟新登甲科今日還珠守何年執戟郎且嫌遊晝短莫問積薪埸無計披清裁唯持祝夀觴願公如衛武百歲尚康強李侍郎於陽羡里冨有泉石牧亦於陽羡粗有薄産敘舊述懷因獻長句四韻冥鴻不下非無意塞馬歸來是偶然紫綬公卿今放矌白頭郎吏尚留連終南山下拋泉洞陽羡溪中買釣船欲與明公操履杖頭聞休去是何年贈李處士長句四韻玉函怪牒鎖靈篆紫洞香風吹碧桃老翁四目牙爪利擲火萬里精神髙靄靄祥雲隨步武纍纍秋冡嘆蓬蒿三山朝去應非久姹女當窗繡羽𫀆送國棊王逢玉子紋楸一路饒最冝簷雨竹蕭蕭嬴形暗去春泉長拔勢橫來野火燒守道還如周伏柱鏖兵不羡霍嫖姚得年七十更萬日與子期於局上銷重送絶句絶藝如君天下少間人似我丗間無別後竹窗風雪夜一燈明暗覆吳圖少年行連環羈玉聲光碎緑錦蔽泥虬卷高春風細雨走馬去珠落璀璀白罽𫀆奉和門下相公送西川相公兼領相印出鎮全蜀詩十八韻盛業冠伊唐台階翊戴光無私天雨露有截舜衣裳蜀輟新衡鏡池留舊鳯凰同心真石友寫恨篾河梁虎騎搖風斾貂冠韻水蒼彤弓隨武庫金印逐文房棧壓嘉陵咽峯橫劒閣長前驅二星去開險五丁忙廽首崢嶸盡連天草樹芳丹心懸魏闕往事愴甘棠治化輕諸葛威聲懾夜郎君平教説卦犬子召升堂塞接西山雪橋維萬里檣奪霞紅錦爛撲地酒爐香忝逐三千客曽依數仞墻滯頑堪白屋攀附亦周行肉管伶倫曲簫韶清廟章唱高知和寡小子斐然狂朱坡下杜鄉園古泉聲繞舍啼靜思長慘切薄宦與乖睽北闕千門外南山午谷西倚川紅葉嶺連寺緑楊堤逈野翹霜鶴澄潭舞錦雞濤驚堆萬岫舸急轉千溪眉點萱牙嫩風條栁幄迷岸藤梢虺尾沙渚印麑蹄火燎湘桃塢波光碧繡畦日䀶絙胡官切翆巘陂影墮晴霓蝸壁斕斑蘚銀延豆􅞦泥洞雲生片假苔徑繚髙低偃蹇松公老森嚴竹陳齊小蓮娃欲語幽笋稚相攜漢館留餘趾周臺接故蹊蟠蛟岡隱隱班雉草萋萋樹老蘿紆組巖深石啓閨侵窗紫桂茂拂面翆禽棲有計冠終挂無才筆謾提自塵何太甚休笑觸藩羝早春寄嶽州李使君李善棊愛酒倩地間雅城高倚峭巘地勝足樓臺朔漠暖鴻去瀟湘春水來縈盈幾多思掩抑若為裁返照三聲角寒香一樹梅烏林芳草逺赤壁健帆開往事空遺恨東流豈不廽分符潁川政弔屈洛陽才拂匣調珠柱磨鉛勘玉杯棊翻小窟勢壚撥凍醪醅詩云為此春酒以介眉壽注云凍醪此興豫非薄何時得奉陪送王侍御赴夏口座主幕君為珠履三千客我是青襟七十徒禮數全優知隗始討論常見念回愚黃鶴樓前春水闊一杯還憶故人無自貽社陵蕭次君遷少去官頻寂寞憐吾道依俙似古人飾心無彩繢到骨是風塵自嫌如匹素刀尺不由身自遣四十巳云老况逢憂窘餘旦抽持板手却展小年書嗜酒狂嫌阮知非晚笑蘧聞流寧嘆吒待俗不親踈遇事知裁剪操心識卷舒還稱二千石於我意何如題桐葉去年桐落故溪上把葉因題歸燕詩江樓今日送歸燕正是去年題業時葉落燕歸真可惜東流玄髮且無期笑筵歌席反惆悵朗月清風見別離莊叟彭殤同在夢陶潛身丗兩相遺一丸五色成虛語石爛松薪更莫疑哆尺也反侈不勞文似錦進趨何必利如錐錢神任尓知無敵酒重於吾亦庶幾江畔秋光蟾閣鏡檻前山翠茂陵眉樽香輕泛數枝菊簷影斜侵半局棊休指宦遊論巧拙秖將愚直禱神祇三吳煙水平生念寧向間人道所之沈下賢斯人清唱何人和草徑苔蕪不可尋一夕小敷山下夢水如環珮月如襟李和鼎鵩鳥飛來庚子直謫去日蝕辛卯年由來枉死賢才事消長相持勢自然贈沈學士張歌人拖袖事當年郎教唱客前斷時輕裂玉收處逺繅煙孤直縆雲定光明滴水圎泥去聲情遲急管流恨咽長絃吳苑春風起河橋酒斾懸慿君更一醉家在杜陵邉憶遊朱坡四韻秋草樊川路斜陽覆盎門獵逢韓嫣騎樹識館陶園帶雨經荷沼盤煙下竹村如今歸不得自戴望天盆朱坡絶句三首故國池塘倚御渠江城三詔換魚書賈生辭賦恨流落秖向長沙住歲餘文帝嵗餘思賈生煙深苔巷唱樵兒花落寒輕倦客歸藤岸竹洲相掩映滿池春雨鸊鵜飛乳肥春洞生鵝管沼避回巖勢犬牙自笑卷懷頭角縮歸盤煙磴恰如蝸出宫人二首間吹玉殿昭華管醉折梨園縹蒂花十年一夢歸人丗絳縷猶封繫臂紗平陽拊背穿馳道銅雀分香下璧門幾向綴珠深殿裏妬拋羞態卧黃昏長安秋望樓倚霜樹外鏡天無一毫南山與秋色氣勢兩相髙獨酌窗外正風雪擁爐開酒缸何如釣船雨蓬底睡秋江醉眠秋醪雨中熟寒齋落葉中幽人本多睡更酌一鐏空不飲贈酒細算人生事彭殤共一籌與愁爭底事要爾作戈矛昔事文皇帝三十二韻昔事文皇帝叨官在諌垣奏章為得地齚齒負明恩金虎知難動毛釐亦耻言撩頭雖欲吐到口却成吞照膽常懸鏡窺天自戴盆周鐘既窕槬胡化切黥陳亦瘢痕鳯闕觚稜影仙盤曉日􅚐雨晴文石滑風暖戟衣翻每慮號無告長憂駭不存隨行户部反唯局蹐出語但寒暄宫省咽喉任戈矛羽衛屯光塵皆影附車馬定西奔億萬持衡價錙銖挾契論堆時過北斗積處滿西園接棹隋河溢連蹄蜀棧刓漉空滄海水搜盡卓王孫鬪巧猴雕刺誇趫索挂跟狐威假白額梟嘯得黃昏馥馥芝蘭圃森森枳棘藩吠聲嗾國猘公議怯膺門竄逐諸丞相蒼茫逺帝閽一名為吉士誰免弔湘魂間丗英明主中興道德尊崑岡憐積火河漢注清源川口隄防決隂車鬼怪掀重雲開㓪照九地雪幽冤我實剛腸者形甘短褐髠曽經觸蠆尾猶得憑熊軒杜若芳洲翠嚴光釣瀨喧溪山侵越角封壤盡吳根客恨縈春細鄉愁壓思繁祝堯千萬壽再拜揖餘樽道一大尹存之學士庭美學士簡于聖明自致霄漢皆與舍第昔年還往牧支離窮悴竊於一麾書美歌詩兼自言志因成長句四韻呈上三君子九金神鼎重丘山五玉諸侯雜珮環星座通霄狼獵暗戍樓吹笛虎牙間斗間紫氣龍埋獄天上洪爐帝鑄顔若念西河舊交友魚符應許出函關杏園夜來微雨洗芳塵公子驊騮步貽勻莫怪杏園憔悴去滿城多少插花人春晚題韋家亭子擁鼻侵襟花草香髙臺春去恨茫茫蔫紅半落平池晚曲渚飄成錦一張過田家宅安邑南門外誰家板築髙奉誠園裏地墻缺見蓬蒿見宋拾遺題名處感而成詩竄逐窮荒與死期餓唯蒿藿病無醫憐君更抱重泉恨不見崇山謫去時雪晴訪趙嘏街西所居三韻命代風騷將誰登李杜壇少陵鯨海動翰苑鶴天寒今日訪君還有意三條冰雪獨來看將赴吳興登樂遊原一絶淸時有味是無能間愛孤雲靜愛僧欲把一麾江海去樂遊原上望昭陵樊川文集卷二
